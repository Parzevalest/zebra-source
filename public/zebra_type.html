      if(resetSeasonPointsBtn) resetSeasonPointsBtn.addEventListener("click", async function(){
        var msg = document.getElementById("resetSeasonPointsMsg");
        function setMsg(t,c){ if(msg){ msg.style.color=c||""; msg.textContent=t; } }
        if(resetSeasonPointsBtn.getAttribute("data-stage") !== "armed"){
          resetSeasonPointsBtn.setAttribute("data-stage", "armed");
          resetSeasonPointsBtn.textContent = "Click again to confirm";
          setTimeout(function(){
            if(resetSeasonPointsBtn && resetSeasonPointsBtn.getAttribute("data-stage") === "armed"){
              resetSeasonPointsBtn.setAttribute("data-stage", "");
              resetSeasonPointsBtn.textContent = "Reset Season Points";
            }
          }, 5000);
          return;
        }
        resetSeasonPointsBtn.setAttribute("data-stage", "");
        resetSeasonPointsBtn.disabled = true; resetSeasonPointsBtn.textContent = "Resetting...";
        setMsg("","");
        try{
          var listRes = await shimList("account:", true).catch(function(){ return { keys:[] }; });
          var keys = listRes.keys || [];
          if(!keys.length && state.user) keys = ["account:"+state.user.username.toLowerCase()];
          var count = 0;
          for(var ki=0; ki<keys.length; ki++){
            var uname = keys[ki].replace(/^account:/,"");
            try{
              var aRes = await getAccount(uname);
              if(aRes.ok && aRes.account){
                if(aRes.account.seasonStats) aRes.account.seasonStats.points = 0;
                await saveAccount(aRes.account);
                if(state.user && uname.toLowerCase() === state.user.username.toLowerCase()) state.user = aRes.account;
                count++;
              }
            }catch(e){}
          }
          setMsg("Done! "+count+" accounts had season points reset.", "var(--green)");
        }catch(e){ setMsg("Error: "+(e.message||String(e)), "var(--red)"); }
        resetSeasonPointsBtn.disabled = false; resetSeasonPointsBtn.textContent = "Reset Season Points";
      });

      // Guild Leaderboard admin controls
      fetchGuildLbConfig().then(function(cfg){
        var statusEl = document.getElementById("guildLbStatus");
        var input = document.getElementById("guildLbEndsAtInput");
        if(!statusEl) return;
        var now = Date.now();
        var isPaused = cfg.paused || (cfg.endsAt && now > cfg.endsAt);
        statusEl.style.color = isPaused ? "var(--red)" : "var(--green)";
        statusEl.textContent = isPaused
          ? "\u23F8 Paused — races not counting" + (cfg.endsAt && now > cfg.endsAt ? " (auto-ended)" : " (manual)")
          : "\u25B6 Active — races counting" + (cfg.endsAt && now <= cfg.endsAt ? " \u00b7 ends " + new Date(cfg.endsAt).toLocaleString() : "");
        if(cfg.endsAt && input){
          var d = new Date(cfg.endsAt);
          d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
          input.value = d.toISOString().slice(0,16);
        }
      });

      var setGuildLbEndBtn = document.getElementById("setGuildLbEndBtn");
      if(setGuildLbEndBtn) setGuildLbEndBtn.addEventListener("click", async function(){
        var input = document.getElementById("guildLbEndsAtInput");
        var msg = document.getElementById("guildLbMsg");
        if(!input || !input.value){ if(msg) msg.textContent = "Pick a date first."; return; }
        var ts = new Date(input.value).getTime();
        if(isNaN(ts)){ if(msg) msg.textContent = "Invalid date."; return; }
        var cfg = await fetchGuildLbConfig();
        cfg.endsAt = ts;
        var res = await saveGuildLbConfig(cfg);
        if(msg) { msg.style.color = res.ok ? "var(--green)" : "var(--red)"; msg.textContent = res.ok ? "End date saved." : "Error: "+res.error; }
        if(res.ok) renderAdminSeason();
      });

      var clearGuildLbEndBtn = document.getElementById("clearGuildLbEndBtn");
      if(clearGuildLbEndBtn) clearGuildLbEndBtn.addEventListener("click", async function(){
        var msg = document.getElementById("guildLbMsg");
        var cfg = await fetchGuildLbConfig();
        cfg.endsAt = null;
        // If it was paused only because it auto-ended, unpause too
        if(!cfg.paused) cfg.paused = false;
        var res = await saveGuildLbConfig(cfg);
        if(msg) { msg.style.color = res.ok ? "var(--green)" : "var(--red)"; msg.textContent = res.ok ? "End date cleared." : "Error: "+res.error; }
        if(res.ok) renderAdminSeason();
      });

      var pauseGuildLbBtn = document.getElementById("pauseGuildLbBtn");
      if(pauseGuildLbBtn) pauseGuildLbBtn.addEventListener("click", async function(){
        var msg = document.getElementById("guildLbMsg");
        var cfg = await fetchGuildLbConfig();
        cfg.paused = true;
        var res = await saveGuildLbConfig(cfg);
        if(msg) { msg.style.color = res.ok ? "var(--green)" : "var(--red)"; msg.textContent = res.ok ? "Guild leaderboard paused." : "Error: "+res.error; }
        if(res.ok) renderAdminSeason();
      });

      var resumeGuildLbBtn = document.getElementById("resumeGuildLbBtn");
      if(resumeGuildLbBtn) resumeGuildLbBtn.addEventListener("click", async function(){
        var msg = document.getElementById("guildLbMsg");
        var cfg = await fetchGuildLbConfig();
        cfg.paused = false;
        // Also clear the endsAt if it's already in the past so it resumes properly
        if(cfg.endsAt && Date.now() > cfg.endsAt) cfg.endsAt = null;
        var res = await saveGuildLbConfig(cfg);
        if(msg) { msg.style.color = res.ok ? "var(--green)" : "var(--red)"; msg.textContent = res.ok ? "Guild leaderboard resumed." : "Error: "+res.error; }
        if(res.ok) renderAdminSeason();
      });

      var resetGuildLbBtn = document.getElementById("resetGuildLbBtn");
      if(resetGuildLbBtn) resetGuildLbBtn.addEventListener("click", async function(){
        var msg = document.getElementById("guildLbMsg");
        if(resetGuildLbBtn.getAttribute("data-stage") !== "armed"){
          resetGuildLbBtn.setAttribute("data-stage", "armed");
          resetGuildLbBtn.textContent = "Click again to confirm";
          setTimeout(function(){
            if(resetGuildLbBtn && resetGuildLbBtn.getAttribute("data-stage") === "armed"){
              resetGuildLbBtn.setAttribute("data-stage", "");
              resetGuildLbBtn.textContent = "Reset All Team Races";
            }
          }, 5000);
          return;
        }
        resetGuildLbBtn.setAttribute("data-stage", "");
        resetGuildLbBtn.disabled = true;
        resetGuildLbBtn.textContent = "Resetting...";
        if(msg) msg.textContent = "";
        try{
          var listRes = await shimList("account:", true).catch(function(){ return { keys:[] }; });
          var keys = listRes.keys || [];
          var count = 0;
          for(var ki = 0; ki < keys.length; ki++){
            var uname = keys[ki].replace(/^account:/, "");
            try{
              var aRes = await getAccount(uname);
              if(aRes.ok && aRes.account && aRes.account.guildStats){
                aRes.account.guildStats = { guildId: aRes.account.guildId || null, races: 0 };
                aRes.account.totalPoints = 0;
                await saveAccount(aRes.account);
                if(state.user && uname.toLowerCase() === state.user.username.toLowerCase()) state.user = aRes.account;
                count++;
              }
            }catch(e){}
          }
          if(msg){ msg.style.color = "var(--green)"; msg.textContent = "Done! " + count + " accounts had team races & points reset."; }
        }catch(e){
          if(msg){ msg.style.color = "var(--red)"; msg.textContent = "Error: " + e.message; }
        }
        resetGuildLbBtn.disabled = false;
        resetGuildLbBtn.textContent = "Reset All Team Races & Points";
      });

      var resetRewardsProgressBtn = document.getElementById("resetRewardsProgressBtn");
      if(resetRewardsProgressBtn) resetRewardsProgressBtn.addEventListener("click", async function(){
        var rpMsg = document.getElementById("resetRewardsProgressMsg");
        function setMsg(text, color){ if(rpMsg){ rpMsg.style.color = color||""; rpMsg.textContent = text; } }

        if(resetRewardsProgressBtn.getAttribute("data-stage") !== "armed"){
          resetRewardsProgressBtn.setAttribute("data-stage", "armed");
          resetRewardsProgressBtn.textContent = "\u26A0\uFE0F CLICK AGAIN TO CONFIRM \u2014 CANNOT BE UNDONE";
          setTimeout(function(){
            if(resetRewardsProgressBtn && resetRewardsProgressBtn.getAttribute("data-stage") === "armed"){
              resetRewardsProgressBtn.setAttribute("data-stage", "");
              resetRewardsProgressBtn.textContent = "\u26A0\uFE0F Reset Rewards Progress";
            }
          }, 5000);
          return;
        }

        resetRewardsProgressBtn.setAttribute("data-stage", "");
        resetRewardsProgressBtn.disabled = true;
        resetRewardsProgressBtn.textContent = "Resetting...";
        setMsg("", "");
        try{
          var rpListRes = await shimList("account:", true).catch(function(){ return { keys:[] }; });
          var rpKeys = rpListRes.keys || [];
          if(rpKeys.length === 0 && state.user){
            rpKeys = ["account:" + state.user.username.toLowerCase()];
          }
          var rpCount = 0;
          for(var rpi = 0; rpi < rpKeys.length; rpi++){
            var rpUser = rpKeys[rpi].replace(/^account:/, "");
            try{
              var rpRes = await getAccount(rpUser);
              if(rpRes.ok && rpRes.account){
                rpRes.account.seasonRacesOffset = rpRes.account.races || 0;
                rpRes.account.seasonFreeClaimedLevel = 0;
                rpRes.account.seasonPremiumClaimedLevel = 0;
                rpRes.account.seasonBonusClaimedCount = 0;
                rpRes.account.claimedSeasonLevels = [];
                rpRes.account.claimedSeasonPremiumLevels = [];
                await saveAccount(rpRes.account);
                rpCount++;
                if(state.user && rpUser.toLowerCase() === state.user.username.toLowerCase()){
                  state.user = rpRes.account;
                }
              }
            }catch(e){ console.warn("Reset failed for", rpUser, e); }
          }
          setMsg("Done! " + rpCount + " account" + (rpCount===1?"":"s") + " reset to level 1.", "var(--green)");
        }catch(e){
          setMsg("Error: " + (e.message||String(e)), "var(--red)");
        }
        resetRewardsProgressBtn.textContent = "\u26A0\uFE0F Reset Rewards Progress";
        resetRewardsProgressBtn.disabled = false;
      });
    }
  }

  function renderAdminSeasonLevelList(cfg){
    var box = document.getElementById("adminSeasonLevelList");
    if(!box) return;
    var levels = cfg.levels || [];
    if(!levels.length){
      box.innerHTML = '<div class="center-note">No levels yet \u2014 add one above.</div>';
      return;
    }
    box.innerHTML = levels.map(function(lvl, i){
      return '<div class="admin-car-row">' +
        '<div style="flex:0 0 36px;text-align:center;font-weight:700;color:var(--muted);">' + (i+1) + '</div>' +
        '<div style="flex:1;min-width:0;font-size:12px;color:var(--text);">' +
          '<div>Free: ' + rewardSummaryText(lvl.freeReward) + '</div>' +
          '<div>Premium: ' + rewardSummaryText(lvl.premiumReward) + '</div>' +
        '</div>' +
        '<button class="small-btn" data-edit-level="' + i + '" style="margin-right:6px;">Edit</button>' +
        '<button class="small-btn" data-del-level="' + i + '">Delete</button>' +
      '</div>';
    }).join("");

    box.querySelectorAll("[data-edit-level]").forEach(function(btn){
      btn.addEventListener("click", function(){
        state.adminSeasonEditingIndex = parseInt(btn.getAttribute("data-edit-level"), 10);
        renderAdminSeason();
      });
    });
    box.querySelectorAll("[data-del-level]").forEach(function(btn){
      btn.addEventListener("click", async function(){
        var idx = parseInt(btn.getAttribute("data-del-level"), 10);
        btn.disabled = true; btn.textContent = "...";
        var fresh = await fetchSeasonConfig();
        fresh.levels = (fresh.levels || []).filter(function(l, i){ return i !== idx; });
        await saveSeasonConfig(fresh);
        if(state.adminSeasonEditingIndex === idx) state.adminSeasonEditingIndex = null;
        renderAdminSeasonLevelList(fresh);
      });
    });
  }

  /* ── Admin: Track tab ────────────────────────────────────────────────── */
  var TRACK_EDITOR_SCALE = 1.5; // zoom level for the car-position editing canvas
  var trackDragHandlers = null; // mousemove/up listeners currently attached for the drag-to-position editor, if any

  function renderAdminPassages(){
    if(!state.isAdmin){ state.screen = "auth"; renderApp(); return; }
    state.adminTab = "passages";

    app.innerHTML =
      brandHeader() +
      adminNavBar("passages") +
      '<div class="panel">' +
        '<div class="garage-title" style="color:var(--text);font-size:18px;margin-bottom:4px;">Race Passage Texts</div>' +
        '<div class="hint-text" style="margin-top:0;margin-bottom:16px;">Paste large bodies of text below. Each entry is one text source. The race server picks a random sentence-start position from a random text and gives each player a chunk sized to their personal WPM for a ~20 second race.</div>' +
        '<div id="passagesList"><div class="center-note">Loading...</div></div>' +
        '<div class="garage-title" style="color:var(--text);font-size:16px;margin-top:22px;margin-bottom:8px;">Add New Text</div>' +
        '<textarea id="newPassageText" rows="8" placeholder="Paste a large body of text here (at least 200 characters). The race engine will find sentence boundaries and slice appropriately sized passages from it." style="width:100%;background:var(--panel-2);color:var(--text);border:1px solid var(--line);border-radius:8px;padding:12px;font-size:14px;line-height:1.5;resize:vertical;box-sizing:border-box;"></textarea>' +
        '<div class="error-text" id="passageAddError" style="margin-top:6px;"></div>' +
        '<button class="btn btn-primary" id="addPassageBtn" style="margin-top:10px;">Add Text</button>' +
      '</div>';

    attachAdminNavListeners();

    // Load existing passages
    shimGet("race_passages", true).then(function(res){
      var texts = [];
      try{ if(res && res.value) texts = JSON.parse(res.value); }catch(e){}
      var listEl = document.getElementById("passagesList");
      if(!listEl) return;
      if(!texts.length){
        listEl.innerHTML = '<div class="center-note">No custom texts yet. Fallback passages will be used until you add one.</div>';
      } else {
        listEl.innerHTML = texts.map(function(t, i){
          var preview = t.length > 120 ? t.slice(0, 120) + "\u2026" : t;
          return '<div style="background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:14px;margin-bottom:10px;">' +
            '<div style="font-size:12px;color:var(--muted);margin-bottom:6px;">' + t.length + ' characters</div>' +
            '<div style="font-size:13px;color:var(--text);line-height:1.5;margin-bottom:10px;">' + escapeHtml(preview) + '</div>' +
            '<textarea data-passage-edit="' + i + '" rows="5" style="width:100%;background:var(--panel);color:var(--text);border:1px solid var(--line);border-radius:6px;padding:10px;font-size:13px;line-height:1.5;resize:vertical;box-sizing:border-box;margin-bottom:8px;">' + escapeHtml(t) + '</textarea>' +
            '<div style="display:flex;gap:8px;">' +
              '<button class="btn btn-primary" data-passage-save="' + i + '" style="padding:8px 14px;font-size:13px;">Save</button>' +
              '<button class="btn btn-ghost" data-passage-delete="' + i + '" style="padding:8px 14px;font-size:13px;color:var(--red);border-color:var(--red);">Delete</button>' +
            '</div>' +
          '</div>';
        }).join("");

        // Save individual text
        document.querySelectorAll("[data-passage-save]").forEach(function(btn){
          btn.addEventListener("click", async function(){
            var idx = parseInt(btn.getAttribute("data-passage-save"), 10);
            var ta = document.querySelector('[data-passage-edit="' + idx + '"]');
            var val = ta ? ta.value.trim() : "";
            if(val.length < 100){ alert("Text is too short — needs at least 100 characters."); return; }
            texts[idx] = val;
            await shimSet("race_passages", JSON.stringify(texts), true);
            renderAdminPassages();
          });
        });

        // Delete a text
        document.querySelectorAll("[data-passage-delete]").forEach(function(btn){
          btn.addEventListener("click", async function(){
            var idx = parseInt(btn.getAttribute("data-passage-delete"), 10);
            if(!confirm("Delete this passage text?")) return;
            texts.splice(idx, 1);
            await shimSet("race_passages", JSON.stringify(texts), true);
            renderAdminPassages();
          });
        });
      }
    }).catch(function(){ 
      var listEl = document.getElementById("passagesList");
      if(listEl) listEl.innerHTML = '<div class="center-note">No custom texts yet.</div>';
    });

    // Add new passage text
    document.getElementById("addPassageBtn").addEventListener("click", async function(){
      var errEl = document.getElementById("passageAddError");
      errEl.textContent = "";
      var val = document.getElementById("newPassageText").value.trim();
      if(val.length < 100){ errEl.textContent = "Text must be at least 100 characters."; return; }
      var res = await shimGet("race_passages", true).catch(function(){ return null; });
      var texts = [];
      try{ if(res && res.value) texts = JSON.parse(res.value); }catch(e){}
      texts.push(val);
      await shimSet("race_passages", JSON.stringify(texts), true);
      renderAdminPassages();
    });
  }

      var yInputsHtml = [0,1,2,3].map(function(i){
        return '<label style="display:flex;align-items:center;gap:6px;font-size:13px;">' + laneLabels[i] + ' Y <input type="number" class="carStartYInput" data-lane="' + i + '" style="width:64px;background:var(--panel-2);color:var(--text);border:1px solid var(--line);border-radius:6px;padding:6px 8px;" /></label>';
      }).join("");

      wrap.innerHTML =
        '<div class="field">' +
          '<label>Car Start Positions</label>' +
          '<div class="hint-text" style="margin-top:0;">Drag any car straight up or down onto its lane\u2019s spot, or set exact Y per lane below. All four cars share the same X (the shared start line below) \u2014 only how far up/down each lane sits can differ.</div>' +
          '<div id="trackPosCanvas" style="position:relative;width:' + (containerW*scale) + 'px;max-width:100%;height:' + (containerH*scale) + 'px;background-color:var(--panel-2);background-image:url(' + "'" + pendingTrackImage + "'" + ');background-repeat:repeat-x;background-size:auto 100%;border:1px solid var(--line);border-radius:8px;margin:10px auto;overflow:hidden;">' +
            laneOutlinesHtml +
            carsHtml +
          '</div>' +
          '<div style="display:flex;align-items:center;justify-content:center;gap:6px;font-size:13px;margin-top:10px;">' +
            '<label style="display:flex;align-items:center;gap:6px;">Shared X (all lanes) <input type="number" id="carStartXInput" style="width:64px;background:var(--panel-2);color:var(--text);border:1px solid var(--line);border-radius:6px;padding:6px 8px;" /></label>' +
          '</div>' +
          '<div style="display:flex;gap:14px;align-items:center;justify-content:center;margin-top:10px;flex-wrap:wrap;">' +
            yInputsHtml +
          '</div>' +
          '<div style="text-align:center;margin-top:10px;">' +
            '<button class="small-btn" id="resetCarPosBtn">Reset All Positions</button>' +
          '</div>' +
        '</div>';

      wireCarPositionDrag();
      syncCarPositionInputs();
    }

    function syncCarPositionInputs(){
      var xInput = document.getElementById("carStartXInput");
      if(xInput) xInput.value = pendingCarStartX;
      pendingCarStartYByLane.forEach(function(y, i){
        var yInput = document.querySelector('.carStartYInput[data-lane="' + i + '"]');
        if(yInput) yInput.value = y;
        var carEl = document.querySelector('.track-pos-car[data-lane="' + i + '"]');
        if(carEl){
          carEl.style.left = (pendingCarStartX * TRACK_EDITOR_SCALE) + "px";
          carEl.style.top = (y * TRACK_EDITOR_SCALE) + "px";
        }
      });
    }

    function wireCarPositionDrag(){
      var xInput = document.getElementById("carStartXInput");
      var resetBtn = document.getElementById("resetCarPosBtn");
      if(!xInput) return;

      function pointFromEvent(e){
        if(e.touches && e.touches[0]) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
        return { x: e.clientX, y: e.clientY };
      }

      // One shared drag state, reused for whichever car is currently
      // being dragged — only the Y coordinate moves; X stays locked to
      // the single shared value no matter how far sideways the pointer
      // strays, since all 4 cars must line up at the same start line.
      var dragging = false;
      var draggingLane = null;
      var startClientY = 0, startY = 0;

      function onMove(e){
        if(!dragging || draggingLane === null) return;
        var p = pointFromEvent(e);
        var dy = Math.round((p.y - startClientY) / TRACK_EDITOR_SCALE);
        pendingCarStartYByLane[draggingLane] = startY + dy;
        syncCarPositionInputs();
      }
      function onUp(){ dragging = false; draggingLane = null; }

      document.querySelectorAll(".track-pos-car").forEach(function(carEl){
        var lane = parseInt(carEl.getAttribute("data-lane"), 10);
        carEl.addEventListener("mousedown", function(e){
          e.preventDefault();
          dragging = true; draggingLane = lane;
          var p = pointFromEvent(e);
          startClientY = p.y;
          startY = pendingCarStartYByLane[lane];
        });
        carEl.addEventListener("touchstart", function(e){
          dragging = true; draggingLane = lane;
          var p = pointFromEvent(e);
          startClientY = p.y;
          startY = pendingCarStartYByLane[lane];
        }, { passive: true });
      });

      document.addEventListener("mousemove", onMove);
      document.addEventListener("mouseup", onUp);
      document.addEventListener("touchmove", onMove);
      document.addEventListener("touchend", onUp);
      trackDragHandlers = { move: onMove, up: onUp };

      xInput.addEventListener("input", function(){
        pendingCarStartX = parseInt(this.value, 10) || 0;
        document.querySelectorAll(".track-pos-car").forEach(function(carEl){
          carEl.style.left = (pendingCarStartX * TRACK_EDITOR_SCALE) + "px";
        });
      });

      document.querySelectorAll(".carStartYInput").forEach(function(yInput){
        yInput.addEventListener("input", function(){
          var lane = parseInt(this.getAttribute("data-lane"), 10);
          pendingCarStartYByLane[lane] = parseInt(this.value, 10) || 0;
          var carEl = document.querySelector('.track-pos-car[data-lane="' + lane + '"]');
          if(carEl) carEl.style.top = (pendingCarStartYByLane[lane] * TRACK_EDITOR_SCALE) + "px";
        });
      });

      resetBtn.addEventListener("click", function(){
        pendingCarStartX = CAR_FIXED_LEFT_PX;
        pendingCarStartYByLane = [8, 8, 8, 8];
        syncCarPositionInputs();
      });
    }

    document.getElementById("trackImageFile").addEventListener("change", function(e){
      var file = e.target.files && e.target.files[0];
      var note = document.getElementById("trackImageNote");
      note.textContent = "";
      if(!file) return;
      if(file.size > 5 * 1024 * 1024){
        note.textContent = "File over 5MB \u2014 pick something smaller.";
        e.target.value = ""; return;
      }
      var reader = new FileReader();
      reader.onload = function(){
        pendingTrackImage = reader.result;
        var img = new Image();
        img.onload = function(){
          pendingDims = { width: img.naturalWidth, height: img.naturalHeight };
          if(img.naturalHeight !== TRACK_FULL_HEIGHT_PX){
            note.textContent = "Heads up: image is " + img.naturalHeight + "px tall, not " + TRACK_FULL_HEIGHT_PX + "px (the height of all 4 lanes together) \u2014 it'll still work, just scaled (may blur a bit).";
          }
          renderCarPositionTool();
        };
        img.src = pendingTrackImage;
      };
      reader.readAsDataURL(file);
    });

    if(editingId){
      document.getElementById("cancelEditTrackBtn").addEventListener("click", function(){
        state.adminEditingTrackId = null;
        renderAdminTrack();
      });
      fetchTracks().then(function(list){
        var track = list.find(function(t){ return t.id === editingId; });
        if(!track) return;
        document.getElementById("trackName").value = track.name || "";
        pendingTrackImage = track.image;
        pendingDims = { width: track.width, height: track.height };
        pendingCarStartX = (typeof track.carStartX === "number") ? track.carStartX : CAR_FIXED_LEFT_PX;
        // Falls back to the old single carStartY (pre-multi-lane tracks)
        // applied to every lane, then to the CSS default, so editing a
        // track saved before this feature existed doesn't show blank/zero
        // positions for lanes 2-4.
        if(Array.isArray(track.carStartYByLane) && track.carStartYByLane.length === 4){
          pendingCarStartYByLane = track.carStartYByLane.slice();
        } else if(typeof track.carStartY === "number"){
          pendingCarStartYByLane = [track.carStartY, track.carStartY, track.carStartY, track.carStartY];
        } else {
          pendingCarStartYByLane = [8, 8, 8, 8];
        }
        renderCarPositionTool();
      });
    }

    document.getElementById("saveTrackBtn").addEventListener("click", async function(){
      var msg = document.getElementById("trackSaveMsg");
      var name = document.getElementById("trackName").value.trim();
      msg.textContent = "";
      if(!name){ msg.textContent = "Give the track a name."; return; }
      if(!pendingTrackImage || !pendingDims){ msg.textContent = "Choose an image first."; return; }

      var btn = document.getElementById("saveTrackBtn");
      btn.disabled = true; btn.textContent = editingId ? "Saving..." : "Adding...";
      try{
        var list = await fetchTracks();
        var entry = {
          name: name, image: pendingTrackImage, width: pendingDims.width, height: pendingDims.height,
          carStartX: pendingCarStartX, carStartYByLane: pendingCarStartYByLane.slice()
        };
        if(editingId){
          var idx = list.findIndex(function(t){ return t.id === editingId; });
          if(idx === -1){ msg.textContent = "This track no longer exists."; return; }
          list[idx] = Object.assign({}, list[idx], entry);
          delete list[idx].carStartY; // legacy single-Y field, fully replaced by carStartYByLane now
        } else {
          entry.id = "track_" + Date.now() + "_" + Math.floor(Math.random()*10000);
          entry.createdAt = Date.now();
          list.push(entry);
        }
        var saveRes = await saveTracks(list);
        if(!saveRes.ok){ msg.textContent = "Couldn\u2019t save: " + saveRes.error; return; }
        tracksCache = list;
        state.adminEditingTrackId = null;
        renderAdminTrack();
      }catch(e){
        msg.textContent = "Unexpected error: " + ((e&&e.message)?e.message:String(e));
      }finally{
        btn.disabled = false; btn.textContent = editingId ? "Save Changes" : "Add Track";
      }
    });

    if(editingId) renderCarPositionTool();
    renderAdminTrackList();
  }

    // Load full index

    async function loadIndex(){
      var listEl = document.getElementById("playerIndexList");
      if(listEl) listEl.innerHTML = '<div class="center-note">Loading players\u2026</div>';
      try{
        var listRes = await shimList("account:", true);

      var listEl = document.getElementById("playerIndexList");

      if(!filtered.length){

        '<div style="font-size:12px;color:var(--muted);margin-bottom:8px;">' + filtered.length + ' player' + (filtered.length===1?'':'s') + (q ? ' matching \u201c'+escapeHtml(q)+'\u201d' : '') + '</div>' +
        '<div style="display:flex;flex-wrap:wrap;gap:6px;">' +
          filtered.map(function(u){

          errEl.textContent = "";

    // Search input filters the index live
    document.getElementById("playerSearchInput").addEventListener("input", function(){
      var q = this.value.trim();
      renderIndex(q);
    });

    document.getElementById("playerSearchBtn").addEventListener("click", function(){
      var username = document.getElementById("playerSearchInput").value.trim();
      var errEl = document.getElementById("playerSearchError");
      errEl.textContent = "";

  async function loadPlayerForAdmin(username, errEl){
    var btn = document.getElementById("playerSearchBtn");
    if(btn){ btn.disabled = true; btn.textContent = "Searching..."; }
    try{
      var res = await getAccount(username);
      if(!res.ok){
        if(errEl) errEl.textContent = "Couldn't reach storage: " + res.error;
        return;
      }
      if(!res.account){
        if(errEl) errEl.textContent = "No player found with that username.";
        document.getElementById("playerDetailPanel").innerHTML = "";
        return;
      }
      var cars = await fetchCustomCars();
      renderPlayerDetail(res.account, cars);
    }catch(e){
      if(errEl) errEl.textContent = "Unexpected error: " + ((e&&e.message)?e.message:String(e));
    }finally{
      if(btn){ btn.disabled = false; btn.textContent = "Find Player"; }
    }
  }

  function renderPlayerDetail(acc, allCustomCars){
    var panel = document.getElementById("playerDetailPanel");
    if(!panel) return;

    // Self-heal corrupted WPM/accuracy sums: if the derived average is
    // physically impossible (>300 WPM or >100% avg accuracy) the sums
    // are out of sync with the race count — zero them out so the display
    // and future races are correct. Persist the fix silently.
    var races = acc.races || 0;
    var derivedAvgWpm = races ? Math.round((acc.sumWpm||0) / races) : 0;
    var derivedAvgAcc = races ? Math.round((acc.sumAccuracy||0) / races) : 0;
    if(derivedAvgWpm > 300 || derivedAvgAcc > 100){
      acc.sumWpm = 0; acc.sumAccuracy = 0;
      persist(acc); // fire-and-forget heal
    }

    // Build the list of cars this player owns: starter car + any custom
    // cars in their ownedCarIds, each paired with its per-car stats.
    var ownedIds = acc.ownedCarIds || [];
    var ownedCustom = allCustomCars.filter(function(c){ return ownedIds.indexOf(c.id) !== -1; });
    var playerCars = [STARTER_CAR].concat(ownedCustom);

    var carRowsHtml = playerCars.map(function(c){
      var carId = c.id || "starter_car";
      var stats = (acc.carStats && acc.carStats[carId]) || { races:0 };
      var races = stats.races || 0;
      var rank = masteryRank(races);
      var isStarter = carId === "starter_car";
      var qty = isStarter ? null : getCarQuantity(acc, carId);
      return '<div class="admin-car-row">' +
        '<div class="admin-car-thumb">' + carVisualHtml(c) + '</div>' +
        '<div style="flex:1;min-width:0;">' +
          '<div style="font-weight:700;font-size:14px;">' + escapeHtml(c.name || "Car") + '</div>' +
          '<div style="font-size:12px;color:var(--muted);">' + races + ' races \u2022 ' + escapeHtml(rank) +
            (qty !== null ? ' \u2022 <span style="color:var(--text);font-weight:700;">x' + qty + '</span>' : '') +
          '</div>' +
        '</div>' +
        (state.isSuperAdmin ?
          '<input type="number" class="car-race-delta" data-car-id="' + escapeHtml(carId) + '" value="10" min="1" ' +
          'style="width:64px;background:var(--panel-2);color:var(--text);border:1px solid var(--line);border-radius:6px;padding:6px 8px;font-size:13px;" />' +
          '<button class="small-btn" data-car-add="' + escapeHtml(carId) + '">+ Add</button>' +
          '<button class="small-btn" data-car-remove="' + escapeHtml(carId) + '">\u2212 Remove</button>' +
          (isStarter ? '' :
            '<div style="display:flex;align-items:center;gap:4px;margin-left:6px;">' +
              '<input type="number" data-car-qty-input="' + escapeHtml(carId) + '" value="1" min="1" max="' + (qty||1) + '" ' +
              'style="width:52px;background:var(--panel-2);color:var(--text);border:1px solid var(--line);border-radius:6px;padding:6px 8px;font-size:13px;" />' +
              '<button class="small-btn" data-car-remove-qty="' + escapeHtml(carId) + '" style="color:var(--red);border-color:var(--red);">Remove Qty</button>' +
              '<button class="small-btn" data-car-take-away="' + escapeHtml(carId) + '" style="color:var(--red);border-color:var(--red);">Take All</button>' +
            '</div>'
          )
        : '') +
      '</div>';
    }).join("");

    panel.innerHTML =
      '<div class="panel" style="margin-top:18px;">' +
        '<div class="garage-title" style="color:var(--text);font-size:18px;margin-bottom:2px;">' + escapeHtml(acc.username) + '</div>' +

        var newName = document.getElementById("newUsernameInput").value.trim();
        if(!newName){ renameErr.textContent = "Enter a username."; return; }
        if(!/^[a-zA-Z0-9_]{4,20}$/.test(newName)){
          renameErr.textContent = "Username must be 4\u201320 characters: letters, numbers, underscore."; return;
        }
        if(newName.toLowerCase() === acc.username.toLowerCase()){
          renameErr.textContent = "That's already their username."; return;
        }
        // Check if new username is already taken
        var renameCheck = await fetch(SERVER_URL + "/api/check-username/" + encodeURIComponent(newName.toLowerCase()));
        if(renameCheck.ok && (await renameCheck.json()).taken){ renameErr.textContent = "That username is already taken."; return; }
        // Save under new key, delete old key
        var oldUsername = acc.username;
        acc.username = newName;
        var saveRes = await saveAccount(acc);
        if(!saveRes.ok){ acc.username = oldUsername; renameErr.textContent = "Save failed: " + saveRes.error; return; }
        await shimDelete(accountKey(oldUsername), true);

        // If they're in a guild, update that guild's membership references
        // so the roster keeps pointing at the renamed account instead of
        // the now-deleted old username.
        if(acc.guildId){
          try{
            var renamedGuild = await fetchGuild(acc.guildId);
            if(renamedGuild){
              var oldLower = oldUsername.toLowerCase();
              var newLower = newName.toLowerCase();
              if(renamedGuild.memberUsernames){
                renamedGuild.memberUsernames = renamedGuild.memberUsernames.map(function(u){
                  return u.toLowerCase() === oldLower ? newName : u;
                });
              }
              if(renamedGuild.leaderUsername && renamedGuild.leaderUsername.toLowerCase() === oldLower){
                renamedGuild.leaderUsername = newName;
              }
              if(renamedGuild.coLeaderUsernames){
                renamedGuild.coLeaderUsernames = renamedGuild.coLeaderUsernames.map(function(u){
                  return u.toLowerCase() === oldLower ? newName : u;
                });
              }
              await saveGuild(renamedGuild);
            }
          }catch(e){ /* guild sync best-effort — don't block the rename on this */ }
        }

    // ---- Race History Chart ----
    var raceLog = acc.recentRaceLog || [];

    function drawChart(filter){
      ["1h","24h","7d","All"].forEach(function(f){
        var btn = document.getElementById("statsFilter" + f);
        if(!btn) return;
        btn.style.background = (f === filter) ? "var(--text)" : "";
        btn.style.color = (f === filter) ? "var(--bg)" : "";
      });
      var now = Date.now();
      var cutoff = filter === "1h" ? now - 3600000
                 : filter === "24h" ? now - 86400000
                 : filter === "7d"  ? now - 604800000
                 : 0;
      var filtered = raceLog.filter(function(r){ return r.ts >= cutoff; }).sort(function(a,b){ return a.ts-b.ts; });
      var canvas = document.getElementById("playerStatsChart");
      var emptyEl = document.getElementById("playerStatsEmpty");
      if(!canvas) return;
      if(!filtered.length){
        canvas.style.display="none";
        if(emptyEl) emptyEl.style.display="";
        return;
      }
      canvas.style.display=""; if(emptyEl) emptyEl.style.display="none";
      var dpr = window.devicePixelRatio||1;
      var W = canvas.parentElement.clientWidth||400, H=180;
      canvas.width=W*dpr; canvas.height=H*dpr;
      canvas.style.width=W+"px"; canvas.style.height=H+"px";
      var ctx=canvas.getContext("2d"); ctx.scale(dpr,dpr); ctx.clearRect(0,0,W,H);
      var PAD={top:16,right:10,bottom:28,left:36};
      var cW=W-PAD.left-PAD.right, cH=H-PAD.top-PAD.bottom;
      var maxWpm=Math.max.apply(null,filtered.map(function(r){return r.wpm||0;}));
      var maxY=Math.max(maxWpm*1.15,60);
      // Grid
      ctx.strokeStyle="rgba(255,255,255,0.07)"; ctx.lineWidth=1;
      for(var gi=0;gi<=4;gi++){
        var gy=PAD.top+(gi/4)*cH;
        ctx.beginPath(); ctx.moveTo(PAD.left,gy); ctx.lineTo(PAD.left+cW,gy); ctx.stroke();
        ctx.fillStyle="rgba(255,255,255,0.4)"; ctx.font="10px sans-serif"; ctx.textAlign="right";
        ctx.fillText(Math.round(maxY*(1-gi/4)),PAD.left-4,gy+3);
      }
      function xPos(i){return PAD.left+(filtered.length>1?(i/(filtered.length-1))*cW:cW/2);}
      function yWpm(v){return PAD.top+cH-(Math.min(v,maxY)/maxY)*cH;}
      function yAcc(v){return PAD.top+cH-(Math.min(v,100)/100)*cH;}
      // WPM line+dots
      ctx.beginPath(); ctx.strokeStyle="#63b3ed"; ctx.lineWidth=2;
      filtered.forEach(function(r,i){i===0?ctx.moveTo(xPos(i),yWpm(r.wpm||0)):ctx.lineTo(xPos(i),yWpm(r.wpm||0));});
      ctx.stroke();
      ctx.fillStyle="#63b3ed";
      filtered.forEach(function(r,i){ctx.beginPath();ctx.arc(xPos(i),yWpm(r.wpm||0),3,0,Math.PI*2);ctx.fill();});
      // Accuracy line+dots
      ctx.beginPath(); ctx.strokeStyle="#68d391"; ctx.lineWidth=1.5; ctx.setLineDash([4,3]);
      filtered.forEach(function(r,i){i===0?ctx.moveTo(xPos(i),yAcc(r.accuracy||0)):ctx.lineTo(xPos(i),yAcc(r.accuracy||0));});
      ctx.stroke(); ctx.setLineDash([]);
      ctx.fillStyle="#68d391";
      filtered.forEach(function(r,i){ctx.beginPath();ctx.arc(xPos(i),yAcc(r.accuracy||0),2.5,0,Math.PI*2);ctx.fill();});
      // X labels
      ctx.fillStyle="rgba(255,255,255,0.35)"; ctx.font="9px sans-serif"; ctx.textAlign="center";
      var step=Math.max(1,Math.floor(filtered.length/6));
      filtered.forEach(function(r,i){
        if(i%step===0||i===filtered.length-1){
          var d=new Date(r.ts);
          var label=(filter==="7d"||filter==="All")?(d.getMonth()+1)+"/"+(d.getDate()):d.getHours().toString().padStart(2,"0")+":"+d.getMinutes().toString().padStart(2,"0");
          ctx.fillText(label,xPos(i),H-6);
        }
      });
      // Summary
      var avgWpm=Math.round(filtered.reduce(function(s,r){return s+(r.wpm||0);},0)/filtered.length);
      var avgAcc=Math.round(filtered.reduce(function(s,r){return s+(r.accuracy||0);},0)/filtered.length);
      var bestWpm=Math.max.apply(null,filtered.map(function(r){return r.wpm||0;}));
      ctx.fillStyle="rgba(255,255,255,0.5)"; ctx.font="10px sans-serif"; ctx.textAlign="left";
      ctx.fillText(filtered.length+" races  avg "+avgWpm+" WPM  best "+bestWpm+" WPM  avg "+avgAcc+"% acc",PAD.left,PAD.top-2);
    }
    drawChart("24h");
    ["1h","24h","7d","All"].forEach(function(f){
      var btn=document.getElementById("statsFilter"+f);
      if(btn) btn.addEventListener("click",function(){drawChart(f);});
    });
  }

            note.textContent = "Heads up: image is " + img.naturalWidth + "px wide, not " + dims.w + "px.";
          }

            var def = defaultHeadOffsets(pendingAvatarNaturalW, pendingAvatarNaturalH);
            pendingHeadOffsetX = def.x;
            pendingHeadOffsetY = def.y;
            renderHeadPositionTool();
          }
        };
        img.src = pendingAvatarImage;
      };
      reader.readAsDataURL(file);

            pendingHeadOffsetY = (typeof piece.headOffsetY === "number") ? piece.headOffsetY : defaultHeadOffsets(pendingAvatarNaturalW, pendingAvatarNaturalH).y;

    document.getElementById("saveAvatarPieceBtn").addEventListener("click", async function(){

    // avatarPositionEditorHtml/wireAvatarPositionDrag are defined below,
    // but need `syncHeadPositionInputs` from this closure, so they're
    // declared as inner functions here rather than top-level.
    function avatarPositionEditorHtml(){
      var scale = AVATAR_EDITOR_SCALE;
      var cw = AVATAR_CANVAS_WIDTH * scale;
      var ch = AVATAR_CANVAS_HEIGHT * scale;
      var headW = (pendingAvatarNaturalW || AVATAR_SLOT_DIMENSIONS.head.w) * scale;
      var headH = (pendingAvatarNaturalH || AVATAR_SLOT_DIMENSIONS.head.h) * scale;

      function blockStyle(top, h, color){
        return 'position:absolute;left:0;top:' + (top*scale) + 'px;width:' + (AVATAR_CANVAS_WIDTH*scale) + 'px;height:' + (h*scale) + 'px;background:' + color + ';';
      }

      return '<div class="field">' +
          '<label>Position the head</label>' +
          '<div class="hint-text" style="margin-top:0;">Drag the head on the mock avatar, or set exact X/Y below.</div>' +
          '<div id="avatarPosCanvas" style="position:relative;width:' + cw + 'px;height:' + ch + 'px;background:repeating-conic-gradient(#1c1d22 0% 25%, #222329 0% 50%) 0 0/16px 16px;border:1px solid var(--line);border-radius:8px;margin:10px auto;overflow:visible;">' +
            '<div style="' + blockStyle(AVATAR_SHOES_TOP, AVATAR_SLOT_DIMENSIONS.shoes.h, "#2e2f33") + '"></div>' +
            '<div style="' + blockStyle(AVATAR_PANTS_TOP, AVATAR_SLOT_DIMENSIONS.pants.h, "#46484e") + '"></div>' +
            '<div style="' + blockStyle(AVATAR_SHIRT_TOP, AVATAR_SLOT_DIMENSIONS.shirt.h, "#5b5e66") + '"></div>' +
            '<img id="avatarPosHeadImg" src="' + pendingAvatarImage + '" alt="" style="position:absolute;left:' + (pendingHeadOffsetX*scale) + 'px;top:' + (pendingHeadOffsetY*scale) + 'px;width:' + headW + 'px;height:' + headH + 'px;cursor:grab;image-rendering:pixelated;user-select:none;" draggable="false" />' +
          '</div>' +
          '<div style="display:flex;gap:14px;align-items:center;justify-content:center;margin-top:8px;flex-wrap:wrap;">' +
            '<label style="display:flex;align-items:center;gap:6px;font-size:13px;">X <input type="number" id="headOffsetXInput" style="width:64px;background:var(--panel-2);color:var(--text);border:1px solid var(--line);border-radius:6px;padding:6px 8px;" /></label>' +
            '<label style="display:flex;align-items:center;gap:6px;font-size:13px;">Y <input type="number" id="headOffsetYInput" style="width:64px;background:var(--panel-2);color:var(--text);border:1px solid var(--line);border-radius:6px;padding:6px 8px;" /></label>' +
            '<button class="small-btn" id="resetHeadPosBtn">Reset Position</button>' +
          '</div>' +
        '</div>';
    }

    function wireAvatarPositionDrag(){
      var headImg = document.getElementById("avatarPosHeadImg");
      var xInput = document.getElementById("headOffsetXInput");
      var yInput = document.getElementById("headOffsetYInput");
      var resetBtn = document.getElementById("resetHeadPosBtn");
      if(!headImg) return;

      var dragging = false;
      var startClientX = 0, startClientY = 0, startOffsetX = 0, startOffsetY = 0;

      function pointFromEvent(e){
        if(e.touches && e.touches[0]) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
        return { x: e.clientX, y: e.clientY };
      }

      function onMove(e){
        if(!dragging) return;
        var p = pointFromEvent(e);
        var dxNative = Math.round((p.x - startClientX) / AVATAR_EDITOR_SCALE);
        var dyNative = Math.round((p.y - startClientY) / AVATAR_EDITOR_SCALE);
        pendingHeadOffsetX = startOffsetX + dxNative;
        pendingHeadOffsetY = startOffsetY + dyNative;
        syncHeadPositionInputs();
      }
      function onUp(){ dragging = false; }

      headImg.addEventListener("mousedown", function(e){
        e.preventDefault();
        dragging = true;
        var p = pointFromEvent(e);
        startClientX = p.x; startClientY = p.y;
        startOffsetX = pendingHeadOffsetX; startOffsetY = pendingHeadOffsetY;
      });
      headImg.addEventListener("touchstart", function(e){
        dragging = true;
        var p = pointFromEvent(e);
        startClientX = p.x; startClientY = p.y;
        startOffsetX = pendingHeadOffsetX; startOffsetY = pendingHeadOffsetY;
      }, { passive: true });

      document.addEventListener("mousemove", onMove);
      document.addEventListener("mouseup", onUp);
      document.addEventListener("touchmove", onMove);
      document.addEventListener("touchend", onUp);
      avatarDragHandlers = { move: onMove, up: onUp };

      xInput.addEventListener("input", function(){
        pendingHeadOffsetX = parseInt(this.value, 10) || 0;
        var img2 = document.getElementById("avatarPosHeadImg");
        if(img2) img2.style.left = (pendingHeadOffsetX * AVATAR_EDITOR_SCALE) + "px";
      });
      yInput.addEventListener("input", function(){
        pendingHeadOffsetY = parseInt(this.value, 10) || 0;
        var img2 = document.getElementById("avatarPosHeadImg");
        if(img2) img2.style.top = (pendingHeadOffsetY * AVATAR_EDITOR_SCALE) + "px";
      });
      resetBtn.addEventListener("click", function(){
        var def = defaultHeadOffsets(pendingAvatarNaturalW, pendingAvatarNaturalH);
        pendingHeadOffsetX = def.x;
        pendingHeadOffsetY = def.y;
        syncHeadPositionInputs();
      });
    }
  }

  /* ============ SHOP ============ */
  function renderShop(){
    var acc = state.user;
    var coins = acc.coins || 0;
    var freeSpins = acc.freeWheelSpins || 0;

    var shopCoinBar = '<div style="display:flex;align-items:center;justify-content:flex-end;gap:18px;margin-bottom:14px;">' +
      '<span style="font-family:\'Arial Black\',Impact,sans-serif;font-style:italic;font-size:16px;color:var(--green);">\uD83C\uDFB0 Free Rolls x' + freeSpins + '</span>' +
      '<span style="font-family:\'Arial Black\',Impact,sans-serif;font-style:italic;font-size:16px;color:var(--amber);">' + COIN_ICON + coins.toLocaleString() + '</span>' +
    '</div>';

    function buildWheelPanelHtml(wc){
      var prizesForWheel = wheelPrizesCache.filter(function(p){ return p.wheelId === wc.id; });
      var hasAny = prizesForWheel.length > 0;
      var canSpin = hasAny && (freeSpins > 0 || coins >= wc.costCoins);
      var oddsLine = wc.tiers.map(function(t){

      return '<div class="panel" style="flex:1 1 280px;min-width:260px;">' +
