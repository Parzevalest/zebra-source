            (targetAcc.displayName && targetAcc.displayName.trim() ? '<div style="color:var(--muted);font-size:13px;margin-bottom:4px;">@' + escapeHtml(targetAcc.username) + '</div>' : '') +
            '<div style="margin-bottom:14px;"><img src="' + equippedTag + '" alt="" style="height:30px;object-fit:contain;image-rendering:pixelated;display:block;" /></div>' +
            '<div class="stat-grid">' +
              '<div class="stat-card"><div class="num">' + races.toLocaleString() + '</div><div class="lbl">Races</div></div>' +
              '<div class="stat-card"><div class="num">' + (targetAcc.bestWpm||0) + '</div><div class="lbl">Best WPM</div></div>' +
              '<div class="stat-card"><div class="num">' + avgWpm + '</div><div class="lbl">Avg WPM</div></div>' +
              '<div class="stat-card"><div class="num">' + avgAcc + '%</div><div class="lbl">Avg Accuracy</div></div>' +
            '</div>' +
            (isOwnProfile ? '' : '<div style="margin-top:18px;">' + relationshipHtml + '</div>') +
          '</div>' +
        '</div>' +
        galleryRow("Cars (" + allOwnedCars.length + ")", carsHtml) +
        galleryRow("Name Tags (" + nameTagOptionsFor(targetAcc).length + ")", nameTagsHtml) +
        galleryRow("Avatar Pieces", avatarItemsHtml, "No avatar pieces earned yet.") +
      '</div>';

    if(isOwnProfile) return;

    var sendCoinsBtn = document.getElementById("profileSendCoinsBtn");
    if(sendCoinsBtn) sendCoinsBtn.addEventListener("click", function(){
      openSendCoinsModal(targetAcc.username);
    });

    var friendBtn = document.getElementById("profileFriendActionBtn");
    if(friendBtn) friendBtn.addEventListener("click", async function(){
      var errEl = document.getElementById("profileActionError");
      var friendState = friendBtn.getAttribute("data-friend-state");
      if(friendState === "friends" || friendState === "pending") return; // nothing to do, button is informational
      friendBtn.disabled = true;
      var originalText = friendBtn.textContent;
      friendBtn.textContent = "...";
      try{
        var result;
        if(friendState === "acceptIncoming"){
          result = await acceptFriendRequest(state.user, targetAcc.username);
        } else {
          result = await sendFriendRequest(state.user, targetAcc.username);
        }
        if(!result.ok){
          if(errEl) errEl.textContent = result.error;
          friendBtn.disabled = false;
          friendBtn.textContent = originalText;
          return;
        }
        // Re-render with the freshly updated relationship state.
        var refreshed = await getAccount(targetAcc.username);
        if(refreshed.ok && refreshed.account) renderProfileContent(refreshed.account, state.user);
      }catch(e){
        if(errEl) errEl.textContent = "Unexpected error: " + ((e&&e.message)?e.message:String(e));
        friendBtn.disabled = false;
        friendBtn.textContent = originalText;
      }
    });
  }

  // Modal for sending coins to another player from their profile.
  function openSendCoinsModal(toUsername){
    var myCoins = (state.user && state.user.coins) || 0;
    openModal(
      '<button class="small-btn" id="modalCloseBtn" style="position:absolute;top:14px;right:14px;">\u2715</button>' +
      '<div class="garage-title" style="color:var(--text);font-size:19px;margin-bottom:14px;">Send Coins to ' + escapeHtml(toUsername) + '</div>' +
      '<div class="field">' +
        '<label for="sendCoinsAmount">Amount (you have ' + COIN_ICON + myCoins.toLocaleString() + ')</label>' +
        '<input id="sendCoinsAmount" type="number" min="' + MIN_COINS_TO_SEND + '" step="1" value="' + MIN_COINS_TO_SEND + '" style="width:100%;background:var(--panel-2);color:var(--text);border:1px solid var(--line);border-radius:8px;padding:11px 12px;font-size:15px;" />' +
        '<div class="hint-text" style="margin-top:6px;">Minimum ' + MIN_COINS_TO_SEND + ' coins.</div>' +
      '</div>' +
      '<div class="error-text" id="sendCoinsError"></div>' +
      '<div style="display:flex;gap:10px;margin-top:16px;">' +
        '<button class="btn btn-primary" id="confirmSendCoinsBtn" style="flex:1;">Send</button>' +
        '<button class="btn btn-ghost" id="cancelSendCoinsBtn" style="flex:1;">Cancel</button>' +
      '</div>'
    );
    document.getElementById("modalCloseBtn").addEventListener("click", closeModal);
    document.getElementById("cancelSendCoinsBtn").addEventListener("click", closeModal);
    document.getElementById("confirmSendCoinsBtn").addEventListener("click", async function(){
      var btn = document.getElementById("confirmSendCoinsBtn");
      var errEl = document.getElementById("sendCoinsError");
      var amount = parseInt(document.getElementById("sendCoinsAmount").value, 10);
      errEl.textContent = "";

      if(!amount || amount < MIN_COINS_TO_SEND){
        errEl.textContent = "Minimum is " + MIN_COINS_TO_SEND + " coins.";
        return;
      }
      if(amount > (state.user.coins||0)){
        errEl.textContent = "You don't have enough coins.";
        return;
      }

      btn.disabled = true; btn.textContent = "Sending...";
      try{
        var result = await sendCoinsToPlayer(state.user, toUsername, amount);
        if(!result.ok){
          errEl.textContent = result.error;
          btn.disabled = false; btn.textContent = "Send";
          return;
        }
        closeModal();
        // Re-render the current screen so the player's own coin balance
        // (shown in the Garage hub, nav, etc.) reflects the deduction.
        renderApp();
      }catch(e){
        errEl.textContent = "Unexpected error: " + ((e&&e.message)?e.message:String(e));
        btn.disabled = false; btn.textContent = "Send";
      }
    });
  }

  /* ============ FRIENDS PAGE ============ */
  // Separate from the Garage, reached via its own nav tab. Shows incoming
  // requests (accept/decline), outgoing requests (cancel), and the
  // accepted friends list. No online/offline status yet — see the note on
  // MIN_COINS_TO_SEND above for why; this game has no live presence today.
  function renderFriends(){
    var acc = state.user;

    app.innerHTML =
      brandHeader() +
      renderNavBar("friends") +
      '<div class="panel">' +
        '<div class="garage-title" style="color:var(--text);font-size:20px;margin-bottom:4px;">Friends</div>' +
        '<div class="hint-text" style="margin-top:0;margin-bottom:16px;">Add friends from anywhere you see a username \u2014 leaderboards, guild rosters, and more.</div>' +
        '<div id="friendsBody"><div class="center-note">Loading...</div></div>' +
      '</div>';

    attachNavListeners();

    getAccount(acc.username).then(function(res){
      if(state.screen !== "friends") return;
      if(!res.ok || !res.account) return;
      state.user = res.account; // refresh in case requests changed elsewhere
      renderFriendsBody(state.user);
    });
  }

  function renderFriendsBody(acc){
    var body = document.getElementById("friendsBody");
    if(!body) return;

    var incoming = acc.incomingFriendRequests || [];
    var outgoing = acc.outgoingFriendRequests || [];
    var friends = acc.friendUsernames || [];

    body.innerHTML = '<div class="center-note">Loading...</div>';

    // Every username across all three lists needs its own account fetched
    // so we can compose a small avatar preview next to it — the lists
    // themselves only store usernames, not full account data. Fetched
    // once per render, deduped, alongside the avatar catalog (shared by
    // every thumbnail).
    var allUsernames = incoming.concat(outgoing, friends);
    var uniqueUsernames = allUsernames.filter(function(u, i){
      return allUsernames.findIndex(function(u2){ return u2.toLowerCase() === u.toLowerCase(); }) === i;
    });

    Promise.all([
      Promise.all(uniqueUsernames.map(function(u){ return getAccount(u); })),
      fetchAvatarCatalog(),
      fetchCustomCars()
    ]).then(function(results){
      if(document.getElementById("friendsBody") !== body) return; // navigated away while loading

      var accountResults = results[0];
      avatarCatalogCache = results[1];
      customCarsCache = results[2];

      var accountsByUsername = {};
      uniqueUsernames.forEach(function(u, i){
        var res = accountResults[i];
        accountsByUsername[u.toLowerCase()] = (res.ok && res.account) ? res.account : null;
      });

      // Now that we know everyone's guildId, fetch each distinct guild once
      // (several friends can share a guild) so we can show each row's tag.
      var guildIds = [];
      Object.keys(accountsByUsername).forEach(function(key){
        var a = accountsByUsername[key];
        if(a && a.guildId && guildIds.indexOf(a.guildId) === -1) guildIds.push(a.guildId);
      });

      Promise.all(guildIds.map(function(id){ return fetchGuild(id); })).then(function(guildResults){
        if(document.getElementById("friendsBody") !== body) return; // navigated away while loading

        var guildsById = {};
        guildIds.forEach(function(id, i){ guildsById[id] = guildResults[i]; });

        renderFriendRows(accountsByUsername, guildsById);
      });
    });

    function renderFriendRows(accountsByUsername, guildsById){
      // Small avatar preview for a row — falls back to a generic blank
      // spot if the account couldn't be loaded (e.g. deleted since the
      // friendship/request was created), same graceful-degradation spirit
      // as resolveEquippedAvatarPiece falling back to the defaults.
      var THUMB_SCALE = 0.7;
      function avatarThumbHtml(username){
        var otherAcc = accountsByUsername[username.toLowerCase()];
        var blankW = AVATAR_CANVAS_WIDTH * THUMB_SCALE;
        var blankH = 40;
        if(!otherAcc){
          return '<div style="width:' + blankW + 'px;height:' + blankH + 'px;flex:0 0 auto;"></div>';
        }
        var resolved = {
          shoes: resolveEquippedAvatarPiece(otherAcc, "shoes", avatarCatalogCache),
          pants: resolveEquippedAvatarPiece(otherAcc, "pants", avatarCatalogCache),
          shirt: resolveEquippedAvatarPiece(otherAcc, "shirt", avatarCatalogCache),
          head:  resolveEquippedAvatarPiece(otherAcc, "head", avatarCatalogCache)
        };
        // composedAvatarHtml always renders the full, tall AVATAR_CANVAS_HEIGHT
        // canvas (lots of blank headroom above the head, since head pieces
        // can vary a lot in height) — cropping that down to just the figure
        // itself for a compact row. The crop's top edge is the actual
        // resolved head's top (not a guessed percentage), so this stays
        // correct for any head piece's real height/offset, not just the
        // default's.
        var headPiece = resolved.head;
        var headNaturalH = headPiece ? (headPiece.naturalH || AVATAR_SLOT_DIMENSIONS.head.h) : DEFAULT_HEAD_NATURAL_H;
        var headOffsetY = headPiece && typeof headPiece.headOffsetY === "number"
          ? headPiece.headOffsetY
          : defaultHeadOffsets(DEFAULT_HEAD_NATURAL_W, DEFAULT_HEAD_NATURAL_H).y;
        var figureTopNative = Math.min(headOffsetY, AVATAR_SHIRT_TOP); // whichever is higher — a tall/offset head can sit above the shirt's own top
        var figureHeightNative = AVATAR_CANVAS_HEIGHT - figureTopNative;

        var fullW = AVATAR_CANVAS_WIDTH * THUMB_SCALE;
        var fullH = AVATAR_CANVAS_HEIGHT * THUMB_SCALE;
        var cropTopPx = figureTopNative * THUMB_SCALE;
        var cropHeightPx = figureHeightNative * THUMB_SCALE;

        return '<div style="width:' + fullW + 'px;height:' + cropHeightPx + 'px;flex:0 0 auto;overflow:hidden;position:relative;">' +
            '<div style="position:absolute;left:0;top:-' + cropTopPx + 'px;">' + composedAvatarHtml(resolved, THUMB_SCALE) + '</div>' +
          '</div>';
      }

      // Guild tag chip — same color-coded pill used on the Garage hub for
      // the logged-in player's own guild, just smaller. Blank (no chip) if
      // the player isn't in a guild, or if their guild record couldn't be
      // found (e.g. it was disbanded since).
      function guildTagHtml(username){
        var otherAcc = accountsByUsername[username.toLowerCase()];
        var guild = otherAcc && otherAcc.guildId ? guildsById[otherAcc.guildId] : null;
        if(!guild) return '';
        return '<span data-guild-tag-click="' + escapeHtml(guild.tag) + '" style="display:inline-flex;align-items:center;background:var(--panel-2);border:1px solid ' + GUILD_COLORS[guild.color] + ';border-radius:999px;padding:2px 8px;font-size:11px;font-weight:700;color:' + GUILD_COLORS[guild.color] + ';margin-top:3px;cursor:pointer;">[' + escapeHtml(guild.tag) + ']</span>';
      }

      // Currently-equipped car, same resolveCarById fallback (starter car
      // if unset/deleted) used everywhere else a stored equippedCarId gets
      // displayed.
      function carThumbHtml(username){
        var otherAcc = accountsByUsername[username.toLowerCase()];
        if(!otherAcc) return '<div style="width:90px;height:45px;flex:0 0 auto;"></div>';
        var car = resolveCarById(otherAcc.equippedCarId);
        return '<div style="width:90px;height:45px;flex:0 0 auto;" title="' + escapeHtml(car.name || "Car") + '">' + carVisualHtml(car) + '</div>';
      }

      // Avg WPM + lifetime races, same math used everywhere else in the
      // game (Garage hub, public profile) — avgWpm from sumWpm/races.
      function statsHtml(username){
        var otherAcc = accountsByUsername[username.toLowerCase()];
        if(!otherAcc) return '';
        var races = otherAcc.races || 0;
        var avgWpm = races ? Math.round((otherAcc.sumWpm||0) / races) : 0;
        return '<div style="display:flex;gap:40px;flex:0 0 auto;text-align:center;">' +
            '<div><div style="font-weight:700;font-style:italic;font-size:30px;">' + avgWpm + '</div><div style="font-size:20px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;">Avg WPM</div></div>' +
            '<div><div style="font-weight:700;font-style:italic;font-size:30px;">' + races + '</div><div style="font-size:20px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;">Races</div></div>' +
          '</div>';
      }

      function userRow(username, actionsHtml){
        var rowAcc = accountsByUsername[username.toLowerCase()];
        var rowDisplayName = rowAcc ? displayNameFor(rowAcc) : username;
        return '<div class="admin-car-row">' +
          avatarThumbHtml(username) +
          carThumbHtml(username) +
          '<div class="admin-car-name" style="font-size:28px;font-weight:700;font-style:italic;">' +
            '<div style="display:flex;align-items:center;gap:8px;">' + clickableUsernameHtml(username, null, rowDisplayName) + '</div>' +
            guildTagHtml(username) +
          '</div>' +
          statsHtml(username) +
          (actionsHtml || '') +
        '</div>';
      }

      body.innerHTML =
        (incoming.length ?
          '<div style="margin-bottom:18px;">' +
            '<div class="lbl" style="text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-size:12px;margin-bottom:8px;">Incoming Requests (' + incoming.length + ')</div>' +
            incoming.map(function(u){
              return userRow(u,
                '<button class="small-btn" data-accept-request="' + escapeHtml(u) + '" style="margin-right:6px;">Accept</button>' +
                '<button class="small-btn" data-decline-request="' + escapeHtml(u) + '">Decline</button>'
              );
            }).join("") +
          '</div>' : '') +
        (outgoing.length ?
          '<div style="margin-bottom:18px;">' +
            '<div class="lbl" style="text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-size:12px;margin-bottom:8px;">Pending (' + outgoing.length + ')</div>' +
            outgoing.map(function(u){
              return userRow(u, '<button class="small-btn" data-cancel-request="' + escapeHtml(u) + '">Cancel</button>');
            }).join("") +
          '</div>' : '') +
        '<div>' +
          '<div class="lbl" style="text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-size:12px;margin-bottom:8px;">Friends (' + friends.length + ')</div>' +
          (friends.length
            ? friends.map(function(u){
                return userRow(u, '<button class="small-btn" data-remove-friend="' + escapeHtml(u) + '">Remove</button>');
              }).join("")
            : '<div class="center-note" style="padding:16px 0;">No friends yet \u2014 visit a player\'s profile to add one.</div>') +
        '</div>' +
        '<div class="error-text" id="friendsActionError" style="margin-top:10px;"></div>';

      attachProfileLinkListeners(body);

      function withBusyButton(btn, fn){
        var original = btn.textContent;
        btn.disabled = true; btn.textContent = "...";
        fn().then(function(result){
          var errEl = document.getElementById("friendsActionError");
          if(!result.ok){
            if(errEl) errEl.textContent = result.error;
            btn.disabled = false; btn.textContent = original;
            return;
          }
          getAccount(acc.username).then(function(res){
            if(res.ok && res.account){
              state.user = res.account;
              renderFriendsBody(state.user);
            }
          });
        });
      }

      body.querySelectorAll("[data-accept-request]").forEach(function(btn){
        btn.addEventListener("click", function(){
          withBusyButton(btn, function(){ return acceptFriendRequest(state.user, btn.getAttribute("data-accept-request")); });
        });
      });
      body.querySelectorAll("[data-decline-request]").forEach(function(btn){
        btn.addEventListener("click", function(){
          withBusyButton(btn, function(){ return removeFriendRequest(state.user, btn.getAttribute("data-decline-request")); });
        });
      });
      body.querySelectorAll("[data-cancel-request]").forEach(function(btn){
        btn.addEventListener("click", function(){
          withBusyButton(btn, function(){ return removeFriendRequest(state.user, btn.getAttribute("data-cancel-request")); });
        });
      });
      body.querySelectorAll("[data-remove-friend]").forEach(function(btn){
        btn.addEventListener("click", function(){
          withBusyButton(btn, function(){ return removeFriend(state.user, btn.getAttribute("data-remove-friend")); });
        });
      });
    }
  }

  /* ============ RACE SCREEN ============ */
  async function startRace(){
    // Prevent joining a second race while already in one
    if(raceState && !raceState.finished){
      return;
    }
    var testSession = state.testRaceSession;
    var acc = testSession || state.user;
    var isCalibration = testSession ? false : (!acc || (!acc.calibratedWpm && (acc.races || 0) === 0) || acc.needsRecalibration);

    // Test races (admin previewing unreleased content) and calibration
    // races (a brand-new player's very first race, just measuring their
    // solo typing speed so future passages are sized right) both stay
    // local — neither makes sense to wait on opponents for. Every other
    // race for a real player goes through the actual multiplayer server.
    if(testSession || isCalibration){
      await startLocalRace(testSession, isCalibration);
      return;
    }

    await startMultiplayerRace();
  }

  // The original local/solo race-building logic, used for test races and
  // first-time calibration — unchanged from before multiplayer existed.
  async function startLocalRace(testSession, isCalibration){
    var passage = isCalibration
      ? CALIBRATION_PASSAGE
      : buildPassage(targetChars(effectiveWpm()));

    // Capture which car is equipped right now so per-car stats are credited
    // correctly even if the player switches cars before the race finishes.
    // In test mode the car comes straight from the admin's catalog pick,
    // not from a real garage/equip selection.
    var equippedCar = testSession ? testSession.car : ((state.garageOrder && state.garageOrder[state.equippedCarIndex]) || STARTER_CAR);

    // A custom track scrolls the background as the camera "follows" the
    // car (which stays at a fixed screen position); with no custom track,
    // lanes fall back to the default static dashed look and the car moves
    // across the screen as before. With multiple tracks in the catalog,
    // one is picked at random for this race — different races can use
    // different tracks, each with its own saved car start position.
    var tracks = await fetchTracks();
    tracksCache = tracks;
    var track = tracks.length ? tracks[Math.floor(Math.random() * tracks.length)] : null;

    raceState = {
      passage: passage,
      typed: "",
      startTime: null,
      mistakes: 0,
      mistakePositions: {},
      finished: false,
      raf: null,
      passageScrollY: 0,
      isCalibration: isCalibration,
      carId: equippedCar.id || "starter_car",
      track: track,
      trackStartGlideFired: false,
      trackFinishGlideFired: false,
      isTestRace: !!testSession,
      isMultiplayer: false,
      opponents: []
    };
    state.screen = "race";
    renderApp();
  }

  // Connects to the live race server and shows the waiting room. Per how
  // this is supposed to work: if the connection fails, show an error and
  // let the player retry — there's no silent fallback to a local race
  // for a real player, that's reserved for the admin Test Race tool and
  // the one-time calibration race.
  async function startMultiplayerRace(){
    var acc = state.user;
    var equippedCar = (state.garageOrder && state.garageOrder[state.equippedCarIndex]) || STARTER_CAR;
    var carId = equippedCar.id || "starter_car";

    // Pre-load title catalog so our title is sent correctly to opponents
    if(!titleCatalogCache || !titleCatalogCache.length){
      try{ titleCatalogCache = (await fetchTitleCatalog()) || []; }catch(e){}
    }

    var tracks = await fetchTracks();
    tracksCache = tracks;

    // Build raceState immediately so the track renders right away.
    // passage and startsAt are filled in when race_starting arrives.
    var track = tracks.length ? tracks[Math.floor(Math.random() * tracks.length)] : null;
    raceState = {
      passage: "",
      typed: "",
      startTime: null,
      mistakes: 0,
      mistakePositions: {},
      finished: false,
      raf: null,
      passageScrollY: 0,
      isCalibration: false,
      carId: carId,
      track: track,
      trackStartGlideFired: false,
      trackFinishGlideFired: false,
      isTestRace: false,
      isMultiplayer: true,
      isWaiting: true, // still in queue, not yet racing
      roomId: null,
      startsAt: null,
      opponents: [],
      lastProgressSentAt: 0,
      placements: []
    };
    state.screen = "race";
    renderApp();

    try{
      await connectToRaceServer(acc.username, carId, {
        error: function(msg){
          if(msg.message === "already_in_race"){
            // Server rejected join — player is already in a race in another tab
            raceState = null;
            state.screen = "dashboard";
            renderApp();
            // Brief toast-style notification
            var toast = document.createElement("div");
            toast.textContent = "You\u2019re already in a race in another tab.";
            toast.style.cssText = "position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--red);color:#fff;padding:12px 20px;border-radius:10px;font-weight:700;font-size:14px;z-index:9999;";
            document.body.appendChild(toast);
            setTimeout(function(){ toast.remove(); }, 4000);
          }
        },
        room_joined: function(msg){
          if(!raceState || !raceState.isWaiting) return;
          raceState.roomId = msg.roomId;
          // Sync opponent list from server — add any new ones, keep existing
          var myUsername = state.user ? state.user.username.toLowerCase() : "";
          var incoming = (msg.opponentsSoFar || []).filter(function(o){ return o.username.toLowerCase() !== myUsername; });
          incoming.forEach(function(o){
            var exists = raceState.opponents.find(function(x){ return x.username === o.username; });
            if(!exists){
              raceState.opponents.push({ username: o.username, carId: o.carId, charsTyped: 0, fraction: 0, wpm: 0, finished: false, place: null, displayName: o.displayName || "", guildTag: o.guildTag || "", guildColor: o.guildColor || "", trackStartGlideFired: false, trackFinishGlideFired: false, titleText: o.titleText || "", titleRarity: o.titleRarity || "" });
            }
          });
          // Remove opponents no longer listed
          raceState.opponents = raceState.opponents.filter(function(x){
            return incoming.find(function(o){ return o.username === x.username; });
          });
          updateWaitingTrack();
        },
        race_starting: function(msg){
          if(!raceState) return;
          raceState.isWaiting = false;
          raceState.passage = (msg.passage||"")
            .replace(/[\u2018\u2019\u02BC\u0060\u00B4]/g, "'")
            .replace(/[\u201C\u201D]/g, '"')
            .replace(/[\u2013\u2014]/g, '-')
            .replace(/\u2026/g, '...');
          var msLeft2 = msg.startsAt - Date.now();
          // Guard both directions of clock skew:
          // - Client ahead of server (msLeft2 < 2000): use now+5s
          // - Client behind server (msLeft2 > 10000): use now+5s
          raceState.startsAt = (msLeft2 < 2000 || msLeft2 > 10000) ? Date.now() + 5000 : msg.startsAt;
          raceState.roomId = msg.roomId;
          // Merge final opponent list (filter out self in case server sends us)
          var myName = state.user ? state.user.username.toLowerCase() : "";
          var filteredOpps = (msg.opponents || []).filter(function(o){ return o.username.toLowerCase() !== myName; });
          filteredOpps.forEach(function(o){
            var exists = raceState.opponents.find(function(x){ return x.username === o.username; });
            if(!exists) raceState.opponents.push({ username: o.username, carId: o.carId, charsTyped: 0, fraction: 0, wpm: 0, finished: false, place: null, displayName: o.displayName || "", guildTag: o.guildTag || "", guildColor: o.guildColor || "", trackStartGlideFired: false, trackFinishGlideFired: false, titleText: o.titleText || "", titleRarity: o.titleRarity || "" });
            else { exists.carId = o.carId; exists.displayName = o.displayName || exists.displayName; exists.guildTag = o.guildTag || exists.guildTag; exists.guildColor = o.guildColor || exists.guildColor; exists.titleText = o.titleText || exists.titleText; exists.titleRarity = o.titleRarity || exists.titleRarity; }
          });
          // Final safety: remove self from opponents
          var selfName = state.user ? state.user.username.toLowerCase() : "";
          if(selfName) raceState.opponents = raceState.opponents.filter(function(o){ return o.username.toLowerCase() !== selfName; });
          // Rebuild race UI now that we have the final opponent list and passage
          renderRace();
          startSyncedCountdown(raceState, function(){
            if(!raceState || raceState.finished) return;
            var input = document.getElementById("typeInput");
            if(input){ input.disabled = false; input.focus(); }
            raceState.startTime = performance.now();
            // Flush any opponent progress that arrived during the countdown
            // so cars jump to their correct position immediately on GO.
            if(raceState.opponents) raceState.opponents.forEach(function(opp){ moveOpponentCar(opp); });
            var trackEl = document.querySelector(".track.has-custom-track");
            if(trackEl) trackEl.style.animationPlayState = "running";
            var nameTagEl = document.querySelector("#playerCar .car-nametag");
            if(nameTagEl) nameTagEl.style.display = "none";
            // Also hide opponent nametags
            document.querySelectorAll(".car-nametag").forEach(function(el){ el.style.display = "none"; });
            startRaceLoop();
          });
        },
        opponent_progress: function(msg){
          if(!raceState || !raceState.isMultiplayer) return;
          var opp = raceState.opponents.find(function(o){ return o.username === msg.username; });
          if(!opp) return;
          opp.fraction = typeof msg.fraction === "number" ? msg.fraction : (msg.charsTyped / Math.max(1, raceState.passage.length));
          opp.charsTyped = msg.charsTyped;
          opp.wpm = msg.wpm;
          // Only move the car visually once the race has actually started
          // on this client — prevents opponents appearing to move during
          // the countdown due to clock skew or different passage lengths.
          if(raceState.startTime) moveOpponentCar(opp);
        },
        opponent_finished: function(msg){
          if(!raceState || !raceState.isMultiplayer) return;
          var opp = raceState.opponents.find(function(o){ return o.username === msg.username; });
          if(opp){
            opp.finished = true;
            opp.place = msg.place;
            opp.charsTyped = raceState.passage.length; opp.fraction = 1; // snap to the finish line visually
            moveOpponentCar(opp, true);
          }
          raceState.placements = raceState.placements || [];
          var oppForPlacement = raceState.opponents ? raceState.opponents.find(function(o){ return o.username === msg.username; }) : null;
          if(oppForPlacement){
            oppForPlacement.finished = true;
            // Trigger finish glide for this opponent
            moveOpponentCar(oppForPlacement, true);
            // Fade out after glide
            var oppIdx = raceState.opponents.indexOf(oppForPlacement);
            setTimeout(function(){
              var el = document.getElementById("opponentCar" + oppIdx);
              if(el) el.style.opacity = "0";
            }, 2000);
          }
          raceState.placements.push({ username: msg.username, wpm: msg.wpm, accuracy: msg.accuracy, place: msg.place, displayName: (oppForPlacement && oppForPlacement.displayName) || "", guildTag: (oppForPlacement && oppForPlacement.guildTag) || "", guildColor: (oppForPlacement && oppForPlacement.guildTag) ? (GUILD_COLORS[oppForPlacement.guildColor] || oppForPlacement.guildColor || "#FFD54F") : "" });
        },
        race_complete: function(msg){
          if(!raceState) return;
          // Hide all opponent cars cleanly
          for(var ci = 0; ci < TRACK_LANE_COUNT - 1; ci++){
            var cel = document.getElementById("opponentCar" + ci);
            if(cel) cel.style.opacity = "0";
          }
          // msg.placements is the server's full finishedOrder for the
          // room — EVERYONE, including this player's own entry. The
          // player's own result is already tracked separately
          // (state.raceResult, set by finishRace()) and re-added
          // explicitly wherever this list is rendered, so leaving our
          // own username in here would show our own row twice. Filter
          // it out before storing, so every consumer of
          // raceState.placements only ever sees real opponents,
          // matching what the live opponent_finished handler above
          // already builds incrementally during the race.
          var myUsername = state.user ? state.user.username : null;
          raceState.placements = (msg.placements || raceState.placements || []).filter(function(p){
            return !myUsername || p.username !== myUsername;
          });
          // If the player has ALREADY finished and is sitting on the
          // results screen waiting, this is what fills in everyone
          // else's final placement. If they're still typing when this
          // arrives (rare — only happens if every opponent finished
          // before they did), it's just stored for when they do finish.
          if(state.screen === "results" && state.raceResult && state.raceResult.isMultiplayer){
            applyFinalPlacementsToResults();
          }
        },
        opponent_left: function(msg){
          if(raceState && raceState.isWaiting){
            raceState.opponents = raceState.opponents.filter(function(o){ return o.username !== msg.username; });
            updateWaitingTrack();
            return;
          }
          // Mid-race: just stop expecting anything more from them — their
          // car stays wherever it last was, same as a real racer who
          // dropped out.
          if(raceState && raceState.isMultiplayer){
            raceState.opponents = raceState.opponents.filter(function(o){ return o.username !== msg.username; });
          }
        },
        __onclose: function(){
          // An unexpected disconnect while still waiting (not yet
          // racing) — surface it the same way a failed connection would,
          // since the player needs to know they're no longer queued.
          if(state.screen === "raceWaiting"){
            state.raceConnectError = "Lost connection to the race server while waiting.";
            state.screen = "raceConnectError";
            renderApp();
          }
        }
      });
    }catch(e){
      state.raceConnectError = (e && e.message) ? e.message : "Couldn't reach the race server.";
      state.screen = "raceConnectError";
      renderApp();
    }
  }

  // Fires once when race_starting arrives — builds the real raceState
  // from the server's passage/opponents/startsAt instead of anything
  // generated locally, and hands off to the normal race screen.
  function beginMultiplayerRace(msg, carId, tracks){
    var track = tracks.length ? tracks[Math.floor(Math.random() * tracks.length)] : null;

    raceState = {
      passage: (msg.passage||"")
        .replace(/[\u2018\u2019\u02BC\u0060\u00B4]/g, "'")
        .replace(/[\u201C\u201D]/g, '"')
        .replace(/[\u2013\u2014]/g, '-')
        .replace(/\u2026/g, '...'),
      typed: "",
      startTime: null,
      mistakes: 0,
      mistakePositions: {},
      finished: false,
      raf: null,
      passageScrollY: 0,
      isCalibration: false,
      carId: carId,
      track: track,
      trackStartGlideFired: false,
      trackFinishGlideFired: false,
      isTestRace: false,
      isMultiplayer: true,
      roomId: msg.roomId,
      startsAt: (function(){
        // Guard against client clock skew in both directions:
        // client ahead of server (msLeft < 2000) or behind server (msLeft > 10000)
        var msLeft = msg.startsAt - Date.now();
        if(msLeft < 2000 || msLeft > 10000) return Date.now() + 5000;
        return msg.startsAt;
      })(),
      opponents: (msg.opponents || []).map(function(o){
        return { username: o.username, carId: o.carId, charsTyped: 0, fraction: 0, wpm: 0, finished: false, place: null, displayName: o.displayName || "", guildTag: o.guildTag || "", guildColor: o.guildColor || "", trackStartGlideFired: false, trackFinishGlideFired: false };
      }),
      lastProgressSentAt: 0,
      placements: [] // filled in as opponent_finished/race_complete arrive
    };
    state.screen = "race";
    renderApp();
  }

  // Updates opponent car lanes on the already-rendered race track
  // when a new opponent joins during the queue phase.
  function updateWaitingTrack(){
    var rs = raceState;
    if(!rs) return;
    var hasTrack = rs.track && rs.track.image;
    var carStartLeft = hasTrack ? (typeof rs.track.carStartX === "number" ? rs.track.carStartX : CAR_FIXED_LEFT_PX) : 0;

    for(var i = 0; i < TRACK_LANE_COUNT - 1; i++){
      var lanes = document.querySelectorAll(".track .lane:not(.player)");
      var laneEl = lanes[i] || null;
      if(!laneEl) continue;
      var opp = rs.opponents[i];
      if(!opp){
        laneEl.innerHTML = ""; // empty lane
        continue;
      }
      // Only re-render if this lane doesn't already have this opponent's car
      if(laneEl.getAttribute("data-opp-username") === opp.username) continue;
      laneEl.setAttribute("data-opp-username", opp.username);
      var oppCar = resolveCarById(opp.carId);
      var oppCarStartTop = null;
      if(hasTrack && rs.track.carStartYByLane && typeof rs.track.carStartYByLane[i+1] === "number"){
        oppCarStartTop = rs.track.carStartYByLane[i+1] - ((i+1) * LANE_HEIGHT_PX); // offset by lane index
      } else if(hasTrack && typeof rs.track.carStartY === "number"){
        oppCarStartTop = rs.track.carStartY;
      }
      laneEl.innerHTML =
        '<div class="car" id="opponentCar' + i + '" style="left:' + carStartLeft + 'px;' + (oppCarStartTop !== null ? 'top:' + oppCarStartTop + 'px;' : '') + '">' +
          '<div class="car-wind"><div class="streak"></div><div class="streak"></div><div class="streak"></div></div>' +
          carVisualHtml(oppCar) +
          nameTagHtml(DEFAULT_NAME_TAG, (opp.displayName && opp.displayName.trim()) ? opp.displayName : opp.username,
              opp.guildTag || null, opp.guildTag ? (GUILD_COLORS[opp.guildColor] || opp.guildColor || "#FFD54F") : null,
              opp.titleText || null, opp.titleRarity || null) +
        '</div>';
    }

    // Show/hide waiting banner
    var banner = document.getElementById("waitingBanner");
    if(banner) banner.style.display = rs.isWaiting ? "" : "none";

    // Show passage box once we have a passage
    var passageBox = document.getElementById("passageBox");
    if(passageBox && rs.passage) passageBox.style.opacity = "1";
  }

  function renderRaceWaiting(){
    var w = state.multiplayerWaiting;
    if(!w){ state.screen = "dashboard"; renderApp(); return; }

    app.innerHTML =
      brandHeader() +
      '<div class="panel" style="text-align:center;">' +
        '<div class="garage-title" style="color:var(--text);font-size:20px;margin-bottom:6px;">Finding Racers\u2026</div>' +
        '<div class="hint-text" style="margin-top:0;margin-bottom:18px;">The race starts in a few seconds either way \u2014 anyone else who joins in time races with you.</div>' +
        '<div id="waitingOpponentsList" style="display:flex;justify-content:center;gap:14px;flex-wrap:wrap;margin-bottom:20px;">' +
          (w.opponents.length
            ? w.opponents.map(function(o){
                return '<div style="background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:10px 16px;">' +
                  '<div style="font-weight:700;font-size:13px;">' + escapeHtml(o.username) + '</div>' +
                '</div>';
              }).join("")
            : '<div class="center-note">Waiting to see who else joins\u2026</div>') +
        '</div>' +
        '<button class="btn btn-ghost" id="leaveWaitingBtn">Cancel</button>' +
      '</div>';

    var leaveBtn = document.getElementById("leaveWaitingBtn");
    if(leaveBtn) leaveBtn.addEventListener("click", function(){
      closeRaceSocket();
      state.multiplayerWaiting = null;
      state.screen = "dashboard";
      renderApp();
    });
  }

  function renderRaceConnectError(){
    app.innerHTML =
      brandHeader() +
      '<div class="panel" style="text-align:center;">' +
        '<div style="font-size:38px;margin-bottom:10px;">\u26A0\uFE0F</div>' +
        '<div class="garage-title" style="color:var(--text);font-size:19px;margin-bottom:8px;">Couldn\u2019t Reach the Race Server</div>' +
        '<div class="error-text" style="margin-bottom:18px;">' + escapeHtml(state.raceConnectError || "Unknown error") + '</div>' +
        '<div style="display:flex;gap:10px;justify-content:center;">' +
          '<button class="btn btn-primary" id="retryRaceBtn">Try Again</button>' +
          '<button class="btn btn-ghost" id="backFromRaceErrorBtn">Back to Garage</button>' +
        '</div>' +
      '</div>';

    document.getElementById("retryRaceBtn").addEventListener("click", function(){
      state.raceConnectError = null;
      startRace();
    });
    document.getElementById("backFromRaceErrorBtn").addEventListener("click", function(){
      state.raceConnectError = null;
      state.screen = "dashboard";
      renderApp();
    });
  }

  function renderRace(){
    var rs = raceState;
    var hasTrack = rs.track && rs.track.image;

    // One image spans the ENTIRE track (all 4 lanes at once) and scrolls
    // continuously via CSS animation — totally independent of typing, so
    // it's already moving during the countdown and never pauses. The
    // image's rendered tile width (scaled to TRACK_FULL_HEIGHT_PX) decides
    // how long one seamless loop takes at a constant real-world speed.
    var trackStyleAttr = '';
    if(hasTrack){
      var tileWidthPx = rs.track.width * (TRACK_FULL_HEIGHT_PX / rs.track.height);
      var loopSeconds = Math.max(0.5, tileWidthPx / TRACK_SCROLL_SPEED_PX_PER_SEC);
      var styleTag = document.getElementById("trackScrollKeyframes");
      if(!styleTag){
        styleTag = document.createElement("style");
        styleTag.id = "trackScrollKeyframes";
        document.head.appendChild(styleTag);
      }
      // Scrolling exactly one tile-width then snapping back to 0 looks
      // perfectly continuous as long as the tile's edges line up, since
      // background-repeat:repeat-x makes position 0 and position
      // -tileWidth show the identical pattern.
      styleTag.textContent =
        '@keyframes trackScrollAnim{ from{ background-position-x:0; } to{ background-position-x:-' + tileWidthPx + 'px; } }';
      trackStyleAttr = ' style="background-image:url(' + "'" + rs.track.image + "'" + ');' +
        'animation:trackScrollAnim ' + loopSeconds + 's linear infinite;animation-play-state:paused;"';
    }
    var trackClass = hasTrack ? 'track has-custom-track' : 'track';

    // With a custom track, the car holds a fixed screen position (this
    // track's own saved start spot, so tracks with different lane spacing
    // or art can each line the car up correctly) and the track scrolls
    // beneath it instead of the car moving across the lane. X is shared
    // across all 4 lanes (every car lines up at the same horizontal spot
    // — only how far up/down each lane sits varies). The player is
    // always lane 1 (index 0); opponents fill in behind them in lanes
    // 2-4 (index 1-3) in whatever order the server listed them.
    var carStartLeft = hasTrack ? (typeof rs.track.carStartX === "number" ? rs.track.carStartX : CAR_FIXED_LEFT_PX) : 0;
    var carStartTop = null;
    if(hasTrack){
      if(rs.track.carStartYByLane && typeof rs.track.carStartYByLane[0] === "number"){
        carStartTop = rs.track.carStartYByLane[0] - (0 * LANE_HEIGHT_PX); // offset by lane index
      } else if(typeof rs.track.carStartY === "number"){
        carStartTop = rs.track.carStartY;
      }
    }

    var charHtml = rs.passage.split("").map(function(ch){
      return '<span class="ch">' + escapeHtml(ch) + '</span>';
    }).join("");

    // 4 lanes total: the player's, plus 3 reserved for opponents. With a
    // real multiplayer race, lanes 2-4 get a real opponent's car (their
    // own equipped car, moving based on opponent_progress messages) for
    // however many actually joined — empty if fewer than 3 opponents, or
    // if this was a solo local/test race. All share this same single
    // road image, just different rows on it.
    var openLanesHtml = '';
    for(var i=0;i<TRACK_LANE_COUNT-1;i++){
      // During waiting phase, always render empty lanes so updateWaitingTrack
      // can populate them correctly without conflicts.
      var opp = (rs.isMultiplayer && !rs.isWaiting) ? rs.opponents[i] : null;
      if(!opp){
        openLanesHtml += '<div class="lane"></div>';
        continue;
      }
      var oppCar = resolveCarById(opp.carId);
      var oppCarStartTop = null;
      if(hasTrack && rs.track.carStartYByLane && typeof rs.track.carStartYByLane[i+1] === "number"){
        oppCarStartTop = rs.track.carStartYByLane[i+1] - ((i+1) * LANE_HEIGHT_PX); // offset by lane index
      } else if(hasTrack && typeof rs.track.carStartY === "number"){
        oppCarStartTop = rs.track.carStartY;
      }
      openLanesHtml += '<div class="lane">' +
          '<div class="car" id="opponentCar' + i + '" style="left:' + carStartLeft + 'px;' + (oppCarStartTop !== null ? 'top:' + oppCarStartTop + 'px;' : '') + '">' +
            '<div class="car-wind"><div class="streak"></div><div class="streak"></div><div class="streak"></div></div>' +
            carVisualHtml(oppCar) +
            nameTagHtml(DEFAULT_NAME_TAG, (opp.displayName && opp.displayName.trim()) ? opp.displayName : opp.username,
              opp.guildTag || null, opp.guildTag ? (GUILD_COLORS[opp.guildColor] || opp.guildColor || "#FFD54F") : null,
              opp.titleText || null, opp.titleRarity || null) +
          '</div>' +
        '</div>';
    }

    app.innerHTML =
      brandHeader() +
      '<div class="panel">' +
        (rs.isCalibration ? '<div class="notice-text" style="margin-bottom:14px;text-align:center;">Calibration Race \u2014 type at your natural pace so we can size future races to last about 20 seconds for you.</div>' : '') +
        (rs.isWaiting ? '<div id="waitingBanner" style="text-align:center;padding:8px 0 2px;color:var(--muted);font-size:13px;">Finding racers\u2026 the race starts automatically</div>' : '') +
        '<div class="race-meta">' +
          '<div class="timer" id="raceTimer">0:00.0</div>' +
          '<div class="gauge-wrap">' +
            gaugeSvg() +
            '<div class="gauge-num"><span id="gaugeNum">0</span><small>WPM</small></div>' +
          '</div>' +
          '<button class="small-btn" id="quitRaceBtn">Quit Race</button>' +
        '</div>' +

        '<div class="race-stage" id="raceStage">' +
          '<div class="' + trackClass + '"' + trackStyleAttr + '>' +
            '<div class="lane player" id="playerLane">' +
              '<div class="car" id="playerCar" style="left:' + carStartLeft + 'px;' + (carStartTop !== null ? 'top:' + carStartTop + 'px;' : '') + '">' +
                '<div class="car-wind"><div class="streak"></div><div class="streak"></div><div class="streak"></div></div>' +
                carVisualHtml(rs.isTestRace ? state.testRaceSession.car : (state.garageOrder && state.garageOrder[state.equippedCarIndex] || STARTER_CAR)) +
                (rs.isTestRace
                  ? nameTagHtml(state.testRaceSession.equippedNameTag || DEFAULT_NAME_TAG, state.testRaceSession.username, null, null)
                  : nameTagHtml((state.user && state.user.equippedNameTag) || DEFAULT_NAME_TAG, state.user ? displayNameFor(state.user) : "",
                      (state.userGuild && state.userGuild.tag) || (state.user && state.user.guildTag) || null,
                      (state.userGuild && GUILD_COLORS[state.userGuild.color]) || (state.user && state.user.guildColor && GUILD_COLORS[state.user.guildColor]) || null,
                      (function(){ var ut = resolveTitle(state.user, titleCatalogCache); return ut ? ut.text : null; })(),
                      (function(){ var ut = resolveTitle(state.user, titleCatalogCache); return ut ? ut.rarity : null; })())) +
              '</div>' +
            '</div>' +
            openLanesHtml +
          '</div>' +

          '<div class="countdown-overlay" id="countdownOverlay"></div>' +
        '</div>' +

        '<div class="passage-box" id="passageBox" style="' + (rs.isWaiting ? 'opacity:0;pointer-events:none;' : '') + '"><div class="passage-inner" id="passageInner">' + charHtml + '</div></div>' +
        '<input id="typeInput" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" disabled placeholder="Get ready..." style="position:absolute;opacity:0;pointer-events:none;width:1px;height:1px;top:0;left:0;" />' +
        '<div class="paste-notice" id="pasteNotice" style="color:var(--red);font-size:13px;min-height:16px;margin-top:4px;"></div>' +
      '</div>';

    document.getElementById("quitRaceBtn").addEventListener("click", function(){
      if(rs.raf) cancelAnimationFrame(rs.raf);
      if(rs.driftInterval){ clearInterval(rs.driftInterval); rs.driftInterval = null; }
      rs.finished = true;
      if(rs.isMultiplayer) closeRaceSocket();
      raceState = null;
      state.screen = rs.isTestRace ? "adminTestRace" : "dashboard";
      renderApp();
    });

    var input = document.getElementById("typeInput");
    input.addEventListener("input", onTypeInput);
    input.addEventListener("paste", function(e){ e.preventDefault(); showPasteNotice(); });
    input.addEventListener("drop", function(e){ e.preventDefault(); showPasteNotice(); });
    input.addEventListener("dragover", function(e){ e.preventDefault(); });

    // Anticheat + device fingerprinting: silent monitoring during this race.
    // Skip for test races (admin previewing content).
    if(typeof initAntiCheatWithFingerprint !== "undefined" && !rs.isTestRace){
      try{
        initAntiCheatWithFingerprint(input, {
          silent: true,
          banCheckUrl: SERVER_URL + "/api/check-ban",
          onBanned: function(fp){
            // Skip ban if this account is whitelisted — trusted fast typists
            // shouldn't be hardware-banned even if their device hash is flagged.
            if(state.user && state.user.anticheatWhitelisted) return;
            // Device is hardware-banned — log out and redirect to auth
            state.user = null;
            currentToken = null;
            try{ localStorage.removeItem("zt_session"); }catch(e){}
            raceState = null;
            state.screen = "auth";
            renderApp();
          },
          reportUrl: SERVER_URL + "/api/anticheat",
          onBot: function(result){
            reportAnticheatResult(result, true);
          },
          onSuspect: function(result){
            reportAnticheatResult(result, false);
          }
        });
      }catch(e){ /* anticheat init failed — don't block the race */ }
    } else if(typeof AntiCheat !== "undefined" && !rs.isTestRace){
      // Fallback to plain AntiCheat if fingerprint module not available
      try{
        AntiCheat.init(input, {
          silent: true,
          onBot: function(result){ reportAnticheatResult(result, true); },
          onSuspect: function(result){ reportAnticheatResult(result, false); }
        });
      }catch(e){}
    }

    // Since the input is invisible, re-focus it whenever the user clicks
    // anywhere on the race panel so keystrokes always land in the right place.
    var panel = app.querySelector(".panel");
    if(panel) panel.addEventListener("click", function(){ if(!input.disabled) input.focus(); });

    // Measure the real lane width so the car's own width can be subtracted -
    // otherwise "100% progress" leaves the car's body clipped past the edge
    // instead of looking like it actually reaches the finish line.
    var sampleLane = document.querySelector(".track .lane.player");
    rs.laneWidthPx = sampleLane ? sampleLane.getBoundingClientRect().width : 0;

    markCurrentChar(0);

    // For multiplayer waiting state, countdown is triggered by race_starting.
    // For local/calibration/test races, start countdown immediately.
    if(!rs.isWaiting){
      startCountdown(rs, function(){
        if(raceState !== rs || rs.finished) return;
        input.disabled = false;
        rs.startTime = performance.now();
        input.focus();
        var trackEl = document.querySelector(".track.has-custom-track");
        if(trackEl) trackEl.style.animationPlayState = "running";
        var nameTagEl = document.querySelector("#playerCar .car-nametag");
        if(nameTagEl) nameTagEl.style.display = "none";
        startRaceLoop();
      });
    }
  }

  function startCountdown(rs, onDone){
    if(rs.isMultiplayer && typeof rs.startsAt === "number"){
      startSyncedCountdown(rs, onDone);
    } else {
      startLocalCountdown(rs, onDone);
    }
  }

  // The original fixed-timing countdown — used for local/test/calibration
  // races, where there's no shared clock to sync against and a steady
  // "5...4...3...2...1...GO!" cadence is all that's needed.
  function startLocalCountdown(rs, onDone){
    var steps = ["5","4","3","2","1","GO!"];
    var i = 0;
    function showNext(){
      if(raceState !== rs || rs.finished) return; // race was quit mid-countdown
      var overlay = document.getElementById("countdownOverlay");
      if(i >= steps.length){
        if(overlay) overlay.remove();
        onDone();
        return;
      }
      var label = steps[i];
      var isGo = (label === "GO!");
      if(overlay){
        overlay.innerHTML = '<div class="countdown-num' + (isGo ? ' go' : '') + '">' + label + '</div>';
      }
      i++;
      setTimeout(showNext, isGo ? 500 : 900);
    }
    showNext();
  }

  // Multiplayer countdown — ticks based on actual time remaining until
  // rs.startsAt (an absolute timestamp every player in the room received
  // identically from the server), not a fixed local sequence. This is
  // what keeps everyone's "GO!" landing at the same real moment
  // regardless of small differences in when each client's race_starting
  // message actually arrived.
  function startSyncedCountdown(rs, onDone){
    var lastShown = -1;
    // Ensure we always show at least 3 ticks (3,2,1) before GO
    var minShowUntil = Date.now() + 3000;
    function tick(){
      if(raceState !== rs || rs.finished) return;
      var overlay = document.getElementById("countdownOverlay");
      var now = Date.now();
      var msLeft = rs.startsAt - now;
      // Don't fire GO until we've shown at least 3 seconds of countdown
      if(msLeft <= 0 && now < minShowUntil) msLeft = minShowUntil - now;
      var secondsLeft = Math.ceil(msLeft / 1000);

      if(msLeft <= 0){
        if(overlay && lastShown !== 0){
          lastShown = 0;
          overlay.innerHTML = '<div class="countdown-num go">GO!</div>';
          setTimeout(function(){
            var el = document.getElementById("countdownOverlay");
            if(el) el.remove();
          }, 500);
        }
        onDone();
        return;
      }

      var s = Math.max(1, secondsLeft);
      if(overlay && s !== lastShown){
        lastShown = s;
        overlay.innerHTML = '<div class="countdown-num">' + s + '</div>';
      }
      setTimeout(tick, 100);
    }
    tick();
  }


  var pasteNoticeTimer = null;
  function showPasteNotice(){
    var el = document.getElementById("pasteNotice");
    if(!el) return;
    el.textContent = "Pasting isn't allowed here \u2014 type it out for real.";
    if(pasteNoticeTimer) clearTimeout(pasteNoticeTimer);
    pasteNoticeTimer = setTimeout(function(){ if(el) el.textContent = ""; }, 2200);
  }

  // Converts a 0..1 completion fraction into a left-offset in px that lands
  // the car's right edge exactly on the finish line at frac === 1.
  function carLeftPx(frac, laneWidthPx){
    var usable = Math.max(0, (laneWidthPx || 0) - CAR_WIDTH_PX);
    return Math.max(0, Math.min(1, frac)) * usable;
  }

  // The two fixed target positions for scrolling-track mode: dead-center
  // of the lane (where the car cruises for most of the race), and a point
  // mostly past the lane's right edge (where it glides to as the race
  // wraps up, like driving off through a finish line). minLeftPx is the
  // current race's track's own saved start X (falls back to the global
  // default if the track didn't set one) — using it as the floor instead
  // of a single hardcoded constant means a track with a narrower or
  // differently-spaced lane never has the car glide to a spot that
  // doesn't fit it.
  function trackCenterLeft(laneWidthPx, minLeftPx){
    var floor = (typeof minLeftPx === "number") ? minLeftPx : CAR_FIXED_LEFT_PX;
    return Math.max(floor, (laneWidthPx - CAR_WIDTH_PX) / 2);
  }
  function trackEndLeft(laneWidthPx, minLeftPx){
    var centerLeft = trackCenterLeft(laneWidthPx, minLeftPx);
    return Math.max(centerLeft, laneWidthPx - CAR_WIDTH_PX);
  }

  // How many pixels of visual separation a full 0..1 progress gap between
  // two racers represents — tune this to taste once there are real
  // opponents to test against (bigger = cars pull apart faster).
  var RELATIVE_GAP_PX_PER_PROGRESS = 2400;

  // Nitro Type-style relative positioning, ready for real multiplayer:
  // every racer is positioned on the SAME shared track based on how far
  // ahead or behind they are of a reference racer (normally "me" — the
  // camera follows my own progress, same as trackCenterLeft's center
  // point). A racer who's pulling ahead drifts right of center; fall far
  // enough behind (or get far enough ahead) and they pass the lane edge,
  // where overflow:hidden naturally hides them — no special-casing needed,
  // they just reappear once the gap closes again.
  //
  // With only one racer in a race today there's nothing to compare
  // against, so this isn't called yet — but the moment live opponent
  // progress exists, rendering their car with
  // relativeCarLeft(myFrac, opponentFrac, laneWidthPx) each tick is all
  // that's needed for the pull-away/out-of-sight effect to work.
  function relativeCarLeft(myFrac, otherFrac, laneWidthPx, minLeftPx){
    var centerLeft = trackCenterLeft(laneWidthPx, minLeftPx);
    var gapPx = (otherFrac - myFrac) * RELATIVE_GAP_PX_PER_PROGRESS;
    return centerLeft + gapPx;
  }

  // Positions one opponent's car based on their last-known progress.
  // Mirrors how the player's own car moves in startRaceLoop: relative
  // (Nitro Type-style) positioning on a scrolling track, or a straight
  // 0..1-across-the-lane position otherwise. `snapToFinish` is set when
  // the opponent has actually finished (rather than just sent their
  // final progress tick), to make sure their car visually reaches the
  // end even if their very last progress message arrived a beat late.
  function moveOpponentCar(opp, snapToFinish){
    var rs = raceState;
    if(!rs) return;
    // Don't move opponent cars until the race has actually started on this
    // client — prevents cars moving during the countdown due to clock skew.
    if(!snapToFinish && !rs.startTime) return;
    var idx = rs.opponents.indexOf(opp);
    if(idx === -1) return;
    var carEl = document.getElementById("opponentCar" + idx);
    if(!carEl) return;

    var oppFrac = snapToFinish ? 1 : Math.max(0, Math.min(1, typeof opp.fraction === "number" ? opp.fraction : (opp.charsTyped / Math.max(1, rs.passage.length))));
    var hasTrack = rs.track && rs.track.image;

    if(hasTrack){
      if(!opp.trackStartGlideFired && oppFrac > 0){
        opp.trackStartGlideFired = true;
        carEl.style.transition = "left " + TRACK_START_GLIDE_SECONDS + "s ease-out";
        var oppCenter = trackCenterLeft(rs.laneWidthPx, rs.track.carStartX);
        carEl.style.left = oppCenter + "px";
        // Each opponent gets its own independent drift
        var oppDriftRange = 28 + Math.random() * 20;
        var oppDriftOffset = (Math.random() * 2 - 1) * oppDriftRange;
        opp.driftInterval = setInterval((function(el, center, range, oppRef){
          return function(){
            if(!raceState || oppRef.trackFinishGlideFired){ clearInterval(oppRef.driftInterval); return; }
            var newOffset = (Math.random() * 2 - 1) * range;
            var dur = 0.7 + Math.random() * 1.0;
            el.style.transition = "left " + dur + "s ease-in-out";
            el.style.left = (center + newOffset) + "px";
          };
        })(carEl, oppCenter, oppDriftRange, opp), 900 + Math.floor(Math.random() * 800));
      } else if((snapToFinish || opp.finished) && !opp.trackFinishGlideFired){
        opp.trackFinishGlideFired = true;
        if(opp.driftInterval){ clearInterval(opp.driftInterval); opp.driftInterval = null; }
        carEl.style.transition = "left 1.5s ease-in";
        carEl.style.left = trackEndLeft(rs.laneWidthPx, rs.track.carStartX) + "px";
      }
    } else {
      carEl.style.left = carLeftPx(oppFrac, rs.laneWidthPx) + "px";
    }
  }

  function gaugeSvg(){
    // semicircle gauge, smaller for compact race header
    return '<svg width="70" height="40" viewBox="0 0 110 64">' +
      '<path d="M6,60 A52,52 0 0 1 104,60" fill="none" stroke="#2A2E35" stroke-width="9" stroke-linecap="round"/>' +
      '<path d="M6,60 A52,52 0 0 1 104,60" fill="none" stroke="#D0D0D0" stroke-width="9" stroke-linecap="round" ' +
        'stroke-dasharray="163" stroke-dashoffset="163" id="gaugeArc"/>' +
      '<g id="needleGroup" transform="rotate(-90 55 60)">' +
        '<line x1="55" y1="60" x2="55" y2="14" stroke="#ECE9E2" stroke-width="3" stroke-linecap="round" id="needle"/>' +
      '</g>' +
      '<circle cx="55" cy="60" r="4.5" fill="#ECE9E2"/>' +
    '</svg>';
  }

  function updateGauge(wpm){
    var maxWpm = 250; // raised from 160 — fast typists can exceed that ceiling
    var clamped = Math.max(0, Math.min(maxWpm, wpm));
    var deg = (clamped/maxWpm) * 180 - 90; // -90deg .. +90deg
    var needleGroup = document.getElementById("needleGroup");
    if(needleGroup) needleGroup.setAttribute("transform", "rotate(" + deg + " 55 60)");
    var arc = document.getElementById("gaugeArc");
    if(arc){
      var frac = clamped/maxWpm;
      arc.setAttribute("stroke-dashoffset", String(163 - frac*163));
    }
    var numEl = document.getElementById("gaugeNum");
    if(numEl) numEl.textContent = Math.round(wpm); // show real WPM, not visually-clamped value
  }

  function passageInner(){
    return document.getElementById("passageInner");
  }

  function markCurrentChar(idx){
    var inner = passageInner();
    if(!inner) return;
    if(inner.children[idx]) inner.children[idx].classList.add("current");
    scrollPassageToChar(idx);
  }

  // Scrolls the passage-inner div so the line containing charIdx is visible
  // as the second (bottom) of the two displayed lines, keeping the previous
  // line visible above it. Only ever scrolls forward — never back.
  function scrollPassageToChar(idx){
    var inner = passageInner();
    if(!inner) return;
    var span = inner.children[idx];
    if(!span){
      // idx is past the last character (race just finished) — still scroll
      // to reveal the final line using the last available span instead of
      // silently doing nothing, which is what caused the "stuck on the
      // second-to-last line until you finish typing it" bug.
      span = inner.children[inner.children.length - 1];
      if(!span) return;
    }

    var lineHeight = 18 * 1.7; // matches CSS font-size × line-height
    // offsetTop of the span relative to the inner div. Use Math.floor with
    // a small epsilon instead of Math.round — rounding could keep a cursor
    // that has visually moved onto a new (especially short) line counted
    // as still being on the previous line until enough sub-pixel drift
    // accumulated, which is what delayed the scroll until the final word(s)
    // were typed instead of when the line was first reached.
    var spanTop = span.offsetTop;
    var lineNum = Math.floor((spanTop + 2) / lineHeight);
    // Scroll forward the moment the cursor lands on a new line, keeping
    // that line as the FIRST visible line (rather than waiting until the
    // cursor is one line from the bottom). With a 3-line-tall box this
    // means the current line plus the next two are always visible,
    // letting you read ahead instead of scrolling only at the last moment.
    var targetY = Math.max(0, lineNum) * lineHeight;
    var current = raceState ? (raceState.passageScrollY || 0) : 0;
    if(targetY > current){
      if(raceState) raceState.passageScrollY = targetY;
      inner.style.transform = "translateY(-" + targetY + "px)";
    }
  }

  // rs.typed is always a correct prefix of rs.passage now — wrong keystrokes
  // never get committed (see onTypeInput) — so there's no "incorrect" state
  // to render here anymore, just correct / current / pending.
  function updatePassageDisplay(){
    var rs = raceState;
    var inner = passageInner();
    if(!inner) return;
    var spans = inner.children;
    var useBackspace = state.user && state.user.typingMode === "backspace";
    for(var i=0;i<spans.length;i++){
      var cls = "ch";
      if(i < rs.typed.length){
        // In backspace mode, show wrong chars in red instead of green
        if(useBackspace && rs.mistakePositions && rs.mistakePositions[i]){
          cls += " wrong";
        } else {
          cls += " correct";
        }
      } else if(i === rs.typed.length) cls += " current";
      spans[i].className = cls;
    }
    scrollPassageToChar(rs.typed.length);
  }

  function markWrongKey(){
    var inner = passageInner();
    if(!inner) return;
    var rs = raceState;
    var span = inner.children[rs.typed.length];
    if(span) span.classList.add("wrong-held");
  }

  function onTypeInput(e){
    var rs = raceState;
    if(!rs || rs.finished) return;

    var val = e.target.value;
    if(val.length > rs.passage.length) val = val.slice(0, rs.passage.length);

    // Anti-paste backstop: a real keystroke either appends exactly one
    // character to the end, or deletes from the end (backspace). Anything
    // else - a paste that slipped past the paste handler, a drag-drop, a
    // mid-string replace, autofill - gets rejected back to the last good
    // value instead of being accepted as "typed".
    var isSingleCharAppend = val.length === rs.typed.length + 1 && val.slice(0, rs.typed.length) === rs.typed;
    var isDeletion = val.length < rs.typed.length && rs.typed.slice(0, val.length) === val;
    var isUnchanged = val === rs.typed;
    var useBackspaceMode = state.user && state.user.typingMode === "backspace";

    if(!isSingleCharAppend && !isDeletion && !isUnchanged){
      e.target.value = rs.typed;
      showPasteNotice();
      return;
    }

    if(isSingleCharAppend){
      var typedChar = val.charAt(rs.typed.length);
      var expectedChar = rs.passage.charAt(rs.typed.length);
      if(typedChar !== expectedChar){
        if(useBackspaceMode){
          // Backspace mode: accept the wrong char, mark it as an error
          var pos = rs.typed.length;
          if(!rs.mistakePositions) rs.mistakePositions = {};
          if(!rs.mistakePositions[pos]){
            rs.mistakePositions[pos] = true;
            rs.mistakes++;
          }
          rs.typed = val;
          e.target.value = val;
          updatePassageDisplay();
          markWrongKey();
          return;
        } else {
          // Stop on error mode: block the wrong char
          var pos = rs.typed.length;
          if(!rs.mistakePositions) rs.mistakePositions = {};
          if(!rs.mistakePositions[pos]){
            rs.mistakePositions[pos] = true;
            rs.mistakes++;
          }
          e.target.value = rs.typed;
          markWrongKey();
          return;
        }
      }
      // Correct key — clear the mistake flag for this position
      if(rs.mistakePositions) delete rs.mistakePositions[rs.typed.length];
    }

    if(isDeletion && useBackspaceMode){
      // In backspace mode, allow deletion — clear mistake flags for deleted positions
      if(rs.mistakePositions){
        for(var p = val.length; p < rs.typed.length; p++){
          delete rs.mistakePositions[p];
        }
      }
    } else if(isDeletion && !useBackspaceMode){
      // In stop-on-error mode, block backspace entirely
      e.target.value = rs.typed;
      return;
    }

    rs.typed = val;
    e.target.value = val;
    updatePassageDisplay();

    if(rs.isMultiplayer){
      // Throttled — sending on every single keystroke would flood the
      // server and every opponent's connection for no real benefit;
      // ~150ms between updates is still smooth enough to watch someone
      // else's car move.
      var nowTs = performance.now();
      if(nowTs - (rs.lastProgressSentAt || 0) > 150){
        rs.lastProgressSentAt = nowTs;
        var minutesSoFar = rs.startTime ? (performance.now() - rs.startTime) / 60000 : 0;
        var wpmSoFar = minutesSoFar > 0 ? Math.round((rs.typed.length/5) / minutesSoFar) : 0;
        var progressFrac = rs.passage.length > 0 ? rs.typed.length / rs.passage.length : 0;
      sendRaceMessage({ type: "progress", charsTyped: rs.typed.length, fraction: progressFrac, wpm: wpmSoFar });
      }
    }

    if(rs.typed === rs.passage){
      // In backspace mode, can't finish if there are unfixed mistakes
      var hasUnfixedMistakes = rs.mistakePositions && Object.keys(rs.mistakePositions).length > 0;
      if(state.user && state.user.typingMode === "backspace" && hasUnfixedMistakes){
        markWrongKey();
        return;
      }
      finishRace();
    }
  }

  function startRaceLoop(){
    var rs = raceState;
    var hasTrack = rs.track && rs.track.image;
    function tick(now){
      if(!raceState || raceState !== rs || rs.finished) return;
      var elapsed = now - rs.startTime;

      var playerFrac = rs.typed.length / rs.passage.length;
      var playerCar = document.getElementById("playerCar");
      if(hasTrack){
        // Two smooth glides, each fired exactly once — not recalculated
        // every keystroke, which is what made this look stepped/choppy.
        if(playerCar && !rs.trackStartGlideFired && rs.typed.length > 0){
          rs.trackStartGlideFired = true;
          playerCar.style.transition = "left " + TRACK_START_GLIDE_SECONDS + "s ease-out";
          var playerCenter = trackCenterLeft(rs.laneWidthPx, rs.track.carStartX);
          playerCar.style.left = playerCenter + "px";
          // Start subtle random drift after glide completes
          var driftRange = 38; // max px drift either side
          var driftOffset = 0;
          rs.driftInterval = setInterval(function(){
            if(!raceState || raceState !== rs || rs.trackFinishGlideFired){ clearInterval(rs.driftInterval); return; }
            var carEl = document.getElementById("playerCar");
            if(!carEl) return;
            driftOffset = (Math.random() * 2 - 1) * driftRange;
            var driftDuration = 0.8 + Math.random() * 1.0;
            carEl.style.transition = "left " + driftDuration + "s ease-in-out";
            carEl.style.left = (playerCenter + driftOffset) + "px";
          }, 900 + Math.random() * 700);
        }
        if(playerCar && !rs.trackFinishGlideFired && playerFrac >= TRACK_PHASE_FINISH_START_FRAC){
          rs.trackFinishGlideFired = true;
          if(rs.driftInterval){ clearInterval(rs.driftInterval); rs.driftInterval = null; }
          // Estimate how much longer the player will likely take based on
          // their own pace so far — this is what keeps the car's arrival
          // at the edge in sync with actual completion instead of always
          // taking the same guessed-at amount of time regardless of how
          // fast they're typing.
          var charsTyped = rs.typed.length;
          var charsRemaining = Math.max(0, rs.passage.length - charsTyped);
          var msPerChar = charsTyped > 0 ? (elapsed / charsTyped) : 80;
          var estimatedSeconds = (msPerChar * charsRemaining) / 1000;
          var glideSeconds = Math.max(TRACK_FINISH_GLIDE_MIN_SECONDS, Math.min(TRACK_FINISH_GLIDE_MAX_SECONDS, estimatedSeconds));
          playerCar.style.transition = "left " + glideSeconds + "s ease-in";
          playerCar.style.left = trackEndLeft(rs.laneWidthPx, rs.track.carStartX) + "px";
        }
      } else {
        if(playerCar) playerCar.style.left = carLeftPx(playerFrac, rs.laneWidthPx) + "px";
      }

      var timerEl = document.getElementById("raceTimer");
      if(timerEl) timerEl.textContent = formatTime(elapsed);

      var minutes = elapsed / 60000;
      var wpmNow = minutes > 0 ? (rs.typed.length/5) / minutes : 0;
      updateGauge(wpmNow);

      // Opponent cars are repositioned every tick too, not just when
      // their own progress message arrives — relativeCarLeft compares
      // against the PLAYER's current frac, which is changing every
      // frame regardless of whether a new opponent message just came
      // in, so the gap needs to stay live on both sides.
      if(rs.isMultiplayer && rs.opponents.length){
        rs.opponents.forEach(function(opp){
          if(!opp.finished) moveOpponentCar(opp);
        });
      }

      rs.raf = requestAnimationFrame(tick);
    }
    rs.raf = requestAnimationFrame(tick);
  }

  // Called by AntiCheat's onBot/onSuspect callbacks during a race (before
  // finishRace runs). We don't ban mid-race — that's decided once at
  // finishRace using AntiCheat.verdict() — but we log suspicious activity
  // to the console for visibility, and skip entirely if console is silenced.
  function reportAnticheatResult(result, isBot){
    // Intentionally minimal — the real decision happens in finishRace()
    // via AntiCheat.verdict(). This callback exists for future use (e.g.
    // a server-side report endpoint) without blocking the current race.
  }

  async function finishRace(){
    var rs = raceState;
    rs.finished = true;
    if(rs.raf) cancelAnimationFrame(rs.raf);

    // Anticheat: run analysis on this race's typing data before resetting.
    var anticheatVerdict = null;
    if(typeof AntiCheat !== "undefined" && !rs.isTestRace){
      try{ anticheatVerdict = AntiCheat.verdict(); }catch(e){ /* don't block race results on anticheat errors */ }
    }

    var elapsed = performance.now() - rs.startTime;
    var minutes = elapsed / 60000;
    var rawWpm = Math.max(0, Math.round((rs.passage.length/5) / minutes));
    // Use a literal ceiling rather than a named variable — named variables
    // can be overridden at runtime via the browser console/inspect element.
    // 350 WPM covers the fastest verified human typists with headroom.
    var wpm = Math.min(rawWpm, 350);
    // Wrong keys never make it into rs.typed, so "accuracy" here means how
    // many blocked attempts it took relative to the correct keystrokes needed.
    var attempts = rs.passage.length + rs.mistakes;
    var accuracy = attempts ? Math.max(0, Math.round((rs.passage.length / attempts) * 100)) : 100;

    // Solo (local/test/calibration) races: always 1st, since there's
    // genuinely no one else in the race. Multiplayer: place is 1 + how
    // many opponents the server already told us finished before now
    // (raceState.placements is populated live by the opponent_finished
    // handler in startMultiplayerRace as the race plays out) — correct
    // even if more opponents finish later and bump nobody, since place
    // is about who finished BEFORE you, not after.
    var place = 1;
    if(rs.isMultiplayer){
      place = 1 + (rs.placements ? rs.placements.length : 0);
      sendRaceMessage({ type: "finished", wpm: wpm, accuracy: accuracy, timeMs: elapsed });
    }

    // Test races (admin previewing an unreleased car/tag) compute the
    // same numbers for display, but never touch a real account, never
    // check achievements/season rewards, and never call saveAccount —
    // this is the entire point of test mode. state.user is left exactly
    // as it was, whether that's null or a real logged-in player's
    // account the admin happened to already be in when they opened the
    // panel.
    if(rs.isTestRace){
      var coinsEarnedTest = 10 + Math.floor(wpm); // shown for realism, never actually granted
      state.raceResult = {
        wpm: wpm, accuracy: accuracy, place: place, elapsed: elapsed,
        coinsEarned: coinsEarnedTest,
        wasCalibration: false,
        newAchievements: [],
        newSeasonRewards: [],
        carId: rs.carId || "starter_car",
        saveWarning: null,
        isTestRace: true
      };
      state.screen = "results";
      renderApp();
      return;
    }

    // Always fetch a fresh copy of the account from the server so that
    // any admin resets that happened between the last save and now are
    // reflected in this race's data rather than being overwritten.
    var freshRes = await getAccount(state.user.username);
    var acc = (freshRes.ok && freshRes.account) ? freshRes.account : state.user;

    // Anticheat: record flags on the account and auto-ban on high confidence,
    // unless this account is whitelisted by a super admin.
    if(anticheatVerdict && !acc.anticheatWhitelisted){
      acc.anticheatFlags = acc.anticheatFlags || [];
      if(anticheatVerdict.isBot || anticheatVerdict.isSuspect){
        acc.anticheatFlags.push({
          t: Date.now(),
          isBot: anticheatVerdict.isBot,
          score: anticheatVerdict.score,
          confidence: anticheatVerdict.confidence,
          signals: anticheatVerdict.signals.slice(0, 5)
        });
        if(acc.anticheatFlags.length > 50) acc.anticheatFlags.shift(); // cap history
      }
      if(anticheatVerdict.isBot && !acc.isBanned){
        acc.isBanned = true;
        acc.banReason = "Automatic anticheat: " + anticheatVerdict.summary;
        acc.bannedAt = Date.now();
        // Store fingerprint hash if available so admin can see/ban the device
        if(anticheatVerdict.fingerprint && anticheatVerdict.fingerprint.hash){
          acc.deviceFingerprint = anticheatVerdict.fingerprint.hash;
          acc.deviceFingerprintShort = anticheatVerdict.fingerprint.shortHash || null;
        }
      }
    }

    acc.races = (acc.races || 0) + 1;
    acc.sumWpm = (acc.sumWpm || 0) + wpm;
    acc.sumAccuracy = (acc.sumAccuracy || 0) + accuracy;
    acc.bestWpm = Math.max(acc.bestWpm || 0, wpm);
    var racePoints = Math.round(Math.pow(wpm, 1.1) * (accuracy / 100));
    acc.totalPoints = (acc.totalPoints || 0) + racePoints;

    // Session: consecutive races with no gap longer than 30 minutes.
    // lastRaceAt tracks when the previous race ended; if the gap exceeds
    // 30 min, the streak resets to 1 (this race starts a fresh session).
    var SESSION_TIMEOUT_MS = 30 * 60 * 1000;
    var now = Date.now();
    var lastRaceAt = acc.lastRaceAt || 0;
    if(now - lastRaceAt > SESSION_TIMEOUT_MS){
      acc.sessionRaces = 1;
    } else {
      acc.sessionRaces = (acc.sessionRaces || 0) + 1;
    }
    acc.lastRaceAt = now;
    acc.bestSession = Math.max(acc.bestSession || 0, acc.sessionRaces);

    // After the calibration race, record the baseline.
    // After every race, push WPM into a 5-race rolling window so the
    // next race's passage length reflects recent actual speed, not a
    // slow exponential average that barely moves.
    var wasCalibration = rs.isCalibration;
    if(wasCalibration){
      acc.calibratedWpm = Math.max(20, wpm);
      acc.needsRecalibration = false;
    }
    acc.recentWpms = acc.recentWpms || [];
    acc.recentWpms.push(wpm);
    if(acc.recentWpms.length > 20) acc.recentWpms.shift(); // keep last 20 only

    // Track stats per-car so the car info modal can show races/accuracy/WPM
    // specific to the car that was equipped during this race.
    var carId = rs.carId || "starter_car";
    acc.carStats = acc.carStats || {};
    var cs = acc.carStats[carId] || { races: 0, sumWpm: 0, sumAccuracy: 0, masteryPoints: 0 };
    cs.races += 1;
    cs.sumWpm += wpm;
    cs.sumAccuracy += accuracy;
    // Mastery points only start accruing once this car has reached Master
    // rank (1000+ races) — checked AFTER incrementing, so the race that
    // crosses the threshold already counts.
    var carRankNow = masteryRank(cs.races);
    if(carRankNow === "Master" || carRankNow === "Divine"){
      cs.masteryPoints = (cs.masteryPoints || 0) + wpm * (accuracy / 100);
    }
    acc.carStats[carId] = cs;

    // Log this race (for the 24-hour leaderboard) and roll it into the
    // current season's stats (for the Season leaderboard). Both are scoped
    // views on top of the same lifetime totals above.
    acc.recentRaceLog = acc.recentRaceLog || [];
