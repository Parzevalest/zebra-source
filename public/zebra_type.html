  // Renders whatever a car actually has: an uploaded image if present,
  // otherwise an explicit color (used by bots, and any older cars saved
  // with the previous color-picker system), otherwise the default car
  // image. Sized to fill its parent container via width/height:100%.
  function carVisualHtml(car){
    if(car && car.image){
      return '<img src="' + car.image + '" alt="" style="width:100%;height:100%;object-fit:contain;display:block;" />';
    }
    if(car && car.primary){
      return carIconSvg(car.primary, car.accent || "#0A0B0D", car.pattern || "solid").replace(
        '<svg ', '<svg style="width:100%;height:100%;display:block;" '
      );
    }
    return ''; // no image, no color — show nothing
  }

  // Resolves a stored equippedCarId (string) back into a renderable car
  // object — the starter car, a catalog car, or null if not found.
  function resolveCarById(carId){
    if(!carId || carId === "starter_car") return STARTER_CAR;
    var found = customCarsCache.find(function(c){ return c.id === carId; });
    return found || null;
  }

  /* ============ CAR INVENTORY (stackable quantities) ============ */
  // Players can own multiple of the same car (from wheel spins, achievement
  // rewards, or buying off the black market). acc.carQuantities tracks the
  // real count per car; acc.ownedCarIds stays a simple deduped "do I own at
  // least one" list (used everywhere that just needs presence, e.g. the
  // garage and achievement "cars owned" condition).

  // Removes the first occurrence of value from arr (returns new array).
  function removeOneFromArray(arr, value){
    var idx = arr.indexOf(value);
    if(idx === -1) return arr.slice();
    var copy = arr.slice();
    copy.splice(idx, 1);
    return copy;
  }

  function getCarQuantity(acc, carId){
    if(!acc) return 0;
    if(acc.carQuantities && typeof acc.carQuantities[carId] === "number") return acc.carQuantities[carId];
    // Legacy fallback for accounts saved before quantities existed.
    if(acc.ownedCarIds && acc.ownedCarIds.indexOf(carId) !== -1) return 1;
    return 0;
  }

  // Adds qty copies of a car to the account, keeping ownedCarIds in sync.
  function addCarToInventory(acc, carId, qty){
    qty = qty || 1;
    acc.carQuantities = acc.carQuantities || {};
    var current = getCarQuantity(acc, carId);
    acc.carQuantities[carId] = current + qty;
    acc.ownedCarIds = acc.ownedCarIds || [];
    if(acc.ownedCarIds.indexOf(carId) === -1) acc.ownedCarIds.push(carId);
  }

  // Removes qty copies of a car. If this brings the player's count to zero,
  // the car drops out of ownedCarIds AND its per-car stats (races, WPM,
  // accuracy) are wiped — selling your last copy resets your history with it.
  function removeCarFromInventory(acc, carId, qty){
    qty = qty || 1;
    acc.carQuantities = acc.carQuantities || {};
    var current = getCarQuantity(acc, carId);
    var next = Math.max(0, current - qty);
    acc.carQuantities[carId] = next;
    if(next === 0){
      if(acc.ownedCarIds){
        var idx = acc.ownedCarIds.indexOf(carId);
        if(idx !== -1) acc.ownedCarIds.splice(idx, 1);
      }
      if(acc.carStats && acc.carStats[carId]) delete acc.carStats[carId];
    }
    return next;
  }

  // Rarity → coin payout for quick-selling. Any rarity not in this map
  // (Ascended, Unobtainable, Exclusive) cannot be quick-sold.
  var QUICK_SELL_VALUES = { "Common": 50, "Rare": 100, "Ultra Rare": 200, "Legendary": 500, "Mythic": 1500 };

  /* ============ AVATAR INVENTORY / EQUIP ============ */
  // Avatars don't stack (no quantities, no quick sell) — owning one is
  // boolean, same as ownedNameTags. Each slot's ownership list lives at
  // acc.ownedAvatarPieces[slot] = [pieceId, ...]; the equipped piece per
  // slot lives at acc.equippedAvatar[slot] = pieceId|null.
  // acc.avatarPieceQuantities[slot][pieceId] = N tracks duplicates.

  function getAvatarPieceQty(acc, slot, pieceId){
    if(acc && acc.avatarPieceQuantities && acc.avatarPieceQuantities[slot] && acc.avatarPieceQuantities[slot][pieceId] !== undefined){
      return acc.avatarPieceQuantities[slot][pieceId];
    }
    // No qty record yet — fall back to 1 if the piece exists in ownedAvatarPieces
    // (pre-quantity-system accounts that have the piece but no count)
    var ownedIds = (acc && acc.ownedAvatarPieces && acc.ownedAvatarPieces[slot]) || [];
    return ownedIds.indexOf(pieceId) !== -1 ? 1 : 0;
  }

  function ownedAvatarPieceIdsFor(acc, slot){
    return (acc && acc.ownedAvatarPieces && acc.ownedAvatarPieces[slot]) || [];
  }

  function addAvatarPieceToInventory(acc, slot, pieceId){
    acc.ownedAvatarPieces = acc.ownedAvatarPieces || { shoes: [], pants: [], shirt: [], head: [] };
    acc.ownedAvatarPieces[slot] = acc.ownedAvatarPieces[slot] || [];
    if(acc.ownedAvatarPieces[slot].indexOf(pieceId) === -1) acc.ownedAvatarPieces[slot].push(pieceId);
    // Ensure avatarPieceQuantities exists and is seeded from ownedAvatarPieces
    // for any slots that were populated before this system existed.
    acc.avatarPieceQuantities = acc.avatarPieceQuantities || {};
    AVATAR_SLOTS.forEach(function(s){
      if(!acc.avatarPieceQuantities[s]){
        acc.avatarPieceQuantities[s] = {};
        (acc.ownedAvatarPieces[s] || []).forEach(function(id){
          // Seed at 1 for pre-existing pieces (they had no qty before)
          if(!acc.avatarPieceQuantities[s][id]) acc.avatarPieceQuantities[s][id] = 1;
        });
      }
    });
    // Now increment the specific piece being added
    acc.avatarPieceQuantities[slot][pieceId] = (acc.avatarPieceQuantities[slot][pieceId] || 0) + 1;
  }

  function removeAvatarPieceFromInventory(acc, slot, pieceId, qty){
    qty = qty || 1;
    acc.avatarPieceQuantities = acc.avatarPieceQuantities || {};
    acc.avatarPieceQuantities[slot] = acc.avatarPieceQuantities[slot] || {};
    var current = acc.avatarPieceQuantities[slot][pieceId] || 0;
    var newQty = Math.max(0, current - qty);
    acc.avatarPieceQuantities[slot][pieceId] = newQty;
    if(newQty <= 0){
      // Remove from the id array entirely when qty hits 0
      acc.ownedAvatarPieces = acc.ownedAvatarPieces || {};
      acc.ownedAvatarPieces[slot] = (acc.ownedAvatarPieces[slot] || []).filter(function(id){ return id !== pieceId; });
      delete acc.avatarPieceQuantities[slot][pieceId];
      if(acc.equippedAvatar && acc.equippedAvatar[slot] === pieceId) acc.equippedAvatar[slot] = null;
    }
  }

  // Resolves what's actually equipped in a slot back into a renderable
  // piece: a catalog entry if owned+equipped, or the built-in default if
  // unequipped (equippedAvatar[slot] is null) or the equipped piece was
  // since deleted from the catalog (graceful fallback, same spirit as
  // resolveCarById falling back to STARTER_CAR).
  function resolveEquippedAvatarPiece(acc, slot, catalogList){
    var equippedId = acc && acc.equippedAvatar && acc.equippedAvatar[slot];
    if(!equippedId) return null; // null = use the default piece for this slot
    var found = (catalogList || []).find(function(p){ return p.id === equippedId && p.slot === slot; });
    return found || null; // deleted-from-catalog fallback also resolves to default
  }

  // Renders the full 4-layer avatar (shoes/pants/shirt fixed position,
  // head manually positioned) at a given pixel scale. Shared by the
  // garage equip page and anywhere else a composed avatar preview is
  // needed. `resolved` is { shoes, pants, shirt, head } where each value
  // is either a catalog piece object or null (meaning "use the default").
  function composedAvatarHtml(resolved, scale){
    scale = scale || 1;
    var cw = AVATAR_CANVAS_WIDTH * scale;
    var ch = AVATAR_CANVAS_HEIGHT * scale;

    function fixedLayerHtml(slot, top){
      var piece = resolved[slot];
      var src = piece ? piece.image : DEFAULT_AVATAR_PIECES[slot];
      var dims = AVATAR_SLOT_DIMENSIONS[slot];
      return '<img src="' + src + '" alt="" style="position:absolute;left:0;top:' + (top*scale) + 'px;width:' + (dims.w*scale) + 'px;height:' + (dims.h*scale) + 'px;image-rendering:pixelated;display:block;" />';
    }

    var headPiece = resolved.head;
    var headSrc = headPiece ? headPiece.image : DEFAULT_AVATAR_PIECES.head;
    var headNaturalW = headPiece ? (headPiece.naturalW || AVATAR_SLOT_DIMENSIONS.head.w) : DEFAULT_HEAD_NATURAL_W;
    var headNaturalH = headPiece ? (headPiece.naturalH || AVATAR_SLOT_DIMENSIONS.head.h) : DEFAULT_HEAD_NATURAL_H;
    var headOffsetX = headPiece && typeof headPiece.headOffsetX === "number" ? headPiece.headOffsetX : defaultHeadOffsets(DEFAULT_HEAD_NATURAL_W, DEFAULT_HEAD_NATURAL_H).x;
    var headOffsetY = headPiece && typeof headPiece.headOffsetY === "number" ? headPiece.headOffsetY : defaultHeadOffsets(DEFAULT_HEAD_NATURAL_W, DEFAULT_HEAD_NATURAL_H).y;

    // Paint order matters for the overlap to be visible: shoes first
    // (bottom of the stack), then pants on top of shoes, then shirt on
    // top of pants, then the head last/topmost. Each layer's bottom edge
    // overlaps the one below it (see AVATAR_SHIRT_OVER_PANTS_PX /
    // AVATAR_PANTS_OVER_SHOES_PX and the Y constants above), so painting
    // bottom-up is what actually makes the shirt cover the pants' top
    // pixels and the pants cover the shoes' top pixel, rather than the
    // lower layer covering the upper one.
    return '<div style="position:relative;width:' + cw + 'px;height:' + ch + 'px;">' +
        fixedLayerHtml("shoes", AVATAR_SHOES_TOP) +
        fixedLayerHtml("pants", AVATAR_PANTS_TOP) +
        fixedLayerHtml("shirt", AVATAR_SHIRT_TOP) +
        '<img src="' + headSrc + '" alt="" style="position:absolute;left:' + (headOffsetX*scale) + 'px;top:' + (headOffsetY*scale) + 'px;width:' + (headNaturalW*scale) + 'px;height:' + (headNaturalH*scale) + 'px;image-rendering:pixelated;display:block;" />' +
      '</div>';
  }

  /* ============ FRIENDS ============ */
  // Friend requests are a pending-approval flow, same shape as guild
  // membership: requesting adds the other player's username to your own
  // outgoingFriendRequests and to their incomingFriendRequests; accepting
  // removes both pending entries and adds each username to the other's
  // friendUsernames. There's no "online" status yet (see MIN_COINS_TO_SEND
  // note below) — this game has no live presence/server push today, so
  // that's left for whenever real multiplayer infrastructure exists.
  var MIN_COINS_TO_SEND = 1000;

  function isFriendWith(acc, otherUsername){
    return (acc.friendUsernames || []).some(function(u){ return u.toLowerCase() === otherUsername.toLowerCase(); });
  }
  function hasIncomingRequestFrom(acc, otherUsername){
    return (acc.incomingFriendRequests || []).some(function(u){ return u.toLowerCase() === otherUsername.toLowerCase(); });
  }
  function hasOutgoingRequestTo(acc, otherUsername){
    return (acc.outgoingFriendRequests || []).some(function(u){ return u.toLowerCase() === otherUsername.toLowerCase(); });
  }

  // Sends a friend request from `fromAcc` to `toUsername`. Re-fetches the
  // recipient's account fresh (rather than trusting any cached copy) right
  // before saving, same caution as the rest of the game's last-write-wins
  // storage — minimizes (but doesn't eliminate) clobbering a concurrent
  // change, since there's no real transaction support here.
  async function sendFriendRequest(fromAcc, toUsername){
    if(toUsername.toLowerCase() === fromAcc.username.toLowerCase()){
      return { ok:false, error: "You can't friend yourself." };
    }
    if(isFriendWith(fromAcc, toUsername)) return { ok:false, error: "Already friends." };
    if(hasOutgoingRequestTo(fromAcc, toUsername)) return { ok:false, error: "Request already sent." };

    var targetRes = await getAccount(toUsername);
    if(!targetRes.ok) return { ok:false, error: targetRes.error };
    if(!targetRes.account) return { ok:false, error: "No player found with that username." };
    var targetAcc = targetRes.account;

    // They already sent *you* a request — accept it instead of creating a
    // duplicate, mirrored pending request in both directions.
    if(hasIncomingRequestFrom(fromAcc, toUsername)){
      return await acceptFriendRequest(fromAcc, toUsername);
    }

    fromAcc.outgoingFriendRequests = fromAcc.outgoingFriendRequests || [];
    fromAcc.outgoingFriendRequests.push(toUsername);
    targetAcc.incomingFriendRequests = targetAcc.incomingFriendRequests || [];
    targetAcc.incomingFriendRequests.push(fromAcc.username);

    var saveFrom = await saveAccount(fromAcc);
    if(!saveFrom.ok) return { ok:false, error: saveFrom.error };
    var saveTarget = await saveAccount(targetAcc);
    if(!saveTarget.ok) return { ok:false, error: saveTarget.error };
    return { ok:true };
  }

  // Accepts a pending request from `otherUsername` into `acc`'s friend
  // list. `acc` is whichever account is doing the accepting — this is
  // called both from the Friends page (accepting someone else's request to
  // you) and internally by sendFriendRequest (when you request someone who
  // already requested you, i.e. an instant mutual match).
  async function acceptFriendRequest(acc, otherUsername){
    var otherRes = await getAccount(otherUsername);
    if(!otherRes.ok) return { ok:false, error: otherRes.error };
    if(!otherRes.account) return { ok:false, error: "That player no longer exists." };
    var otherAcc = otherRes.account;

    acc.incomingFriendRequests = (acc.incomingFriendRequests || []).filter(function(u){ return u.toLowerCase() !== otherUsername.toLowerCase(); });
    acc.outgoingFriendRequests = (acc.outgoingFriendRequests || []).filter(function(u){ return u.toLowerCase() !== otherUsername.toLowerCase(); });
    acc.friendUsernames = acc.friendUsernames || [];
    if(!isFriendWith(acc, otherUsername)) acc.friendUsernames.push(otherUsername);

    otherAcc.incomingFriendRequests = (otherAcc.incomingFriendRequests || []).filter(function(u){ return u.toLowerCase() !== acc.username.toLowerCase(); });
    otherAcc.outgoingFriendRequests = (otherAcc.outgoingFriendRequests || []).filter(function(u){ return u.toLowerCase() !== acc.username.toLowerCase(); });
    otherAcc.friendUsernames = otherAcc.friendUsernames || [];
    if(!isFriendWith(otherAcc, acc.username)) otherAcc.friendUsernames.push(acc.username);

    var saveAcc = await saveAccount(acc);
    if(!saveAcc.ok) return { ok:false, error: saveAcc.error };
    var saveOther = await saveAccount(otherAcc);
    if(!saveOther.ok) return { ok:false, error: saveOther.error };
    return { ok:true };
  }

  // Declines an incoming request, or cancels one you sent — same removal
  // on both sides either way, just framed differently to the caller.
  async function removeFriendRequest(acc, otherUsername){
    var otherRes = await getAccount(otherUsername);
    if(!otherRes.ok) return { ok:false, error: otherRes.error };
    var otherAcc = otherRes.account; // may be null if they deleted their account — still clean up our own side below

    acc.incomingFriendRequests = (acc.incomingFriendRequests || []).filter(function(u){ return u.toLowerCase() !== otherUsername.toLowerCase(); });
    acc.outgoingFriendRequests = (acc.outgoingFriendRequests || []).filter(function(u){ return u.toLowerCase() !== otherUsername.toLowerCase(); });
    var saveAcc = await saveAccount(acc);
    if(!saveAcc.ok) return { ok:false, error: saveAcc.error };

    if(otherAcc){
      otherAcc.incomingFriendRequests = (otherAcc.incomingFriendRequests || []).filter(function(u){ return u.toLowerCase() !== acc.username.toLowerCase(); });
      otherAcc.outgoingFriendRequests = (otherAcc.outgoingFriendRequests || []).filter(function(u){ return u.toLowerCase() !== acc.username.toLowerCase(); });
      await saveAccount(otherAcc); // best-effort — our own side is already clean either way
    }
    return { ok:true };
  }

  // Removes an accepted friendship from both sides.
  async function removeFriend(acc, otherUsername){
    var otherRes = await getAccount(otherUsername);
    if(!otherRes.ok) return { ok:false, error: otherRes.error };
    var otherAcc = otherRes.account;

    acc.friendUsernames = (acc.friendUsernames || []).filter(function(u){ return u.toLowerCase() !== otherUsername.toLowerCase(); });
    var saveAcc = await saveAccount(acc);
    if(!saveAcc.ok) return { ok:false, error: saveAcc.error };

    if(otherAcc){
      otherAcc.friendUsernames = (otherAcc.friendUsernames || []).filter(function(u){ return u.toLowerCase() !== acc.username.toLowerCase(); });
      await saveAccount(otherAcc);
    }
    return { ok:true };
  }

  // Transfers coins from `fromAcc` to `toUsername`. Re-fetches the
  // recipient fresh right before crediting (same last-write-wins caution
  // as everywhere else). The sender's own balance is checked against
  // fromAcc as passed in — the caller is expected to have a reasonably
  // fresh copy (it's the logged-in player's own session state).
  async function sendCoinsToPlayer(fromAcc, toUsername, amount){
    if(toUsername.toLowerCase() === fromAcc.username.toLowerCase()){
      return { ok:false, error: "You can't send coins to yourself." };
    }
    amount = parseInt(amount, 10);
    if(!amount || amount < MIN_COINS_TO_SEND){
      return { ok:false, error: "Minimum is " + MIN_COINS_TO_SEND + " coins." };
    }
    if((fromAcc.coins || 0) < amount){
      return { ok:false, error: "You don't have enough coins." };
    }

    var targetRes = await getAccount(toUsername);
    if(!targetRes.ok) return { ok:false, error: targetRes.error };
    if(!targetRes.account) return { ok:false, error: "No player found with that username." };
    var targetAcc = targetRes.account;

    fromAcc.coins = (fromAcc.coins || 0) - amount;
    targetAcc.coins = (targetAcc.coins || 0) + amount;
    targetAcc.pendingCoinNotifications = targetAcc.pendingCoinNotifications || [];
    targetAcc.pendingCoinNotifications.push({
      id: "coinnotif_" + Date.now() + "_" + Math.floor(Math.random()*100000),
      fromUsername: fromAcc.username,
      amount: amount,
      ts: Date.now()
    });

    var saveFrom = await saveAccount(fromAcc);
    if(!saveFrom.ok) return { ok:false, error: saveFrom.error };
    var saveTarget = await saveAccount(targetAcc);
    if(!saveTarget.ok){
      // Best-effort rollback so the sender isn't left short if the credit
      // side failed to save — not bulletproof against concurrent writes,
      // but better than silently losing coins.
      fromAcc.coins = (fromAcc.coins || 0) + amount;
      await saveAccount(fromAcc);
      return { ok:false, error: "Couldn't reach the recipient's account: " + saveTarget.error };
    }
    return { ok:true };
  }

  // Turns any plain-text username into a clickable link that navigates to
  // their public profile. Used everywhere a username is displayed outside
  // of inputs/forms (leaderboard rows, guild member rows, etc.) so the
  // person asking for "click a name anywhere" gets a single, consistent
  // mechanism rather than bespoke click handlers scattered around.
  function clickableUsernameHtml(username, extraClass, displayName){
    var label = (displayName && displayName.trim()) ? displayName.trim() : username;
    return '<span class="username-link' + (extraClass ? " " + extraClass : "") + '" data-view-profile="' + escapeHtml(username) + '" style="cursor:pointer;text-decoration:underline;text-decoration-color:transparent;transition:text-decoration-color .15s;">' + escapeHtml(label) + '</span>';
  }

  // Delegated click handler for clickableUsernameHtml spans — attach once
  // per screen render on a container that wraps all of them (or on `app`
  // itself, since profile navigation is valid from anywhere).
  function attachProfileLinkListeners(container){
    (container || app).querySelectorAll("[data-guild-tag-click]").forEach(function(el){
      if(el.dataset.guildTagBound) return;
      el.dataset.guildTagBound = "1";
      el.addEventListener("click", function(e){
        e.stopPropagation();
        var tag = el.getAttribute("data-guild-tag-click");
        if(tag) navigate(GUILD_PREFIX + encodeURIComponent(tag));
      });
    });
    (container || app).querySelectorAll("[data-view-profile]").forEach(function(el){
      // Guard against double-binding if a screen re-renders a sub-section
      // without a full app.innerHTML replace.
      if(el.dataset.profileLinkBound) return;
      el.dataset.profileLinkBound = "1";
      el.addEventListener("click", function(){
        var username = el.getAttribute("data-view-profile");
        if(!username) return;
        state.profileReturnScreen = state.screen;
        state.profileUsername = username;
        navigate(PROFILE_PREFIX + encodeURIComponent(username));
      });
    });
  }

  function buildGarageCars(count){
    // All default slots are the single starter car.
    var cars = [];
    for(var i=0;i<count;i++) cars.push(STARTER_CAR);
    return cars;
  }

  // Custom (admin-added) cars show up first, then the rest of the slots
  // fill in with the procedural palette - same as before.
  function composeGarageCars(customCars, count){
    var result = (customCars || []).slice(0, count).map(function(c){
      return { primary: c.primary, accent: c.accent, pattern: c.pattern || "solid", name: c.name, image: c.image || null };
    });
    if(result.length < count){
      result = result.concat(buildGarageCars(count - result.length));
    }
    return result;
  }

  function garageGridHtml(cars, equippedIndex){
    var slots = cars.map(function(c, idx){
      var isEquipped = (idx === equippedIndex);
      var titleAttr = c.name ? ' title="' + escapeHtml(c.name) + '"' : '';
      var equippedClass = isEquipped ? ' equipped' : '';
      var btnLabel = isEquipped ? 'Equipped' : 'Equip';
      var qtyBadge = (typeof c.qty === "number") ? '<div class="qty-badge">' + c.qty + '</div>' : '';
      var rarityColor = RARITY_COLORS[c.rarity] || "var(--muted)";
      var nameLabel = c.name ? '<div style="font-size:10px;font-weight:700;color:' + rarityColor + ';text-align:center;padding:3px 4px 0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%;line-height:1.2;">' + escapeHtml(c.name) + '</div>' : '';
      return '<div class="garage-slot' + equippedClass + '" data-equip-idx="' + idx + '"' + titleAttr + ' style="display:flex;flex-direction:column;align-items:center;justify-content:flex-end;">' +
        nameLabel +
        carVisualHtml(c) +
        qtyBadge +
        '<button class="info-btn" data-info-idx="' + idx + '" title="Car info">i</button>' +
        '<button class="equip-btn">' + btnLabel + '</button>' +
      '</div>';
    }).join("");
    return '<div class="garage-line"></div><div class="garage-row">' + slots + '</div>';
  }

  // Every name tag a player can equip: the default everyone starts with,
  // plus anything they've earned (achievements, season rewards, wheel
  // wins). Returns both the html and the ordered list itself, since the
  // click handler needs to map a clicked index back to an actual image.
  function nameTagOptionsFor(acc){
    var owned = (acc.ownedNameTags || []).filter(function(t){ return t && t !== DEFAULT_NAME_TAG; });
    return [DEFAULT_NAME_TAG].concat(owned);
  }

  function nameTagFloorHtml(acc){
    var options = nameTagOptionsFor(acc);
    var equipped = acc.equippedNameTag || DEFAULT_NAME_TAG;
    var slots = options.map(function(src, idx){
      var isEquipped = src === equipped;
      var btnLabel = isEquipped ? 'Equipped' : 'Equip';
      var isDefault = src === DEFAULT_NAME_TAG;
      return '<div class="garage-slot' + (isEquipped ? ' equipped' : '') + '" data-equip-tag-idx="' + idx + '" style="width:160px;height:auto;flex:0 0 160px;display:flex;flex-direction:column;align-items:center;">' +
        '<img src="' + src + '" alt="" style="width:100%;height:46px;object-fit:contain;display:block;image-rendering:pixelated;" />' +
        (!isDefault ? '<button class="info-btn" data-info-tag-idx="' + idx + '" title="Name tag info">i</button>' : '') +
        '<button class="equip-btn">' + btnLabel + '</button>' +
      '</div>';
    }).join("");
    return '<div class="garage-line"></div><div class="garage-row">' + slots + '</div>';
  }

  /* ============ DASHBOARD ============ */
  // "dashboard" used to be its own hub screen (stats + 3 buttons + a Top
  // Racers preview). That hub is gone now — Garage opens straight into
  // Cars, with the same stats panel and the Cars/Name Tags/Avatar
  // switcher pinned to the top of every garage sub-page instead (see
  // garageStatsAndSwitcherHtml). "dashboard" is kept as the screen name
  // (rather than renaming it everywhere) so every existing "go back to
  // the garage" call site — login, race quit, admin exit, nav bar, the
  // profile back button — keeps working unchanged.
  function renderDashboard(){
    renderGarageCars();
  }

  // Stats panel + the Cars/Name Tags/Avatar switcher, shared across all
  // three garage sub-pages so it's always visible no matter which one
  // you're on — this is what replaced the old separate hub screen.
  // `activeSubTab` is "cars" | "nameTags" | "avatars", used to highlight
  // the current section in the switcher.
  function garageStatsAndSwitcherHtml(activeSubTab){
    var acc = state.user;
    var races = acc.races || 0;
    var avgWpm = races ? Math.round(acc.sumWpm / races) : 0;
    var avgAcc = races ? Math.round(acc.sumAccuracy / races) : 0;
    var bestWpm = acc.bestWpm || 0;
    var recentWpms = acc.recentWpms || [];
    var recentAvgWpm = recentWpms.length
      ? Math.round(recentWpms.reduce(function(a,b){ return a+b; },0) / recentWpms.length)
      : avgWpm;

    var ownedIds = acc.ownedCarIds || [];
    var ownedCustom = customCarsCache.filter(function(c){ return ownedIds.indexOf(c.id) !== -1; });
    var totalCars = 1 + ownedCustom.length;
    var coins = acc.coins || 0;

    function switcherBtn(key, label, countHtml){
      var isActive = activeSubTab === key;
      return '<button class="btn ' + (isActive ? "btn-primary" : "btn-ghost") + '" data-garage-switch="' + key + '" style="flex:1;min-width:140px;' + (isActive ? "" : "opacity:.75;") + '">' + label +
        (countHtml || '') +
      '</button>';
    }

    var equippedCar = (state.garageOrder && state.garageOrder[state.equippedCarIndex]) || STARTER_CAR;
    var equippedCarRarityColor = RARITY_COLORS[equippedCar.rarity] || "var(--muted)";
    var resolvedAvatar = {
      shoes: resolveEquippedAvatarPiece(acc, "shoes", avatarCatalogCache),
      pants: resolveEquippedAvatarPiece(acc, "pants", avatarCatalogCache),
      shirt: resolveEquippedAvatarPiece(acc, "shirt", avatarCatalogCache),
      head:  resolveEquippedAvatarPiece(acc, "head", avatarCatalogCache)
    };
    var playerDisplayName = displayNameFor(acc);
    var isPremium = !!acc.hasPremiumPass;
    var premiumBadgeHtml = isPremium ? '<div class="premium-badge">Premium</div>' : '';

    return '<div class="panel' + (isPremium ? ' premium-panel' : '') + '" style="margin-bottom:18px;">' +
        premiumBadgeHtml +
        '<div style="display:flex;align-items:center;gap:18px;flex-wrap:wrap;">' +
          '<div style="flex:0 0 auto;">' + composedAvatarHtml(resolvedAvatar, 1.2) + '</div>' +
          '<div style="flex:1;min-width:0;">' +
            '<div style="font-family:\'Arial Black\',Impact,sans-serif;font-style:italic;font-size:20px;color:var(--text);margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + escapeHtml(playerDisplayName) + '</div>' +
            '<div style="display:flex;align-items:center;gap:10px;margin-top:6px;">' +
              '<div style="width:80px;height:40px;flex:0 0 auto;">' + carVisualHtml(equippedCar) + '</div>' +
              '<div>' +
                '<div style="font-size:13px;font-weight:700;color:var(--text);">' + escapeHtml(equippedCar.name || "Bluez") + '</div>' +
                '<div style="font-size:11px;color:' + equippedCarRarityColor + ';font-weight:700;">' + escapeHtml(equippedCar.rarity || "Common") + '</div>' +
              '</div>' +
            '</div>' +
          '</div>' +
        '</div>' +
      '</div>' +
      (state.userGuild ?
        '<div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;">' +
          '<span style="display:inline-flex;align-items:center;gap:6px;background:var(--panel-2);border:1px solid ' + GUILD_COLORS[state.userGuild.color] + ';border-radius:999px;padding:5px 12px;font-size:12px;font-weight:700;">' +
            '<span style="color:' + GUILD_COLORS[state.userGuild.color] + ';">[' + escapeHtml(state.userGuild.tag) + ']</span>' +
            '<span style="color:var(--text);">' + escapeHtml(state.userGuild.name) + '</span>' +
          '</span>' +
        '</div>' : '') +
      '<div class="panel' + (isPremium ? ' premium-panel' : '') + '">' +
        '<div class="stat-grid">' +
          '<div class="stat-card"><div class="num">' + races.toLocaleString() + '</div><div class="lbl">Races</div></div>' +
          '<div class="stat-card"><div class="num">' + bestWpm + '</div><div class="lbl">Best WPM</div></div>' +
          '<div class="stat-card"><div class="num">' + recentAvgWpm + '</div><div class="lbl">Avg WPM</div></div>' +
          '<div class="stat-card"><div class="num">' + avgAcc + '%</div><div class="lbl">Avg Accuracy</div></div>' +
        '</div>' +
      '</div>' +
      '<div class="panel garage-panel' + (isPremium ? ' premium-panel' : '') + '" style="margin-top:18px;">' +
        '<div class="garage-header">' +
          '<div class="garage-title" style="color:var(--text);">Garage' +
            '<span class="garage-count" style="margin-left:14px;">' + COIN_ICON + coins.toLocaleString() + '</span>' +
          '</div>' +
        '</div>' +
        '<div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:14px;">' +
          switcherBtn("cars", '\uD83D\uDE97 Cars ', '<span style="opacity:.75;font-weight:600;">| ' + totalCars + '</span>') +
          switcherBtn("nameTags", '\uD83C\uDFF7\uFE0F Name Tags ', '<span style="opacity:.75;font-weight:600;">| ' + nameTagOptionsFor(acc).length + '</span>') +
          switcherBtn("avatars", '\uD83E\uDDCD Avatar', '') +
          switcherBtn("titles", '\uD83D\uDCDC Titles ', '<span style="opacity:.75;font-weight:600;">| ' + (acc.ownedTitles||[]).length + '</span>') +
        '</div>' +
      '</div>';
  }

  // Wires the switcher buttons rendered by garageStatsAndSwitcherHtml. Call
  // after the panel's innerHTML (and attachNavListeners) are in place on
  // every garage sub-page.
  function attachGarageStatsAndSwitcherListeners(){
    document.querySelectorAll("[data-garage-switch]").forEach(function(btn){
      btn.addEventListener("click", function(){
        var key = btn.getAttribute("data-garage-switch");
        if(key === "cars") state.screen = "garageCars";
        else if(key === "nameTags") state.screen = "garageNameTags";
        else if(key === "avatars") state.screen = "garageAvatars";
        else if(key === "titles") state.screen = "garageTitles";
        renderApp();
      });
    });
  }

  /* ============ GARAGE: CARS ============ */
  /* ============ COIN GIFT NOTIFICATIONS ============ */
  // When a coin gift arrives (sendCoinsToPlayer), it's recorded on the
  // recipient's account as a pendingCoinNotifications entry rather than
  // shown immediately — there's no live push in this game, so the
  // recipient only finds out next time their account loads. The Garage
  // page (which is also where login/signup land) is the one place this
  // gets checked, so "click Garage" and "log in" both surface it as
  // requested. Shown one at a time, queued, oldest first — each is
  // cleared from storage as soon as it's dismissed, so a page reload or
  // navigating away mid-queue can't cause an already-seen one to repeat.
  var coinNotificationQueueInFlight = false;
  function checkAndShowPendingCoinNotifications(){
    if(coinNotificationQueueInFlight) return; // already showing/processing a queue
    var acc = state.user;
    var pending = (acc && acc.pendingCoinNotifications) || [];
    if(!pending.length) return;
    coinNotificationQueueInFlight = true;

    var queue = pending.slice().sort(function(a,b){ return a.ts - b.ts; });

    function showNext(){
      if(!queue.length){
        coinNotificationQueueInFlight = false;
        return;
      }
      var notif = queue.shift();
      showCoinNotificationModal(notif, function(){
        // Remove this one notification from the account's persisted list
        // (re-reading state.user.pendingCoinNotifications fresh in case
        // something else touched it) and save, then move to the next.
        state.user.pendingCoinNotifications = (state.user.pendingCoinNotifications || []).filter(function(n){ return n.id !== notif.id; });
        saveAccount(state.user).then(function(){ showNext(); });
      });
    }
    showNext();
  }

  // Builds and shows the "X sent you Y coins" modal for one notification.
  // Looks up the sender's account (for their guild tag) — gracefully
  // degrades if the sender's account or guild can't be found anymore
  // (deleted account, disbanded guild), same spirit as everywhere else
  // a stored reference might point at something gone.
  function showCoinNotificationModal(notif, onDismiss){
    openModal(
      '<button class="small-btn" id="modalCloseBtn" style="position:absolute;top:14px;right:14px;">\u2715</button>' +
      '<div style="text-align:center;padding:6px 0 4px;">' +
        '<div style="font-size:38px;margin-bottom:8px;">\uD83D\uDCB0</div>' +
        '<div class="garage-title" style="color:var(--text);font-size:19px;margin-bottom:14px;">You\u2019ve Got Coins!</div>' +
        '<div id="coinNotifBody"><div class="center-note">Loading sender info...</div></div>' +
      '</div>'
    );

    function finish(){
      closeModal();
      if(onDismiss) onDismiss();
    }
    document.getElementById("modalCloseBtn").addEventListener("click", finish);

    getAccount(notif.fromUsername).then(async function(senderRes){
      var senderAcc = senderRes.ok ? senderRes.account : null;

      var guildTagHtml = "";
      if(senderAcc && senderAcc.guildId){
        var guild = await fetchGuild(senderAcc.guildId);
        if(guild){
          guildTagHtml = '<span style="display:inline-flex;align-items:center;background:var(--panel-2);border:1px solid ' + GUILD_COLORS[guild.color] + ';border-radius:999px;padding:2px 9px;font-size:12px;font-weight:700;color:' + GUILD_COLORS[guild.color] + ';margin-left:8px;">[' + escapeHtml(guild.tag) + ']</span>';
        }
      }

      var senderNameHtml = senderAcc
        ? clickableUsernameHtml(notif.fromUsername)
        : escapeHtml(notif.fromUsername) + ' <span style="color:var(--muted);font-size:12px;">(account no longer exists)</span>';

      var body = document.getElementById("coinNotifBody");
      if(!body) return; // modal already dismissed before this resolved
      body.innerHTML =
        '<div style="font-size:15px;margin-bottom:6px;">' +
          '<span style="font-weight:700;font-size:18px;">' + senderNameHtml + '</span>' + guildTagHtml +
        '</div>' +
        '<div style="font-size:15px;color:var(--muted);margin-bottom:18px;">sent you</div>' +
        '<div style="font-family:\'Arial Black\',Impact,sans-serif;font-style:italic;font-size:32px;color:var(--amber);margin-bottom:20px;">' + COIN_ICON + (notif.amount||0).toLocaleString() + '</div>' +
        '<div style="display:flex;gap:10px;">' +
          (senderAcc ? '<button class="btn btn-ghost" id="coinNotifViewProfileBtn" style="flex:1;">View Profile</button>' : '') +
          '<button class="btn btn-primary" id="coinNotifDismissBtn" style="flex:1;">Nice!</button>' +
        '</div>';

      var viewBtn = document.getElementById("coinNotifViewProfileBtn");
      if(viewBtn) viewBtn.addEventListener("click", function(){
        state.profileReturnScreen = state.screen;
        state.profileUsername = notif.fromUsername;
        finish();
        state.screen = "profile";
        renderApp();
      });
      document.getElementById("coinNotifDismissBtn").addEventListener("click", finish);
      attachProfileLinkListeners(body); // covers the username span if rendered via clickableUsernameHtml
    });
  }

  function openCarIndexModal(){
    // Load cars, wheel prizes, and achievements in parallel
    Promise.all([fetchCustomCars(), fetchWheelPrizes(), fetchAchievements()]).then(function(results){
      var allCars = results[0];
      var wheelPrizes = results[1];
      var achievements = results[2];

      // Build set of car IDs that are on a wheel or in an achievement
      var visibleIds = {};
      wheelPrizes.forEach(function(p){ if(p.rewardType === "car" && p.rewardCarId) visibleIds[p.rewardCarId] = true; });
      achievements.forEach(function(a){ if(a.rewardType === "car" && a.rewardCarId) visibleIds[a.rewardCarId] = true; });

      var cars = allCars.filter(function(c){ return visibleIds[c.id]; });

      if(!cars.length){
        openModal('<button class="small-btn" id="modalCloseBtn" style="position:absolute;top:14px;right:14px;">\u2715</button><div class="center-note" style="padding:20px;">No cars in the index yet.</div>');
        document.getElementById("modalCloseBtn").addEventListener("click", closeModal);
        return;
      }

      // Group by rarity
      var byRarity = {};
      cars.forEach(function(c){
        var r = c.rarity || "Common";
        if(!byRarity[r]) byRarity[r] = [];
        byRarity[r].push(c);
      });
      var rarityOrder = ["Common","Rare","Ultra Rare","Legendary","Mythic","Ascended","Unobtainable","Admin","Exclusive","Achievement"];

      var html = '<button class="small-btn" id="modalCloseBtn" style="position:absolute;top:14px;right:14px;">\u2715</button>' +
        '<div class="garage-title" style="color:var(--text);font-size:20px;margin-bottom:16px;">\uD83D\uDCD6 Car Index</div>' +
        '<div class="hint-text" style="margin-top:0;margin-bottom:16px;">All cars that have been added to the game. ' + cars.length + ' total.</div>';

      rarityOrder.forEach(function(rarity){
        var group = byRarity[rarity];
        if(!group || !group.length) return;
        html += '<div style="margin-bottom:18px;">' +
          '<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--line);">' +
            rarityTextHtml(rarity) + ' <span style="color:var(--muted);font-weight:400;">' + group.length + '</span>' +
          '</div>' +
          '<div style="display:flex;flex-wrap:wrap;gap:12px;">';

        group.forEach(function(c){
          var acc = state.user;
          var owned = (acc.ownedCarIds || []).indexOf(c.id) !== -1 || (acc.equippedCarId === c.id);
          var rarColor = RARITY_COLORS[c.rarity] || "var(--muted)";
          html += '<div style="width:128px;text-align:center;">' +
            '<div style="font-size:10px;font-weight:700;color:' + rarColor + ';margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + escapeHtml(c.name) + '</div>' +
            '<div style="position:relative;width:128px;height:64px;background:var(--panel-2);border:1px solid ' + (owned ? 'var(--green)' : 'var(--line)') + ';border-radius:8px;overflow:hidden;display:flex;align-items:center;justify-content:center;">' +
              carVisualHtml(c) +
              (owned ? '<div style="position:absolute;top:3px;right:4px;font-size:9px;font-weight:700;color:var(--green);">\u2714 Owned</div>' : '') +
            '</div>' +
          '</div>';
        });

        html += '</div></div>';
      });

      openModal(html);
      document.getElementById("modalCloseBtn").addEventListener("click", closeModal);
    }).catch(function(e){ console.error("Car index error:", e); });
  }

  function renderGarageCars(){
    var acc = state.user;
    checkAndShowPendingCoinNotifications();

    // If both caches are still empty (first load), fetch them first so the
    // garage never flashes the default car/avatar before showing the real ones.
    if(!garageCachesLoaded){
      app.innerHTML =
        brandHeader() +
        renderNavBar("garage") +
        '<div class="panel" style="margin-bottom:18px;"><div class="center-note">Loading garage\u2026</div></div>';
      attachNavListeners();
      Promise.all([fetchCustomCars(), fetchAvatarCatalog()]).then(function(results){
        customCarsCache = results[0];
        avatarCatalogCache = results[1];
        garageCachesLoaded = true;
        if(state.screen === "garageCars" || state.screen === "dashboard") renderGarageCars();
      });
      return;
    }

    var ownedIds = acc.ownedCarIds || [];
    var ownedCustom = customCarsCache.filter(function(c){ return ownedIds.indexOf(c.id) !== -1; });
    var totalCars = 1 + ownedCustom.length;
    state.garageOrder = [STARTER_CAR].concat(ownedCustom.map(function(c){
      return { primary: c.primary, accent: c.accent, pattern: c.pattern || "solid", name: c.name, image: c.image || null, id: c.id, creator: c.creator, description: c.description, rarity: c.rarity, qty: getCarQuantity(acc, c.id), isSeasonal: !!c.isSeasonal };
    }));
    // Equip index is derived from the persisted equippedCarId (not just a
    // bounds check) so a fresh login lands on whatever was actually
    // equipped last, not always the starter car.
    var equippedIdx = state.garageOrder.findIndex(function(c){ return (c.id || "starter_car") === (acc.equippedCarId || "starter_car"); });
    state.equippedCarIndex = equippedIdx !== -1 ? equippedIdx : 0;
    var isPremium = !!acc.hasPremiumPass;

    app.innerHTML =
      brandHeader() +
      renderNavBar("garage") +
      garageStatsAndSwitcherHtml("cars") +
      '<div class="panel garage-panel' + (isPremium ? ' premium-panel' : '') + '" style="margin-top:18px;">' +
        '<div class="garage-header">' +
          '<div class="garage-title" style="color:var(--text);">My Cars ' +
            '<span class="garage-count">| ' + totalCars + '</span>' +
          '</div>' +
          '<button class="small-btn" id="openCarIndexBtn" style="padding:14px 24px;font-size:16px;">\uD83D\uDCD6 Car Index</button>' +
        '</div>' +
        '<div class="garage-floor" id="garageFloor">' + garageGridHtml(state.garageOrder, state.equippedCarIndex) + '</div>' +
      '</div>';

    attachNavListeners();
    attachGarageStatsAndSwitcherListeners();

    // Equip any car by clicking its slot, or show car info via the "i"
    // button — single delegated listener on the floor div. We re-render the
    // grid contents in-place (not the floor div itself) so the listener
    // stays attached through equips.
    document.getElementById("openCarIndexBtn").addEventListener("click", function(){ openCarIndexModal(); });

    var garageFloorEl = document.getElementById("garageFloor");
    garageFloorEl.addEventListener("click", function(e){
      var infoBtn = e.target.closest("[data-info-idx]");
      if(infoBtn){
        var infoIdx = parseInt(infoBtn.getAttribute("data-info-idx"), 10);
        if(!isNaN(infoIdx) && state.garageOrder[infoIdx]) showCarInfoModal(state.garageOrder[infoIdx]);
        return; // don't also trigger equip
      }
      var slot = e.target.closest("[data-equip-idx]");
      if(!slot) return;
      var idx = parseInt(slot.getAttribute("data-equip-idx"), 10);
      if(isNaN(idx)) return;
      state.equippedCarIndex = idx;
      garageFloorEl.innerHTML = garageGridHtml(state.garageOrder, state.equippedCarIndex);
      // Persist which car is equipped so it's visible to others (e.g. in a
      // guild member list), not just kept in this browser's session state.
      var equippedNow = state.garageOrder[idx];
      state.user.equippedCarId = (equippedNow && equippedNow.id) || "starter_car";
      saveAccount(state.user);
    });

    // Refresh the custom-car catalog in the background.
    fetchCustomCars().then(function(list){
      customCarsCache = list;
      if(state.screen !== "garageCars") return;
      // Re-compose the garage with the freshly loaded catalog.
      var ownedIds2 = (state.user && state.user.ownedCarIds) || [];
      var ownedCustom2 = list.filter(function(c){ return ownedIds2.indexOf(c.id) !== -1; });
      state.garageOrder = [STARTER_CAR].concat(ownedCustom2.map(function(c){
        return { primary: c.primary, accent: c.accent, pattern: c.pattern || "solid", name: c.name, image: c.image || null, id: c.id, creator: c.creator, description: c.description, rarity: c.rarity, qty: getCarQuantity(state.user, c.id), isSeasonal: !!c.isSeasonal };
      }));
      if(state.equippedCarIndex >= state.garageOrder.length) state.equippedCarIndex = 0;
      var floor = document.getElementById("garageFloor");
      if(floor) floor.innerHTML = garageGridHtml(state.garageOrder, state.equippedCarIndex);
    });

    // Refresh the player's own account in the background too. This is what
    // makes admin edits (races added/removed, coins, car stats) show up
    // immediately without needing a page reload — important since reloading
    // would wipe an in-memory (non-persistent) session. This used to only
    // run on the old hub screen; now that Cars is the default landing
    // screen, it runs here instead.
    getAccount(acc.username).then(async function(res){
      if(!res.ok || !res.account) return;
      if(state.screen !== "garageCars") return;
      var fresh = res.account;
      var changed = fresh.races !== state.user.races ||
        fresh.coins !== state.user.coins ||
        fresh.bestWpm !== state.user.bestWpm ||
        fresh.guildId !== state.user.guildId ||
        JSON.stringify(fresh.carStats) !== JSON.stringify(state.user.carStats) ||
        JSON.stringify(fresh.ownedCarIds) !== JSON.stringify(state.user.ownedCarIds);
      if(changed){
        var guildChanged = fresh.guildId !== state.user.guildId;
        state.user = fresh;
        if(guildChanged) await refreshUserGuildCache();
        renderGarageCars(); // full re-render with the up-to-date numbers
      }
    });
  }

  /* ============ GARAGE: NAME TAGS ============ */
  // ---- Titles Garage ----
  function renderGarageTitles(){
    var acc = state.user;
    app.innerHTML =
      brandHeader() +
      renderNavBar("garage") +
      garageStatsAndSwitcherHtml("titles") +
      '<div class="panel garage-panel" style="margin-top:18px;">' +
        '<div class="garage-header">' +
          '<div class="garage-title" style="color:var(--text);">My Titles ' +
            '<span class="garage-count">| ' + (acc.ownedTitles||[]).length + '</span>' +
          '</div>' +
        '</div>' +
        '<div id="titlesFloor" style="padding:14px 0;"></div>' +
      '</div>';

    attachNavListeners();
    attachGarageStatsAndSwitcherListeners();

    var floor = document.getElementById("titlesFloor");
    var ownedTitles = acc.ownedTitles || [];
    if(!ownedTitles.length){
      floor.innerHTML = '<div class="center-note">No titles yet. Earn them from achievements and seasons!</div>';
      return;
    }

    fetchTitleCatalog().then(function(catalog){
      var equipped = acc.equippedTitle || DEFAULT_TITLE_ID;
      // Always include default title first, dedup the list
      var displayTitles = [DEFAULT_TITLE_ID].concat(ownedTitles.filter(function(tid){ return tid !== DEFAULT_TITLE_ID; }));
      floor.innerHTML = displayTitles.map(function(tid){
        var isDefault = tid === DEFAULT_TITLE_ID;
        var title = isDefault ? DEFAULT_TITLE : catalog.find(function(t){ return t.id === tid; });
        var text = title ? title.text : tid;
        var rarity = title ? (title.rarity || "Common") : "Common";
        var color = RARITY_COLORS[rarity] || "var(--muted)";
        var isEquipped = equipped === tid;
        return '<div class="admin-car-row" style="border:1px solid ' + (isEquipped ? 'var(--text)' : 'var(--line)') + ';border-radius:10px;padding:12px;margin-bottom:8px;">' +
          '<div style="flex:1;">' +
            '<div style="font-size:15px;font-weight:700;color:' + color + ';font-style:italic;">&ldquo;' + escapeHtml(text) + '&rdquo;' + (isDefault ? ' <span style="font-size:10px;font-weight:400;color:var(--muted);font-style:normal;">(Default)</span>' : '') + '</div>' +
            '<div style="font-size:11px;margin-top:3px;">' + rarityTextHtml(rarity) + '</div>' +
          '</div>' +
          '<button class="equip-btn" data-equip-title="' + escapeHtml(tid) + '">' + (isEquipped ? 'Equipped' : 'Equip') + '</button>' +
        '</div>';
      }).join("");

      floor.querySelectorAll("[data-equip-title]").forEach(function(btn){
        btn.addEventListener("click", async function(){
          var tid = btn.getAttribute("data-equip-title");
          var latest = await getAccount(acc.username);
          if(!latest.ok) return;
          latest.account.equippedTitle = (latest.account.equippedTitle === tid) ? null : tid;
          await saveAccount(latest.account);
          state.user = latest.account;
          renderGarageTitles();
        });
      });
    });
  }

  // ---- BM Item Listing Modal ----
  function openBMItemListModal(item, acc, onSuccess){
    var html =
      '<button class="small-btn" id="modalCloseBtn" style="position:absolute;top:14px;right:14px;">\u2715</button>' +
      '<div style="display:flex;align-items:center;gap:14px;background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:16px;margin-bottom:16px;">' +
        '<img src="' + item.itemImage + '" style="width:80px;height:50px;object-fit:contain;image-rendering:pixelated;" />' +
        '<div><div style="font-weight:700;font-size:16px;color:var(--text);">' + escapeHtml(item.itemName) + '</div>' +
          '<div style="font-size:13px;">' + rarityTextHtml(item.rarity) + '</div></div>' +
      '</div>' +
      '<div class="garage-title" style="font-size:16px;color:var(--text);margin-bottom:10px;">List on Black Market</div>' +
      '<div style="display:flex;gap:10px;align-items:center;margin-bottom:6px;">' +
        '<span style="color:var(--muted);font-size:13px;">Price</span>' +
        '<input type="number" id="bmItemPrice" min="1" value="100" style="width:100px;background:var(--panel-2);color:var(--text);border:1px solid var(--line);border-radius:6px;padding:8px 10px;font-size:14px;" />' +
        '<span style="color:var(--muted);font-size:13px;">coins</span>' +
      '</div>' +
      '<div class="error-text" id="bmItemListError" style="margin-bottom:8px;"></div>' +
      '<button class="btn btn-primary btn-block" id="bmItemListBtn">List Item</button>';

    openModal(html);
    document.getElementById("modalCloseBtn").addEventListener("click", closeModal);
    document.getElementById("bmItemListBtn").addEventListener("click", async function(){
      var errEl = document.getElementById("bmItemListError");
      var price = parseInt(document.getElementById("bmItemPrice").value, 10);
      if(!price || price < 1){ errEl.textContent = "Enter a valid price."; return; }
      var btn = document.getElementById("bmItemListBtn");
      btn.disabled = true; btn.textContent = "Listing...";
      try{
        var listings = await fetchBMItemListings();
        // Check not already listed
        var alreadyListed = listings.filter(function(l){ return l.sellerUsername.toLowerCase() === acc.username.toLowerCase() && l.itemId === item.itemId && l.itemType === item.itemType; }).length;
        if(alreadyListed > 0){ errEl.textContent = "You already have this item listed."; btn.disabled = false; btn.textContent = "List Item"; return; }
        var listing = {
          id: "bmi_" + Date.now() + "_" + Math.floor(Math.random()*10000),
          itemType: item.itemType,
          itemId: item.itemId,
          itemName: item.itemName,
          itemImage: item.itemImage,
          rarity: item.rarity,
          slot: item.slot || null,
          price: price,
          sellerUsername: acc.username,
          createdAt: Date.now()
        };
        listings.push(listing);
        await saveBMItemListings(listings);
        closeModal();
        if(onSuccess) onSuccess();
      }catch(e){ errEl.textContent = "Error: " + e.message; btn.disabled = false; btn.textContent = "List Item"; }
    });
  }

  // ---- Name Tag Info Modal ----
  async function openNameTagInfoModal(idx, acc){
    var options = nameTagOptionsFor(acc);
    var src = options[idx];
    if(!src || src === DEFAULT_NAME_TAG) return;
    // Find catalog entry for this tag
    var catalog = await fetchNameTagCatalog();
    var entry = catalog.find(function(t){ return t.image === src; });
    var name = entry ? (entry.name || "Name Tag") : "Name Tag";
    var rarity = entry ? (entry.rarity || "Common") : "Common";
    var sellValue = QUICK_SELL_VALUES[rarity];
    var canQuickSell = ITEM_UNSELLABLE_RARITIES.indexOf(rarity) === -1 && typeof sellValue === "number" && !entry.isSeasonal;
    var canList = ITEM_UNSELLABLE_RARITIES.indexOf(rarity) === -1 && !entry.isSeasonal;

    var quickSellHtml = canQuickSell
      ? '<button class="btn btn-ghost btn-block" id="ntQuickSellBtn" data-stage="confirm" style="margin-top:14px;color:var(--red);border-color:var(--red);">Quick Sell for ' + COIN_ICON + sellValue + '</button>'
      : '<div class="hint-text" style="margin-top:14px;margin-bottom:0;text-align:center;">' + (entry.isSeasonal ? "Seasonal" : escapeHtml(rarity)) + " items can't be quick-sold.</div>";
    var listHtml = canList
      ? '<div style="margin-top:10px;"><button class="btn btn-ghost btn-block" id="ntListBtn">List on Black Market</button></div>'
      : '<div class="hint-text" style="margin-top:10px;margin-bottom:0;text-align:center;">' + (entry.isSeasonal ? "Seasonal" : escapeHtml(rarity)) + " items can't be listed.</div>";

    var html =
      '<button class="small-btn" id="modalCloseBtn" style="position:absolute;top:14px;right:14px;">\u2715</button>' +
      '<div style="display:flex;align-items:center;justify-content:center;background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:16px;margin-bottom:16px;">' +
        '<img src="' + src + '" alt="" style="width:200px;height:50px;object-fit:contain;image-rendering:pixelated;" />' +
      '</div>' +
      '<div class="garage-title" style="color:var(--text);font-size:19px;margin-bottom:4px;">' + escapeHtml(name) + '</div>' +
      '<div style="display:flex;align-items:center;gap:14px;background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:14px;margin-bottom:12px;">' +
        rarityIconHtml(rarity, 40) +
        '<div>' +
          '<div style="font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);">Rarity</div>' +
          '<div style="font-family:\'Arial Black\',Impact,sans-serif;font-style:italic;font-size:18px;">' + rarityTextHtml(rarity) + '</div>' +
        '</div>' +
      '</div>' +
      '<div class="error-text" id="ntSellError"></div>' +
      quickSellHtml + listHtml;

    openModal(html);
    document.getElementById("modalCloseBtn").addEventListener("click", closeModal);

    if(canQuickSell){
      var sellBtn = document.getElementById("ntQuickSellBtn");
      sellBtn.addEventListener("click", async function(){
        if(sellBtn.getAttribute("data-stage") === "confirm"){
          sellBtn.setAttribute("data-stage", "armed");
          sellBtn.textContent = "Click again to confirm";
          sellBtn.style.background = "var(--red)"; sellBtn.style.color = "#fff";
          setTimeout(function(){
            if(sellBtn.getAttribute("data-stage") === "armed"){
              sellBtn.setAttribute("data-stage", "confirm");
              sellBtn.textContent = "Quick Sell for " + sellValue + " coins";
              sellBtn.style.background = ""; sellBtn.style.color = "var(--red)";
            }
          }, 4000);
          return;
        }
        sellBtn.disabled = true; sellBtn.textContent = "Selling...";
        var errEl = document.getElementById("ntSellError");
        try{
          var latest = await getAccount(acc.username);
          if(!latest.ok || !latest.account){ errEl.textContent = "Couldn't load account."; sellBtn.disabled = false; return; }
          var freshAcc = latest.account;
          freshAcc.ownedNameTags = (freshAcc.ownedNameTags || []).filter(function(t){ return t !== src; });
          if(freshAcc.equippedNameTag === src) freshAcc.equippedNameTag = DEFAULT_NAME_TAG;
          freshAcc.coins = (freshAcc.coins || 0) + sellValue;
          var saveRes = await saveAccount(freshAcc);
          if(!saveRes.ok){ errEl.textContent = "Save failed."; sellBtn.disabled = false; return; }
          state.user = freshAcc;
          closeModal();
          renderGarageNameTags();
        }catch(e){ errEl.textContent = "Error: " + e.message; sellBtn.disabled = false; }
      });
    }
    if(canList){
      document.getElementById("ntListBtn").addEventListener("click", function(){
        closeModal();
        openBMItemListModal({ itemType: "nameTag", itemId: src, itemName: name, itemImage: src, rarity: rarity, slot: null }, acc, function(){ renderGarageNameTags(); });
      });
    }
  }

  // ---- Avatar Piece Info Modal ----
  async function openAvatarInfoModal(pieceId, acc, ownedPieces){
    var p = ownedPieces.find(function(x){ return x.id === pieceId; });
    if(!p) return;
    var rarity = p.rarity || "Common";
    var sellValue = QUICK_SELL_VALUES[rarity];
    var canQuickSell = ITEM_UNSELLABLE_RARITIES.indexOf(rarity) === -1 && typeof sellValue === "number" && !p.isSeasonal;
    var canList = ITEM_UNSELLABLE_RARITIES.indexOf(rarity) === -1 && !p.isSeasonal;

    var quickSellHtml = canQuickSell
      ? '<button class="btn btn-ghost btn-block" id="avQuickSellBtn" data-stage="confirm" style="margin-top:14px;color:var(--red);border-color:var(--red);">Quick Sell for ' + COIN_ICON + sellValue + '</button>'
      : '<div class="hint-text" style="margin-top:14px;margin-bottom:0;text-align:center;">' + (p.isSeasonal ? "Seasonal" : escapeHtml(rarity)) + " items can't be quick-sold.</div>";
    var listHtml = canList
      ? '<div style="margin-top:10px;"><button class="btn btn-ghost btn-block" id="avListBtn">List on Black Market</button></div>'
      : '<div class="hint-text" style="margin-top:10px;margin-bottom:0;text-align:center;">' + (p.isSeasonal ? "Seasonal" : escapeHtml(rarity)) + " items can't be listed.</div>";

    var html =
      '<button class="small-btn" id="modalCloseBtn" style="position:absolute;top:14px;right:14px;">\u2715</button>' +
      '<div style="display:flex;align-items:center;justify-content:center;background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:16px;margin-bottom:16px;height:100px;">' +
        '<img src="' + p.image + '" alt="" style="max-width:80%;max-height:80px;object-fit:contain;image-rendering:pixelated;" />' +
      '</div>' +
      '<div class="garage-title" style="color:var(--text);font-size:19px;margin-bottom:2px;">' + escapeHtml(p.name || "") + '</div>' +
      '<div style="font-size:12px;color:var(--muted);margin-bottom:14px;">' + escapeHtml(AVATAR_SLOT_LABELS[p.slot] || p.slot || "") + '</div>' +
      '<div style="display:flex;align-items:center;gap:14px;background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:14px;margin-bottom:12px;">' +
        rarityIconHtml(rarity, 40) +
        '<div>' +
          '<div style="font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);">Rarity</div>' +
          '<div style="font-family:\'Arial Black\',Impact,sans-serif;font-style:italic;font-size:18px;">' + rarityTextHtml(rarity) + '</div>' +
        '</div>' +
      '</div>' +
      '<div class="error-text" id="avSellError"></div>' +
      quickSellHtml + listHtml;

    openModal(html);
    document.getElementById("modalCloseBtn").addEventListener("click", closeModal);

    if(canQuickSell){
      var sellBtn = document.getElementById("avQuickSellBtn");
      sellBtn.addEventListener("click", async function(){
        if(sellBtn.getAttribute("data-stage") === "confirm"){
          sellBtn.setAttribute("data-stage", "armed");
          sellBtn.textContent = "Click again to confirm";
          sellBtn.style.background = "var(--red)"; sellBtn.style.color = "#fff";
          setTimeout(function(){
            if(sellBtn.getAttribute("data-stage") === "armed"){
              sellBtn.setAttribute("data-stage", "confirm");
              sellBtn.textContent = "Quick Sell for " + sellValue + " coins";
              sellBtn.style.background = ""; sellBtn.style.color = "var(--red)";
            }
          }, 4000);
          return;
        }
        sellBtn.disabled = true; sellBtn.textContent = "Selling...";
        var errEl = document.getElementById("avSellError");
        try{
          var latest = await getAccount(acc.username);
          if(!latest.ok || !latest.account){ errEl.textContent = "Couldn't load account."; sellBtn.disabled = false; return; }
          var freshAcc = latest.account;
          removeAvatarPieceFromInventory(freshAcc, p.slot, p.id, 1);
          freshAcc.coins = (freshAcc.coins || 0) + sellValue;
          var saveRes = await saveAccount(freshAcc);
          if(!saveRes.ok){ errEl.textContent = "Save failed."; sellBtn.disabled = false; return; }
          state.user = freshAcc;
          closeModal();
          renderGarageAvatars();
        }catch(e){ errEl.textContent = "Error: " + e.message; sellBtn.disabled = false; }
      });
    }
    if(canList){
      document.getElementById("avListBtn").addEventListener("click", function(){
        closeModal();
        openBMItemListModal({ itemType: "avatar", itemId: p.id, itemName: p.name, itemImage: p.image, rarity: rarity, slot: p.slot }, acc, function(){ renderGarageAvatars(); });
      });
    }
  }

  function renderGarageNameTags(){
    var acc = state.user;

    app.innerHTML =
      brandHeader() +
      renderNavBar("garage") +
      garageStatsAndSwitcherHtml("nameTags") +
      '<div class="panel garage-panel" style="margin-top:18px;">' +

          '<div class="garage-title" style="color:var(--text);">Name Tags ' +
            '<span class="garage-count">| ' + nameTagOptionsFor(acc).length + '</span>' +

        '</div>' +

  /* ============ GARAGE: AVATARS ============ */
  function renderGarageAvatars(){
    var acc = state.user;
    state.garageAvatarSlot = state.garageAvatarSlot || "head";
    var activeSlot = state.garageAvatarSlot;

    app.innerHTML =
      brandHeader() +
      renderNavBar("garage") +
      garageStatsAndSwitcherHtml("avatars") +
      '<div class="panel" style="text-align:center;margin-top:18px;">' +
        '<div id="avatarPreviewWrap" style="display:flex;justify-content:center;padding:10px 0;"></div>' +
      '</div>' +
      '<div class="panel garage-panel" style="margin-top:18px;">' +
        '<div class="lb-tabs">' +
          AVATAR_SLOTS.map(function(s){
            return '<div class="lb-tab' + (s === activeSlot ? " active" : "") + '" data-garage-avatar-slot="' + s + '">' + AVATAR_SLOT_LABELS[s] + '</div>';
          }).join("") +
        '</div>' +
        '<div class="garage-floor" id="avatarPieceFloor" style="margin-top:14px;"><div class="center-note">Loading...</div></div>' +
      '</div>';

    attachNavListeners();
    attachGarageStatsAndSwitcherListeners();

    app.querySelectorAll("[data-garage-avatar-slot]").forEach(function(tab){
      tab.addEventListener("click", function(){
        state.garageAvatarSlot = tab.getAttribute("data-garage-avatar-slot");
        renderGarageAvatars();
      });
    });

    function updatePreview(catalogList){
      var wrap = document.getElementById("avatarPreviewWrap");
      if(!wrap) return;
      var resolved = {
        shoes: resolveEquippedAvatarPiece(state.user, "shoes", catalogList),
        pants: resolveEquippedAvatarPiece(state.user, "pants", catalogList),
        shirt: resolveEquippedAvatarPiece(state.user, "shirt", catalogList),
        head:  resolveEquippedAvatarPiece(state.user, "head", catalogList)
      };
      wrap.innerHTML = composedAvatarHtml(resolved, 3);
    }

    fetchAvatarCatalog().then(function(catalogList){
      avatarCatalogCache = catalogList;
      if(state.screen !== "garageAvatars") return;

      updatePreview(catalogList);

      var slotPieces = catalogList.filter(function(p){ return p.slot === activeSlot; });
      var ownedIdsForSlot = ownedAvatarPieceIdsFor(state.user, activeSlot);
      var ownedPieces = slotPieces.filter(function(p){ return ownedIdsForSlot.indexOf(p.id) !== -1; });
      var equippedId = state.user.equippedAvatar && state.user.equippedAvatar[activeSlot];

      var floorEl = document.getElementById("avatarPieceFloor");
      if(!floorEl) return;

      // Default piece is always first and always available, exactly like
      // DEFAULT_NAME_TAG in the name tag floor.
      var defaultSlotEl = '<div class="garage-slot' + (!equippedId ? ' equipped' : '') + '" data-equip-avatar-default="1" style="width:120px;height:140px;flex:0 0 120px;">' +
          '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;">' +
            '<img src="' + DEFAULT_AVATAR_PIECES[activeSlot] + '" alt="" style="max-width:80%;max-height:80%;object-fit:contain;image-rendering:pixelated;display:block;" />' +
          '</div>' +
          '<button class="equip-btn">' + (!equippedId ? "Equipped" : "Equip") + '</button>' +
        '</div>';

      var ownedSlotsHtml = ownedPieces.map(function(p){
        var isEquipped = p.id === equippedId;
        var pieceQty = getAvatarPieceQty(acc, activeSlot, p.id) || 1;
        var qtyBadge = '<div class="qty-badge">' + pieceQty + '</div>';
        return '<div class="garage-slot' + (isEquipped ? ' equipped' : '') + '" data-equip-avatar-id="' + escapeHtml(p.id) + '" title="' + escapeHtml(p.name) + '" style="width:120px;height:auto;flex:0 0 120px;display:flex;flex-direction:column;align-items:center;">' +
            '<div style="width:100%;flex:1;display:flex;align-items:center;justify-content:center;min-height:80px;">' +
              '<img src="' + p.image + '" alt="" style="max-width:80%;max-height:80px;object-fit:contain;image-rendering:pixelated;display:block;" />' +
            '</div>' +
            '<div style="font-size:10px;font-weight:700;text-align:center;">' + rarityTextHtml(p.rarity || "Common") + '</div>' +
            qtyBadge +
            '<button class="info-btn" data-info-av-id="' + escapeHtml(p.id) + '" title="Piece info">i</button>' +
            '<button class="equip-btn">' + (isEquipped ? "Equipped" : "Equip") + '</button>' +
          '</div>';
      }).join("");

      floorEl.innerHTML = '<div class="garage-line"></div><div class="garage-row">' + defaultSlotEl + ownedSlotsHtml + '</div>';

      floorEl.addEventListener("click", async function(e){
        // Info button for avatar piece
        var infoAvBtn = e.target.closest("[data-info-av-id]");
        if(infoAvBtn){ e.stopPropagation(); await openAvatarInfoModal(infoAvBtn.getAttribute("data-info-av-id"), acc, ownedPieces); return; }
        var defaultBtn = e.target.closest("[data-equip-avatar-default]");
        var pieceBtn = e.target.closest("[data-equip-avatar-id]");
        if(!defaultBtn && !pieceBtn) return;

        state.user.equippedAvatar = state.user.equippedAvatar || { shoes: null, pants: null, shirt: null, head: null };
        if(defaultBtn){
          state.user.equippedAvatar[activeSlot] = null; // unequip → falls back to the default piece
        } else {
          state.user.equippedAvatar[activeSlot] = pieceBtn.getAttribute("data-equip-avatar-id");
        }
        saveAccount(state.user); // fire-and-forget, same pattern as equipping a car/name tag
        renderGarageAvatars(); // full re-render: updates both the floor and the preview
      });
    });
  }

  /* ============ PUBLIC PROFILE ============ */
  // Read-only view of any player's garage — reached by clicking a username
  // anywhere (leaderboard rows, guild member rows, etc. via
  // clickableUsernameHtml/attachProfileLinkListeners). state.profileUsername
  // says whose profile to show; state.profileReturnScreen is where the
  // back button goes (wherever the person clicked the name from).
  function renderProfile(){
    var viewerAcc = state.user;
    var targetUsername = state.profileUsername;
    if(!targetUsername){ state.screen = state.user ? "dashboard" : "auth"; renderApp(); return; }

    app.innerHTML =
      brandHeader() +
      renderNavBar(state.profileReturnScreen === "friends" ? "friends" : "") +
      '<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">' +
        '<button class="small-btn" id="backFromProfileBtn">\u2190 Back</button>' +
      '</div>' +
      '<div class="panel"><div class="center-note">Loading profile...</div></div>';

    attachNavListeners();
    document.getElementById("backFromProfileBtn").addEventListener("click", function(){
      state.screen = state.profileReturnScreen || "dashboard";
      renderApp();
    });

    fetchTitleCatalog().then(function(tc){ titleCatalogCache = tc || []; });
    Promise.all([getAccount(targetUsername), fetchCustomCars(), fetchAvatarCatalog()]).then(function(results){
      if(state.screen !== "profile" || state.profileUsername !== targetUsername) return; // navigated away while loading
      var res = results[0];
      customCarsCache = results[1];
      avatarCatalogCache = results[2];

      var panelArea = app.querySelector(".panel");
      if(!res.ok){
        if(panelArea) panelArea.innerHTML = '<div class="center-note">Couldn\'t load that profile: ' + escapeHtml(res.error) + '</div>';
        return;
      }
      if(!res.account){
        if(panelArea) panelArea.innerHTML = '<div class="center-note">No player found with that username.</div>';
        return;
      }

      renderProfileContent(res.account, viewerAcc);
      // Wire display name save button (own profile only)
      var saveDisplayNameBtn = document.getElementById("saveDisplayNameBtn");
      if(saveDisplayNameBtn){
        saveDisplayNameBtn.addEventListener("click", async function(){
          var errEl = document.getElementById("displayNameError");
          errEl.textContent = "";
          errEl.style.color = "var(--red)";
          var val = document.getElementById("displayNameInput").value.trim();
          if(val && !/^[a-zA-Z0-9]{4,20}$/.test(val)){
            errEl.textContent = "Display name must be 4-20 characters, letters and numbers only.";
            return;
          }
          var fresh = await getAccount(targetUsername);
          if(!fresh.ok || !fresh.account){ errEl.textContent = "Couldn't load account."; return; }
          fresh.account.displayName = val;
          var saveRes = await saveAccount(fresh.account);
          if(!saveRes.ok){ errEl.textContent = "Save failed: " + saveRes.error; return; }
          if(state.user && state.user.username.toLowerCase() === targetUsername.toLowerCase()) state.user.displayName = val;
          errEl.style.color = "var(--green)";
          errEl.textContent = val ? "Display name saved." : "Display name cleared — showing username.";
        });
      }
    });
  }

  function renderProfileContent(targetAcc, viewerAcc){
    var isOwnProfile = viewerAcc && viewerAcc.username.toLowerCase() === targetAcc.username.toLowerCase();
    var ownDisplayName = isOwnProfile ? (targetAcc.displayName || "") : "";
    var races = targetAcc.races || 0;
    var avgWpm = races ? Math.round((targetAcc.sumWpm||0) / races) : 0;
    var avgAcc = races ? Math.round((targetAcc.sumAccuracy||0) / races) : 0;

    var equippedCar = resolveCarById(targetAcc.equippedCarId);
    var equippedTag = targetAcc.equippedNameTag || DEFAULT_NAME_TAG;
    var resolvedAvatar = {
      shoes: resolveEquippedAvatarPiece(targetAcc, "shoes", avatarCatalogCache),
      pants: resolveEquippedAvatarPiece(targetAcc, "pants", avatarCatalogCache),
      shirt: resolveEquippedAvatarPiece(targetAcc, "shirt", avatarCatalogCache),
      head:  resolveEquippedAvatarPiece(targetAcc, "head", avatarCatalogCache)
    };

    var relationshipHtml = "";
    if(!isOwnProfile && viewerAcc){
      var alreadyFriends = isFriendWith(viewerAcc, targetAcc.username);
      var requestSentByMe = hasOutgoingRequestTo(viewerAcc, targetAcc.username);
      var requestFromThem = hasIncomingRequestFrom(viewerAcc, targetAcc.username);

      var friendBtnHtml;
      if(alreadyFriends){
        friendBtnHtml = '<button class="btn btn-ghost" id="profileFriendActionBtn" data-friend-state="friends">\u2713 Friends</button>';
      } else if(requestFromThem){
        friendBtnHtml = '<button class="btn btn-primary" id="profileFriendActionBtn" data-friend-state="acceptIncoming">Accept Friend Request</button>';
      } else if(requestSentByMe){
        friendBtnHtml = '<button class="btn btn-ghost" id="profileFriendActionBtn" data-friend-state="pending">Request Sent</button>';
      } else {
        friendBtnHtml = '<button class="btn btn-primary" id="profileFriendActionBtn" data-friend-state="none">+ Add Friend</button>';
      }

      relationshipHtml =
        '<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px;">' +
          '<button class="btn btn-primary" id="profileSendCoinsBtn">\uD83D\uDCB0 Send Coins</button>' +
          friendBtnHtml +
        '</div>' +
        '<div class="error-text" id="profileActionError"></div>';
    }

    var displayNameEditHtml = isOwnProfile ?
      '<div style="display:flex;align-items:center;gap:10px;background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:14px;margin-bottom:14px;">' +
        '<div style="flex:1;">' +
          '<div style="font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);">Display Name</div>' +
          '<div style="font-size:13px;color:var(--muted);margin-top:2px;">Shown on your profile. 4-20 characters, letters and numbers only.</div>' +
        '</div>' +
        '<input id="displayNameInput" maxlength="20" value="' + escapeHtml(ownDisplayName) + '" placeholder="' + escapeHtml(targetAcc.username) + '" style="width:140px;background:var(--panel);color:var(--text);border:1px solid var(--line);border-radius:6px;padding:8px 10px;font-size:14px;" />' +
        '<button class="btn btn-primary" id="saveDisplayNameBtn" style="white-space:nowrap;">Save</button>' +
      '</div>' +
      '<div class="error-text" id="displayNameError" style="margin-bottom:8px;"></div>'
    : "";

    function galleryRow(label, itemsHtml, emptyNote){
      return '<div style="margin-top:18px;">' +
        '<div class="lbl" style="text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-size:12px;margin-bottom:8px;">' + escapeHtml(label) + '</div>' +
        '<div class="garage-row" style="flex-wrap:wrap;">' + (itemsHtml || '<div class="center-note" style="padding:10px 0;">' + escapeHtml(emptyNote) + '</div>') + '</div>' +
      '</div>';
    }

    // Cars: starter car (everyone has it) + any owned custom cars.
    var ownedCarIds = targetAcc.ownedCarIds || [];
    var ownedCustomCars = customCarsCache.filter(function(c){ return ownedCarIds.indexOf(c.id) !== -1; });
    var allOwnedCars = [STARTER_CAR].concat(ownedCustomCars);
    var carsHtml = allOwnedCars.map(function(c){
      var isEquipped = (c.id || "starter_car") === (targetAcc.equippedCarId || "starter_car");
      var profileRarityColor = RARITY_COLORS[c.rarity] || "var(--muted)";
      var profileNameLabel = c.name ? '<div style="font-size:10px;font-weight:700;color:' + profileRarityColor + ';text-align:center;padding:3px 4px 0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%;line-height:1.2;">' + escapeHtml(c.name) + '</div>' : '';
      return '<div class="garage-slot' + (isEquipped ? ' equipped' : '') + '" style="cursor:default;width:128px;height:auto;flex:0 0 128px;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;" title="' + escapeHtml(c.name || "Car") + '">' +
          profileNameLabel +
          carVisualHtml(c) +
        '</div>';
    }).join("");

    // Name tags: only ones actually owned (default is implicit/always shown if nothing else).
    var nameTagsHtml = nameTagOptionsFor(targetAcc).map(function(src){
      var isEquipped = src === equippedTag;
      return '<div class="garage-slot' + (isEquipped ? ' equipped' : '') + '" style="cursor:default;width:160px;height:46px;flex:0 0 160px;">' +
          '<img src="' + src + '" alt="" style="width:100%;height:100%;object-fit:contain;display:block;image-rendering:pixelated;" />' +
        '</div>';
    }).join("");

    // Avatar pieces: every owned piece across all 4 slots, grouped by slot.
    var avatarItemsHtml = AVATAR_SLOTS.map(function(slot){
      var ownedIds = ownedAvatarPieceIdsFor(targetAcc, slot);
      var ownedPieces = avatarCatalogCache.filter(function(p){ return p.slot === slot && ownedIds.indexOf(p.id) !== -1; });
      if(!ownedPieces.length) return "";
      return ownedPieces.map(function(p){
        var isEquipped = targetAcc.equippedAvatar && targetAcc.equippedAvatar[slot] === p.id;
        var avatarRarityColor = RARITY_COLORS[p.rarity] || "var(--muted)";
        var avatarNameLabel = p.name ? '<div style="font-size:10px;font-weight:700;color:' + avatarRarityColor + ';text-align:center;padding:3px 4px 0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%;line-height:1.2;">' + escapeHtml(p.name) + '</div>' : '';
        return '<div class="garage-slot' + (isEquipped ? ' equipped' : '') + '" style="cursor:default;width:100px;height:auto;flex:0 0 100px;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;" title="' + escapeHtml(p.name) + '">' +
            avatarNameLabel +
            '<div style="width:100%;flex:1;display:flex;align-items:center;justify-content:center;">' +
              '<img src="' + p.image + '" alt="" style="max-width:75%;max-height:75%;object-fit:contain;image-rendering:pixelated;display:block;" />' +
            '</div>' +
          '</div>';
      }).join("");
    }).join("");

    var panelArea = app.querySelector(".panel");
    if(!panelArea) return;
    var isPremium = !!targetAcc.hasPremiumPass;

    panelArea.outerHTML =
      '<div class="panel' + (isPremium ? ' premium-panel' : '') + '">' +
        (isPremium ? '<div class="premium-badge">Premium</div>' : '') +
        displayNameEditHtml +
        '<div style="display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap;">' +
          '<div style="display:flex;justify-content:center;flex:0 0 auto;">' + composedAvatarHtml(resolvedAvatar, 3) + '</div>' +
          '<div style="flex:1;min-width:220px;">' +
            '<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:2px;">' +
              '<div class="garage-title" style="color:var(--text);font-size:22px;margin:0;">' + escapeHtml(displayNameFor(targetAcc)) + '</div>' +
              (function(){ var t = resolveTitle(targetAcc, titleCatalogCache); return t ? '<div style="font-size:12px;font-style:italic;font-weight:700;color:' + (RARITY_COLORS[t.rarity]||'var(--muted)') + ';margin-bottom:4px;">' + escapeHtml(t.text) + '</div>' : ''; })() +
              (targetAcc.isBanned ? '<span style="color:var(--red);font-weight:900;font-size:14px;">BANNED</span>' : '') +
              (targetAcc.isSuspended && !targetAcc.isBanned ? '<span style="color:var(--amber);font-weight:900;font-size:14px;">SUSPENDED</span>' : '') +
            '</div>' +
