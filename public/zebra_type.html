  function guildColorSwatchesHtml(selectedColor, idPrefix){
    return Object.keys(GUILD_COLORS).map(function(name){
      return '<span class="guild-color-swatch' + (name===selectedColor ? " selected" : "") + '" data-guild-color="' + name + '" ' +
        'style="background:' + GUILD_COLORS[name] + ';" title="' + name + '"></span>';
    }).join(" ");
  }

  function renderGuildBrowse(){
    var acc = state.user;
    var body = document.getElementById("guildsBody");
    if(!body) return;

    var selectedColor = "blue";

    body.innerHTML =
      '<div class="panel" style="margin-bottom:18px;">' +
        '<div class="garage-title" style="color:var(--text);font-size:20px;margin-bottom:4px;">\uD83D\uDEE1\uFE0F Guilds</div>' +
        '<div class="hint-text" style="margin-top:0;">Team up with up to ' + GUILD_MAX_MEMBERS + ' players. Race together to climb the Guilds leaderboard.</div>' +
      '</div>' +

      '<div class="panel" style="margin-bottom:18px;">' +
        '<div class="garage-title" style="color:var(--text);font-size:17px;margin-bottom:10px;">Create a Guild</div>' +
        '<div class="hint-text" style="margin-top:0;margin-bottom:14px;">Costs ' + COIN_ICON + GUILD_CREATE_COST + '. You become the leader.</div>' +
        '<div class="field">' +
          '<label for="guildTagInput">Tag (2\u20136 letters/numbers)</label>' +
          '<input id="guildTagInput" maxlength="6" placeholder="e.g. ZHRL" style="width:100%;background:var(--panel-2);color:var(--text);border:1px solid var(--line);border-radius:8px;padding:11px 12px;font-size:15px;text-transform:uppercase;" />' +
        '</div>' +
        '<div class="field">' +
          '<label for="guildNameInput">Name (4\u201320 characters)</label>' +
          '<input id="guildNameInput" maxlength="20" placeholder="e.g. Midnight Racers" style="width:100%;background:var(--panel-2);color:var(--text);border:1px solid var(--line);border-radius:8px;padding:11px 12px;font-size:15px;" />' +
        '</div>' +
        '<div class="field">' +
          '<label>Color</label>' +
          '<div id="createGuildColorPicker" style="display:flex;gap:10px;flex-wrap:wrap;margin-top:4px;">' + guildColorSwatchesHtml(selectedColor, "create") + '</div>' +
        '</div>' +
        '<div class="error-text" id="createGuildError"></div>' +
        '<button class="btn btn-primary btn-block btn-lg" id="createGuildBtn">Create Guild \u2014 ' + COIN_ICON + GUILD_CREATE_COST + '</button>' +
      '</div>' +

      '<div class="panel">' +
        '<div class="garage-title" style="color:var(--text);font-size:17px;margin-bottom:10px;">Browse Guilds</div>' +
        '<div id="guildBrowseList"><div class="center-note">Loading...</div></div>' +
      '</div>';

    document.getElementById("createGuildColorPicker").addEventListener("click", function(e){
      var swatch = e.target.closest("[data-guild-color]");
      if(!swatch) return;
      selectedColor = swatch.getAttribute("data-guild-color");
      document.querySelectorAll("#createGuildColorPicker .guild-color-swatch").forEach(function(s){
        s.classList.toggle("selected", s.getAttribute("data-guild-color") === selectedColor);
      });
    });

    document.getElementById("createGuildBtn").addEventListener("click", async function(){
      var errEl = document.getElementById("createGuildError");
      errEl.textContent = "";
      var tag = document.getElementById("guildTagInput").value.trim().toUpperCase();
      var name = document.getElementById("guildNameInput").value.trim();

      if(!isValidGuildTag(tag)){ errEl.textContent = "Tag must be 2\u20136 letters or numbers only."; return; }
      if(!isValidGuildName(name)){ errEl.textContent = "Name must be 4\u201320 characters."; return; }
      if(containsProfanity(tag) || containsProfanity(name)){ errEl.textContent = "That guild name or tag isn\u2019t allowed."; return; }

      var btn = document.getElementById("createGuildBtn");
      btn.disabled = true; btn.textContent = "Checking...";
      try{
        // Check for duplicate tag or name before creating
        var existingGuilds = await fetchAllGuilds();
        var tagTaken = existingGuilds.some(function(g){ return g.tag && g.tag.toUpperCase() === tag; });
        var nameTaken = existingGuilds.some(function(g){ return g.name && g.name.toLowerCase() === name.toLowerCase(); });
        if(tagTaken){ errEl.textContent = "A guild with that tag already exists."; btn.disabled = false; btn.textContent = "Create Guild \u2014 " + GUILD_CREATE_COST + " coins"; return; }
        if(nameTaken){ errEl.textContent = "A guild with that name already exists."; btn.disabled = false; btn.textContent = "Create Guild \u2014 " + GUILD_CREATE_COST + " coins"; return; }

        btn.textContent = "Creating...";
        var latest = await getAccount(acc.username);
        if(!latest.ok || !latest.account){ errEl.textContent = "Couldn't reach storage."; return; }
        var freshAcc = latest.account;
        if(freshAcc.guildId){ errEl.textContent = "You're already in a guild."; return; }
        if((freshAcc.coins||0) < GUILD_CREATE_COST){ errEl.textContent = "Not enough coins."; return; }

        var guildId = "g_" + Date.now() + "_" + Math.floor(Math.random()*10000);
        var guild = {
          id: guildId, tag: tag, name: name, color: selectedColor,
          leaderUsername: freshAcc.username,
          coLeaderUsernames: [],
          memberUsernames: [freshAcc.username],
          createdAt: Date.now()
        };
        var saveGuildRes = await saveGuild(guild);
        if(!saveGuildRes.ok){ errEl.textContent = "Couldn't save guild: " + saveGuildRes.error; return; }

        freshAcc.coins -= GUILD_CREATE_COST;
        freshAcc.guildId = guildId;
        freshAcc.guildStats = { guildId: guildId, races: 0, pointsOffset: freshAcc.totalPoints || 0 };
        freshAcc.guildTag = guild.tag || "";
        freshAcc.guildColor = guild.color || "";
        var saveAccRes = await saveAccount(freshAcc);
        if(!saveAccRes.ok){ errEl.textContent = "Couldn't save: " + saveAccRes.error; return; }

        state.user = freshAcc;
        await refreshUserGuildCache();
        renderGuilds();
      }catch(e){
        errEl.textContent = "Unexpected error: " + ((e&&e.message)?e.message:String(e));
      }finally{
        btn.disabled = false; btn.textContent = "Create Guild \u2014 " + GUILD_CREATE_COST + " coins";
      }
    });

    fetchAllGuilds().then(function(guilds){
      var listEl = document.getElementById("guildBrowseList");
      if(!listEl) return;
      if(!guilds.length){
        listEl.innerHTML = '<div class="center-note">No guilds yet \u2014 be the first to create one.</div>';
        return;
      }
      guilds.sort(function(a,b){ return (b.memberUsernames||[]).length - (a.memberUsernames||[]).length; });
      listEl.innerHTML = guilds.map(function(g){
        var count = (g.memberUsernames||[]).length;
        var full = count >= GUILD_MAX_MEMBERS;
        return '<div class="admin-car-row">' +
          '<div style="width:10px;height:36px;border-radius:4px;background:' + GUILD_COLORS[g.color] + ';flex:0 0 auto;"></div>' +
          '<div style="flex:1;min-width:0;">' +
            '<div style="font-weight:700;font-size:14px;">' +
              '<span style="color:' + GUILD_COLORS[g.color] + ';">[' + escapeHtml(g.tag) + ']</span> ' + escapeHtml(g.name) +
            '</div>' +
            '<div style="font-size:12px;color:var(--muted);">' + count + ' / ' + GUILD_MAX_MEMBERS + ' members</div>' +
          '</div>' +
          (g.closed
            ? '<button class="small-btn" disabled style="opacity:.5;">Closed</button>'
            : full
            ? '<button class="small-btn" disabled style="opacity:.5;">Full</button>'
            : '<button class="small-btn" data-join-guild="' + escapeHtml(g.id) + '">Join</button>') +
        '</div>';
      }).join("");

      listEl.querySelectorAll("[data-join-guild]").forEach(function(btn){
        btn.addEventListener("click", async function(){
          var gid = btn.getAttribute("data-join-guild");
          var checkGuild = await fetchGuild(gid);
          if(checkGuild && checkGuild.closed){ btn.textContent = "Closed"; btn.disabled = true; return; }
          var guildId = btn.getAttribute("data-join-guild");
          btn.disabled = true; btn.textContent = "Joining...";
          try{
            var latest = await getAccount(acc.username);
            if(!latest.ok || !latest.account){ btn.textContent = "Error"; return; }
            var freshAcc = latest.account;
            if(freshAcc.guildId){ btn.textContent = "Already in a guild"; return; }

            var guild = await fetchGuild(guildId);
            if(!guild){ btn.textContent = "Guild not found"; return; }
            if((guild.memberUsernames||[]).length >= GUILD_MAX_MEMBERS){ btn.textContent = "Full"; renderGuildBrowse(); return; }

            guild.memberUsernames = guild.memberUsernames || [];
            guild.memberUsernames.push(freshAcc.username);
            var saveGuildRes = await saveGuild(guild);
            if(!saveGuildRes.ok){ btn.textContent = "Error"; return; }

            freshAcc.guildId = guildId;
            // Preserve guild races if rejoining the same guild they were
            // previously in — only reset when switching to a different guild.
            if(freshAcc.guildStats && freshAcc.guildStats.guildId === guildId){
              // Same guild — keep existing races count and pointsOffset
            } else {
              freshAcc.guildStats = { guildId: guildId, races: 0, pointsOffset: freshAcc.totalPoints || 0 };
            }
            freshAcc.guildTag = guild.tag || "";
            freshAcc.guildColor = guild.color || "";
            var saveAccRes = await saveAccount(freshAcc);
            if(!saveAccRes.ok){ btn.textContent = "Error"; return; }

            state.user = freshAcc;
            await refreshUserGuildCache();
            renderGuilds();
          }catch(e){
            btn.textContent = "Error";
            btn.disabled = false;
          }
        });
      });
    });
  }

  async function renderGuildDetail(){
    var acc = state.user;
    var body = document.getElementById("guildsBody");
    if(!body) return;

    var tcList = await fetchTitleCatalog().catch(function(){ return []; });
    titleCatalogCache = tcList || [];

    var guild = await fetchGuild(acc.guildId);
    if(!guild){
      // Their guild vanished (e.g. disbanded) — clear local membership and
      // fall back to the browse/create view.
      acc.guildId = null;
      acc.guildStats = { guildId: null, races: 0 };
      acc.guildTag = "";
      acc.guildColor = "";
      await saveAccount(acc);
      state.userGuild = null;
      renderGuildBrowse();
      return;
    }
    state.userGuild = guild;

    var isLeader = guild.leaderUsername && guild.leaderUsername.toLowerCase() === acc.username.toLowerCase();
    var isCoLeader = (guild.coLeaderUsernames||[]).some(function(u){ return u.toLowerCase() === acc.username.toLowerCase(); });

    body.innerHTML =
      '<div class="panel" style="margin-bottom:18px;border-top:4px solid ' + GUILD_COLORS[guild.color] + ';">' +
        '<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;">' +
          '<div class="garage-title" style="color:var(--text);font-size:22px;">' +
            '<span style="color:' + GUILD_COLORS[guild.color] + ';">[' + escapeHtml(guild.tag) + ']</span> ' + escapeHtml(guild.name) +
          '</div>' +
          '<button class="small-btn" id="leaveGuildBtn" data-stage="confirm">Leave Guild</button>' +
        '</div>' +
        '<div class="hint-text" style="margin-top:4px;margin-bottom:0;">' + (guild.memberUsernames||[]).length + ' / ' + GUILD_MAX_MEMBERS + ' members</div>' +
      '</div>' +

      ((isLeader || isCoLeader) && guild.pendingRequests && guild.pendingRequests.length ?
        '<div class="panel" style="margin-bottom:18px;border:1px solid var(--amber);">' +
          '<div class="garage-title" style="color:var(--amber);font-size:16px;margin-bottom:10px;">\uD83D\uDCEC Join Requests (' + guild.pendingRequests.length + ')</div>' +
          guild.pendingRequests.map(function(u){
            return '<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line);">' +
              '<div style="flex:1;font-weight:700;color:var(--text);">' + escapeHtml(u) + '</div>' +
              '<button class="small-btn" data-guild-accept="' + escapeHtml(u) + '" style="color:var(--green);border-color:var(--green);">Accept</button>' +
              '<button class="small-btn" data-guild-decline="' + escapeHtml(u) + '" style="color:var(--red);border-color:var(--red);">Decline</button>' +
            '</div>';
          }).join("") +
        '</div>'
      : '') +

      (isLeader ?
        '<div class="panel" style="margin-bottom:18px;">' +
          '<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:14px;">' +
            '<div class="garage-title" style="color:var(--text);font-size:16px;margin:0;">Edit Guild</div>' +
            '<button class="small-btn" id="toggleGuildClosedBtn" style="color:' + (guild.closed ? 'var(--green)' : 'var(--red)') + ';border-color:' + (guild.closed ? 'var(--green)' : 'var(--red)') + ';">' + (guild.closed ? '\u2705 Open Guild' : '\uD83D\uDD12 Close Guild') + '</button>' +
          '</div>' +
          '<div style="display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap;">' +
            '<div style="flex:1;min-width:140px;">' +
              '<div style="font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:4px;">Guild Name</div>' +
              '<input id="editGuildName" maxlength="32" value="' + escapeHtml(guild.name) + '" style="width:100%;background:var(--panel-2);color:var(--text);border:1px solid var(--line);border-radius:8px;padding:9px 12px;font-size:14px;" />' +
            '</div>' +
            '<div style="width:90px;">' +
              '<div style="font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:4px;">Tag (2-6)</div>' +
              '<input id="editGuildTag" maxlength="6" value="' + escapeHtml(guild.tag) + '" style="width:100%;background:var(--panel-2);color:var(--text);border:1px solid var(--line);border-radius:8px;padding:9px 12px;font-size:14px;" />' +
            '</div>' +
            '<div style="display:flex;align-items:flex-end;">' +
              '<button class="btn btn-primary" id="saveGuildEditBtn" style="padding:10px 16px;">Save</button>' +
            '</div>' +
          '</div>' +
          '<div class="error-text" id="guildEditMsg" style="margin-bottom:10px;"></div>' +
          '<div class="garage-title" style="color:var(--text);font-size:15px;margin-bottom:8px;">Guild Color</div>' +
          '<div id="guildColorPicker" style="display:flex;gap:10px;flex-wrap:wrap;">' + guildColorSwatchesHtml(guild.color, "edit") + '</div>' +
          '<div class="error-text" id="guildColorMsg" style="margin-top:8px;"></div>' +
        '</div>'
      : '') +

      '<div class="panel">' +
        '<div class="garage-title" style="color:var(--text);font-size:16px;margin-bottom:10px;">Members</div>' +
        '<div id="guildMemberList"><div class="center-note">Loading...</div></div>' +
      '</div>';

    // Join request Accept / Decline
    body.querySelectorAll("[data-guild-accept]").forEach(function(btn){
      btn.addEventListener("click", async function(){
        var username = btn.getAttribute("data-guild-accept");
        btn.disabled = true;
        try{
          var freshG = await fetchGuild(guild.id);
          if(!freshG){ return; }
          // Remove from pending
          freshG.pendingRequests = (freshG.pendingRequests||[]).filter(function(u){ return u !== username; });
          // Add to members if not already there and not full
          if(!(freshG.memberUsernames||[]).some(function(u){ return u.toLowerCase() === username.toLowerCase(); })){
            if((freshG.memberUsernames||[]).length >= GUILD_MAX_MEMBERS){ alert("Guild is full."); return; }
            freshG.memberUsernames = freshG.memberUsernames || [];
            freshG.memberUsernames.push(username);
          }
          await saveGuild(freshG);
          // Update the accepted player's account to set their guildId
          var acceptedRes = await getAccount(username);
          if(acceptedRes.ok && acceptedRes.account){
            var acceptedAcc = acceptedRes.account;
            if(!acceptedAcc.guildStats || acceptedAcc.guildStats.guildId !== guild.id){
              acceptedAcc.guildStats = { guildId: guild.id, races: 0, pointsOffset: acceptedAcc.totalPoints || 0 };
            }
            acceptedAcc.guildId = guild.id;
            acceptedAcc.guildTag = freshG.tag || "";
            acceptedAcc.guildColor = freshG.color || "";
            await saveAccount(acceptedAcc);
          }
          guild = freshG;
          renderGuildDetail();
        }catch(e){ btn.disabled = false; }
      });
    });

    body.querySelectorAll("[data-guild-decline]").forEach(function(btn){
      btn.addEventListener("click", async function(){
        var username = btn.getAttribute("data-guild-decline");
        btn.disabled = true;
        try{
          var freshG = await fetchGuild(guild.id);
          if(!freshG){ return; }
          freshG.pendingRequests = (freshG.pendingRequests||[]).filter(function(u){ return u !== username; });
          await saveGuild(freshG);
          guild = freshG;
          renderGuildDetail();
        }catch(e){ btn.disabled = false; }
      });
    });

    document.getElementById("leaveGuildBtn").addEventListener("click", async function(){
      var btn = document.getElementById("leaveGuildBtn");
      if(btn.getAttribute("data-stage") === "confirm"){
        btn.setAttribute("data-stage", "armed");
        btn.textContent = "Click again to confirm";
        btn.style.color = "var(--red)";
        setTimeout(function(){
          if(btn && btn.getAttribute("data-stage") === "armed"){
            btn.setAttribute("data-stage", "confirm");
            btn.textContent = "Leave Guild";
            btn.style.color = "";
          }
        }, 4000);
        return;
      }
      btn.disabled = true; btn.textContent = "Leaving...";
      try{
        var latest = await getAccount(acc.username);
        var freshAcc = (latest.ok && latest.account) || acc;
        var freshGuild = await fetchGuild(freshAcc.guildId);
        if(freshGuild) await removeMemberFromGuild(freshGuild, freshAcc.username);
        freshAcc.guildId = null;
        freshAcc.guildStats = { guildId: null, races: 0 };
        freshAcc.guildTag = "";
        freshAcc.guildColor = "";
        await saveAccount(freshAcc);
        state.user = freshAcc;
        state.userGuild = null;
        renderGuilds();
      }catch(e){
        btn.disabled = false; btn.textContent = "Leave Guild";
      }
    });

    if(isLeader){
      // Toggle guild closed
      document.getElementById("toggleGuildClosedBtn").addEventListener("click", async function(){
        var btn = document.getElementById("toggleGuildClosedBtn");
        btn.disabled = true;
        var freshGuild = await fetchGuild(guild.id);
        if(!freshGuild){ btn.disabled = false; return; }
        freshGuild.closed = !freshGuild.closed;
        var res = await saveGuild(freshGuild);
        if(res.ok){ state.userGuild = freshGuild; renderGuildDetail(); }
        else { btn.disabled = false; }
      });

      // Save name + tag edit
      document.getElementById("saveGuildEditBtn").addEventListener("click", async function(){
        var msgEl = document.getElementById("guildEditMsg");
        msgEl.style.color = "var(--red)";
        var newName = document.getElementById("editGuildName").value.trim();
        var newTag = document.getElementById("editGuildTag").value.trim().toUpperCase();
        if(!newName){ msgEl.textContent = "Enter a guild name."; return; }
        if(!isValidGuildTag(newTag)){ msgEl.textContent = "Tag must be 2-6 letters/numbers."; return; }
        if(containsProfanity(newTag) || containsProfanity(newName)){ msgEl.textContent = "That guild name or tag isn\u2019t allowed."; return; }
        // Check for duplicate tag/name (allow current guild to keep its own)
        var allGuildsForRename = await fetchAllGuilds();
        var renameTagTaken = allGuildsForRename.some(function(g){ return g.id !== guild.id && g.tag && g.tag.toUpperCase() === newTag.toUpperCase(); });
        var renameNameTaken = allGuildsForRename.some(function(g){ return g.id !== guild.id && g.name && g.name.toLowerCase() === newName.toLowerCase(); });
        if(renameTagTaken){ msgEl.textContent = "A guild with that tag already exists."; return; }
        if(renameNameTaken){ msgEl.textContent = "A guild with that name already exists."; return; }
        var freshGuild = await fetchGuild(guild.id);
        if(!freshGuild){ msgEl.textContent = "Guild not found."; return; }
        freshGuild.name = newName;
        freshGuild.tag = newTag;
        var res = await saveGuild(freshGuild);
        if(res.ok){
          state.userGuild = freshGuild;
          // Update every member's cached guildTag/guildColor -- not just
          // whoever made this change -- so the rename shows correctly for
          // the whole guild immediately (leaderboard, race screens, etc.)
          // instead of only refreshing for whichever member next logs in.
          var renameMemberNames = freshGuild.memberUsernames || [];
          for(var rmi = 0; rmi < renameMemberNames.length; rmi++){
            try{
              var rmRes = await getAccount(renameMemberNames[rmi]);
              if(rmRes.ok && rmRes.account && rmRes.account.guildId === freshGuild.id){
                rmRes.account.guildTag = newTag;
                rmRes.account.guildColor = freshGuild.color;
                await saveAccount(rmRes.account);
                if(state.user && rmRes.account.username.toLowerCase() === state.user.username.toLowerCase()) state.user = rmRes.account;
              }
            }catch(e2){}
          }
          msgEl.style.color = "var(--green)";
          msgEl.textContent = "Saved!";
          setTimeout(function(){ renderGuildDetail(); }, 600);
        } else {
          msgEl.textContent = "Error: " + res.error;
        }
      });

      document.getElementById("guildColorPicker").addEventListener("click", async function(e){
        var swatch = e.target.closest("[data-guild-color]");
        if(!swatch) return;
        var color = swatch.getAttribute("data-guild-color");
        var msg = document.getElementById("guildColorMsg");
        msg.textContent = "Saving...";
        var freshGuild = await fetchGuild(guild.id);
        if(!freshGuild){ msg.textContent = "Guild not found."; return; }
        freshGuild.color = color;
        var res = await saveGuild(freshGuild);
        if(res.ok){
          state.userGuild = freshGuild;
          // Update every member's cached guildColor -- the guild object
          // itself is now correct, but each member's account keeps its
          // own cached copy of the color (used by the leaderboard, race
          // screens, etc.), and that copy is only otherwise refreshed the
          // next time that specific member happens to log back in. Push
          // the new color out to everyone now instead of waiting for that.
          var colorMemberNames = freshGuild.memberUsernames || [];
          for(var cmi = 0; cmi < colorMemberNames.length; cmi++){
            try{
              var cmRes = await getAccount(colorMemberNames[cmi]);
              if(cmRes.ok && cmRes.account && cmRes.account.guildId === freshGuild.id){
                cmRes.account.guildColor = color;
                await saveAccount(cmRes.account);
                if(state.user && cmRes.account.username.toLowerCase() === state.user.username.toLowerCase()) state.user = cmRes.account;
              }
            }catch(e2){}
          }
          msg.textContent = "Saved.";
          setTimeout(function(){ renderGuildDetail(); }, 400);
        } else {
          msg.textContent = "Error: " + res.error;
        }
      });
    }

    // Fetch every member's account in parallel for the stats table.
    var usernames = guild.memberUsernames || [];
    Promise.all(usernames.map(function(u){ return getAccount(u); })).then(function(results){
      var listEl = document.getElementById("guildMemberList");
      if(!listEl) return;

      var members = [];
      var failedUsernames = [];
      results.forEach(function(r, idx){
        if(r.ok && r.account) members.push(r.account);
        else failedUsernames.push(usernames[idx]);
      });
      // Surface load failures so members never silently vanish from the roster —
      // shows a minimal row with just the username so admins/leaders notice
      // and can investigate (account deleted, storage issue, etc.) rather than
      // the member just disappearing with no explanation.
      if(failedUsernames.length){
        console.warn("[guild] Failed to load member account(s):", failedUsernames);
      }

      members.sort(function(a,b){ return (b.guildStats && b.guildStats.races || 0) - (a.guildStats && a.guildStats.races || 0); });

      listEl.innerHTML = members.map(function(m){
        var races = m.races || 0;
        var avgWpm = races ? Math.round((m.sumWpm||0) / races) : 0;
        var avgAcc = races ? Math.round((m.sumAccuracy||0) / races) : 0;
        var teamRaces = (m.guildStats && m.guildStats.guildId === guild.id) ? (m.guildStats.races || 0) : 0;
        var equippedCar = resolveCarById(m.equippedCarId);
        var memberIsLeader = guild.leaderUsername && guild.leaderUsername.toLowerCase() === m.username.toLowerCase();
        var memberIsCoLeader = (guild.coLeaderUsernames||[]).some(function(u){ return u.toLowerCase() === m.username.toLowerCase(); });
        var roleBadge = memberIsLeader
          ? '<span class="guild-role-badge" style="background:var(--amber);color:#0A0B0D;">Leader</span>'
          : memberIsCoLeader
            ? '<span class="guild-role-badge" style="background:var(--panel-2);color:var(--text);border:1px solid var(--line);">Co-Leader</span>'
            : '';

        var canPromote = isLeader && !memberIsLeader && !memberIsCoLeader && (guild.coLeaderUsernames||[]).length < GUILD_MAX_COLEADERS;
        var canDemote = isLeader && memberIsCoLeader;

        return '<div class="guild-member-row">' +
          '<div class="admin-car-thumb">' + carVisualHtml(equippedCar) + '</div>' +
          '<div class="guild-member-name-col">' +
            '<div style="font-weight:700;font-size:14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;">' +
              clickableUsernameHtml(m.username, null, m.displayName) +
              (function(){ var gt = resolveTitle(m, titleCatalogCache); return gt ? '<span style="font-size:10px;font-style:italic;font-weight:700;color:' + (RARITY_COLORS[gt.rarity]||'var(--muted)') + ';">' + escapeHtml(gt.text) + '</span>' : ''; })() +
              (m.isBanned ? '<span style="color:var(--red);font-weight:900;font-size:11px;">BANNED</span>' : '') +
              (m.isSuspended && !m.isBanned ? '<span style="color:var(--amber);font-weight:900;font-size:11px;">SUSPENDED</span>' : '') +
            '</div>' +
            (roleBadge ? '<div style="margin-top:3px;">' + roleBadge + '</div>' : '') +
          '</div>' +
          '<div class="guild-member-stats">' +
            '<div class="guild-member-stat"><div class="num">' + races + '</div><div class="lbl">All-Time</div></div>' +
            '<div class="guild-member-stat"><div class="num">' + avgWpm + '</div><div class="lbl">Avg WPM</div></div>' +
            '<div class="guild-member-stat"><div class="num">' + avgAcc + '%</div><div class="lbl">Avg Acc</div></div>' +
            '<div class="guild-member-stat"><div class="num">' + teamRaces + '</div><div class="lbl">Team Races</div></div>' +
          '</div>' +
          '<div class="guild-member-actions">' +
            (canPromote ? '<button class="small-btn" data-promote="' + escapeHtml(m.username) + '">Make Co-Leader</button>' : '') +
            (canDemote ? '<button class="small-btn" data-demote="' + escapeHtml(m.username) + '">Demote</button>' : '') +
            (isLeader && !memberIsLeader ? '<button class="small-btn" data-kick="' + escapeHtml(m.username) + '" style="color:var(--red);border-color:var(--red);">Kick</button>' : '') +
          '</div>' +
        '</div>';
      }).join("");

      attachProfileLinkListeners(listEl);

      listEl.querySelectorAll("[data-promote]").forEach(function(btn){
        btn.addEventListener("click", async function(){
          var username = btn.getAttribute("data-promote");
          btn.disabled = true; btn.textContent = "...";
          var freshGuild = await fetchGuild(guild.id);
          if(freshGuild){
            freshGuild.coLeaderUsernames = freshGuild.coLeaderUsernames || [];
            if(freshGuild.coLeaderUsernames.length < GUILD_MAX_COLEADERS && freshGuild.coLeaderUsernames.indexOf(username) === -1){
              freshGuild.coLeaderUsernames.push(username);
              await saveGuild(freshGuild);
            }
          }
          renderGuildDetail();
        });
      });
      listEl.querySelectorAll("[data-demote]").forEach(function(btn){
        btn.addEventListener("click", async function(){
          var username = btn.getAttribute("data-demote");
          btn.disabled = true; btn.textContent = "...";
          var freshGuild = await fetchGuild(guild.id);
          if(freshGuild){
            freshGuild.coLeaderUsernames = (freshGuild.coLeaderUsernames||[]).filter(function(u){ return u.toLowerCase() !== username.toLowerCase(); });
            await saveGuild(freshGuild);
          }
          renderGuildDetail();
        });
      });

      listEl.querySelectorAll("[data-kick]").forEach(function(btn){
        btn.addEventListener("click", async function(){
          var username = btn.getAttribute("data-kick");
          if(!confirm("Kick " + username + " from the guild?")) return;
          btn.disabled = true; btn.textContent = "...";
          var freshGuild = await fetchGuild(guild.id);
          var kickedAcc = await getAccount(username);
          if(freshGuild) await removeMemberFromGuild(freshGuild, username);
          if(kickedAcc.ok && kickedAcc.account){
            kickedAcc.account.guildId = null;
            kickedAcc.account.guildStats = { guildId: null, races: 0 };
            kickedAcc.account.guildTag = "";
            kickedAcc.account.guildColor = "";
            await saveAccount(kickedAcc.account);
          }
          renderGuildDetail();
        });
      });
    });
  }


  /* ============ LEADERBOARD ============ */
  function renderLeaderboard(){
    var acc = state.user; // may be null for public view
    var mode = state.lbMode || "racing";

    app.innerHTML =
      brandHeader() +
      renderNavBar("leaderboard") +
      '<div class="panel">' +
        '<div class="garage-title" style="color:var(--text);font-size:20px;margin-bottom:16px;">\uD83C\uDFC6 Leaderboard</div>' +
        '<div class="lb-tabs">' +
          '<div class="lb-tab' + (mode==="racing" ? " active" : "") + '" data-lb-mode="racing">Racing</div>' +
          '<div class="lb-tab' + (mode==="carMastery" ? " active" : "") + '" data-lb-mode="carMastery">Car Mastery</div>' +
          '<div class="lb-tab' + (mode==="guilds" ? " active" : "") + '" data-lb-mode="guilds">Guilds</div>' +
        '</div>' +
        '<div id="lbBody"></div>' +
      '</div>';

    attachNavListeners();

    app.querySelectorAll("[data-lb-mode]").forEach(function(tab){
      tab.addEventListener("click", function(){
        state.lbMode = tab.getAttribute("data-lb-mode");
        renderLeaderboard();
      });
    });

    if(mode === "carMastery"){
      renderCarMasteryLeaderboard();
    } else if(mode === "guilds"){
      renderGuildsLeaderboard();
    } else {
      renderRacingLeaderboard();
    }
  }

  function renderRacingLeaderboard(){
    var acc = state.user;
    var scope = state.lbScope || "allTime";
    var activeTab = state.lbTab || "points";

    var body = document.getElementById("lbBody");
    if(!body) return;
    body.innerHTML =
      '<div class="lb-tabs" style="margin-top:10px;">' +
        '<div class="lb-tab' + (scope==="season"  ? " active" : "") + '" data-lb-scope="season">Season</div>' +
        '<div class="lb-tab' + (scope==="allTime" ? " active" : "") + '" data-lb-scope="allTime">All-Time</div>' +
        '<div class="lb-tab' + (scope==="day"     ? " active" : "") + '" data-lb-scope="day">24 Hour</div>' +
      '</div>' +
      '<div class="lb-tabs">' +
        '<div class="lb-tab' + (activeTab==="points"  ? " active" : "") + '" data-lb-tab="points">Points</div>' +
        '<div class="lb-tab' + (activeTab==="races"   ? " active" : "") + '" data-lb-tab="races">Most Races</div>' +
        '<div class="lb-tab' + (activeTab==="bestWpm" ? " active" : "") + '" data-lb-tab="bestWpm">Best WPM</div>' +
        '<div class="lb-tab' + (activeTab==="avgWpm"  ? " active" : "") + '" data-lb-tab="avgWpm">Avg WPM</div>' +
        '<div class="lb-tab' + (activeTab==="avgAcc"  ? " active" : "") + '" data-lb-tab="avgAcc">Accuracy</div>' +
        (scope === "allTime" ? '<div class="lb-tab' + (activeTab==="session" ? " active" : "") + '" data-lb-tab="session">Session</div>' : '') +
      '</div>' +
      '<div id="lbContent"><div class="center-note">Loading...</div></div>';

    body.querySelectorAll("[data-lb-scope]").forEach(function(tab){
      tab.addEventListener("click", function(){
        state.lbScope = tab.getAttribute("data-lb-scope");
        if(state.lbScope !== "allTime" && state.lbTab === "session") state.lbTab = "points";
        renderRacingLeaderboard();
      });
    });
    body.querySelectorAll("[data-lb-tab]").forEach(function(tab){
      tab.addEventListener("click", function(){
        state.lbTab = tab.getAttribute("data-lb-tab");
        renderRacingLeaderboard();
      });
    });

    // Track load ID so stale async results from previous renders don't
    // overwrite data from a newer load (prevents the flash-then-reset issue).
    var thisLoadId = (state._lbLoadId = (state._lbLoadId || 0) + 1);
    loadLeaderboard().then(function(rows){
      if(state._lbLoadId !== thisLoadId) return; // superseded by newer load
      var el = document.getElementById("lbContent");
      if(!el) return;
      if(!rows.length){
        el.innerHTML = '<div class="center-note">No races recorded yet \u2014 race first to appear here.</div>';
        return;
      }

      // Pull out the stats for the selected time scope. All-Time uses the
      // row's own top-level fields; Season/24h use the nested sub-objects
      // computed in loadLeaderboard.
      var scoped = rows.map(function(r){
        var base = { username:r.username, displayName:r.displayName||'', guildTag:r.guildTag||'', guildColor:r.guildColor||'' };
        if(scope === "season") return Object.assign(base, { bestWpm:r.season.bestWpm, avgWpm:r.season.avgWpm, races:r.season.races, avgAcc:r.season.avgAcc, points:r.season.points||0, sessionRaces:r.sessionRaces||0, bestSession:r.bestSession||0 });
        if(scope === "day") return Object.assign(base, { bestWpm:r.day.bestWpm, avgWpm:r.day.avgWpm, races:r.day.races, avgAcc:r.day.avgAcc, points:r.day.points||0, sessionRaces:r.sessionRaces||0, bestSession:r.bestSession||0 });
        return Object.assign(base, { bestWpm:r.bestWpm, avgWpm:r.avgWpm, races:r.races, avgAcc:r.avgAcc, points:r.totalPoints||0, sessionRaces:r.sessionRaces||0, bestSession:r.bestSession||0 });
      });
      // Season/24h are participation-scoped — a player with zero races in
      // that window isn't really "ranked", just hasn't shown up yet.
      if(scope !== "allTime") scoped = scoped.filter(function(r){ return r.races > 0; });

      if(!scoped.length){
        el.innerHTML = '<div class="center-note">No races in this time window yet.</div>';
        return;
      }

      var tab = state.lbTab || "points";
      var configs = {
        points:   { label:"Points",      key:"points",        unit:" pts",   secondary:"races",  secLabel:"races" },
        bestWpm:  { label:"Best WPM",    key:"bestWpm",       unit:" wpm",   secondary:"races",  secLabel:"races" },
        avgWpm:   { label:"Avg WPM",     key:"avgWpm",        unit:" wpm",   secondary:"races",  secLabel:"races" },
        races:    { label:"Races",       key:"races",         unit:"",       secondary:"bestWpm", secLabel:"best" },
        avgAcc:   { label:"Accuracy",    key:"avgAcc",        unit:"%",      secondary:"races",  secLabel:"races" },
        session:  { label:"Best Session", key:"bestSession",   unit:" races", secondary:"races",  secLabel:"total races" }
      };
      var cfg = configs[tab] || configs.points;

      // Session tab: only show players who've had at least 1 session race ever
      var sorted = scoped.slice();
      if(tab === "session"){
        sorted = sorted.filter(function(r){ return r.bestSession > 0; });
      }
      sorted.sort(function(a,b){ return b[cfg.key] - a[cfg.key]; });

      if(!sorted.length){
        el.innerHTML = '<div class="center-note">' + (tab === "session" ? "No active sessions right now \u2014 race to start one!" : "No races in this time window yet.") + '</div>';
        return;
      }

      function badge(i){
        if(i===0) return '<span class="lb-badge gold">1</span>';
        if(i===1) return '<span class="lb-badge silver">2</span>';
        if(i===2) return '<span class="lb-badge bronze">3</span>';
        return '<span class="lb-badge">' + (i+1) + '</span>';
      }

      el.innerHTML =
        '<table class="lb-table">' +
          '<thead><tr>' +
            '<th style="width:36px;">#</th>' +
            '<th>Player</th>' +
            '<th class="num">' + cfg.label + '</th>' +
            '<th class="num">' + cfg.secLabel + '</th>' +
          '</tr></thead>' +
          '<tbody>' + sorted.map(function(r, i){
            var isYou = acc && r.username.toLowerCase() === acc.username.toLowerCase();
            var rawVal = r[cfg.key];
            var displayVal = typeof rawVal === "number" ? (tab === "points" ? Math.round(rawVal) : rawVal).toLocaleString() : rawVal;
            var val = displayVal + (cfg.unit || "");
            var secRaw = r[cfg.secondary];
            var sec = (typeof secRaw === "number" ? secRaw.toLocaleString() : secRaw) + (cfg.secondary === "avgAcc" ? "%" : cfg.secondary === "bestWpm" ? " wpm" : "");
            var guildBadgeLb = r.guildTag ? '<span data-guild-tag-click="' + escapeHtml(r.guildTag) + '" style="color:' + (GUILD_COLORS[r.guildColor] || r.guildColor || "#FFD54F") + ';font-size:11px;font-weight:700;margin-right:4px;cursor:pointer;">[' + escapeHtml(r.guildTag) + ']</span>' : '';
            return '<tr>' +
              '<td>' + badge(i) + '</td>' +
              '<td class="' + (isYou ? "lb-you" : "") + '">' + guildBadgeLb + clickableUsernameHtml(r.username, null, r.displayName) + (r.titleText ? '<div style="font-size:10px;font-style:italic;font-weight:700;color:' + (RARITY_COLORS[r.titleRarity]||'var(--muted)') + ';">' + escapeHtml(r.titleText) + '</div>' : '') + '</td>' +
              '<td class="td-num">' + val + '</td>' +
              '<td class="td-muted">' + sec + '</td>' +
            '</tr>';
          }).join("") +
          '</tbody>' +
        '</table>';
      attachProfileLinkListeners(el);
    });
  }

  function renderCarMasteryLeaderboard(){

        '<div class="field" style="margin-top:10px;">' +

          '<input id="lbCarSearch" type="text" placeholder="Search cars\u2026" autocomplete="off" style="width:100%;background:var(--panel-2);color:var(--text);border:1px solid var(--line);border-radius:8px;padding:9px 12px;font-size:13px;margin-bottom:6px;" />' +

            allCars.map(function(c){
              var isSelected = c.id === selectedCarId || (!c.id && selectedCarId === "starter_car");
              return '<div class="lb-car-option' + (isSelected ? ' lb-car-option-selected' : '') + '" data-car-id="' + escapeHtml(c.id||"starter_car") + '" style="display:flex;align-items:center;gap:10px;padding:8px 12px;cursor:pointer;border-bottom:1px solid var(--line);background:' + (isSelected ? 'var(--panel)' : 'transparent') + ';">' +
                '<div style="width:56px;height:28px;flex:0 0 56px;display:flex;align-items:center;justify-content:center;">' + carVisualHtml(c) + '</div>' +
                '<div style="flex:1;min-width:0;">' +
                  '<div style="font-size:13px;font-weight:700;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + escapeHtml(c.name||"Bluez") + '</div>' +
                  '<div style="font-size:11px;color:' + (RARITY_COLORS[c.rarity]||"var(--muted)") + ';font-weight:700;">' + escapeHtml(c.rarity||"Common") + '</div>' +
                '</div>' +
              '</div>';
            }).join("") +
          '</div>' +
        '</div>' +
        '<div class="hint-text" style="margin-top:0;margin-bottom:14px;">Only drivers who\u2019ve reached Master or Divine rank on this car qualify. Points are earned as WPM \u00d7 (accuracy \u00f7 100) on every race completed after reaching Master.</div>' +
        '<div id="lbCarMasteryContent"><div class="center-note">Loading...</div></div>';

      function renderMasteryRows(rows, carName, targetEl){
        if(!targetEl) return;
        if(!rows.length){
          targetEl.innerHTML = '<div class="center-note">No one has reached Master rank on ' + escapeHtml(carName || "this car") + ' yet.</div>';
          return;
        }
        function badge(i){
          if(i===0) return '<span class="lb-badge gold">1</span>';
          if(i===1) return '<span class="lb-badge silver">2</span>';
          if(i===2) return '<span class="lb-badge bronze">3</span>';
          return '<span class="lb-badge">' + (i+1) + '</span>';
        }
        targetEl.innerHTML =
          '<table class="lb-table">' +
            '<thead><tr>' +
              '<th style="width:36px;">#</th>' +
              '<th>Player</th>' +
              '<th style="width:60px;text-align:center;">Rank</th>' +
              '<th class="num">Points</th>' +
              '<th class="num">Races</th>' +
            '</tr></thead>' +
            '<tbody>' + rows.map(function(r, i){
              var isYou = acc && r.username.toLowerCase() === acc.username.toLowerCase();
              return '<tr>' +
                '<td>' + badge(i) + '</td>' +
                '<td class="' + (isYou ? "lb-you" : "") + '">' + clickableUsernameHtml(r.username, null, r.displayName) + '</td>' +
                '<td style="text-align:center;">' + masteryIconHtml(r.rank, 22) + '</td>' +
                '<td class="td-num">' + r.masteryPoints + '</td>' +
                '<td class="td-num">' + r.races + '</td>' +
              '</tr>';
            }).join("") +
            '</tbody></table>';
      }

      // Wire up the custom car picker
      var pickerList = document.getElementById("lbCarPickerList");
      var searchInput = document.getElementById("lbCarSearch");

      function selectCar(carId){
        state.lbCarId = carId;
        var newSelectedCar = allCars.find(function(c){ return (c.id||"starter_car") === carId; });
        pickerList.querySelectorAll(".lb-car-option").forEach(function(el){
          var isNow = el.getAttribute("data-car-id") === carId;
          el.classList.toggle("lb-car-option-selected", isNow);
          el.style.background = isNow ? "var(--panel)" : "transparent";
        });
        var content = document.getElementById("lbCarMasteryContent");
        if(content) content.innerHTML = '<div class="center-note">Loading...</div>';
        loadCarMasteryLeaderboard(carId).then(function(rows){
          renderMasteryRows(rows, newSelectedCar ? newSelectedCar.name : "", document.getElementById("lbCarMasteryContent"));
        });
        // Scroll selected into view
        var sel = pickerList.querySelector('[data-car-id="' + carId + '"]');
        if(sel) sel.scrollIntoView({ block: "nearest" });
      }

      pickerList.addEventListener("click", function(e){
        var row = e.target.closest(".lb-car-option");
        if(row) selectCar(row.getAttribute("data-car-id"));
      });

      // Search filter — hide non-matching rows
      searchInput.addEventListener("input", function(){
        var q = this.value.toLowerCase();
        pickerList.querySelectorAll(".lb-car-option").forEach(function(row){
          var carId = row.getAttribute("data-car-id");
          var car = allCars.find(function(c){ return (c.id||"starter_car") === carId; });
          var name = car ? (car.name||"").toLowerCase() : "";
          row.style.display = (!q || name.indexOf(q) !== -1) ? "" : "none";
        });
      });

      // Scroll the initially selected car into view
      var initSel = pickerList && pickerList.querySelector('.lb-car-option-selected');
      if(initSel) setTimeout(function(){ initSel.scrollIntoView({ block: "nearest" }); }, 50);

      var selectedCar = allCars.find(function(c){ return c.id === selectedCarId; });

      loadCarMasteryLeaderboard(selectedCarId).then(function(rows){
        var el = document.getElementById("lbCarMasteryContent");
        renderMasteryRows(rows, selectedCar ? selectedCar.name : "", el);
        if(el) attachProfileLinkListeners(el);
      });
    });
  }

  async function renderAdminAboutList(){
    var box = document.getElementById("aboutSectionsList");
    if(!box) return;
    var sections = await fetchAboutSections();
    if(!sections.length){ box.innerHTML = '<div class="center-note">No sections yet. Add one above.</div>'; return; }
    sections = sections.slice().sort(function(a,b){ return (a.order||0)-(b.order||0); });

    box.innerHTML = sections.map(function(sec, idx){
      var paras = sec.paragraphs || [];
      return '<div class="panel" style="margin-bottom:14px;" data-sec-id="' + escapeHtml(sec.id) + '">' +
        '<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">' +
          '<div style="flex:1;font-size:15px;font-weight:700;color:var(--text);">' + escapeHtml(sec.title) + '</div>' +
          (idx > 0 ? '<button class="small-btn" data-move-up="' + escapeHtml(sec.id) + '" title="Move up">\u2191</button>' : '') +
          (idx < sections.length-1 ? '<button class="small-btn" data-move-down="' + escapeHtml(sec.id) + '" title="Move down">\u2193</button>' : '') +
          '<button class="small-btn" data-edit-sec-title="' + escapeHtml(sec.id) + '">Rename</button>' +
          '<button class="small-btn" style="color:var(--red);border-color:var(--red);" data-delete-sec="' + escapeHtml(sec.id) + '">Delete</button>' +
        '</div>' +
        '<div id="paraList_' + escapeHtml(sec.id) + '" style="margin-bottom:10px;">' +
          (paras.length ? paras.map(function(p, pi){
            return '<div style="display:flex;align-items:flex-start;gap:6px;margin-bottom:6px;">' +
              '<div style="flex:1;font-size:13px;color:var(--muted);background:var(--panel-2);border:1px solid var(--line);border-radius:6px;padding:8px 10px;line-height:1.6;">' + escapeHtml(p) + '</div>' +
              '<button class="small-btn" data-edit-para="' + pi + '" data-para-sec="' + escapeHtml(sec.id) + '">Edit</button>' +
              '<button class="small-btn" style="color:var(--red);border-color:var(--red);" data-delete-para="' + pi + '" data-para-sec="' + escapeHtml(sec.id) + '">\u00D7</button>' +
            '</div>';
          }).join("") : '<div style="font-size:12px;color:var(--muted);margin-bottom:6px;">No paragraphs yet.</div>') +
        '</div>' +
        '<div style="display:flex;gap:6px;">' +
          '<textarea id="newPara_' + escapeHtml(sec.id) + '" rows="3" placeholder="Write a paragraph\u2026" style="flex:1;background:var(--panel-2);color:var(--text);border:1px solid var(--line);border-radius:8px;padding:9px 11px;font-size:13px;resize:vertical;"></textarea>' +
          '<button class="btn btn-primary" style="align-self:flex-end;padding:9px 14px;font-size:13px;" data-add-para="' + escapeHtml(sec.id) + '">Add</button>' +
        '</div>' +
        '<div class="error-text" id="paraErr_' + escapeHtml(sec.id) + '"></div>' +
      '</div>';
    }).join("");

    // Delete section
    box.querySelectorAll("[data-delete-sec]").forEach(function(btn){
      btn.addEventListener("click", async function(){
        if(!confirm("Delete this section and all its paragraphs?")) return;
        var id = btn.getAttribute("data-delete-sec");
        var updated = (await fetchAboutSections()).filter(function(s){ return s.id !== id; });
        await saveAboutSections(updated);
        renderAdminAboutList();
      });
    });

    // Rename section title
    box.querySelectorAll("[data-edit-sec-title]").forEach(function(btn){
      btn.addEventListener("click", async function(){
        var id = btn.getAttribute("data-edit-sec-title");
        var sections = await fetchAboutSections();
        var sec = sections.find(function(s){ return s.id===id; });
        if(!sec) return;
        var newTitle = prompt("Rename section:", sec.title);
        if(!newTitle || !newTitle.trim()) return;
        sec.title = newTitle.trim();
        await saveAboutSections(sections);
        renderAdminAboutList();
      });
    });

    // Move up
    box.querySelectorAll("[data-move-up]").forEach(function(btn){
      btn.addEventListener("click", async function(){
        var id = btn.getAttribute("data-move-up");
        var secs = (await fetchAboutSections()).slice().sort(function(a,b){ return (a.order||0)-(b.order||0); });
        var idx = secs.findIndex(function(s){ return s.id===id; });
        if(idx<=0) return;
        var tmp = secs[idx].order; secs[idx].order = secs[idx-1].order; secs[idx-1].order = tmp;
        await saveAboutSections(secs);
        renderAdminAboutList();
      });
    });

    // Move down
    box.querySelectorAll("[data-move-down]").forEach(function(btn){
      btn.addEventListener("click", async function(){
        var id = btn.getAttribute("data-move-down");
        var secs = (await fetchAboutSections()).slice().sort(function(a,b){ return (a.order||0)-(b.order||0); });
        var idx = secs.findIndex(function(s){ return s.id===id; });
        if(idx<0||idx>=secs.length-1) return;
        var tmp = secs[idx].order; secs[idx].order = secs[idx+1].order; secs[idx+1].order = tmp;
        await saveAboutSections(secs);
        renderAdminAboutList();
      });
    });

    // Add paragraph
    box.querySelectorAll("[data-add-para]").forEach(function(btn){
      btn.addEventListener("click", async function(){
        var secId = btn.getAttribute("data-add-para");
        var ta = document.getElementById("newPara_"+secId);
        var errEl = document.getElementById("paraErr_"+secId);
        var text = ta ? ta.value.trim() : "";
        if(errEl) errEl.textContent = "";
        if(!text){ if(errEl) errEl.textContent = "Paragraph cannot be empty."; return; }
        var secs = await fetchAboutSections();
        var sec = secs.find(function(s){ return s.id===secId; });
        if(!sec) return;
        sec.paragraphs = sec.paragraphs || [];
        sec.paragraphs.push(text);
        var res = await saveAboutSections(secs);
        if(res.ok){ renderAdminAboutList(); }
        else { if(errEl) errEl.textContent = "Error: "+res.error; }
      });
    });

    // Edit paragraph
    box.querySelectorAll("[data-edit-para]").forEach(function(btn){
      btn.addEventListener("click", async function(){
        var pi = parseInt(btn.getAttribute("data-edit-para"), 10);
        var secId = btn.getAttribute("data-para-sec");
        var secs = await fetchAboutSections();
        var sec = secs.find(function(s){ return s.id===secId; });
        if(!sec||!sec.paragraphs[pi]===undefined) return;
        var newText = prompt("Edit paragraph:", sec.paragraphs[pi]);
        if(newText===null) return;
        newText = newText.trim();
        if(!newText){ alert("Paragraph cannot be empty."); return; }
        sec.paragraphs[pi] = newText;
        await saveAboutSections(secs);
        renderAdminAboutList();
      });
    });

    // Delete paragraph
    box.querySelectorAll("[data-delete-para]").forEach(function(btn){
      btn.addEventListener("click", async function(){
        var pi = parseInt(btn.getAttribute("data-delete-para"), 10);
        var secId = btn.getAttribute("data-para-sec");
        if(!confirm("Delete this paragraph?")) return;
        var secs = await fetchAboutSections();
        var sec = secs.find(function(s){ return s.id===secId; });
        if(!sec) return;
        sec.paragraphs.splice(pi, 1);
        await saveAboutSections(secs);
        renderAdminAboutList();
      });
    });
  }

          '<div id="achCount" style="color:var(--muted);font-size:13px;">Loading...</div>' +
        '</div>' +
        '<div id="achList"><div class="center-note">Loading achievements...</div></div>' +
      '</div>';

    attachNavListeners();

    // Fetch achievements, the car catalog, and the avatar catalog
    // simultaneously so we can show the actual reward image (not just the
    // name) in the reward panel.
    Promise.all([fetchAchievements(), fetchCustomCars(), fetchAvatarCatalog()]).then(function(results){
      var list = results[0];
      var cars = results[1];
      var avatarPieces = results[2];
      var carMap = {};
      cars.forEach(function(c){ carMap[c.id] = c; });
      var avatarMap = {};
      avatarPieces.forEach(function(p){ avatarMap[p.id] = p; });

      var el = document.getElementById("achList");
      var countEl = document.getElementById("achCount");
      if(!el) return;

      if(!list.length){
        countEl.textContent = "";
        el.innerHTML = '<div class="center-note">No achievements set up yet \u2014 check back later.</div>';
        return;
      }

      var earnedIds = (acc && acc.earnedAchievementIds) || [];
      var earned = list.filter(function(a){ return earnedIds.indexOf(a.id) !== -1; });
      var locked  = list.filter(function(a){ return earnedIds.indexOf(a.id) === -1; });
      countEl.textContent = earned.length + ' / ' + list.length + ' earned';

      function rewardPanelHtml(a){
        if(!a.rewardType || a.rewardType === "none") return "";
        var inner = "";
        if(a.rewardType === "coins"){
          inner =
            '<div class="ach-card-reward-label">Reward</div>' +
            '<div class="ach-card-reward-coins">' + COIN_ICON + (a.rewardCoins||0) + '</div>' +
            '<div class="ach-card-reward-name">coins</div>';
        } else if(a.rewardType === "car"){
          var car = a.rewardCarId && carMap[a.rewardCarId];
          inner =
            '<div class="ach-card-reward-label">Car</div>' +
            '<div class="ach-card-reward-img">' + (car ? carVisualHtml(car) : '<div style="color:var(--muted);font-size:11px;">Car image</div>') + '</div>' +
            '<div class="ach-card-reward-name">' + escapeHtml(a.rewardCarName || "") + '</div>';
        } else if(a.rewardType === "nameTag" && a.rewardNameTagImage){
          inner =
            '<div class="ach-card-reward-label">Name Tag</div>' +
            '<div class="ach-card-reward-img"><img src="' + a.rewardNameTagImage + '" alt="" style="width:100%;height:100%;object-fit:contain;display:block;" /></div>' +
            '<div class="ach-card-reward-name">Race tag</div>';
        } else if(a.rewardType === "avatar" && a.rewardAvatarPieceId){
          var piece = avatarMap[a.rewardAvatarPieceId];
          inner =
            '<div class="ach-card-reward-label">' + (a.rewardAvatarSlot ? AVATAR_SLOT_LABELS[a.rewardAvatarSlot] : "Avatar") + '</div>' +
            '<div class="ach-card-reward-img">' + (piece ? '<img src="' + piece.image + '" alt="" style="max-width:100%;max-height:100%;object-fit:contain;image-rendering:pixelated;display:block;" />' : '<div style="color:var(--muted);font-size:11px;">Piece image</div>') + '</div>' +
            '<div class="ach-card-reward-name">' + escapeHtml(a.rewardAvatarName || "") + '</div>';
        } else if(a.rewardType === "title" && a.rewardTitleId){
          var titleRarity = a.rewardTitleRarity;
          if(!titleRarity){
            var catalogEntry = titleCatalogCache.find(function(t){ return t.id === a.rewardTitleId; });
            titleRarity = catalogEntry ? catalogEntry.rarity : "";
          }
          var titleColor = RARITY_COLORS[titleRarity] || "var(--text)";
          inner =
            '<div class="ach-card-reward-label">Title</div>' +
            '<div style="display:flex;align-items:center;justify-content:center;flex:1;padding:4px 0;">' +
              '<div style="font-family:\'Arial Black\',Impact,sans-serif;font-style:italic;font-size:13px;color:' + titleColor + ';text-align:center;word-break:break-word;text-shadow:-1px -1px 0 rgba(0,0,0,.6),1px -1px 0 rgba(0,0,0,.6),-1px 1px 0 rgba(0,0,0,.6),1px 1px 0 rgba(0,0,0,.6);">&ldquo;' + escapeHtml(a.rewardTitleText || "Title") + '&rdquo;</div>' +
            '</div>' +
            '<div class="ach-card-reward-name">' + escapeHtml(titleRarity || "") + '</div>';
        }
        return '<div class="ach-card-reward">' + inner + '</div>';
      }

      function cardHtml(a){
        var done = earnedIds.indexOf(a.id) !== -1;
        var reward = rewardPanelHtml(a);
        var progressHtml = "";
        if(!done && acc && a.conditionType && a.conditionValue){
          var val = parseInt(a.conditionValue, 10) || 0;
          var current = 0;
          var label = "";
          if(a.conditionType === "races"){
            current = acc.races || 0;
            label = current + " / " + val + " races";
          } else if(a.conditionType === "bestWpm"){
            current = acc.bestWpm || 0;
            label = current + " / " + val + " WPM";
          } else if(a.conditionType === "ownedCars"){
            current = 1 + (acc.ownedCarIds || []).length;
            label = current + " / " + val + " cars";
          } else if(a.conditionType === "coins"){
            current = acc.coins || 0;
            label = current.toLocaleString() + " / " + val.toLocaleString() + " coins";
          } else if(a.conditionType === "bestSession"){
            // Show live current session if active, otherwise 0 — so progress
            // resets visually once the session expires and they haven't hit the goal.
            var SESSION_TIMEOUT_MS = 30 * 60 * 1000;
            var sessionActive = acc.lastRaceAt && (Date.now() - acc.lastRaceAt < SESSION_TIMEOUT_MS);
            current = sessionActive ? (acc.sessionRaces || 0) : 0;
            label = current + " / " + val + " races this session";
          } else if(a.conditionType === "racesWithRarity"){
            current = (acc.racesWithRarity && a.conditionRarity) ? (acc.racesWithRarity[a.conditionRarity] || 0) : 0;
            label = current + " / " + val + " races (" + (a.conditionRarity || "") + ")";
          }
          if(label){
            var frac = val > 0 ? Math.min(1, current / val) : 0;
            var pct = Math.round(frac * 100);
            progressHtml =
              '<div style="margin-top:8px;">' +
                '<div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:4px;">' +
                  '<span>' + escapeHtml(label) + '</span>' +
                  '<span>' + pct + '%</span>' +
                '</div>' +
                '<div style="height:4px;background:var(--line);border-radius:2px;overflow:hidden;">' +
                  '<div style="height:100%;width:' + pct + '%;background:var(--green);border-radius:2px;transition:width .3s;"></div>' +
                '</div>' +
              '</div>';
          }
        }
        return '<div class="ach-card ' + (done ? "done" : "locked") + '">' +
          '<div class="ach-card-body">' +
            '<div class="ach-card-title">' + escapeHtml(a.title) + '</div>' +
            '<div class="ach-card-desc">' + escapeHtml(a.description) + '</div>' +
            progressHtml +
            (done
              ? '<div class="ach-card-complete">\u2714 Completed</div>'
              : '') +
          '</div>' +
          reward +
        '</div>';
      }

            var ALL_SECTIONS = [
        { key: "Common",      color: "#9AA1AB" },
        { key: "Rare",        color: "#4FA3FF" },
        { key: "Ultra Rare",  color: "#26C6DA" },
        { key: "Legendary",   color: "#FFA726" },
        { key: "Mythic",      color: "#B388FF" },
        { key: "Ascended",    color: "#C7CCD4" },
        { key: "Unobtainable",color: "#FF4D45" },
        { key: "Loaded",      color: "#FFD54F" },
        { key: "Redline",     color: "#FF4D45" },
        { key: "Sessionist",  color: "#26C6DA" },
        { key: "Premium",     color: "#FFD700" }
      ];

      function sectionHtml(title, color, items){
        if(!items.length) return "";
        var doneCount = items.filter(function(a){ return earnedIds.indexOf(a.id) !== -1; }).length;
        return '<div style="margin-bottom:28px;">' +
          '<div style="display:flex;align-items:baseline;gap:10px;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid ' + color + '33;">' +
            '<div style="font-family:\'Arial Black\',Impact,sans-serif;font-style:italic;font-size:17px;color:' + color + ';">' + escapeHtml(title) + '</div>' +
            '<div style="font-size:12px;color:var(--muted);">' + doneCount + ' / ' + items.length + '</div>' +
          '</div>' +
          items.map(cardHtml).join("") +
        '</div>';
      }

      // Group achievements by their saved section field.
      // Achievements without a section default to "Common".
      var buckets = {};
      ALL_SECTIONS.forEach(function(s){ buckets[s.key] = []; });
      list.forEach(function(a){
        var sec = a.section || "Common";
        if(buckets[sec]) buckets[sec].push(a);
        else buckets["Common"].push(a);
      });

      var html = "";
      ALL_SECTIONS.forEach(function(s){ html += sectionHtml(s.key, s.color, buckets[s.key]); });
      el.innerHTML = html || '<div class="center-note">No achievements yet.</div>';
    });
  }

  /* ============ INIT ============ */
  app.innerHTML =
    brandHeader() +
    '<div class="auth-wrap"><div class="panel" style="text-align:center;color:var(--muted);">' +
    'Starting engines...' +
    '</div></div>';

  detectStorageMode().then(async function(){
    try{
      var maintTimeout = new Promise(function(res){ setTimeout(function(){ res(null); }, 3000); });
      var mRes = await Promise.race([shimGet("site_maintenance", true), maintTimeout]);
      state.maintenanceMode = mRes && mRes.value ? JSON.parse(mRes.value) : false;
    }catch(e){ state.maintenanceMode = false; }

    // Restore session from localStorage if available
    try{
      var savedToken = localStorage.getItem("zt_session");
      if(savedToken && STORAGE_MODE === "real"){
        currentToken = savedToken;
        var sessionRes = await fetch(SERVER_URL + "/api/session", {
          headers: { "x-session-token": savedToken }
        });
        if(sessionRes.ok){
          var sessionData = await sessionRes.json();
          // Admin-only session (no player account)
          if(sessionData.isAdmin && !sessionData.account){
            // Token is valid — keep it for API calls.
            // state.isAdmin stays false until they open the admin panel,
            // but at least the token is ready for when they do.
          } else {
          var restored = sessionData.account;
          if(restored && !restored.isBanned){
            // Clear expired suspension
            if(restored.isSuspended && restored.suspendedUntil && Date.now() >= restored.suspendedUntil){
              restored.isSuspended = false;
              restored.suspendedUntil = null;
              await saveAccount(restored);
            }
            if(!restored.isSuspended){
              state.user = restored;
              await refreshUserGuildCache();
              if(state.user.guildId && state.userGuild){
                if(state.user.guildTag !== state.userGuild.tag || state.user.guildColor !== state.userGuild.color){
                  state.user.guildTag = state.userGuild.tag || "";
                  state.user.guildColor = state.userGuild.color || "";
                  await saveAccount(state.user);
                }
              }
              try{
                var bootNewlyEarned = await checkAndGrantAchievements(state.user);
                if(bootNewlyEarned.length) await saveAccount(state.user);
              }catch(e){}
              try{
                var cacheResults = await Promise.all([fetchCustomCars(), fetchAvatarCatalog(), fetchSeasonConfig()]);
                customCarsCache = cacheResults[0];
                avatarCatalogCache = cacheResults[1];
                // cacheResults[2] populates seasonConfigCache automatically
              }catch(e){}
            } else {
              currentToken = null; localStorage.removeItem("zt_session");
            }
          } else {
            currentToken = null; localStorage.removeItem("zt_session");
          }
          } // end else (not admin-only session)
        } else {
          // Token invalid or expired
          currentToken = null; localStorage.removeItem("zt_session");
        }
      }
    }catch(e){ currentToken = null; /* session restore failed */ }

    // If we're being redirected back from Stripe checkout, the webhook
    // that actually flips hasPremiumPass on the account can take a moment
    // to land -- poll a few times (up to ~7.5s total) rather than showing
    // a stale "not active" state right after a successful payment.
    try{
      var postCheckoutQs = window.location.search;
      if(postCheckoutQs.indexOf("premium=success") !== -1 && state.user && currentToken){
        for(var premiumPollAttempt = 0; premiumPollAttempt < 5; premiumPollAttempt++){
          await new Promise(function(r){ setTimeout(r, 1500); });
          try{
            var refreshRes = await fetch(SERVER_URL + "/api/session", { headers: { "x-session-token": currentToken } });
            if(refreshRes.ok){
              var refreshData = await refreshRes.json();
              if(refreshData.account){
                state.user = refreshData.account;
                if(state.user.hasPremiumPass) break;
              }
            }
          }catch(e){}
        }
        // Premium just activated (or was already active) -- grant any
        // "Premium" section achievements immediately rather than waiting
        // for this player's next race.
        try{
          if(state.user && state.user.hasPremiumPass){
            var checkoutNewlyEarned = await checkAndGrantAchievements(state.user);
            if(checkoutNewlyEarned.length) await saveAccount(state.user);
          }
        }catch(e){}
      }
      if(postCheckoutQs.indexOf("premium=") !== -1){
        window.history.replaceState({}, "", window.location.pathname);
      }
    }catch(e){}

    // Pre-warm season config cache before rendering any screen,
    // so the leaderboard never shows zeroed season stats from a cache miss.
    fetchSeasonConfig().catch(function(){});

    // Route based on current URL path.
    navigate(window.location.pathname, false);

    // Poll maintenance status every 3 seconds so all clients are
    // kicked immediately when maintenance mode is toggled on.
    var maintPollFailures = 0;
    var maintPollRendering = false; // prevent poll from stomping an in-progress leaderboard load
    setInterval(async function(){
      try{
        var live = false;
        try{
          var pollRes = await fetch(SERVER_URL + "/api/maintenance-status", { cache: "no-store" });
          if(pollRes.ok){
            var pollData = await pollRes.json();
            live = !!pollData.maintenance;
            maintPollFailures = 0;
          } else {
            maintPollFailures++;
            return;
          }
        }catch(e){
          maintPollFailures++;
          return;
        }
        if(live === !!state.maintenanceMode) return;
        state.maintenanceMode = live;
        if(live && !state.isAdmin && !state.isSuperAdmin &&
           !(state.user && (state.user.isModerator || state.user.maintenanceAccess))){
          try{ localStorage.removeItem("zt_session"); }catch(e){}
          window.location.reload();
        } else {
          renderApp();
        }
      }catch(e){}
    }, 3000);
  });

})();
</script>
