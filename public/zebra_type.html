<title>Panda Type</title><!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panda Type</title>
<style>
  :root{
    --bg:#0A0B0D;
    --panel:#15171B;
    --panel-2:#1B1E23;
    --line:#2A2E35;
    --track:#1E2126;
    --text:#ECE9E2;
    --muted:#8A8F98;
    --amber:#D0D0D0;
    --amber-dark:#A0A0A0;
    --red:#FF4D45;
    --blue:#4FA3FF;
    --green:#33CC78;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    /* Site background image — tiled panda-spot texture. */
    background-color:#0A0B0D;
    background-image:url('/background');
    background-repeat:repeat;
    background-size:1650px auto;
    background-attachment:fixed;
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
  }

  #app{
    flex:1;
    width:100%;
    max-width:1200px;
    margin:0 auto;
    padding:28px 18px 60px;
  }

  .brand{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:14px;
    flex-wrap:wrap;
    gap:6px;
  }
  .brand h1{
    font-family:"Arial Black", Impact, sans-serif;
    font-style:italic;
    text-transform:uppercase;
    letter-spacing:1px;
    font-size:22px;
    margin:0;
    color:var(--text);
  }
  .brand img.site-logo{
    height:44px;
    width:auto;
    display:block;
  }

  /* ── NAV BAR ─────────────────────────────────── */
  .navbar{
    display:flex;
    flex-wrap:wrap;
    align-items:stretch;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:12px;
    margin-bottom:20px;
    overflow:visible;
    position:relative;
    z-index:100;
  }
  .navbar-race{
    display:flex;
    align-items:center;
    gap:10px;
    background:var(--red);
    color:#fff;
    font-family:"Arial Black",Impact,sans-serif;
    font-style:italic;
    font-size:15px;
    text-transform:uppercase;
    letter-spacing:0.5px;
    padding:0 22px;
    cursor:pointer;
    border:none;
    white-space:nowrap;
    flex:0 0 auto;
    transition:background .12s;
    border-radius:11px 0 0 11px;
  }
  .navbar-race:hover{ background:#e03c35; }
  .navbar-race svg{ flex-shrink:0; }
  .navbar-tabs{
    display:flex;
    align-items:stretch;
    flex:1 1 260px;
    min-width:260px;
    overflow-x:auto;
    scrollbar-width:none;
  }
  .navbar-tabs::-webkit-scrollbar{ display:none; }
  .navbar-tab{
    display:flex;
    align-items:center;
    padding:0 20px;
    font-size:14px;
    font-weight:700;
    color:var(--muted);
    cursor:pointer;
    border:none;
    background:none;
    white-space:nowrap;
    border-bottom:3px solid transparent;
    transition:color .12s, border-color .12s, background .12s;
    position:relative;
  }
  .navbar-tab:hover{ color:var(--text); background:rgba(255,255,255,.04); }
  .navbar-tab.active{ color:var(--text); border-bottom-color:var(--amber); background:var(--panel-2); }
  .nav-badge{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-width:16px;
    height:16px;
    padding:0 4px;
    margin-left:6px;
    border-radius:999px;
    background:var(--danger, #e0455a);
    color:#fff;
    font-size:10px;
    font-weight:800;
    line-height:1;
  }
  .navbar-right{
    display:flex;
    flex-wrap:wrap;
    align-items:center;
    justify-content:flex-end;
    gap:8px;
    padding:10px 14px;
    border-left:1px solid var(--line);
    flex:0 0 auto;
    margin-left:auto;
  }
  /* ── END NAV BAR ──────────────────────────────── */

  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:22px;
  }
  .userpill{
    display:flex;
    align-items:center;
    gap:10px;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:999px;
    padding:8px 14px;
    font-size:14px;
  }
  .userpill b{ color:var(--amber); }
  .small-btn{
    background:none;
    border:1px solid var(--line);
    color:var(--muted);
    border-radius:8px;
    padding:7px 12px;
    font-size:13px;
    cursor:pointer;
  }
  .small-btn:hover{ border-color:var(--amber); color:var(--amber); }

  .panel{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:14px;
    padding:24px;
  }

  .btn{
    border:none;
    border-radius:9px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:0.6px;
    font-size:14px;
    padding:13px 20px;
    cursor:pointer;
    transition:transform .12s ease, box-shadow .12s ease;
  }
  .btn:hover{ transform:translateY(-1px); }
  .btn:active{ transform:translateY(0); }
  .btn-primary{
    background:var(--amber);
    color:#0A0B0D;
    box-shadow:0 6px 0 var(--amber-dark);
  }
  .btn-primary:hover{ box-shadow:0 8px 0 var(--amber-dark); }
  .btn-primary:active{ box-shadow:0 3px 0 var(--amber-dark); }
  .btn-ghost{
    background:transparent;
    color:var(--text);
    border:1px solid var(--line);
  }
  .btn-ghost:hover{ border-color:var(--muted); }
  .btn-block{ width:100%; }
  .btn-lg{ padding:18px 24px; font-size:16px; }

  /* ---------- AUTH SCREEN ---------- */
  .auth-wrap{
    max-width:380px;
    margin:40px auto 0;
  }
  .tabs{
    display:flex;
    background:var(--panel-2);
    border-radius:999px;
    padding:4px;
    margin-bottom:20px;
  }
  .tab{
    flex:1;
    text-align:center;
    padding:9px 0;
    border-radius:999px;
    cursor:pointer;
    font-size:13px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:0.5px;
    color:var(--muted);
  }
  .tab.active{ background:var(--amber); color:#0A0B0D; }
  .field{ margin-bottom:14px; }
  .field label{
    display:block;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:1px;
    color:var(--muted);
    margin-bottom:6px;
  }
  .field input{
    width:100%;
    background:var(--panel-2);
    border:1px solid var(--line);
    color:var(--text);
    border-radius:8px;
    padding:11px 12px;
    font-size:15px;
  }
  .field input:focus{ outline:2px solid var(--amber); outline-offset:1px; }
  .error-text{
    color:var(--red);
    font-size:13px;
    margin:-4px 0 14px;
    min-height:16px;
  }
  .notice-text{
    color:var(--amber);
    background:rgba(255,179,0,0.08);
    border:1px solid rgba(255,179,0,0.35);
    border-radius:8px;
    font-size:12.5px;
    line-height:1.5;
    padding:10px 12px;
    margin-bottom:16px;
  }
  .hint-text{
    color:var(--muted);
    font-size:12px;
    margin-top:14px;
    line-height:1.5;
  }

  /* ---------- DASHBOARD ---------- */
  .stat-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:12px;
    margin:20px 0 26px;
  }
  .stat-card{
    background:var(--panel-2);
    border:1px solid var(--line);
    border-radius:10px;
    padding:16px 10px;
    text-align:center;
  }
  .stat-card .num{
    font-family:"Arial Black", Impact, sans-serif;
    font-style:italic;
    font-size:26px;
    color:var(--amber);
  }
  .stat-card .lbl{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.8px;
    color:var(--muted);
    margin-top:4px;
  }
  @media (max-width:560px){
    .stat-grid{ grid-template-columns:repeat(2,1fr); }
  }

  /* ---------- GARAGE ---------- */
  .garage-panel{ padding:0 !important; overflow:hidden; }

  /* Premium garage styling -- gold border + small "Premium" ribbon tab,
     applied to specific .panel elements when the account viewed has an
     active premium subscription. See renderGarageCars(),
     garageStatsAndSwitcherHtml(), and renderProfileContent(). */
  .premium-panel{
    position:relative;
    border:2px solid #FFD700 !important;
    box-shadow:0 0 14px rgba(255,215,0,0.35);
  }
  .premium-badge{
    position:absolute;
    top:-15px;
    left:50%;
    transform:translateX(-50%);
    background:linear-gradient(180deg,#FFE47A,#FFC700);
    color:#0A0B0D;
    font-family:'Arial Black',Impact,sans-serif;
    font-style:italic;
    font-weight:900;
    font-size:13px;
    letter-spacing:0.5px;
    padding:5px 20px;
    border-radius:6px;
    box-shadow:0 2px 6px rgba(0,0,0,0.4);
    white-space:nowrap;
    z-index:2;
  }
  .garage-header{
    background:var(--panel-2);
    border-bottom:1px solid var(--line);
    padding:18px 20px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:10px;
  }
  .garage-title{
    font-family:"Arial Black", Impact, sans-serif;
    font-style:italic;
    text-transform:uppercase;
    letter-spacing:0.5px;
    font-size:19px;
    color:var(--text);
  }
  .garage-title .garage-count{ font-style:normal; opacity:0.7; font-weight:400; }
  .garage-floor{
    background:var(--bg);
    padding:20px 0 6px;
  }
  .garage-line{
    height:2px;
    background:var(--amber);
    opacity:0.85;
    margin:0 16px 18px;
  }
  .garage-row{
    display:flex;
    flex-wrap:wrap;
  }
  .garage-slot{
    flex:0 0 128px;
    width:128px;
    height:80px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-end;
    padding-bottom:2px;
    border-right:1px solid var(--line);
  }
  .garage-slot:first-child{ border-left:1px solid var(--line); }
  .garage-slot > *{
    filter:drop-shadow(0 3px 4px rgba(0,0,0,.45));
    transition:transform .15s ease;
  }
  .garage-slot:hover > *{ transform:translateY(-3px) scale(1.04); }
  .garage-slot.equipped{
    background:rgba(255,179,0,0.12);
    box-shadow:inset 0 0 0 2px var(--amber);
  }
  .garage-slot.equipped > *{ transform:none !important; }
  .garage-slot{ position:relative; cursor:pointer; }
  .garage-slot .equip-btn{
    display:none;
    position:absolute;
    bottom:3px;
    left:50%;
    transform:translateX(-50%);
    background:var(--amber);
    color:#0A0B0D;
    font-size:9px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:0.5px;
    border:none;
    border-radius:4px;
    padding:2px 7px;
    cursor:pointer;
    white-space:nowrap;
    z-index:3;
  }
  .garage-slot:hover .equip-btn{ display:block; }
  .garage-slot.equipped .equip-btn{
    display:block;
    background:#0A0B0D;
    color:var(--amber);
    box-shadow:0 0 0 1px var(--amber);
  }
  /* Info button — small circled "i" in the top-right corner of a car slot */
  .info-btn{
    position:absolute;
    top:3px;
    right:3px;
    width:16px;
    height:16px;
    border-radius:50%;
    background:rgba(0,0,0,0.55);
    color:var(--muted);
    border:1px solid var(--line);
    font-size:10px;
    font-weight:700;
    font-style:normal;
    line-height:1;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    z-index:4;
    padding:0;
  }
  .info-btn:hover{ color:var(--text); border-color:var(--text); }

  /* Quantity badge — sits just left of the info button, shows how many
     copies of this car the player owns. */
  .qty-badge{
    position:absolute;
    top:3px;
    right:23px;
    min-width:16px;
    height:16px;
    padding:0 4px;
    border-radius:8px;
    background:rgba(0,0,0,0.55);
    color:var(--amber);
    border:1px solid var(--line);
    font-size:10px;
    font-weight:700;
    line-height:14px;
    text-align:center;
    z-index:4;
  }

  /* ---------- GLOBAL MODAL ---------- */
  .modal-overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.65);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:1000;
    padding:20px;
  }
  .modal-box{
    position:relative;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:14px;
    padding:24px;
    max-width:420px;
    width:100%;
    max-height:85vh;
    overflow-y:auto;
  }

  .lb-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:9px 0;
    border-bottom:1px solid var(--line);
    font-size:14px;
  }
  .lb-row:last-child{ border-bottom:none; }
  .lb-rank{
    width:24px;
    color:var(--muted);
    font-weight:700;
  }
  .lb-name{ flex:1; padding-left:6px; }
  .lb-wpm{ color:var(--amber); font-weight:700; }

  /* ---------- FULL LEADERBOARD ---------- */
  .lb-table{
    width:100%;
    border-collapse:collapse;
    font-size:14px;
    margin-top:6px;
  }
  .lb-table th{
    text-align:left;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:1px;
    color:var(--muted);
    padding:0 10px 10px;
    font-weight:700;
    border-bottom:1px solid var(--line);
  }
  .lb-table th:first-child{ padding-left:0; }
  .lb-table th.num{ text-align:right; }
  .lb-table td{
    padding:12px 10px;
    border-bottom:1px solid var(--line);
    vertical-align:middle;
  }
  .lb-table td:first-child{ padding-left:0; }
  .lb-table tr:last-child td{ border-bottom:none; }
  .lb-table .td-num{ text-align:right; color:var(--amber); font-weight:700; font-style:italic; font-family:"Arial Black",Impact,sans-serif; font-size:16px; }
  .lb-table .td-muted{ text-align:right; color:var(--muted); }
  .lb-badge{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    width:26px; height:26px;
    border-radius:6px;
    font-weight:900;
    font-size:13px;
    background:var(--panel-2);
    color:var(--muted);
  }
  .lb-badge.gold{ background:rgba(200,200,200,.12); color:var(--amber); }
  .lb-badge.silver{ background:rgba(180,180,200,.15); color:#b0b8c8; }
  .lb-badge.bronze{ background:rgba(180,100,40,.15); color:#c87c42; }
  .lb-you{ color:var(--amber); font-weight:700; }
  .lb-you::after{ content:" (you)"; font-weight:400; font-size:11px; opacity:.7; }

  .lb-tabs{
    display:flex;
    gap:4px;
    margin-bottom:20px;
    background:var(--panel-2);
    border-radius:999px;
    padding:4px;
  }
  .lb-tab{
    flex:1;
    text-align:center;
    padding:8px 0;
    border-radius:999px;
    cursor:pointer;
    font-size:12px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:0.5px;
    color:var(--muted);
    transition:background .15s, color .15s;
  }
  .lb-tab.active{ background:var(--amber); color:#0A0B0D; }

  /* ---------- GUILDS ---------- */
  .guild-color-swatch{
    width:32px;
    height:32px;
    border-radius:50%;
    cursor:pointer;
    border:3px solid transparent;
    display:inline-block;
    transition:transform .1s, border-color .1s;
  }
  .guild-color-swatch:hover{ transform:scale(1.08); }
  .guild-color-swatch.selected{ border-color:var(--text); }
  .guild-role-badge{
    font-size:9px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:0.5px;
    padding:2px 6px;
    border-radius:4px;
    margin-left:6px;
  }
  .guild-member-row{
    display:flex;
    align-items:center;
    gap:14px;
    padding:14px 4px;
    border-bottom:1px solid var(--line);
  }
  .guild-member-row:last-child{ border-bottom:none; }
  .guild-member-name-col{
    flex:0 1 auto;
    min-width:120px;
  }
  .guild-member-stats{
    flex:1;
    display:flex;
    flex-wrap:wrap;
    gap:20px;
    justify-content:flex-start;
    padding:0 12px;
  }
  .guild-member-stat{
    text-align:center;
    min-width:64px;
  }
  .guild-member-stat .num{
    font-family:"Arial Black", Impact, sans-serif;
    font-style:italic;
    font-size:19px;
    color:var(--text);
    line-height:1.1;
  }
  .guild-member-stat .lbl{
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:0.6px;
    color:var(--muted);
    margin-top:2px;
  }
  .guild-member-actions{
    flex:0 0 auto;
    display:flex;
    flex-direction:column;
    gap:6px;
  }
  @media (max-width:680px){
    .guild-member-row{ flex-wrap:wrap; }
    .guild-member-stats{ flex-basis:100%; padding:10px 0 0; }
  }

  /* ---------- SEASON ---------- */
  .season-name{
    font-family:"Arial Black", Impact, sans-serif;
    font-style:italic;
    text-transform:uppercase;
    letter-spacing:0.5px;
    font-size:36px;
    color:var(--text);
  }
  .season-row{
    display:flex;
    align-items:stretch;
  }
  .season-label-col{
    flex:0 0 110px;
    display:flex;
    flex-direction:column;
  }
  .season-label-cell{
    height:192px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:14px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:1px;
    color:var(--muted);
    text-align:center;
    padding:8px;
  }
  .season-scroll{
    flex:1;
    overflow-x:auto;
  }
  .season-levels{
    display:flex;
  }
  .season-level-col{
    flex:0 0 168px;
    border-right:1px solid var(--line);
  }
  .season-level-num{
    height:44px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:18px;
    font-weight:700;
    color:var(--muted);
    border-bottom:1px solid var(--line);
  }
  .season-cell{
    height:192px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:8px;
    position:relative;
    padding:12px;
  }
  .season-cell.free{ border-bottom:1px solid var(--line); }
  .season-cell.locked{ opacity:0.35; filter:grayscale(0.6); }
  .season-cell-img{ width:92px; height:46px; }
  .season-cell-img img{ width:100%; height:100%; object-fit:contain; display:block; image-rendering:pixelated; }
  .season-cell-label{ font-size:14px; color:var(--muted); text-align:center; line-height:1.3; }
  .season-cell-check{
    position:absolute;
    top:6px;
    right:6px;
    color:var(--green);
    font-size:20px;
    font-weight:900;
  }
  .season-bonus-col{
    flex:0 0 200px;
  }
  .season-bonus-cell{
    height:192px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:4px;
    padding:12px;
    text-align:center;
  }
  .season-bonus-cell.free{ border-bottom:1px solid var(--line); }

  /* ---------- ADMIN NAV ---------- */
  .admin-navbar{
    display:flex;
    flex-wrap:wrap;
    align-items:stretch;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:12px;
    margin-bottom:20px;
    overflow:hidden;
  }
  .admin-navbar-brand{
    display:flex;
    align-items:center;
    gap:8px;
    padding:0 20px;
    border-right:1px solid var(--line);
    flex:0 0 auto;
  }
  .admin-navbar-brand span{
    font-family:"Arial Black",Impact,sans-serif;
    font-style:italic;
    font-size:15px;
    text-transform:uppercase;
    letter-spacing:0.5px;
    color:var(--amber);
  }
  .admin-navbar-tabs{
    display:flex;
    align-items:stretch;
    flex:1 1 220px;
    min-width:220px;
    overflow-x:auto;
    scrollbar-width:none;
  }
  .admin-navbar-tabs::-webkit-scrollbar{ display:none; }
  .admin-navbar-tab{
    display:flex;
    align-items:center;
    padding:0 24px;

  /* ---------- RACE SCREEN ---------- */
  .race-meta{
    display:flex;

  .gauge-wrap{
    display:flex;

  .gauge-num{
    font-family:"Arial Black", Impact, sans-serif;

  .race-stage{
    position:relative;

    position:absolute;

    align-items:center;

  .countdown-num{
    font-family:"Arial Black", Impact, sans-serif;

  .countdown-num.go{
    color:var(--green);
    font-size:58px;

  .paste-notice{
    color:var(--amber);
    font-size:12.5px;
    margin-top:8px;

  }


  .track{
    background:var(--panel-2);
    border:1px solid var(--line);
    border-radius:10px;
    padding:14px 10px;
    margin-bottom:22px;
    position:relative;
  }
  /* When a custom track is active, ONE image spans the entire track
     container (all 4 lanes at once, not repeated per lane) and scrolls
     continuously via a CSS animation applied inline (see startRace()).
     background-origin:content-box keeps the sizing math simple — the
     image only needs to cover the lanes themselves, not the panel padding. */
  .track.has-custom-track{
    background-origin:content-box;
    background-repeat:repeat-x;
    background-size:auto 100%;
  }
  .lane{
    position:relative;
    height:80px;
    margin-bottom:8px;
    background:var(--track);
    border-radius:6px;
    background-image:repeating-linear-gradient(to right, var(--line) 0 14px, transparent 14px 30px);
    background-position:0 center;
    background-repeat:repeat-x;
    background-size:30px 2px;
    overflow:visible;
  }
  .lane:last-child{ margin-bottom:0; }

  /* With a custom track, lanes go edge-to-edge with no gap or rounding —
     they're just rows within the one continuous road image, not separate
     boxes. The background pattern above is also turned off per-lane since
     the shared image on .track shows through instead. */
  .has-custom-track .lane{
    margin-bottom:0;
    border-radius:0;
    background:none;
  }
  .lane-name{
    position:absolute;
    left:6px; top:3px;
    font-size:10px;
    color:var(--muted);
    z-index:2;
    text-transform:uppercase;
    letter-spacing:0.5px;
  }
  /* Track cars render at full native size — same 128x64 image as the
     garage, no scaling down. Lane height (80px) is sized to fit this with
     a little breathing room above and below. */
  .car{
    position:absolute;
    top:8px;
    left:0;
    width:128px;
    height:64px;
    transition:left .08s linear;
    z-index:1;
  }
  /* Scoped to just the car's own visual (img or svg) — NOT the name tag,
     which is also a direct child but needs its own size/position below. */
  .car > img, .car > svg{ width:100%; height:100%; display:block; }

  /* A few simple streaks trailing behind the car (to its left, opposite
     the direction of travel) to sell a sense of speed/wind. Pure CSS,
     loops continuously, no JS involved. */
  .car-wind{
    position:absolute;
    top:0;
    right:100%;
    width:40px;
    height:100%;
    pointer-events:none;
    z-index:0;
    overflow:visible;
  }
  .car-wind .streak{
    position:absolute;
    height:3px;
    border-radius:2px;
    background:linear-gradient(to left, rgba(255,255,255,.6), rgba(255,255,255,0));
    animation:carWindStreak .55s linear infinite;
  }
  .car-wind .streak:nth-child(1){ top:22%; width:30px; animation-delay:0s; }
  .car-wind .streak:nth-child(2){ top:48%; width:40px; animation-delay:.18s; }
  .car-wind .streak:nth-child(3){ top:74%; width:26px; animation-delay:.36s; }
  @keyframes carWindStreak{
    0%{ transform:translateX(14px); opacity:0; }
    25%{ opacity:.85; }
    100%{ transform:translateX(-26px); opacity:0; }
  }

  /* Name tag floats just ahead of the car (to its right, since lanes race
     left-to-right) and moves with it since it's a child of .car. Also
     rendered at full native size (256x64) to match the uploaded tag art. */
  .car-nametag{
    position:absolute;
    left:100%;
    top:50%;
    transform:translateY(-50%);
    margin-left:8px;
    width:256px;
    height:64px;
    z-index:2;
    pointer-events:none;
  }
  .car-nametag img{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:fill;
    image-rendering:pixelated;
    display:block;
  }
  .car-nametag-text{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:2px;
    font-family:-apple-system,sans-serif;
    font-size:14px;
    font-weight:700;
    color:#fff;
    text-shadow:-1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
    white-space:nowrap;
    letter-spacing:0.2px;
  }

  .nav-dropdown-wrap{ position:relative; z-index:9999; }
  .nav-dropdown-trigger{
    display:flex;align-items:center;gap:8px;
    background:var(--panel-2);border:1px solid var(--line);
    border-radius:20px;padding:6px 12px 6px 8px;
    cursor:pointer;font-size:14px;font-weight:600;color:var(--text);
    transition:border-color .15s;
  }
  .nav-dropdown-trigger:hover{ border-color:var(--text); }
  .nav-dropdown-trigger svg{ flex-shrink:0; }
  .nav-dropdown-arrow{ font-size:9px;color:var(--muted);margin-left:2px; }
  .nav-dropdown-menu{
    display:none;position:absolute;top:calc(100% + 8px);right:0;
    background:var(--panel-2);border:1px solid var(--line);
    border-radius:10px;min-width:170px;z-index:9999;
    box-shadow:0 8px 24px rgba(0,0,0,.4);overflow:hidden;
  }
  .nav-dropdown-menu.open{ display:block; }
  .nav-dropdown-item{
    display:block;width:100%;text-align:left;
    padding:11px 16px;font-size:14px;font-weight:500;
    color:var(--text);background:none;border:none;
    cursor:pointer;border-bottom:1px solid var(--line);
    transition:background .12s;
  }
  .nav-dropdown-item:last-child{ border-bottom:none; }
  .nav-dropdown-item:hover{ background:var(--panel); }
  .nav-dropdown-item.danger{ color:var(--red); }
  .passage-box{
    background:var(--panel-2);
    border:1px solid var(--line);
    border-radius:10px;
    padding:14px 18px;
    font-family:"SFMono-Regular","Roboto Mono","Consolas","Liberation Mono",monospace;
    font-size:18px;
    line-height:1.7;
    letter-spacing:0.3px;
    margin-bottom:14px;
    cursor:default;
    user-select:none;
    /* Fixed to exactly 3 lines: font-size × line-height × 3 + top+bottom padding */
    height:calc(18px * 1.7 * 3 + 28px);
    overflow:hidden;
    position:relative;
  }
  /* The inner div slides up one line at a time as the player progresses */
  .passage-inner{
    transition:transform 0.18s ease;
  }
  .ch{ color:var(--muted); }
  .ch.correct{ color:var(--green); }
  .ch.wrong{ color:#fff; background:var(--red); border-radius:2px; }
  .ch.current{ color:var(--text); background:var(--amber); border-radius:2px; color:#0A0B0D; }
  .ch.wrong-held{ background:var(--red); color:#fff; border-radius:2px; }

  #typeInput{
    width:100%;
    background:var(--panel-2);
    border:1px solid var(--line);
    color:var(--text);
    border-radius:8px;
    padding:13px 14px;
    font-size:16px;
    font-family:"SFMono-Regular","Roboto Mono","Consolas",monospace;
  }
  #typeInput:focus{ outline:2px solid var(--amber); outline-offset:1px; }

  .race-actions{
    margin-top:16px;
    display:flex;
    justify-content:flex-end;
  }

  /* ---------- RESULTS ---------- */
  .results-place{
    font-family:"Arial Black", Impact, sans-serif;
    font-style:italic;
    font-size:48px;
    color:var(--amber);
    text-align:center;
    margin:6px 0 2px;
  }
  .results-sub{
    text-align:center;
    color:var(--muted);
    text-transform:uppercase;
    letter-spacing:1.5px;
    font-size:12px;
    margin-bottom:22px;
  }
  .results-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:12px;
    margin-bottom:24px;
  }
  .results-actions{
    display:flex;
    gap:12px;
  }
  .results-actions .btn{ flex:1; }

  .coins-earned{
    text-align:center;
    font-family:"Arial Black", Impact, sans-serif;
    font-style:italic;
    font-size:22px;
    color:var(--amber);
    margin:-8px 0 18px;
    animation:pop-in .3s ease;
  }
  .coins-earned span{ font-style:normal; font-size:14px; opacity:.75; }
  @keyframes pop-in{ from{ transform:scale(.6); opacity:0; } to{ transform:scale(1); opacity:1; } }

  .coin-pill{
    display:flex;
    align-items:center;
    gap:6px;
    background:var(--panel-2);
    border:1px solid var(--amber);
    border-radius:999px;
    padding:7px 14px;
    font-family:"Arial Black", Impact, sans-serif;
    font-style:italic;
    font-size:15px;
    color:var(--amber);
  }

  /* ---------- SHOP ---------- */
  .shop-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(180px, 1fr));
    gap:14px;
    margin-top:16px;
  }
  .shop-card{
    background:var(--panel-2);
    border:1px solid var(--line);
    border-radius:12px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
  }
  .shop-card-img{
    width:100%;
    height:90px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:var(--track);
    padding:8px;
  }
  .shop-card-img > *{ max-width:128px; max-height:64px; width:100%; height:100%; display:block; object-fit:contain; }
  .shop-card-body{ padding:12px; flex:1; display:flex; flex-direction:column; gap:8px; }
  .shop-card-name{ font-weight:700; font-size:14px; }
  .shop-card-price{
    font-family:"Arial Black", Impact, sans-serif;
    font-style:italic;
    font-size:15px;
    color:var(--amber);
  }
  .shop-card-price.free{ color:var(--green); }
  .shop-card .btn{ margin-top:auto; }
  .shop-card.owned{ border-color:var(--green); }
  .shop-card.owned .shop-card-price{ color:var(--green); font-size:13px; font-style:normal; font-family:inherit; font-weight:700; }

  .center-note{
    text-align:center;
    color:var(--muted);
    font-size:13px;
    margin-top:18px;
  }
</style>

<script>
/**
 * Usage:
 *   AntiCheat.init(inputEl, options?)
 *   AntiCheat.verdict()           — call at race end
 *   AntiCheat.sessionSummary()    — cross-race stats
 *
 * Options:
 *   {
 *     onBot:     (result) => void,  // fires when bot detected (default: operator alert)
 *     onSuspect: (result) => void,  // fires when score 25-39
 *     reportUrl: 'https://...',     // POST evidence payload here
 *     silent:    false,             // suppress internal console logging
 *   }
 */

const AntiCheat = (() => {

  const _N = (() => {
    const _DP     = Object.defineProperty;
    const _GOP    = Object.getOwnPropertyDescriptor;
    const iDesc   = _GOP(HTMLInputElement.prototype,   'value');
    const tDesc   = _GOP(HTMLTextAreaElement.prototype, 'value');
    const _now    = performance.now.bind(performance);
    const _dateNow = Date.now.bind(Date);
    const _addEL  = EventTarget.prototype.addEventListener;
    const _rmEL   = EventTarget.prototype.removeEventListener;
    const _dispEL = EventTarget.prototype.dispatchEvent;
    const _warn   = console.warn.bind(console);
    const _alert  = window.alert.bind(window);           
    const _fetch  = window.fetch  ? window.fetch.bind(window) : null;
    const _XHR    = window.XMLHttpRequest;
    const _setInt = window.setInterval.bind(window);    
    const _clrInt = window.clearInterval.bind(window);
    const _rAF    = window.requestAnimationFrame.bind(window);
    const _prom   = Promise.resolve.bind(Promise);      
    const _stack  = () => { try { return new Error().stack || ''; } catch(e){ return ''; } };
    const _scrollX = () => window.scrollX;
    const _scrollY = () => window.scrollY;

    return {
      iGet: iDesc?.get, iSet: iDesc?.set,
      tGet: tDesc?.get, tSet: tDesc?.set,
      DP: _DP, GOP: _GOP,
      now: _now, dateNow: _dateNow,
      addEL: _addEL, rmEL: _rmEL, dispEL: _dispEL,
      warn: _warn, alert: _alert,
      fetch: _fetch, XHR: _XHR,
      setInt: _setInt, clrInt: _clrInt,
      rAF: _rAF, prom: _prom,
      stack: _stack,
      scrollX: _scrollX, scrollY: _scrollY,
    };
  })();

  // Options 
  let _opts = {
    onBot:     null,
    onSuspect: null,
    reportUrl: null,
    silent:    false,
  };

  //  Per-race state 
  let _el               = null;
  let keyTimestamps     = [];   // { t, key, deltaMs }
  let bigrams           = {};   // "th" -> [deltaMs, ...] for bigram fingerprinting
  let triplets          = [];   // { key, downT, pressT, upT, holdMs, dpMs, puMs }
  let inputEvents       = [];   // { t, inputType, data, isTrusted }
  let mouseHistory      = [];   // { t, x, y, type }
  let focusHistory      = [];   // { t, type }
  let scrollEvents      = [];   // { t, x, y }
  let visibilityEvents  = [];   // { t, state }
  let valueSnapshots    = [];   // { t, len } from poller
  let rafHeartbeats     = [];   // { t } from rAF loop — detects clock manipulation
  let flags             = [];

  let pasteDetected           = false;
  let nativeSetterTampered    = false;
  let execCommandDetected     = false;
  let syntheticKeyDetected    = false;
  let isTrustedViolations     = 0;
  let descriptorRepatched     = false;
  let dispatchEventOverridden = false;
  let programmaticFocus       = false;
  let programmaticClick       = false;
  let keypressValueMismatches = 0;
  let perfNowMocked           = false;
  let dateNowMocked           = false;
  let typedWhileHidden        = false;
  let pollerSuppressed        = false;

  let lastValue     = '';
  let lastKeyName   = '';
  let valueJumps    = [];
  let keyDownTimes  = {};       
  let keyPressTimes = {};
  let keyDurations  = [];
  let _keySeq       = 0;        

  let _inTrustedHandler = false;
  let _lastTrustedKeyT  = -Infinity;
  let _pollId           = null;
  let _rafId            = null;
  let _rafLastT         = null;

  // Cross-race session (survives reset)
  const _session = {
    races:        0,
    botRaces:     0,
    suspectRaces: 0,
    scores:       [],
    flagTypes:    {},
    bigramBaseline: {},   
    startTime:    _N.now(),
  };

  //  Internal logging 
  function _log(type, detail) {
    flags.push({ type, detail, t: _N.now() });
    _session.flagTypes[type] = (_session.flagTypes[type] || 0) + 1;
    // Keep session flag map from growing unbounded
    if (Object.keys(_session.flagTypes).length > 50) {
      const oldest = Object.entries(_session.flagTypes).sort((a,b)=>a[1]-b[1])[0][0];
      delete _session.flagTypes[oldest];
    }
    if (!_opts.silent) _N.warn(`[AntiCheat] 🚩 ${type}: ${detail}`);
  }

  // Integrity checks 
  function _integrityChecks() {
    // performance.now tamper
    if (performance.now !== _N.now) {
      if (!perfNowMocked) { perfNowMocked = true; _log('perf_now_mocked', 'performance.now replaced'); }
    }
    // Date.now tamper
    if (Date.now !== _N.dateNow) {
      if (!dateNowMocked) { dateNowMocked = true; _log('date_now_mocked', 'Date.now replaced'); }
    }
    // dispatchEvent override
    if (EventTarget.prototype.dispatchEvent !== _N.dispEL) {
      if (!dispatchEventOverridden) {
        dispatchEventOverridden = true;
        _log('dispatch_event_overridden', 'EventTarget.prototype.dispatchEvent was replaced');
      }
    }
    // setInterval override 
    if (window.setInterval !== _N.setInt) {
      if (!pollerSuppressed) {
        pollerSuppressed = true;
        _log('setinterval_overridden', 'setInterval replaced — poller may be suppressed');
      }
    }
  }

  // rAF heartbeat (clock drift / freeze detection) 
  // If rAF stops firing or fires at wrong cadence, something is manipulating the clock
  function _rafLoop(t) {
    if (!_el) return; // stopped
    const now = _N.now();
    if (_rafLastT !== null) {
      const gap = now - _rafLastT;
      // rAF should fire every ~16ms. If gap > 1000ms and page is visible, something's wrong.
      if (gap > 1000 && document.visibilityState === 'visible') {
        _log('raf_gap', `requestAnimationFrame gap ${Math.round(gap)}ms — clock manipulation?`);
      }
    }
    rafHeartbeats.push({ t: now });
    if (rafHeartbeats.length > 300) rafHeartbeats.shift();
    _rafLastT = now;
    _rafId = _N.rAF(_rafLoop);
  }

  //  Patch native value setter
  function _patchSetter(el) {
    const isTA  = el.tagName === 'TEXTAREA';
    const proto = isTA ? HTMLTextAreaElement.prototype : HTMLInputElement.prototype;
    const oGet  = isTA ? _N.tGet : _N.iGet;
    const oSet  = isTA ? _N.tSet : _N.iSet;

    try {
      _N.DP(proto, 'value', {
        configurable: false,
        enumerable:   true,
        get() { return oGet.call(this); },
        set(val) {
          if (this === el) {
            const sinceKey = _N.now() - _lastTrustedKeyT;
            if (!_inTrustedHandler && sinceKey > 30) {
              nativeSetterTampered = true;
              _log('native_setter', `value set "${String(val).slice(0,20)}" — ${Math.round(sinceKey)}ms after last trusted key`);
            }
          }
          return oSet.call(this, val);
        },
      });
    } catch(e) {
      _log('patch_failed', `Could not patch setter: ${e.message}`);
    }

    // Watch for re-patch attempts 
    const origDP = Object.defineProperty;
    Object.defineProperty = function(obj, prop, desc) {
      if (prop === 'value' &&
          (obj === HTMLInputElement.prototype || obj === HTMLTextAreaElement.prototype)) {
        descriptorRepatched = true;
        _log('descriptor_repatch', 'Attempt to redefine value descriptor after anticheat');
      }
      return origDP(obj, prop, desc);
    };
  }

  //  Patch execCommand 
  function _patchExecCommand() {
    document.execCommand = function(cmd, ...args) {
      if (cmd === 'insertText') {
        const sinceKey = _N.now() - _lastTrustedKeyT;
        if (!_inTrustedHandler && sinceKey > 30) {
          execCommandDetected = true;
          _log('exec_command', `execCommand('insertText') ${Math.round(sinceKey)}ms after last trusted key`);
        }
      }
      return _N.iSet ? _N.execCmd ? _N.execCmd(cmd, ...args) : false : false;
    };

    // Stash the real one now
    _N.execCmd = _N.execCmd || ((...a) => false);
  }

  //  Safe addEventListener via frozen ref 
  function _on(target, evt, fn) {
    _N.addEL.call(target, evt, fn, true);
  }

  //  Attach listeners 
  function _attachListeners(el) {
    _on(el,       'keydown',           _onKeyDown);
    _on(el,       'keypress',          _onKeyPress);
    _on(el,       'keyup',             _onKeyUp);
    _on(el,       'input',             _onInput);
    _on(el,       'paste',             _onPaste);
    _on(el,       'focus',             _onFocus);
    _on(el,       'blur',              _onBlur);
    _on(document, 'mousemove',         _onMouse);
    _on(document, 'mousedown',         _onMouse);
    _on(document, 'mouseup',           _onMouse);
    _on(document, 'scroll',            _onScroll);
    _on(document, 'visibilitychange',  _onVisibility);

    _watchFocusAndClick(el);
    _startPoller(el);
    _N.rAF(_rafLoop);
    // Periodic integrity checks every 2s using frozen setInterval
    _N.setInt(_integrityChecks, 2000);
    _integrityChecks();
  }

  //  Watch programmatic focus/click 
  function _watchFocusAndClick(el) {
    const origFocus = el.focus.bind(el);
    const origClick = el.click.bind(el);

    el.focus = function(...args) {
      const last = mouseHistory[mouseHistory.length - 1];
      const ms   = last ? _N.now() - last.t : Infinity;
      if (ms > 300) {
        programmaticFocus = true;
        _log('programmatic_focus', `focus() ${Math.round(ms)}ms after last mouse event`);
      }
      return origFocus(...args);
    };

    el.click = function(...args) {
      const last = mouseHistory[mouseHistory.length - 1];
      const ms   = last ? _N.now() - last.t : Infinity;
      if (ms > 300) {
        programmaticClick = true;
        _log('programmatic_click', `click() ${Math.round(ms)}ms after last mouse event`);
      }
      return origClick(...args);
    };
  }

  //  Event handlers 
  function _onKeyDown(e) {
    const t  = _N.now();
    const id = ++_keySeq; 

    if (document.visibilityState === 'hidden') {
      typedWhileHidden = true;
      _log('typed_while_hidden', `keydown "${e.key}" while tab hidden`);
    }

    if (e.isTrusted) {
      _inTrustedHandler = true;
      _lastTrustedKeyT  = t;
      _N.prom().then(() => { _inTrustedHandler = false; });
    } else {
      isTrustedViolations++;
      syntheticKeyDetected = true;
      _log('synthetic_key', `keydown "${e.key}" isTrusted=false`);
    }

    keyDownTimes[id]    = { key: e.key, t };
    e._acId             = id; 
  }

  function _onKeyPress(e) {
    const t = _N.now();
    if (e.isTrusted) {
      _inTrustedHandler = true;
      _lastTrustedKeyT  = t;
      _N.prom().then(() => { _inTrustedHandler = false; });
    }
    keyPressTimes[e.key] = t;

    const last = keyTimestamps[keyTimestamps.length - 1];
    const deltaMs = last ? t - last.t : null;
    keyTimestamps.push({ t, key: e.key, deltaMs });

    // Bigram tracking: record inter-key time for this pair
    if (lastKeyName && e.key.length === 1 && lastKeyName.length === 1) {
      const bigram = lastKeyName + e.key;
      if (!bigrams[bigram]) bigrams[bigram] = [];
      if (deltaMs != null) bigrams[bigram].push(deltaMs);
    }
    lastKeyName = e.key;
  }

  function _onKeyUp(e) {
    const t    = _N.now();
    if (e.isTrusted) {
      _inTrustedHandler = true;
      _lastTrustedKeyT  = t;
      _N.prom().then(() => { _inTrustedHandler = false; });
    }

    // Match by key name since we can't reliably pass _acId through keyup
    // Find the most recent unmatched keydown for this key
    const matchId = Object.keys(keyDownTimes)
      .reverse()
      .find(id => keyDownTimes[id].key === e.key);

    if (matchId != null) {
      const { t: downT } = keyDownTimes[matchId];
      const pressT = keyPressTimes[e.key];
      const holdMs = t - downT;
      const dpMs   = pressT != null ? pressT - downT : null;
      const puMs   = pressT != null ? t - pressT     : null;
      keyDurations.push(holdMs);
      triplets.push({ key: e.key, downT, pressT, upT: t, holdMs, dpMs, puMs });
      delete keyDownTimes[matchId];
      delete keyPressTimes[e.key];
    }
  }

  function _onInput(e) {
    const t      = _N.now();
    const newVal = e.target.value || '';
    const delta  = newVal.length - lastValue.length;

    inputEvents.push({ t, inputType: e.inputType, data: e.data, isTrusted: e.isTrusted });

    if (!e.isTrusted) {
      _log('synthetic_input', `InputEvent isTrusted=false type="${e.inputType}" data="${e.data}"`);
    }
    if (delta > 1) {
      valueJumps.push({ t, delta });
      _log('value_jump', `Value +${delta} chars in one input event`);
    }
    if (e.inputType === 'insertText' && !e.isTrusted) {
      _log('untrusted_insert', `insertText not trusted (data="${e.data}")`);
    }

    if (e.data && e.data.length === 1 && keyTimestamps.length > 0) {
      const lastKey = keyTimestamps[keyTimestamps.length - 1].key;
      if (lastKey.length === 1 && lastKey.toLowerCase() !== e.data.toLowerCase()) {
        keypressValueMismatches++;
        if (keypressValueMismatches >= 3) {
          _log('keypress_mismatch', `pressed "${lastKey}" but inserted "${e.data}" (${keypressValueMismatches}x)`);
        }
      }
    }
    lastValue = newVal;
  }

  function _onPaste(e) { pasteDetected = true; _log('paste', 'Paste event'); }
  function _onFocus(e) { focusHistory.push({ t: _N.now(), type: 'focus' }); }
  function _onBlur(e)  { focusHistory.push({ t: _N.now(), type: 'blur'  }); }

  function _onMouse(e) {
    mouseHistory.push({ t: _N.now(), x: e.clientX, y: e.clientY, type: e.type });
    if (mouseHistory.length > 300) mouseHistory.shift();
  }

  function _onScroll() {
    scrollEvents.push({ t: _N.now(), x: _N.scrollX(), y: _N.scrollY() });
  }

  function _onVisibility() {
    visibilityEvents.push({ t: _N.now(), state: document.visibilityState });
  }

  //  Value poller (uses frozen setInterval) 
  function _startPoller(el) {
    let last = el.value;
    // Check if poller was actually registered by verifying it fires
    let pollerFired = false;
    _pollId = _N.setInt(() => {
      pollerFired = true;
      const cur = el.value;
      const t   = _N.now();
      valueSnapshots.push({ t, len: cur.length });
      if (valueSnapshots.length > 600) valueSnapshots.shift();
      if (cur !== last) {
        const delta    = cur.length - last.length;
        const recentEv = inputEvents.length > 0 && (t - inputEvents[inputEvents.length-1].t) < 80;
        if (!recentEv && delta > 0) {
          _log('silent_change', `Value +${delta} chars with no input event in 80ms`);
        }
        last = cur;
      }
    }, 20);
    // After 500ms, verify poller actually ran
    _N.setInt(() => {
      if (!pollerFired) {
        pollerSuppressed = true;
        _log('poller_suppressed', 'Value poller never fired — setInterval may have been overridden before init');
      }
    }, 500);
  }

  //  Timing analysis 
  function _analyzeTimings() {
    const deltas = keyTimestamps.map(k => k.deltaMs).filter(d => d != null && d > 0);
    if (deltas.length < 15) return { insufficient: true, sampleSize: deltas.length };

    const n    = deltas.length;
    const mean = deltas.reduce((a,b)=>a+b,0) / n;
    const vari = deltas.reduce((a,b)=>a+(b-mean)**2,0) / n;
    const std  = Math.sqrt(vari);
    const cv   = std / mean;

    // Autocorrelation lag-1
    let acN = 0, acD = 0;
    for (let i = 1; i < n; i++) {
      acN += (deltas[i]-mean)*(deltas[i-1]-mean);
      acD += (deltas[i]-mean)**2;
    }
    const autocorr = acD > 0 ? acN/acD : 0;

    // Skewness
    const skew = std > 0
      ? deltas.reduce((a,b)=>a+((b-mean)/std)**3,0)/n : 0;

    // Interval ratio
    const rounded = deltas.map(d=>Math.round(d/5)*5);
    const freq = {};
    rounded.forEach(v=>{ freq[v]=(freq[v]||0)+1; });
    const topFreq  = Math.max(...Object.values(freq));
    const domRatio = topFreq / n;

    // Key hold
    const avgHold = keyDurations.length > 0
      ? keyDurations.reduce((a,b)=>a+b,0)/keyDurations.length : null;
    const holdSD = keyDurations.length > 1
      ? Math.sqrt(keyDurations.reduce((a,b)=>a+(b-avgHold)**2,0)/keyDurations.length) : null;

    // Triplets
    const vt   = triplets.filter(t=>t.dpMs!=null&&t.puMs!=null);
    const avgDp = vt.length>0 ? vt.reduce((a,t)=>a+t.dpMs,0)/vt.length : null;
    const avgPu = vt.length>0 ? vt.reduce((a,t)=>a+t.puMs,0)/vt.length : null;

    // Speed chunks
    const cs = Math.floor(n/5);
    const chunks = [];
    for (let i=0;i<5&&i*cs<n;i++) {
      const ch=deltas.slice(i*cs,(i+1)*cs);
      chunks.push(ch.reduce((a,b)=>a+b,0)/ch.length);
    }
    const chMean = chunks.reduce((a,b)=>a+b,0)/chunks.length;
    const chSD   = chunks.length>1
      ? Math.sqrt(chunks.reduce((a,b)=>a+(b-chMean)**2,0)/chunks.length) : 0;

    // Sliding window burst
    const W=10, wins=[];
    for (let i=0;i<=n-W;i++){
      const sl=deltas.slice(i,i+W), wm=sl.reduce((a,b)=>a+b,0)/W;
      wins.push(Math.sqrt(sl.reduce((a,b)=>a+(b-wm)**2,0)/W));
    }
    const zeroBurstRatio = wins.filter(s=>s<5).length/wins.length;

    // Chars/sec from snapshots
    const speedWins=[];
    if (valueSnapshots.length>10){
      const s0=valueSnapshots[0].t, sN=valueSnapshots[valueSnapshots.length-1].t;
      for (let t=s0;t<sN-5000;t+=1000){
        const a=valueSnapshots.find(s=>s.t>=t);
        const b=valueSnapshots.find(s=>s.t>=t+5000);
        if(a&&b) speedWins.push((b.len-a.len)/5);
      }
    }
    const speedFlat = speedWins.length>3 &&
      Math.sqrt(speedWins.reduce((a,b)=>a+(b-speedWins.reduce((x,y)=>x+y,0)/speedWins.length)**2,0)/speedWins.length) < 1.5;

    // Bigram consistency
    const suspiciousBigrams = [];
    for (const [bg, times] of Object.entries(bigrams)) {
      if (times.length < 5) continue;
      const bm  = times.reduce((a,b)=>a+b,0)/times.length;
      const bsd = Math.sqrt(times.reduce((a,b)=>a+(b-bm)**2,0)/times.length);
      const bcv = bm > 0 ? bsd/bm : 0;
      if (bcv < 0.05) suspiciousBigrams.push(`"${bg}"(cv=${bcv.toFixed(3)})`);
    }

    // WPM implied by mean inter-key delay: mean ms/char -> CPM = 60000/mean -> WPM = CPM/5
    const impliedWPM = mean > 0 ? Math.round((60000 / mean) / 5) : 0;
    // Human physiological ceiling: ~220 WPM for world-record typists.
    // 250+ WPM is physically impossible without automation.
    const physicallyImpossible = impliedWPM >= 250;
    const extremelyFast        = impliedWPM >= 180 && impliedWPM < 250;

    return {
      mean: Math.round(mean), stdDev: Math.round(std), cv: +cv.toFixed(3),
      autocorr: +autocorr.toFixed(3), skewness: +skew.toFixed(3),
      dominantRatio: +domRatio.toFixed(2),
      avgHoldMs: avgHold?Math.round(avgHold):null, holdStdDev: holdSD?Math.round(holdSD):null,
      avgTripletDpMs: avgDp?Math.round(avgDp):null, avgTripletPuMs: avgPu?Math.round(avgPu):null,
      chunkSpeedSD: Math.round(chSD), zeroBurstRatio: +zeroBurstRatio.toFixed(2),
      speedFlat, suspiciousBigrams, sampleSize: n,
      impliedWPM, physicallyImpossible, extremelyFast,
      // derived
      tooUniform:    cv < 0.15,
      tooRepetitive: domRatio > 0.35,
      badHold:       avgHold!=null && (avgHold<15 || (holdSD!=null && holdSD<3)),
      badTriplets:   avgDp!=null && avgPu!=null && (avgDp<2 && avgPu<2),
      flatSpeed:     chSD<3 && mean<200,
      burstPattern:  zeroBurstRatio>0.2,
      lowSkew:       skew<0.3,
      highAutocorr:  Math.abs(autocorr)>0.6,
    };
  }

  //  Mouse analysis 
  function _analyzeMouse() {
    const moves  = mouseHistory.filter(e=>e.type==='mousemove');
    const clicks = mouseHistory.filter(e=>e.type==='mousedown');
    if (!moves.length) return { noMouse:true, totalDist:0, moveCount:0, clickCount:clicks.length };
    let dist=0;
    for(let i=1;i<moves.length;i++){
      const dx=moves[i].x-moves[i-1].x, dy=moves[i].y-moves[i-1].y;
      dist+=Math.sqrt(dx*dx+dy*dy);
    }
    return { noMouse:false, totalDist:Math.round(dist), moveCount:moves.length,
             clickCount:clicks.length, likelyStat: dist<30&&moves.length<5 };
  }

  //  Confidence curve 
  function _confidence(score) {
    if (score>=100) return 99;
    if (score>=80)  return 97;
    if (score>=60)  return 95;
    if (score>=50)  return 90;
    if (score>=40)  return 80;
    if (score>=30)  return 60;
    if (score>=20)  return 40;
    return Math.round(score*1.5);
  }

  //  Silent response
  function _respond(result) {
    // 1. Custom handler
    if (typeof _opts.onBot === 'function') {
      _opts.onBot(result);
    } else {
      // Default: operator alert (invisible to the bot user — alert blocks their tab but
      // the site owner is the one checking, so use sparingly; prefer reportUrl instead)
      _N.alert(
        `[AntiCheat] BOT DETECTED\n` +
        `Confidence: ${result.confidence}%\n` +
        `Signals: ${result.signals.slice(0,3).join('; ')}` +
        (result.signals.length>3 ? ` (+${result.signals.length-3} more)` : '')
      );
    }
    // 2. Server report
    if (_opts.reportUrl) _report(result);
  }

  function _respondSuspect(result) {
    if (typeof _opts.onSuspect === 'function') {
      _opts.onSuspect(result);
    } else if (!_opts.silent) {
      _N.warn(`[AntiCheat] ⚠️ SUSPECT score=${result.score}: ${result.signals.join('; ')}`);
    }
    if (_opts.reportUrl) _report(result);
  }

  function _report(result) {
    const body = JSON.stringify({
      t:          _N.dateNow(),
      url:        location.href,
      score:      result.score,
      confidence: result.confidence,
      signals:    result.signals,
      flags:      result.flags.slice(-30),
      timings:    result.timings,
      mouse:      result.mouse,
      session:    result.session,
    });
    if (_N.fetch) {
      _N.fetch(_opts.reportUrl, {
        method:'POST', headers:{'Content-Type':'application/json'}, body,
      }).catch(()=>{});
    } else if (_N.XHR) {
      const x = new _N.XHR();
      x.open('POST', _opts.reportUrl, true);
      x.setRequestHeader('Content-Type','application/json');
      x.send(body);
    }
  }

  //  Public API 
  function init(el, opts={}) {
    if (!el) throw new Error('AntiCheat.init() needs an input element');
    _el   = el;
    _opts = { ..._opts, ...opts };
    reset(false);
    _patchSetter(el);
    _patchExecCommand();
    _attachListeners(el);
    _session.races++;
    if (!_opts.silent) _N.warn('[AntiCheat] v4 — silent monitoring started.');
  }

  function reset(full=false) {
    keyTimestamps=[]; bigrams={}; triplets=[]; inputEvents=[];
    mouseHistory=[]; focusHistory=[]; scrollEvents=[];
    visibilityEvents=[]; valueSnapshots=[]; rafHeartbeats=[]; flags=[];
    pasteDetected=false; nativeSetterTampered=false; execCommandDetected=false;
    syntheticKeyDetected=false; isTrustedViolations=0; descriptorRepatched=false;
    dispatchEventOverridden=false; programmaticFocus=false; programmaticClick=false;
    keypressValueMismatches=0; perfNowMocked=false; dateNowMocked=false;
    typedWhileHidden=false; pollerSuppressed=false;
    lastValue=''; lastKeyName=''; valueJumps=[];
    keyDownTimes={}; keyPressTimes={}; keyDurations=[]; _keySeq=0;
    _inTrustedHandler=false; _lastTrustedKeyT=-Infinity;
    if (_pollId)  { _N.clrInt(_pollId); _pollId=null; }
    if (_rafId)   { /* cancelAnimationFrame not frozen, just let it expire */ _el=null; _rafId=null; }
    _rafLastT=null;
    if (full) {
      _session.races=0; _session.botRaces=0; _session.suspectRaces=0;
      _session.scores=[]; _session.flagTypes={}; _session.bigramBaseline={};
      _session.startTime=_N.now();
    }
  }

  function verdict() {
    const timings  = _analyzeTimings();
    const mouse    = _analyzeMouse();
    const focus    = {
      focuses: focusHistory.filter(e=>e.type==='focus').length,
      blurs:   focusHistory.filter(e=>e.type==='blur').length,
    };
    const signals  = [];
    let score      = 0;

    //  Hard signals 
    if (syntheticKeyDetected)
      { signals.push(`Synthetic key events (${isTrustedViolations}x isTrusted=false)`); score+=60; }
    if (nativeSetterTampered)
      { signals.push('Native value setter called outside keyboard handler'); score+=55; }
    if (execCommandDetected)
      { signals.push('execCommand("insertText") outside keyboard handler'); score+=55; }
    if (descriptorRepatched)
      { signals.push('Attempt to repatch value descriptor'); score+=45; }
    if (dispatchEventOverridden)
      { signals.push('dispatchEvent prototype overridden'); score+=10; } // was 40 — some extensions wrap dispatchEvent globally
    if (pollerSuppressed)
      { signals.push('setInterval overridden — poller suppressed'); score+=10; } // was 35 — common with privacy/fingerprint-blocking browsers
    if (perfNowMocked)
      { signals.push('performance.now replaced'); score+=8; } // was 35 — Brave/Firefox RFP, privacy extensions do this routinely
    if (dateNowMocked)
      { signals.push('Date.now replaced'); score+=5; } // was 25 — same cause as above
    if (pasteDetected)
      { signals.push('Paste event'); score+=25; }
    if (valueJumps.length>1)
      { signals.push(`Multi-char value jump (${valueJumps.length}x)`); score+=35; }
    if (keypressValueMismatches>=3)
      { signals.push(`Keypress/value mismatches (${keypressValueMismatches}x)`); score+=30; }
    if (programmaticClick)
      { signals.push('Programmatic .click() without prior mouse event'); score+=20; }
    if (typedWhileHidden)
      { signals.push('Keystrokes while tab was hidden'); score+=40; }

    //  Behavioral
    if (!timings.insufficient) {
      // ── Absolute speed check — physiology doesn't lie ──────────────────────
      // 250+ WPM is beyond human capability. No jitter analysis needed.
      // This is the primary signal for the bot you saw at 300 WPM.
      if (timings.physicallyImpossible)
        { signals.push(`Physically impossible speed: ${timings.impliedWPM} WPM (≥250 WPM threshold)`); score+=80; }
      else if (timings.extremelyFast)
        { signals.push(`Extremely fast: ${timings.impliedWPM} WPM (180-249 range)`); score+=30; }

      if (timings.tooUniform)    { signals.push(`Timing uniform (CV=${timings.cv})`); score+=20; }
      if (timings.tooRepetitive) { signals.push(`Dominant interval ratio ${timings.dominantRatio}`); score+=15; }
      if (timings.badHold)       { signals.push(`Key hold abnormal (avg ${timings.avgHoldMs}ms σ=${timings.holdStdDev}ms)`); score+=25; }
      if (timings.badTriplets)   { signals.push(`Triplet near-instant (dp=${timings.avgTripletDpMs}ms pu=${timings.avgTripletPuMs}ms)`); score+=25; }
      if (timings.flatSpeed)     { signals.push(`Speed flat (chunk σ=${timings.chunkSpeedSD}ms)`); score+=15; }
      if (timings.speedFlat)     { signals.push('Chars/sec perfectly constant over time'); score+=15; }
      if (timings.burstPattern)  { signals.push(`Burst pattern (${Math.round(timings.zeroBurstRatio*100)}% zero-σ)`); score+=12; }
      if (timings.lowSkew)       { signals.push(`Low skewness (${timings.skewness})`); score+=10; }
      if (timings.highAutocorr)  { signals.push(`High autocorrelation (${timings.autocorr})`); score+=10; }
      if (timings.suspiciousBigrams.length>2)
        { signals.push(`Inhumanly consistent bigrams: ${timings.suspiciousBigrams.slice(0,3).join(', ')}`); score+=25; }
    }

    //  Mouse 
    if (mouse.likelyStat && score>=20)
      { signals.push(`No mouse movement (${mouse.totalDist}px)`); score+=10; }

    //  Session
    const sessionBotRate = _session.races>2 ? _session.botRaces/_session.races : 0;
    if (sessionBotRate>0.5)
      { signals.push(`Session bot rate ${Math.round(sessionBotRate*100)}% (${_session.races} races)`); score+=20; }

    const confidence = _confidence(score);
    // Only signals that CANNOT be explained by privacy extensions / dev tools /
    // tabbing with the keyboard count as "hard" evidence of a bot.
    // perfNowMocked, dateNowMocked, pollerSuppressed, dispatchEventOverridden,
    // and programmaticFocus are EXCLUDED here — they fire on legit users with
    // fingerprint-protection browsers (Brave, Firefox RFP), privacy extensions,
    // ad blockers, or keyboard-only navigation (Tab into the input).
    // Hard DOM signals — near-certain bot regardless of score
    const domHardSignal =
      syntheticKeyDetected ||
      nativeSetterTampered ||
      execCommandDetected ||
      descriptorRepatched ||
      keypressValueMismatches >= 5 ||
      valueJumps.length >= 3;

    // Timing hard signal — physically impossible speeds need no DOM evidence
    const timingHardSignal = !timings.insufficient && (
      timings.physicallyImpossible ||                        // ≥250 WPM — impossible
      (timings.extremelyFast && timings.tooUniform) ||      // 180-249 WPM + uniform timing
      (timings.badTriplets && timings.badHold)              // near-instant triplets + short hold
    );

    const hardSignal = domHardSignal || timingHardSignal;

    // Bot requires hard signal OR overwhelmingly high score from behavioral evidence alone
    const isBot     = hardSignal ? score >= 40 : score >= 90;
    const isSuspect = !isBot && score >= 35;

    _session.scores.push(score);
    if (isBot)     _session.botRaces++;
    if (isSuspect) _session.suspectRaces++;

    const result = {
      isBot, isSuspect, confidence, score, signals, flags, timings, mouse, focus,
      session: { ..._session },
      summary: isBot
        ? `BOT (${confidence}%) — ${signals.slice(0,2).join('; ')}${signals.length>2?` +${signals.length-2} more`:''}`
        : isSuspect
          ? `SUSPECT (${score}) — ${signals.join('; ')}`
          : `Human (score ${score})`,
    };

    if (isBot)          _respond(result);
    else if (isSuspect) _respondSuspect(result);

    return result;
  }

  function sessionSummary() {
    const n = _session.scores.length;
    return {
      ..._session,
      avgScore:  n>0 ? Math.round(_session.scores.reduce((a,b)=>a+b,0)/n) : 0,
      topFlags:  Object.entries(_session.flagTypes).sort((a,b)=>b[1]-a[1]).slice(0,8),
    };
  }

  function getFlags()     { return [...flags]; }
  function getLiveScore() { return _analyzeTimings(); }

  return { init, verdict, reset, getFlags, getLiveScore, sessionSummary };

})();

//  Recommended usage 
//
// Silent flag + server report (recommended — bot never knows):
//   AntiCheat.init(input, {

//     onBot:     (r) => fetch('/api/flag-user', { method:'POST', body: JSON.stringify(r) }),

// At race end:

//
// Cross-race stats:
//   AntiCheat.sessionSummary();
//   // { races:10, botRaces:4, avgScore:68, topFlags:[...] }

<script>
/**
 * device-fingerprint.js
 * Hardware-derived device fingerprinting for ZebraType anticheat.
 * Produces a stable hash that survives incognito, cookie clears, and localStorage wipes.
 *
 * Integration with anticheat.js:
 *
 *   // 1. Load both scripts
 *   <script src="device-fingerprint.js"><\/script>
 *   <script src="anticheat.js"><\/script>
 *
 *   // 2. Get fingerprint before race starts
 *   const fp = await DeviceFingerprint.get();
 *
 *   // 3. Check ban status before allowing race entry
 *   const banned = await DeviceFingerprint.checkBan(fp.hash, '/api/check-ban');
 *   if (banned) { showBanMessage(); return; }
 *
 *   // 4. Pass fingerprint into anticheat so it's included in every report
 *   AntiCheat.init(inputEl, {
 *     reportUrl: '/api/anticheat',
 *     onBot: (result) => {
 *       // result.fingerprint is automatically attached
 *       fetch('/api/ban', {
 *         method: 'POST',
 *         body: JSON.stringify({ hash: result.fingerprint.hash, result })
 *       });
 *     }
 *   });
 *
 * Server-side ban flow (Node/Express example at bottom of file).
 */

const DeviceFingerprint = (() => {

  // ─── Canvas fingerprint ────────────────────────────────────────────────────
  // Renders text/shapes using GPU-accelerated canvas. Different hardware,
  // drivers, and OS font rendering produce slightly different pixel outputs.
  // Survives: incognito, cookie clear, localStorage wipe, VPN.
  // Defeated by: canvas-blocking extensions (detectable — we note if blocked).
  function _canvasFingerprint() {
    try {
      const c = document.createElement('canvas');
      c.width = 280; c.height = 60;
      const ctx = c.getContext('2d');
      if (!ctx) return { value: 'no-canvas', blocked: true };

      // Text rendering — OS + font + GPU anti-aliasing all affect output
      ctx.textBaseline = 'alphabetic';
      ctx.fillStyle    = '#f60';
      ctx.fillRect(125, 1, 62, 20);
      ctx.fillStyle    = '#069';
      ctx.font         = '11pt "Times New Roman"';
      ctx.fillText('ZebraType 🦓 anticheat', 2, 15);
      ctx.fillStyle    = 'rgba(102, 204, 0, 0.7)';
      ctx.font         = '18pt Arial';
      ctx.fillText('ZebraType 🦓 anticheat', 4, 45);

      // Geometric operations — blending and compositing vary by GPU
      ctx.globalCompositeOperation = 'multiply';
      ctx.fillStyle = 'rgb(255,0,255)';
      ctx.beginPath();
      ctx.arc(50, 50, 50, 0, Math.PI * 2, true);
      ctx.closePath();
      ctx.fill();

      const data = c.toDataURL();
      // Check for canvas-blocking extensions (they return empty/identical data)
      const isBlocked = data === 'data:,' ||
        data.length < 200 ||
        data === document.createElement('canvas').toDataURL();

      return { value: data, blocked: isBlocked };
    } catch(e) {
      return { value: 'canvas-error', blocked: true };
    }
  }

  // ─── WebGL fingerprint ─────────────────────────────────────────────────────
  // GPU renderer string is hardware-specific and stable.
  // Often includes GPU model, vendor, and driver version.
  function _webglFingerprint() {
    try {
      const c   = document.createElement('canvas');
      const gl  = c.getContext('webgl') || c.getContext('experimental-webgl');
      if (!gl) return { renderer: 'no-webgl', vendor: 'no-webgl', params: '' };

      const dbg = gl.getExtension('WEBGL_debug_renderer_info');
      const renderer = dbg
        ? gl.getParameter(dbg.UNMASKED_RENDERER_WEBGL)
        : gl.getParameter(gl.RENDERER);
      const vendor = dbg
        ? gl.getParameter(dbg.UNMASKED_VENDOR_WEBGL)
        : gl.getParameter(gl.VENDOR);

      // Sample a range of GL parameters that vary by hardware
      const params = [
        gl.getParameter(gl.MAX_TEXTURE_SIZE),
        gl.getParameter(gl.MAX_VIEWPORT_DIMS),
        gl.getParameter(gl.MAX_VERTEX_ATTRIBS),
        gl.getParameter(gl.MAX_VERTEX_UNIFORM_VECTORS),
        gl.getParameter(gl.MAX_FRAGMENT_UNIFORM_VECTORS),
        gl.getParameter(gl.MAX_VARYING_VECTORS),
        gl.getParameter(gl.MAX_COMBINED_TEXTURE_IMAGE_UNITS),
        gl.getParameter(gl.ALIASED_LINE_WIDTH_RANGE),
        gl.getParameter(gl.ALIASED_POINT_SIZE_RANGE),
      ].join(',');

      // WebGL rendering fingerprint — shader output varies by GPU
      const prog = gl.createProgram();
      const vs   = gl.createShader(gl.VERTEX_SHADER);
      gl.shaderSource(vs, `
        attribute vec2 p;
        void main() { gl_Position = vec4(p, 0.0, 1.0); }
      `);
      gl.compileShader(vs);
      const fs = gl.createShader(gl.FRAGMENT_SHADER);
      gl.shaderSource(fs, `
        precision mediump float;
        void main() {
          float r = fract(sin(dot(gl_FragCoord.xy, vec2(12.9898,78.233))) * 43758.5453);
          gl_FragColor = vec4(r, r*0.5, r*0.25, 1.0);
        }
      `);
      gl.compileShader(fs);
      gl.attachShader(prog, vs); gl.attachShader(prog, fs);
      gl.linkProgram(prog); gl.useProgram(prog);

      const buf  = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, buf);
      gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);
      const loc  = gl.getAttribLocation(prog, 'p');
      gl.enableVertexAttribArray(loc);
      gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);
      c.width = 16; c.height = 16;
      gl.viewport(0, 0, 16, 16);
      gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

      const pixels = new Uint8Array(16 * 16 * 4);
      gl.readPixels(0, 0, 16, 16, gl.RGBA, gl.UNSIGNED_BYTE, pixels);
      const renderHash = _quickHash(pixels.join(','));

      return { renderer, vendor, params, renderHash };
    } catch(e) {
      return { renderer: 'webgl-error', vendor: 'webgl-error', params: '', renderHash: '' };
    }
  }

  // ─── Audio fingerprint ─────────────────────────────────────────────────────
  // Processes an oscillator through the audio graph. Output varies by
  // OS audio stack, CPU architecture, and floating-point implementation.
  function _audioFingerprint() {
    return new Promise(resolve => {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 44100 });
        const osc = ctx.createOscillator();
        const cmp = ctx.createDynamicsCompressor();

        // Set compressor params that interact with hardware float precision
        cmp.threshold.value = -50;
        cmp.knee.value      = 40;
        cmp.ratio.value     = 12;
        cmp.attack.value    = 0;
        cmp.release.value   = 0.25;

        osc.type = 'triangle';
        osc.frequency.value = 1000;
        osc.connect(cmp);

        const dest = ctx.createMediaStreamDestination();
        cmp.connect(dest);

        // Offline rendering is faster and doesn't require user gesture
        const offline = new OfflineAudioContext(1, 4096, 44100);
        const osc2    = offline.createOscillator();
        const cmp2    = offline.createDynamicsCompressor();
        Object.assign(cmp2.threshold, { value: -50 });
        Object.assign(cmp2.knee,      { value: 40 });
        Object.assign(cmp2.ratio,     { value: 12 });
        Object.assign(cmp2.attack,    { value: 0 });
        Object.assign(cmp2.release,   { value: 0.25 });
        osc2.type = 'triangle';
        osc2.frequency.value = 1000;
        osc2.connect(cmp2);
        cmp2.connect(offline.destination);
        osc2.start(0);

        offline.startRendering().then(buf => {
          const data    = buf.getChannelData(0);
          // Sample specific points and sum — variation comes from float rounding
          let sum = 0;
          for (let i = 0; i < data.length; i += 37) sum += Math.abs(data[i]);
          ctx.close();
          resolve(sum.toString());
        }).catch(() => {
          ctx.close();
          resolve('audio-error');
        });
      } catch(e) {
        resolve('no-audio');
      }
    });
  }

  // ─── Hardware signals ──────────────────────────────────────────────────────
  // CPU core count, memory, screen, and timezone are stable per device.
  function _hardwareSignals() {
    return {
      cores:      navigator.hardwareConcurrency || 0,
      memory:     navigator.deviceMemory        || 0,   // GB, rounded
      platform:   navigator.platform            || '',
      screenW:    screen.width,
      screenH:    screen.height,
      screenDepth:screen.colorDepth,
      pixelRatio: window.devicePixelRatio       || 1,
      timezone:   Intl.DateTimeFormat().resolvedOptions().timeZone,
      tzOffset:   new Date().getTimezoneOffset(),
      languages:  (navigator.languages || [navigator.language]).join(','),
    };
  }

  // ─── Browser signals ───────────────────────────────────────────────────────
  // Font list, plugin list, touch points — stable per browser install.
  function _browserSignals() {
    // Font detection via canvas measurement
    const testFonts = [
      'Arial','Courier New','Georgia','Times New Roman','Trebuchet MS','Verdana',
      'Comic Sans MS','Impact','Palatino','Garamond','Bookman','Tahoma',
      'Helvetica','Monaco','Lucida Console','Gill Sans',
    ];
    const c   = document.createElement('canvas');
    const ctx = c.getContext('2d');
    const baseFont = 'monospace';
    ctx.font = `72px ${baseFont}`;
    const baseW = ctx.measureText('mmmmmmmmmmlli').width;
    const fonts = testFonts.filter(f => {
      ctx.font = `72px '${f}',${baseFont}`;
      return ctx.measureText('mmmmmmmmmmlli').width !== baseW;
    });

    return {
      fonts:        fonts.join(','),
      plugins:      Array.from(navigator.plugins || []).map(p => p.name).join(','),
      touchPoints:  navigator.maxTouchPoints || 0,
      cookieEnabled:navigator.cookieEnabled,
      doNotTrack:   navigator.doNotTrack    || '',
      vendor:       navigator.vendor        || '',
      userAgent:    navigator.userAgent,
    };
  }

  // ─── Canvas-block detection ────────────────────────────────────────────────
  // Users with fingerprint-blocking extensions get flagged (not banned, but noted).
  // Blocking canvas/WebGL is itself a weak signal of a bot-aware user.
  function _detectFingerprintBlocking(canvas, webgl) {
    return {
      canvasBlocked: canvas.blocked,
      webglBlocked:  webgl.renderer === 'no-webgl' || webgl.renderer === 'webgl-error',
    };
  }

  // ─── Fast non-crypto hash (FNV-1a) ────────────────────────────────────────
  function _quickHash(str) {
    let h = 0x811c9dc5;
    for (let i = 0; i < str.length; i++) {
      h ^= str.charCodeAt(i);
      h  = (h * 0x01000193) >>> 0;
    }
    return h.toString(16).padStart(8, '0');
  }

  // ─── SHA-256 via SubtleCrypto ──────────────────────────────────────────────
  // Used for the final fingerprint hash — collision-resistant.
  async function _sha256(str) {
    try {
      const buf  = new TextEncoder().encode(str);
      const hash = await crypto.subtle.digest('SHA-256', buf);
      return Array.from(new Uint8Array(hash))
        .map(b => b.toString(16).padStart(2, '0'))
        .join('');
    } catch(e) {
      // Fallback to FNV if SubtleCrypto unavailable
      return _quickHash(str);
    }
  }

  // ─── Stability score ───────────────────────────────────────────────────────
  // How reliable is this fingerprint? Lower score = easier to spoof.
  function _stabilityScore(canvas, webgl, audio) {
    let score = 0;
    if (!canvas.blocked)                       score += 35;  // strong, hardware-derived
    if (webgl.renderer !== 'no-webgl')         score += 30;  // GPU identity
    if (audio !== 'no-audio' &&
        audio !== 'audio-error')               score += 20;  // CPU float precision
    score += 15;                                              // hardware signals always present
    return score; // max 100
  }

  // ─── Public API ───────────────────────────────────────────────────────────
  async function get() {
    // Collect all signals in parallel
    const [canvas, webgl, audio] = await Promise.all([
      Promise.resolve(_canvasFingerprint()),
      Promise.resolve(_webglFingerprint()),
      _audioFingerprint(),
    ]);
    const hw      = _hardwareSignals();
    const browser = _browserSignals();
    const blocked = _detectFingerprintBlocking(canvas, webgl);

    // Build the raw fingerprint string
    const raw = [
      canvas.value,
      webgl.renderer,
      webgl.vendor,
      webgl.params,
      webgl.renderHash,
      audio,
      hw.cores,
      hw.memory,
      hw.platform,
      hw.screenW,
      hw.screenH,
      hw.screenDepth,
      hw.pixelRatio,
      hw.timezone,
      hw.languages,
      browser.fonts,
      browser.plugins,
      browser.touchPoints,
      browser.vendor,
    ].join('|||');

    const hash = await _sha256(raw);

    // Also store in localStorage as a secondary identifier
    // (weaker than fingerprint — clearable, but adds another signal)
    try {
      const stored = localStorage.getItem('_zt_did');
      if (!stored) localStorage.setItem('_zt_did', hash);
    } catch(e) {}

    const stability = _stabilityScore(canvas, webgl, audio);

    return {
      hash,                   // SHA-256 of all signals — use this as the ban key
      shortHash: hash.slice(0, 12),  // human-readable abbreviation for logs
      stability,              // 0-100: how hardware-derived this is
      blocked,                // canvas/WebGL blocking detected
      signals: {              // raw signals for debugging
        canvas:  canvas.blocked ? '[blocked]' : _quickHash(canvas.value),
        webgl:   { renderer: webgl.renderer, vendor: webgl.vendor, renderHash: webgl.renderHash },
        audio,
        hardware: hw,
        browser: { ...browser, userAgent: browser.userAgent.slice(0, 80) },
      },
      localStorage: localStorage.getItem('_zt_did') || null,
    };
  }

  // ─── Check if this device is banned ───────────────────────────────────────
  // Calls your server's ban-check endpoint before the race starts.
  async function checkBan(hash, endpoint) {
    try {
      const r = await fetch(endpoint, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ hash }),
      });
      const data = await r.json();
      return data.banned === true;
    } catch(e) {
      return false; // fail open — don't ban if server unreachable
    }
  }

  return { get, checkBan };

})();


// ─── Integration with AntiCheat ───────────────────────────────────────────────
// Patch AntiCheat._report to automatically attach fingerprint to every report.
// Call this ONCE after both scripts are loaded.
async function initAntiCheatWithFingerprint(inputEl, opts = {}) {
  const fp = await DeviceFingerprint.get();

  // Optionally check ban before allowing race
  if (opts.banCheckUrl) {
    const banned = await DeviceFingerprint.checkBan(fp.hash, opts.banCheckUrl);
    if (banned) {
      if (typeof opts.onBanned === 'function') opts.onBanned(fp);
      return null; // caller should block race entry
    }
  }

  // Attach fingerprint to all anticheat reports
  const originalOnBot = opts.onBot;
  opts.onBot = (result) => {
    result.fingerprint = fp;
    if (typeof originalOnBot === 'function') originalOnBot(result);
  };

  const originalOnSuspect = opts.onSuspect;
  opts.onSuspect = (result) => {
    result.fingerprint = fp;
    if (typeof originalOnSuspect === 'function') originalOnSuspect(result);
  };

  AntiCheat.init(inputEl, opts);
  return fp;
}

<script>
(function(){
  // ============ CLIENT-SIDE ROUTER ============
  // Maps URL paths to screen names / actions.
  // Public routes (leaderboard, profile) work without login.
  var PUBLIC_ROUTES = ["/leaderboards", "/leaderboard", "/about"];
  var PROFILE_PREFIX = "/racer/";
  var GUILD_PREFIX = "/guilds/";

  var ROUTE_MAP = {
    "/":            "dashboard",
    "/garage":      "garageCars",
    "/shop":        "shop",
    "/blackmarket": "blackMarket",
    "/friends":     "friends",
    "/guilds":      "guilds",
    "/season":      "season",
    "/achievements":"achievements",
    "/leaderboards":"leaderboard",
    "/leaderboard": "leaderboard",
    "/account":     "account",
    "/about":       "about",
    "/race":        "raceEntry"
  };

  // Navigate to a new URL and update the screen.
  function navigate(path, pushState){
    if(pushState !== false) history.pushState(null, "", path);
    var pathname = path.split("?")[0].split("#")[0];

    // Profile route: /racer/username
    if(pathname.toLowerCase().indexOf(PROFILE_PREFIX) === 0){
      var username = decodeURIComponent(pathname.slice(PROFILE_PREFIX.length));
      if(username){
        state.profileUsername = username;
        state.screen = "profile";
        renderApp();
        return;
      }
    }

    // Guild route: /guilds/TAG
    if(pathname.toLowerCase().indexOf(GUILD_PREFIX) === 0){
      var tag = decodeURIComponent(pathname.slice(GUILD_PREFIX.length));
      if(tag){
        state.guildViewTag = tag;
        state.screen = "guildView";
        renderApp();
        return;
      }
    }

    var screen = ROUTE_MAP[pathname] || "dashboard";
    // If not logged in and the screen requires auth, show auth instead
    if(!state.user && screen !== "leaderboard" && screen !== "profile" && screen !== "about" && screen !== "guildView"){
      screen = "auth";
    }
    state.screen = screen;
    renderApp();
  }

  // Update URL when screen changes without a navigate() call.
  var SCREEN_TO_PATH = {
    "dashboard":    "/garage",
    "garageCars":   "/garage",
    "garageNameTags":"/garage",
    "garageAvatars":"/garage",
    "garageTitles":"/garage",
    "shop":         "/shop",
    "blackMarket":  "/blackmarket",
    "friends":      "/friends",
    "guilds":       "/guilds",
    "season":       "/season",
    "achievements": "/achievements",
    "leaderboard":  "/leaderboards",
    "account":      "/account",
    "about":        "/about",
    "raceWaiting":       "/race",
    "race":              "/race",
    "raceConnectError":  "/race",
    "results":           "/race"
  };

  // Called by renderApp to sync the URL with the current screen.
  function syncUrl(){
    var screen = state.screen;
    var path;
    if(screen === "profile" && state.profileUsername){
      path = PROFILE_PREFIX + encodeURIComponent(state.profileUsername);
    } else if(screen === "guildView" && state.guildViewTag){
      path = GUILD_PREFIX + encodeURIComponent(state.guildViewTag);
    } else {
      path = SCREEN_TO_PATH[screen];
    }
    if(path && window.location.pathname !== path){
      history.pushState(null, "", path);
    }
  }

  // Handle browser back/forward buttons.
  window.addEventListener("popstate", function(){
    navigate(window.location.pathname, false);
  });



  /* ============ DATA ============ */
  // Individual sentences used as building blocks. Each race assembles enough
  // of them to fill a target duration rather than using a fixed passage.
  var SENTENCES = [
    "The quick fox does not simply jump over lazy dogs.",
    "It calculates the perfect arc before launching into the air.",
    "Mechanics in the pit lane tighten every bolt twice.",
    "A loose wheel at top speed forgives no one.",
    "Rain on the windshield turns streetlights into long silver ribbons.",
    "They stretch across the wet asphalt like slow rivers.",
    "A good typist breathes between words.",
    "The fingers rest just long enough to find the next rhythm.",
    "Engines roar to life at dawn.",
    "The garage fills with the smell of oil, rubber, and quiet anticipation.",
    "Somewhere between the third and fourth lap, drivers stop thinking about winning.",
    "They start trusting their hands instead.",
