  var CALIBRATION_PASSAGE =
    "Welcome to the track. This short passage will measure your typing speed " +
    "so future races can be sized just right for you. Type carefully and at " +
    "your natural pace.";

  // Assembles a race passage by joining random sentences until the combined
  // length is at least targetChars. Never repeats a sentence in one race.
  function buildPassage(targetChars){
    var pool = shuffle(SENTENCES.slice());
    var result = [];
    var len = 0;
    var i = 0;
    while(len < targetChars && i < pool.length){
      result.push(pool[i]);
      len += pool[i].length + 1; // +1 for the space
      i++;
    }
    // If we exhausted the pool (very fast typist), cycle through again
    while(len < targetChars){
      var extra = pool[Math.floor(Math.random() * pool.length)];
      result.push(extra);
      len += extra.length + 1;
    }
    return result.join(" ");
  }

  // Returns the WPM to use for sizing the next race.
  // Uses the rolling average of the last 20 races so a single fast or slow
  // race doesn't dramatically spike or crash the next passage length.
  function effectiveWpm(){
    var acc = state.testRaceSession || state.user;
    if(!acc) return 60;
    var recent = acc.recentWpms || [];
    if(recent.length > 0){
      var sum = recent.reduce(function(a,b){ return a+b; }, 0);
      return Math.round(sum / recent.length);
    }
    if(acc.calibratedWpm) return acc.calibratedWpm;
    return 60;
  }

  // Target character count for a 20-second race at a given WPM.
  // chars = (wpm * 5 / 60) * 20  =  wpm * 5/3
  function targetChars(wpm){
    var chars = Math.round(wpm * 5 / 3);
    return Math.max(80, Math.min(350, chars)); // sensible floor/ceiling
  }

  /* ============ CAR MASTERY ============ */
  var MASTERY_TIERS = [
    { name: "None",   min: 0 },
    { name: "Novice", min: 50 },
    { name: "Expert", min: 400 },
    { name: "Master", min: 1000 },
    { name: "Divine", min: 5000 }
  ];

  function masteryRank(races){
    var rank = MASTERY_TIERS[0].name;
    for(var i=0;i<MASTERY_TIERS.length;i++){
      if(races >= MASTERY_TIERS[i].min) rank = MASTERY_TIERS[i].name;
    }
    return rank;
  }

  // Returns {current, next, racesIntoTier, racesForNextTier} for a progress display.
  // next is null when already at the top tier.
  function masteryProgress(races){
    var idx = 0;
    for(var i=0;i<MASTERY_TIERS.length;i++){
      if(races >= MASTERY_TIERS[i].min) idx = i;
    }
    var current = MASTERY_TIERS[idx];
    var next = MASTERY_TIERS[idx+1] || null;
    return {
      current: current.name,
      next: next ? next.name : null,
      nextThreshold: next ? next.min : null
    };
  }

  // Cache for title catalog used in display
  var titleCatalogCache = [];
  function resolveTitle(acc, catalog){
    if(!acc) return null;
    var equipped = acc.equippedTitle || DEFAULT_TITLE_ID;
    if(equipped === DEFAULT_TITLE_ID) return DEFAULT_TITLE;
    return (catalog || titleCatalogCache).find(function(x){ return x.id === equipped; }) || DEFAULT_TITLE;
  }

    if(!acc) return "";
    var t = resolveTitle(acc, catalog);
    if(!t) return "";
    var color = RARITY_COLORS[t.rarity] || "var(--muted)";
    return '<div style="font-size:11px;font-style:italic;font-weight:700;color:' + color + ';line-height:1.2;opacity:0.9;">' + escapeHtml(t.text) + '</div>';
  }

  // Rarities that can never be quick-sold or listed on the Black Market —
  // Exclusive is handmade/special, Achievement is earned (not tradeable),

  // that's already implicit since none of the wheels' tiers lists include

  /* ============ AVATARS ============ */
  // Avatars are 4 stacked layers, bottom to top: shoes, pants, shirt, head.
  // Width is fixed at 46px for every layer; shoes/pants/shirt also have a
  // fixed native height, but head pieces can be taller than the baseline
  // (a tall helmet, hair, etc.), which is why heads get a manual X/Y
  // position set once per piece in the admin tool instead of always
  // rendering at one canonical spot like the other three layers do.
  var AVATAR_SLOTS = ["shoes", "pants", "shirt", "head"]; // bottom-to-top stacking/z-order
  var AVATAR_SLOT_LABELS = { shoes: "Shoes", pants: "Pants", shirt: "Shirt", head: "Head" };
  var AVATAR_SLOT_DIMENSIONS = {
    shoes: { w: 46, h: 6 },
    pants: { w: 46, h: 38 },
    shirt: { w: 46, h: 42 },
    head:  { w: 46, h: 38 } // just the DEFAULT/typical size — actual head pieces can vary, especially in height
  };
  var AVATAR_CANVAS_WIDTH = 46;
  var AVATAR_CANVAS_HEIGHT = 140; // generous headroom above the body so even a tall head piece fits during positioning
  var AVATAR_EDITOR_SCALE = 4; // how much the admin's positioning canvas is zoomed in for easier dragging

  // How many native pixels each upper garment reaches down into the
  // layer below it. These aren't the same value: the default shirt art
  // has a transparent cutout near the bottom-center of its torso (a
  // "window" so the pants' waistband shows through there) that's several
  // rows deep, so the shirt needs to come down far enough for the pants
  // to actually appear inside that window — closing the gap between the
  // shirt's two cuffs takes much more than 1px. The pants/shoes seam has
  // no such cutout (the shapes line up flush already), so a 1px nudge is
  // enough there, purely to tuck the seam under the layer above as
  // requested. If different default art is swapped in later with
  // different cutout depths, these may need to change again — there's no
  // way to derive them from the sprites automatically, since "how deep is
  // the window" isn't something the dimensions alone tell us.
  var AVATAR_SHIRT_OVER_PANTS_PX = 8;
  var AVATAR_PANTS_OVER_SHOES_PX = 1;

  // Canonical top-edge Y (in native, unscaled px) for each fixed-position
  // layer. Shoes are anchored to the canvas floor. Pants sit on top of
  // shoes, pulled up by AVATAR_PANTS_OVER_SHOES_PX so their bottom edge
  // overlaps the shoes' top edge. The shirt sits on top of pants, pulled
  // up by AVATAR_SHIRT_OVER_PANTS_PX for the same reason (see above for
  // why that number is bigger). Paint order in composedAvatarHtml is
  // shoes -> pants -> shirt so each overlap is actually visible on top.
  var AVATAR_SHOES_TOP = AVATAR_CANVAS_HEIGHT - AVATAR_SLOT_DIMENSIONS.shoes.h;
  var AVATAR_PANTS_TOP = AVATAR_SHOES_TOP - AVATAR_SLOT_DIMENSIONS.pants.h + AVATAR_PANTS_OVER_SHOES_PX;
  var AVATAR_SHIRT_TOP = AVATAR_PANTS_TOP - AVATAR_SLOT_DIMENSIONS.shirt.h + AVATAR_SHIRT_OVER_PANTS_PX;

  function rarityIconHtml(rarityName, sizePx){
    var src = RARITY_ICONS[rarityName];
    if(src){
      return '<img src="' + src + '" alt="' + escapeHtml(rarityName) + '" style="width:' + sizePx + 'px;height:' + sizePx + 'px;image-rendering:pixelated;display:block;" />';
    }
    var color = RARITY_COLORS[rarityName] || "#9AA1AB";
    return '<div style="width:' + sizePx + 'px;height:' + sizePx + 'px;border-radius:50%;' +
      'background:' + color + '22;border:2px solid ' + color + ';display:flex;align-items:center;' +
      'justify-content:center;font-size:' + Math.round(sizePx*0.3) + 'px;font-weight:900;color:' + color + ';">' +
      escapeHtml((rarityName || "?").charAt(0)) + '</div>';
  }

  // Renders the rarity NAME text with special per-letter coloring for the
  // two tiers that call for it: Unobtainable gets a rainbow cycle, Ascended
  // gets alternating white/light-gray. Every other tier just gets its
  // single RARITY_COLORS value. Returns inline HTML (spans), not a wrapper.
  var RAINBOW_HUES = [0, 35, 60, 130, 195, 250, 290, 320];
  function rarityTextHtml(rarityName){
    var text = rarityName || "";
    if(rarityName === "Unobtainable"){
      var hueIdx = 0;
      return text.split("").map(function(ch){
        if(ch === " ") return " ";
        var hue = RAINBOW_HUES[hueIdx % RAINBOW_HUES.length];
        hueIdx++;
        return '<span style="color:hsl(' + hue + ',85%,62%);">' + escapeHtml(ch) + '</span>';
      }).join("");
    }
    if(rarityName === "Ascended"){
      var letterIdx = 0;
      return text.split("").map(function(ch){
        if(ch === " ") return " ";
        var color = (letterIdx % 2 === 0) ? "#FFFFFF" : "#C7CCD4";
        letterIdx++;
        return '<span style="color:' + color + ';">' + escapeHtml(ch) + '</span>';
      }).join("");
    }
    if(rarityName === "Admin"){
      var adminLetterIdx = 0;
      return text.split("").map(function(ch){
        if(ch === " ") return " ";
        var isGold = (adminLetterIdx % 2 === 0);
        adminLetterIdx++;
        var color = isGold ? "#D4AF37" : "#ffffff";
        var shadow = isGold
          ? "-1px -1px 0 #8B6914,1px -1px 0 #8B6914,-1px 1px 0 #8B6914,1px 1px 0 #8B6914"
          : "-1px -1px 0 #D4AF37,1px -1px 0 #D4AF37,-1px 1px 0 #D4AF37,1px 1px 0 #D4AF37";
        return '<span style="color:' + color + ';text-shadow:' + shadow + ';font-weight:900;">' + escapeHtml(ch) + '</span>';
      }).join("");
    }
    var color = RARITY_COLORS[rarityName] || "var(--text)";
    return '<span style="color:' + color + ';">' + escapeHtml(text) + '</span>';
  }

  function getWheelConfig(configs, wheelId){
    return (configs || []).find(function(w){ return w.id === wheelId; }) || null;
  }

  // Normalizes a possibly-legacy prize record into the shared reward shape
  // used everywhere else (achievements, season): { rewardType: "car"|
  // "nameTag"|"avatar", rewardCarId, rewardCarName, rewardNameTagImage,
  // rewardNameTagName, rewardAvatarPieceId, rewardAvatarSlot,
  // rewardAvatarName }. Older prizes used carId/carName directly with no
  // rewardType at all — those are read as type "car". Anything that can't
  // resolve to a real car or name tag is dropped.
  function normalizeWheelPrize(p){
    if(p.rewardType === "nameTag" && p.rewardNameTagImage){
      return {
        id: p.id, wheelId: p.wheelId || "great", rarity: p.rarity,
        rewardType: "nameTag",
        rewardNameTagImage: p.rewardNameTagImage,
        rewardNameTagName: p.rewardNameTagName || "Name Tag"
      };
    }
    if(p.rewardType === "avatar" && p.rewardAvatarPieceId){
      return {
        id: p.id, wheelId: p.wheelId || "great", rarity: p.rarity,
        rewardType: "avatar",
        rewardAvatarPieceId: p.rewardAvatarPieceId,
        rewardAvatarSlot: p.rewardAvatarSlot,
        rewardAvatarName: p.rewardAvatarName || "Avatar Piece"
      };
    }
    if(p.rewardType === "title" && p.rewardTitleId){
      return {
        id: p.id, wheelId: p.wheelId || "great", rarity: p.rarity,
        rewardType: "title",
        rewardTitleId: p.rewardTitleId,
        rewardTitleText: p.rewardTitleText || "Title"
      };
    }
    var carId = p.rewardCarId || p.carId || null;
    var carName = p.rewardCarName || p.carName || null;
    if(!carId) return null;
    return {
      id: p.id, wheelId: p.wheelId || "great", rarity: p.rarity,
      rewardType: "car",
      rewardCarId: carId,
      rewardCarName: carName
    };
  }

  function groupWheelPrizesByTier(prizes, tiers){
    var grouped = {};
    tiers.forEach(function(t){ grouped[t] = []; });
    (prizes || []).forEach(function(p){
      if(grouped[p.rarity]) grouped[p.rarity].push(p);
    });
    return grouped;
  }

  // A wheel's tier spans a fixed angular range based on that wheel's own
  // configured weights — this never changes based on how many prizes are in
  // a tier. Adding more Common cars doesn't grow the Common band; they just
  // share it. Returns {start, end} in degrees (0 = top, clockwise).
  function wheelTierAngleRange(wheelConfig, tierName){
    var startPct = 0;
    for(var i=0;i<wheelConfig.tiers.length;i++){
      var t = wheelConfig.tiers[i];
      var w = wheelConfig.weights[t] || 0;
      if(t === tierName) return { start: startPct/100*360, end: (startPct+w)/100*360 };
      startPct += w;
    }
    return { start: 0, end: 0 };
  }

  function pickTierByWheelWeights(wheelConfig){
    var totalWeight = wheelConfig.tiers.reduce(function(s,t){ return s + (wheelConfig.weights[t]||0); }, 0);
    var roll = Math.random() * totalWeight;
    var acc = 0;
    for(var i=0;i<wheelConfig.tiers.length;i++){
      acc += wheelConfig.weights[wheelConfig.tiers[i]] || 0;
      if(roll <= acc) return wheelConfig.tiers[i];
    }
    return wheelConfig.tiers[wheelConfig.tiers.length-1];
  }

  // Picks a winning {tier, prize} for a specific wheel. Bands are always
  // fixed-size (see wheelTierAngleRange), so to keep the needle landing
  // exactly where the result actually lives, this rolls against that
  // wheel's own configured odds and retries (rejection sampling) if it
  // lands on a tier with zero prizes — preserving true relative odds among
  // populated tiers without ever faking where the needle stops. Capped
  // attempts so an all-but-one-empty-tier setup can never hang.
  function rollWheelTierAndPrize(wheelConfig, prizesForWheel){
    var grouped = groupWheelPrizesByTier(prizesForWheel, wheelConfig.tiers);
    var hasAny = wheelConfig.tiers.some(function(t){ return grouped[t].length > 0; });
    if(!hasAny) return null;

    for(var attempt=0; attempt<200; attempt++){
      var tier = pickTierByWheelWeights(wheelConfig);
      if(grouped[tier].length > 0){
        var candidates = grouped[tier];
        return { tier: tier, prize: candidates[Math.floor(Math.random()*candidates.length)] };
      }
    }
    for(var i=0;i<wheelConfig.tiers.length;i++){
      var t2 = wheelConfig.tiers[i];
      if(grouped[t2].length > 0){
        return { tier: t2, prize: grouped[t2][Math.floor(Math.random()*grouped[t2].length)] };
      }
    }
    return null;
  }

  // Builds a wheel's SVG: one band per tier THAT WHEEL INCLUDES, sized by
  // that wheel's own configured weight (never by prize count). Same color
  // treatment as the rarity text/badges elsewhere. Tiers with no prizes
  // added yet are dimmed so it's obvious at a glance what's active.
  function buildWheelSvg(wheelConfig, prizesForWheel, sizePx){
    var size = sizePx || 280, cx = size/2, cy = size/2, r = size/2 - 6;
    var grouped = groupWheelPrizesByTier(prizesForWheel, wheelConfig.tiers);
    var defs = '';
    var slices = wheelConfig.tiers.map(function(tierName){
      var range = wheelTierAngleRange(wheelConfig, tierName);
      var startRad = (range.start - 90) * Math.PI/180, endRad = (range.end - 90) * Math.PI/180;
      var x1 = cx + r*Math.cos(startRad), y1 = cy + r*Math.sin(startRad);
      var x2 = cx + r*Math.cos(endRad), y2 = cy + r*Math.sin(endRad);
      var largeArc = (range.end - range.start) > 180 ? 1 : 0;
      var path = 'M' + cx + ',' + cy + ' L' + x1 + ',' + y1 + ' A' + r + ',' + r + ' 0 ' + largeArc + ' 1 ' + x2 + ',' + y2 + ' Z';

      var fill;
      if(tierName === "Unobtainable"){
        var gid = "wheelRainbow_" + wheelConfig.id;
        defs += '<linearGradient id="' + gid + '" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">' +
          RAINBOW_HUES.map(function(h, hi){
            var pct = Math.round((hi/(RAINBOW_HUES.length-1))*100);
            return '<stop offset="' + pct + '%" stop-color="hsl(' + h + ',85%,62%)"/>';
          }).join("") +
        '</linearGradient>';
        fill = 'url(#' + gid + ')';
      } else if(tierName === "Ascended"){
        var gid2 = "wheelAscended_" + wheelConfig.id;
        defs += '<linearGradient id="' + gid2 + '" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">' +
          '<stop offset="0%" stop-color="#FFFFFF"/><stop offset="50%" stop-color="#C7CCD4"/><stop offset="100%" stop-color="#FFFFFF"/>' +
        '</linearGradient>';
        fill = 'url(#' + gid2 + ')';
      } else {
        fill = RARITY_COLORS[tierName] || "#9AA1AB";
      }
      var opacity = grouped[tierName].length > 0 ? 1 : 0.3;
      return '<path d="' + path + '" fill="' + fill + '" opacity="' + opacity + '" stroke="var(--bg)" stroke-width="2"/>';
    }).join("");

    return '<svg viewBox="0 0 ' + size + ' ' + size + '" width="' + size + '" height="' + size + '">' +
      '<defs>' + defs + '</defs>' +
      slices +
      '<circle cx="' + cx + '" cy="' + cy + '" r="' + r + '" fill="none" stroke="var(--line)" stroke-width="2"/>' +
    '</svg>';
  }

  /* ============ GLOBAL MODAL ============ */
  // A single reusable overlay/modal pair, created lazily and shared by any
  // screen that needs to show a popup (currently: car info).
  function ensureModalRoot(){
    var el = document.getElementById("globalModalOverlay");
    if(el) return el;
    el = document.createElement("div");
    el.id = "globalModalOverlay";
    el.className = "modal-overlay";
    el.style.display = "none";
    el.innerHTML = '<div class="modal-box" id="globalModalBox"></div>';
    el.addEventListener("click", function(e){
      if(e.target === el) closeModal(); // click outside the box closes it
    });
    document.body.appendChild(el);
    return el;
  }

  function openModal(innerHtml){
    var overlay = ensureModalRoot();
    document.getElementById("globalModalBox").innerHTML = innerHtml;
    overlay.style.display = "flex";
  }

  function closeModal(){
    var overlay = document.getElementById("globalModalOverlay");
    if(overlay) overlay.style.display = "none";
  }

  // Builds and shows the car info modal: creator, description, per-car
  // stats for the current player, and mastery rank.
  async function showCarInfoModal(car){
    var acc = state.user;
    var carId = car.id || "starter_car";
    var isStarter = carId === "starter_car";
    var stats = (acc && acc.carStats && acc.carStats[carId]) || { races:0, sumWpm:0, sumAccuracy:0 };
    var races = stats.races || 0;
    var avgWpm = races ? Math.round(stats.sumWpm / races) : 0;
    var avgAcc = races ? Math.round(stats.sumAccuracy / races) : 0;
    var rank = masteryRank(races);
    var prog = masteryProgress(races);
    var rarity = car.rarity || "Common";
    var qty = isStarter ? null : getCarQuantity(acc, carId);
    var sellValue = QUICK_SELL_VALUES[rarity];
    var canQuickSell = !isStarter && qty > 0 && typeof sellValue === "number" && !car.isSeasonal;

    // How many of this car the player already has listed, so we know if
    // there's an unlisted copy left to list right now.
    var alreadyListed = 0;
    if(!isStarter && qty > 0){
      try{
        var listings = await fetchBlackMarketListings();
        alreadyListed = listings.filter(function(l){
          return l.sellerUsername.toLowerCase() === acc.username.toLowerCase() && l.carId === carId;
        }).length;
      }catch(e){ /* if this fails, just don't offer listing right now */ }
    }
    var canList = !isStarter && qty > 0 && UNSELLABLE_RARITIES.indexOf(rarity) === -1 && qty > alreadyListed && !car.isSeasonal;

    var progressHtml = prog.next
      ? '<div style="font-size:11px;color:var(--muted);margin-top:6px;">' +
          (prog.nextThreshold - races) + ' more races to reach ' + escapeHtml(prog.next) +
        '</div>'
      : '<div style="font-size:11px;color:var(--amber);margin-top:6px;">Max rank reached</div>';

    var quantityCardHtml = (qty !== null)
      ? '<div class="stat-card"><div class="num">' + qty + '</div><div class="lbl">Owned</div></div>'
      : '';

    var quickSellHtml = '';
    if(canQuickSell){
      quickSellHtml =
        '<button class="btn btn-ghost btn-block" id="quickSellBtn" data-stage="confirm" style="margin-top:14px;color:var(--red);border-color:var(--red);">' +
          'Quick Sell for ' + COIN_ICON + sellValue + '' +
        '</button>';
    } else if(!isStarter && qty > 0 && (typeof sellValue !== "number" || car.isSeasonal)){
      quickSellHtml = '<div class="hint-text" style="margin-top:14px;margin-bottom:0;text-align:center;">' + (car.isSeasonal ? 'Seasonal' : escapeHtml(rarity)) + ' cars can\u2019t be quick-sold.</div>';
    }

    var listHtml = '';
    if(canList){
      listHtml = '<div id="listSection" style="margin-top:10px;">' +
        '<button class="btn btn-ghost btn-block" id="listOpenBtn">List on Black Market</button>' +
      '</div>';
    } else if(!isStarter && qty > 0 && (UNSELLABLE_RARITIES.indexOf(rarity) !== -1 || car.isSeasonal)){
      listHtml = '<div class="hint-text" style="margin-top:10px;margin-bottom:0;text-align:center;">' + (car.isSeasonal ? 'Seasonal' : escapeHtml(rarity)) + ' cars can\u2019t be listed.</div>';
    }

    var html =
      '<button class="small-btn" id="modalCloseBtn" style="position:absolute;top:14px;right:14px;">\u2715</button>' +
      '<div style="display:flex;align-items:center;justify-content:center;background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:16px;margin-bottom:16px;">' +
        '<div style="width:160px;height:80px;">' + carVisualHtml(car) + '</div>' +
      '</div>' +
      '<div class="garage-title" style="color:var(--text);font-size:19px;margin-bottom:4px;">' + escapeHtml(car.name || "Car") + '</div>' +
      '<div style="font-size:12px;color:var(--muted);margin-bottom:14px;">By ' + escapeHtml(car.creator || "Unknown") + '</div>' +
      (car.description ? '<div style="font-size:13px;color:var(--text);margin-bottom:18px;line-height:1.5;">' + escapeHtml(car.description) + '</div>' : '') +

      '<div style="display:flex;align-items:center;gap:14px;background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:14px;margin-bottom:12px;">' +
        rarityIconHtml(rarity, 40) +
        '<div>' +
          '<div style="font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);">Rarity</div>' +
          '<div style="font-family:\'Arial Black\',Impact,sans-serif;font-style:italic;font-size:18px;">' + rarityTextHtml(rarity) + '</div>' +
          (car.isSeasonal ? '<div style="margin-top:6px;display:inline-block;background:rgba(99,179,237,0.15);border:1px solid #63b3ed;border-radius:6px;padding:3px 10px;font-size:12px;font-weight:700;color:#63b3ed;">\u2744 Seasonal</div>' : '') +
        '</div>' +
      '</div>' +

      '<div style="display:flex;align-items:center;gap:14px;background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:14px;margin-bottom:16px;">' +
        masteryIconHtml(rank, 44) +
        '<div>' +
          '<div style="font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);">Mastery Rank</div>' +
          '<div style="font-family:\'Arial Black\',Impact,sans-serif;font-style:italic;font-size:18px;color:var(--text);">' + escapeHtml(rank) + '</div>' +
          progressHtml +
        '</div>' +
      '</div>' +

      '<div class="stat-grid" style="margin:0;">' +
        '<div class="stat-card"><div class="num">' + races.toLocaleString() + '</div><div class="lbl">Races</div></div>' +
        '<div class="stat-card"><div class="num">' + avgWpm + '</div><div class="lbl">Avg WPM</div></div>' +
        '<div class="stat-card"><div class="num">' + avgAcc + '%</div><div class="lbl">Avg Accuracy</div></div>' +
        quantityCardHtml +
      '</div>' +
      '<div class="error-text" id="quickSellError"></div>' +
      quickSellHtml +
      listHtml;

    openModal(html);
    document.getElementById("modalCloseBtn").addEventListener("click", closeModal);

    if(canQuickSell){
      var sellBtn = document.getElementById("quickSellBtn");
      var revertTimer = null;
      sellBtn.addEventListener("click", async function(){
        if(sellBtn.getAttribute("data-stage") === "confirm"){
          sellBtn.setAttribute("data-stage", "armed");
          sellBtn.textContent = "Click again to confirm";
          sellBtn.style.background = "var(--red)";
          sellBtn.style.color = "#fff";
          revertTimer = setTimeout(function(){
            if(sellBtn && sellBtn.getAttribute("data-stage") === "armed"){
              sellBtn.setAttribute("data-stage", "confirm");
              sellBtn.textContent = "Quick Sell for " + sellValue + " coins";
              sellBtn.style.background = "";
              sellBtn.style.color = "var(--red)";
            }
          }, 4000);
          return;
        }
        // Second click: actually sell.
        clearTimeout(revertTimer);
        sellBtn.disabled = true;
        sellBtn.textContent = "Selling...";
        var errEl = document.getElementById("quickSellError");
        errEl.textContent = "";
        try{
          var latest = await getAccount(acc.username);
          if(!latest.ok || !latest.account){
            errEl.textContent = "Couldn't reach storage. Try again.";
            sellBtn.disabled = false;
            return;
          }
          var freshAcc = latest.account;
          if(getCarQuantity(freshAcc, carId) <= 0){
            errEl.textContent = "You don't own this car anymore.";
            sellBtn.disabled = false;
            return;
          }
          removeCarFromInventory(freshAcc, carId, 1);
          freshAcc.coins = (freshAcc.coins || 0) + sellValue;
          var saveRes = await saveAccount(freshAcc);
          if(!saveRes.ok){
            errEl.textContent = "Couldn't save: " + saveRes.error;
            sellBtn.disabled = false;
            return;
          }
          state.user = freshAcc;
          // If this Quick Sell dropped them below what they have listed on
          // the Black Market, trim the excess listings so nothing stale
          // sits there promising a car they no longer have.
          await pruneSellerListingsForCar(freshAcc.username, carId);
          closeModal();
          if(state.screen === "garageCars") renderGarageCars();
        }catch(e){
          errEl.textContent = "Unexpected error: " + ((e&&e.message)?e.message:String(e));
          sellBtn.disabled = false;
        }
      });
    }

    if(canList){
      document.getElementById("listOpenBtn").addEventListener("click", function(){
        var section = document.getElementById("listSection");
        section.innerHTML =
          '<div class="field" style="margin-top:10px;margin-bottom:8px;">' +
            '<label for="listPriceInModal">Price (coins)</label>' +
            '<input id="listPriceInModal" type="number" min="1" value="500" style="width:100%;background:var(--panel-2);color:var(--text);border:1px solid var(--line);border-radius:8px;padding:11px 12px;font-size:15px;" />' +
          '</div>' +
          '<div style="display:flex;gap:10px;">' +
            '<button class="btn btn-primary" id="listConfirmBtn" style="flex:1;">List</button>' +
            '<button class="btn btn-ghost" id="listCancelBtn" style="flex:0 0 auto;">Cancel</button>' +
          '</div>' +
          '<div class="error-text" id="listModalError"></div>';

        document.getElementById("listCancelBtn").addEventListener("click", function(){
          section.innerHTML = '<button class="btn btn-ghost btn-block" id="listOpenBtnAgain">List on Black Market</button>';
          // Re-show the modal fresh so the open button works again.
          showCarInfoModal(car);
        });

        document.getElementById("listConfirmBtn").addEventListener("click", async function(){
          var priceInput = document.getElementById("listPriceInModal");
          var price = Math.max(1, parseInt(priceInput.value, 10) || 0);
          var errEl = document.getElementById("listModalError");
          errEl.textContent = "";
          var btn = document.getElementById("listConfirmBtn");
          btn.disabled = true; btn.textContent = "Listing...";

          try{
            var latestAcc = await getAccount(acc.username);
            if(!latestAcc.ok || !latestAcc.account){
              errEl.textContent = "Couldn't reach storage.";
              btn.disabled = false; btn.textContent = "List";
              return;
            }
            var freshAcc2 = latestAcc.account;

            var allListings = await fetchBlackMarketListings();
            var alreadyListedNow = allListings.filter(function(l){
              return l.sellerUsername.toLowerCase() === freshAcc2.username.toLowerCase() && l.carId === carId;
            }).length;
            if(getCarQuantity(freshAcc2, carId) <= alreadyListedNow){
              errEl.textContent = "You don't have any unlisted copies of this car left.";
              btn.disabled = false; btn.textContent = "List";
              return;
            }

            allListings.push({
              id: "bm_" + Date.now() + "_" + Math.floor(Math.random()*10000),
              carId: carId, carName: car.name, rarity: rarity,
              price: price, sellerUsername: freshAcc2.username, createdAt: Date.now()
            });
            var saveListRes = await saveBlackMarketListings(allListings);
            if(!saveListRes.ok){
              errEl.textContent = "Couldn't save: " + saveListRes.error;
              btn.disabled = false; btn.textContent = "List";
              return;
            }

            closeModal();
            if(state.screen === "garageCars") renderGarageCars();
          }catch(e){
            errEl.textContent = "Unexpected error: " + ((e&&e.message)?e.message:String(e));
            btn.disabled = false; btn.textContent = "List";
          }
        });
      });
    }
  }

  var CAR_WIDTH_PX = 128; // must match the .car { width } in CSS — full native car resolution now
  var LANE_HEIGHT_PX = 80; // must match the .lane { height } in CSS
  var TRACK_LANE_COUNT = 4; // total lanes shown (1 real racer today, 3 reserved for future opponents)
  var TRACK_FULL_HEIGHT_PX = LANE_HEIGHT_PX * TRACK_LANE_COUNT; // the WHOLE shared road image's recommended height — one PNG spans all 4 lanes, not one per lane
  var CAR_FIXED_LEFT_PX = 20; // where the car starts on screen when a custom track is scrolling beneath it
  // The shared road scrolls continuously and automatically at a constant
  // real-world speed — purely ambient motion, completely independent of
  // typing. It runs via a CSS animation, not JS, so it never pauses just
  // because no keys are being pressed.
  var TRACK_SCROLL_SPEED_PX_PER_SEC = 600;
  // Car choreography over a custom track is two SMOOTH glides, each fired
  // exactly once — not continuously recalculated per keystroke, which is
  // what made it look choppy/stepped before. The first keystroke kicks off
  // a slow glide to lane-center; crossing the finish-approach threshold
  // kicks off a second slow glide toward the lane's far edge. Between
  // those two trigger points the car just holds still at center — no
  // per-character position updates at all.
  var TRACK_PHASE_FINISH_START_FRAC = 0.85;
  var TRACK_START_GLIDE_SECONDS = 1.8;
  // The finish glide's duration isn't fixed — it's estimated from the
  // player's own typing pace so far this race (see startRaceLoop), so the
  // car arrives at the edge close to when they actually finish typing
  // instead of always reaching it after some guessed-at delay. These are
  // just safety bounds so an extreme pace can't make it instant or absurdly slow.

  /* ============ STORAGE LAYER ============ */
  // STORAGE_MODE is decided once, at startup, by detectStorageMode():
  //   "real"   -> window.storage works, accounts persist across reloads and are shared
  //   "memory" -> no working storage bridge found, accounts live only in this tab/session
  var STORAGE_MODE = null;
  var memoryStore = {};

  function accountKey(username){ return "account:" + username.toLowerCase(); }
  function displayNameFor(acc){ return (acc && acc.displayName && acc.displayName.trim()) ? acc.displayName.trim() : (acc ? acc.username : ""); }

  function withTimeout(promise, ms, label){
    return new Promise(function(resolve, reject){
      var timer = setTimeout(function(){
        reject(new Error((label || "Request") + " timed out after " + (ms/1000) + "s"));
      }, ms);
      Promise.resolve(promise).then(
        function(v){ clearTimeout(timer); resolve(v); },
        function(e){ clearTimeout(timer); reject(e); }
      );
    });
  }

  function waitForWindowStorage(timeoutMs){
    return new Promise(function(resolve){
      var start = Date.now();
      function check(){
        if(typeof window.storage !== "undefined" && window.storage !== null &&
           typeof window.storage.get === "function" && typeof window.storage.set === "function"){
          return resolve(true);
        }
        if(Date.now() - start >= timeoutMs) return resolve(false);
        setTimeout(check, 120);
      }
      check();
    });
  }

  // Runs once at startup. Tries a real round-trip write+read; only commits to
  // "real" mode if that actually works, so we never half-trust a broken bridge.
  // Where the game's backend server lives — HTTP API for storage, and a
  // WebSocket at the same host's /race path for live multiplayer (see
  // connectToRaceServer further down). Change this to wherever you
  // deployed the server from the zebra-type-server package.
  var SERVER_URL = "https://pandatype.org"; // <-- CHANGE THIS after deploying, see docs/DEPLOYMENT.md in the server package

  // Sent on every storage request so the server knows whose private data
  // is being read/written, and used to identify this player to the race
  // server too. Set right after a successful login/signup, cleared on
  // logout. NOT a secure session token — see SECURITY_NOTE in the
  // server's server.js for what to upgrade before this handles real
  // money or anything sensitive at scale.
  var currentToken = null; // session token issued by /api/login — sent as x-session-token header

  // Runs once at startup. Pings the real server's /health endpoint —
  // STORAGE_MODE ends up "real" if it answers, "memory" if it's
  // unreachable (server not deployed yet, wrong SERVER_URL, network
  // down, etc.). The in-memory fallback (memoryStore) below means the
  // game still loads and is playable solo even with no server reachable
  // — useful for local UI work — but nothing will persist or sync with
  // anyone else until SERVER_URL points at a real, running server.
  async function detectStorageMode(){
    try{
      var res = await fetch(SERVER_URL + "/health");
      STORAGE_MODE = res.ok ? "real" : "memory";
    }catch(e){
      STORAGE_MODE = "memory";
    }
  }

  async function shimGet(key, shared){
    var url = SERVER_URL + "/api/kv/" + encodeURIComponent(key) + "?shared=" + (shared ? "true" : "false");
    var headers = {};
    if(currentToken) headers["x-session-token"] = currentToken;
    var res = await fetch(url, { headers: headers });
    if(res.status === 404) throw new Error("not found");
    if(!res.ok) throw new Error("storage get failed: " + res.status);
    return await res.json();
  }

  async function shimSet(key, value, shared){
    var url = SERVER_URL + "/api/kv/" + encodeURIComponent(key);
    var headers = { "Content-Type": "application/json" };
    if(currentToken) headers["x-session-token"] = currentToken;
    var res = await fetch(url, {
      method: "POST",
      headers: headers,
      body: JSON.stringify({ value: value, shared: !!shared })
    });
    if(!res.ok) throw new Error("storage set failed: " + res.status);
    return await res.json();
  }

  async function shimList(prefix, shared){
    var url = SERVER_URL + "/api/kv-list?prefix=" + encodeURIComponent(prefix || "") + "&shared=" + (shared ? "true" : "false");
    var headers = {};
    if(currentToken) headers["x-session-token"] = currentToken;
    var res = await fetch(url, { headers: headers });
    if(!res.ok) throw new Error("storage list failed: " + res.status);
    return await res.json();
  }

  async function shimDelete(key, shared){
    var url = SERVER_URL + "/api/kv/" + encodeURIComponent(key) + "?shared=" + (shared ? "true" : "false");
    var headers = {};
    if(currentToken) headers["x-session-token"] = currentToken;
    var res = await fetch(url, {
      method: "DELETE",
      headers: headers
    });
    if(!res.ok) throw new Error("storage delete failed: " + res.status);
    return await res.json();
  }

  async function hashPassword(pw){
    var enc = new TextEncoder().encode(pw);
    var buf = await crypto.subtle.digest("SHA-256", enc);
    var bytes = Array.from(new Uint8Array(buf));
    return bytes.map(function(b){ return b.toString(16).padStart(2,"0"); }).join("");
  }

  async function getLoginChallenge(){
    var res = await fetch(SERVER_URL + "/api/challenge");
    if(!res.ok) throw new Error("Could not get login challenge");
    var data = await res.json();
    return data.nonce;
  }

  async function challengeHash(passwordHash, nonce){
    var enc = new TextEncoder().encode(passwordHash + nonce);
    var buf = await crypto.subtle.digest("SHA-256", enc);
    var bytes = Array.from(new Uint8Array(buf));
    return bytes.map(function(b){ return b.toString(16).padStart(2,"0"); }).join("");
  }

  // Returns {ok:true, account} | {ok:true, account:null} | {ok:false, error}
  async function getAccount(username){
    try{
      var res = await shimGet(accountKey(username), true);
      var parsedAcc = res ? JSON.parse(res.value) : null;
      if(parsedAcc){
        parsedAcc.ownedTitles = parsedAcc.ownedTitles || [];
        if(parsedAcc.ownedTitles.indexOf(DEFAULT_TITLE_ID) === -1) parsedAcc.ownedTitles.unshift(DEFAULT_TITLE_ID);
        if(!parsedAcc.equippedTitle) parsedAcc.equippedTitle = DEFAULT_TITLE_ID;
        // Self-heal: strip stale guild tag if player has no guild
        if(!parsedAcc.guildId && (parsedAcc.guildTag || parsedAcc.guildColor)){
          parsedAcc.guildTag = "";
          parsedAcc.guildColor = "";
          shimSet(accountKey(username), JSON.stringify(parsedAcc), true).catch(function(){});
        }
      }
      return { ok:true, account: parsedAcc };
    }catch(e){
      var msg = (e && e.message) ? e.message : String(e);
      // A "key not found" style error just means no account yet - that's a normal case, not a failure.
      if(/not found|no such key|404/i.test(msg)){
        return { ok:true, account:null };
      }
      return { ok:false, error: msg };
    }
  }

  async function saveAccount(acc){
    try{
      await shimSet(accountKey(acc.username), JSON.stringify(acc), true);
      return { ok:true };
    }catch(e){
      return { ok:false, error: (e && e.message) ? e.message : String(e) };
    }
  }

  async function loadLeaderboard(){
    try{
      var tcRes = await fetchTitleCatalog().catch(function(){ return []; });
      titleCatalogCache = tcRes || [];
      var listRes = await shimList("account:", true);
      if(!listRes || !listRes.keys || !listRes.keys.length) return [];
      var keys = listRes.keys;
      var seasonCfg = await fetchSeasonConfig();
      var dayCutoff = Date.now() - 24*60*60*1000;
      var rows = [];

      // Fetch all accounts in parallel batches of 20 for speed
      var BATCH = 20;
      var allAccounts = [];
      for(var b = 0; b < keys.length; b += BATCH){
        var batch = keys.slice(b, b + BATCH);
        var results = await Promise.all(batch.map(function(key){
          return shimGet(key, true).catch(function(e){
            console.warn("[lb] failed to load", key, e && e.message);
            return null;
          });
        }));
        allAccounts = allAccounts.concat(results);
      }

      for(var i = 0; i < allAccounts.length; i++){
        try{
          var r = allAccounts[i];
          if(!r || !r.value) continue;
          var acc = JSON.parse(r.value);
          var races = acc.races || 0;
          var recentWpms = acc.recentWpms || [];
          var recentAvgWpm = recentWpms.length
            ? Math.round(recentWpms.reduce(function(a,b){ return a+b; },0) / recentWpms.length)
            : (races ? Math.round((acc.sumWpm||0) / races) : 0);

            // Season scope: show whatever is in seasonStats.
            // Don't gate on seasonId match — that causes the leaderboard
            // to blank out whenever the config seasonId is out of sync.
            var ss = acc.seasonStats;
            var seasonRaces = (ss && ss.races) || 0;
            var seasonStats = {
              races: seasonRaces,
              bestWpm: (ss && ss.bestWpm) || 0,
              avgWpm: seasonRaces ? Math.round((ss.sumWpm||0)/seasonRaces) : 0,
              avgAcc: seasonRaces ? Math.round((ss.sumAccuracy||0)/seasonRaces) : 0,
              points: (ss && ss.points) || 0
            };

            // 24-hour scope: derived live from the race log each time.
            var dayRaces = (acc.recentRaceLog || []).filter(function(log){ return log.ts >= dayCutoff; });
            var daySumWpm = dayRaces.reduce(function(s,l){ return s+l.wpm; }, 0);
            var daySumAcc = dayRaces.reduce(function(s,l){ return s+l.accuracy; }, 0);
            var dayBest = dayRaces.reduce(function(m,l){ return Math.max(m,l.wpm); }, 0);
            var dayStats = {
              races: dayRaces.length,
              bestWpm: dayBest,
              avgWpm: dayRaces.length ? Math.round(daySumWpm/dayRaces.length) : 0,
              avgAcc: dayRaces.length ? Math.round(daySumAcc/dayRaces.length) : 0,
              points: dayRaces.reduce(function(sum,r){ return sum + (r.points||0); }, 0)
            };

            if(acc.isBanned || acc.isSuspended) continue; // skip banned/suspended
            var lbTitleEntry = resolveTitle(acc, titleCatalogCache);
            // Strip stale guild tag — can happen if player left guild but tag wasn't cleared
            var lbGuildTag = acc.guildId ? (acc.guildTag || "") : "";
            var lbGuildColor = acc.guildId ? (acc.guildColor || "") : "";
            rows.push({
              username: acc.username,
              displayName: acc.displayName || "",
              guildTag: lbGuildTag,
              guildColor: lbGuildColor,
              equippedTitle: acc.equippedTitle || null,
              titleText: lbTitleEntry ? lbTitleEntry.text : "",
              titleRarity: lbTitleEntry ? lbTitleEntry.rarity : "",
              bestWpm: acc.bestWpm || 0,
              races: races,
              totalPoints: acc.totalPoints || 0,
              avgWpm: recentAvgWpm,
              avgAcc: races ? Math.round((acc.sumAccuracy || 0) / races) : 0,
              sessionRaces: acc.lastRaceAt && (Date.now() - acc.lastRaceAt < 30*60*1000) ? (acc.sessionRaces || 0) : 0,
              bestSession: acc.bestSession || acc.sessionRaces || 0,
              season: seasonStats,
              day: dayStats
            });
        }catch(e){ /* skip unreadable rows */ }
      }
      return rows;
    }catch(e){
      return [];
    }
  }

  // Leaderboard for a single car: only players who've reached Master or
  // Divine rank ON THAT CAR qualify, ranked by mastery points (earned only
  // on races completed after hitting Master).
  async function loadCarMasteryLeaderboard(carId){
    try{
      var listRes = await shimList("account:", true);
      if(!listRes || !listRes.keys || !listRes.keys.length) return [];
      var keys = listRes.keys;
      var rows = [];

      // Fetch all accounts in parallel batches of 20 (same as racing leaderboard)
      var BATCH = 20;
      for(var b = 0; b < keys.length; b += BATCH){
        var batch = keys.slice(b, b + BATCH);
        var results = await Promise.all(batch.map(function(key){
          return shimGet(key, true).catch(function(){ return null; });
        }));
        for(var i = 0; i < results.length; i++){
          try{
            var r = results[i];
            if(!r || !r.value) continue;
            var acc = JSON.parse(r.value);
            if(acc.isBanned || acc.isSuspended) continue;
            var cs = acc.carStats && acc.carStats[carId];
            if(!cs) continue;
            var rank = masteryRank(cs.races || 0);
            if(rank !== "Master" && rank !== "Divine") continue;
            rows.push({
              username: acc.username,
              displayName: acc.displayName || "",
              races: cs.races || 0,
              masteryPoints: Math.round((cs.masteryPoints || 0) * 10) / 10,
              rank: rank
            });
          }catch(e){ /* skip unreadable rows */ }
        }
      }

      rows.sort(function(a,b){ return b.masteryPoints - a.masteryPoints; });
      return rows;
    }catch(e){
      return [];
    }
  }

  // Guild leaderboard: ranked by total team races (the sum of every current
  // member's guild-scoped race count), with the guild's average WPM and
  // accuracy shown as the mean of its members' all-time averages.
  async function loadGuildsLeaderboard(){
    var guilds = await fetchAllGuilds();
    if(!guilds.length) return [];

    var rows = await Promise.all(guilds.map(async function(g){
      var usernames = g.memberUsernames || [];
      var memberResults = await Promise.all(usernames.map(function(u){ return getAccount(u); }));
      // Exclude banned and suspended members from guild totals — their
      // races/points shouldn't count toward the guild leaderboard while
      // they're banned, same as they're excluded from the individual
      // racing leaderboard.
      var members = memberResults
        .filter(function(r){ return r.ok && r.account; })
        .map(function(r){ return r.account; })
        .filter(function(m){ return !m.isBanned && !m.isSuspended; });

      var totalTeamRaces = members.reduce(function(sum, m){
        return sum + ((m.guildStats && m.guildStats.guildId === g.id) ? (m.guildStats.races || 0) : 0);
      }, 0);
      var totalTeamPoints = members.reduce(function(sum, m){
        // Only count points earned since the member joined this guild.
        // guildPointsOffset is saved at join time so pre-join points
        // don't inflate the guild's total.
        var offset = (m.guildStats && m.guildStats.guildId === g.id) ? (m.guildStats.pointsOffset || 0) : (m.totalPoints || 0);
        return sum + Math.max(0, (m.totalPoints || 0) - offset);
      }, 0);
      var avgWpmSum = members.reduce(function(sum, m){
        var races = m.races || 0;
        return sum + (races ? (m.sumWpm||0)/races : 0);
      }, 0);
      var avgAccSum = members.reduce(function(sum, m){
        var races = m.races || 0;
        return sum + (races ? (m.sumAccuracy||0)/races : 0);
      }, 0);

      return {
        id: g.id, tag: g.tag, name: g.name, color: g.color,
        memberCount: members.length,
        teamRaces: totalTeamRaces,
        teamPoints: totalTeamPoints + (g.pointsBonus || 0),
        avgWpm: members.length ? Math.round(avgWpmSum / members.length) : 0,
        avgAcc: members.length ? Math.round(avgAccSum / members.length) : 0
      };
    }));

    rows.sort(function(a,b){ return b.teamPoints - a.teamPoints; });
    return rows;
  }

  // Adds a car or name tag to every wheel whose configured tiers include
  // its rarity — this is the "rarities connect to the wheel automatically"
  // behavior: a Common car just goes wherever Common already lives on each
  // wheel, no manual per-wheel setup needed. Skips any wheel where it's
  // already present (so clicking the button twice is harmless), and skips
  // entirely if the rarity isn't on any wheel at all (e.g. Exclusive).
  async function addCatalogItemToWheel(item, itemType){
    // Seasonal items must never be added to the wheel
    if(item.isSeasonal) return { addedTo: [], reason: "seasonal" };
    var configs = await fetchWheelConfigs();
    var eligibleWheels = configs.filter(function(w){
      if(w.tiers.indexOf(item.rarity) === -1) return false;
      if(w.allowedTypes && w.allowedTypes.indexOf(itemType) === -1) return false;
      return true;
    });
    if(!eligibleWheels.length) return { addedTo: [], reason: "no-eligible-wheel" };

    var prizes = await fetchWheelPrizes();
    var added = [];
    eligibleWheels.forEach(function(w){
      var alreadyThere = prizes.some(function(p){
        if(p.wheelId !== w.id) return false;
        if(itemType === "car") return p.rewardType === "car" && p.rewardCarId === item.id;
        if(itemType === "avatar") return p.rewardType === "avatar" && p.rewardAvatarPieceId === item.id;
        if(itemType === "title") return p.rewardType === "title" && p.rewardTitleId === item.id;
        return p.rewardType === "nameTag" && p.rewardNameTagImage === item.image;
      });
      if(alreadyThere) return;
      var entry = {
        id: "wp_" + Date.now() + "_" + Math.floor(Math.random()*10000) + "_" + w.id,
        wheelId: w.id, rarity: item.rarity, createdAt: Date.now()
      };
      if(itemType === "car"){
        entry.rewardType = "car";
        entry.rewardCarId = item.id;
        entry.rewardCarName = item.name;
      } else if(itemType === "avatar"){
        entry.rewardType = "avatar";
        entry.rewardAvatarPieceId = item.id;
        entry.rewardAvatarSlot = item.slot;
        entry.rewardAvatarName = item.name;
      } else if(itemType === "title"){
        entry.rewardType = "title";
        entry.rewardTitleId = item.id;
        entry.rewardTitleText = item.text;
      } else {
        entry.rewardType = "nameTag";
        entry.rewardNameTagImage = item.image;
        entry.rewardNameTagName = item.name;
      }
      prizes.push(entry);
      added.push(w.label);
    });
    if(added.length){
      var saveRes = await saveWheelPrizes(prizes);
      if(!saveRes.ok) return { addedTo: [], reason: "save-failed", error: saveRes.error };
    }
    return { addedTo: added, reason: added.length ? "ok" : "already-present" };
  }

  // The inverse of addCatalogItemToWheel — strips a car, name tag, or
  // avatar piece off every wheel it currently appears on (regardless of
  // rarity tier), rather than requiring the admin to track down and
  // delete each entry by hand across however many wheels it's on.
  async function removeCatalogItemFromWheel(item, itemType){
    var prizes = await fetchWheelPrizes();
    var matches = prizes.filter(function(p){
      if(itemType === "car") return p.rewardType === "car" && p.rewardCarId === item.id;
      if(itemType === "avatar") return p.rewardType === "avatar" && p.rewardAvatarPieceId === item.id;
      if(itemType === "title") return p.rewardType === "title" && p.rewardTitleId === item.id;
      return p.rewardType === "nameTag" && p.rewardNameTagImage === item.image;
    });
    if(!matches.length) return { removedCount: 0, reason: "not-present" };

    var remaining = prizes.filter(function(p){ return matches.indexOf(p) === -1; });
    var saveRes = await saveWheelPrizes(remaining);
    if(!saveRes.ok) return { removedCount: 0, reason: "save-failed", error: saveRes.error };
    return { removedCount: matches.length, reason: "ok" };
  }

  // Old wheel labels/odds, kept only so fetchWheelConfigs can recognize and
  // auto-migrate any storage that was already seeded before a rename or
  // odds rebalance. A wheel is only migrated if its label matches an old
  // default label OR its weights exactly match a known earlier snapshot —
  // meaning the admin never customized it — so any real edits an admin
  // already made are left completely alone.
  var LEGACY_WHEEL_LABELS = { bad: "Bad Wheel", decent: "Decent Wheel", great: "Great Wheel" };
  var LEGACY_WHEEL_WEIGHT_SNAPSHOTS = {
    bad: [],
    decent: [
      { "Common": 50, "Rare": 30, "Ultra Rare": 16, "Legendary": 3, "Mythic": 0.9, "Ascended": 0.1 },
      { "Common": 48.9583, "Rare": 29.375, "Ultra Rare": 15.6667, "Legendary": 5, "Mythic": 0.9, "Ascended": 0.1 }
    ],
    great: [
      { "Common": 45, "Rare": 30, "Ultra Rare": 20, "Legendary": 3.5, "Mythic": 1, "Ascended": 0.49, "Unobtainable": 0.01 },
      { "Common": 10, "Rare": 49.0943, "Ultra Rare": 32.7296, "Legendary": 5.7277, "Mythic": 1.6365, "Ascended": 0.8019, "Unobtainable": 0.01 }
    ]
  };

  // Fetches the 3 wheel configs (tiers/weights/cost per wheel). If nothing
  // has been saved yet, seeds storage with DEFAULT_WHEEL_CONFIGS so the
  // admin panel has real, persisted, editable records immediately.
  var wheelConfigsCache = null;

  async function fetchWheelConfigs(){
    try{
      var res = await shimGet(WHEEL_CONFIGS_KEY, true);
      if(res && res.value){
        var saved = JSON.parse(res.value);
        if(Array.isArray(saved) && saved.length){
          var migrated = false;
          saved.forEach(function(w){
            var def = DEFAULT_WHEEL_CONFIGS.find(function(d){ return d.id === w.id; });
            if(!def) return;
            var labelIsLegacy = w.label === LEGACY_WHEEL_LABELS[w.id];
            var weightsMatchOldSnapshot = (LEGACY_WHEEL_WEIGHT_SNAPSHOTS[w.id] || []).some(function(snap){
              return JSON.stringify(snap) === JSON.stringify(w.weights);
            });
            if(labelIsLegacy || weightsMatchOldSnapshot){
              w.label = def.label;
              w.weights = def.weights;
              migrated = true;
            }
          });
          // The single "titles" wheel (id: "titles") was an earlier design
          // that's now replaced by three tiered title wheels. If it was
          // already saved from that earlier version, drop it -- and if it
          // ever gained any prizes, roll them into "titles_decent" (the
          // closest equivalent tier) rather than losing them.
          var legacyTitlesIdx = saved.findIndex(function(w){ return w.id === "titles"; });
          var removedLegacyTitles = false;
          if(legacyTitlesIdx !== -1){
            saved.splice(legacyTitlesIdx, 1);
            removedLegacyTitles = true;
            try{
              var legacyPrizes = await fetchWheelPrizes();
              var touchedPrizes = false;
              legacyPrizes.forEach(function(p){
                if(p.wheelId === "titles"){ p.wheelId = "titles_decent"; touchedPrizes = true; }
              });
              if(touchedPrizes) await saveWheelPrizes(legacyPrizes);
            }catch(e){}
          }
          var addedNewDefaults = false;
          DEFAULT_WHEEL_CONFIGS.forEach(function(def){
            var already = saved.some(function(w){ return w.id === def.id; });
            if(!already){
              saved.push(JSON.parse(JSON.stringify(def)));
              addedNewDefaults = true;
            }
          });
          if(migrated || addedNewDefaults || removedLegacyTitles){
            try{ await shimSet(WHEEL_CONFIGS_KEY, JSON.stringify(saved), true); }catch(e){}
          }
          wheelConfigsCache = saved;
          return saved;
        }
      }
    }catch(e){ /* fall through */ }
    // Return cache if available — never overwrite real config with defaults on a failed read
    if(wheelConfigsCache) return wheelConfigsCache;
    // Try backup before falling back to defaults
    try{
      var backupRes = await shimGet("wheel_configs_backup", true);
      if(backupRes && backupRes.value){
        var backupSaved = JSON.parse(backupRes.value);
        if(Array.isArray(backupSaved) && backupSaved.length){
          try{ await shimSet(WHEEL_CONFIGS_KEY, JSON.stringify(backupSaved), true); }catch(e){}
          wheelConfigsCache = backupSaved;
          return backupSaved;
        }
      }
    }catch(e){}
    // Only seed defaults if key truly doesn't exist yet — don't save on read failure
    try{
      var checkRes = await shimGet(WHEEL_CONFIGS_KEY, true);
      if(!checkRes || !checkRes.value){
        await shimSet(WHEEL_CONFIGS_KEY, JSON.stringify(DEFAULT_WHEEL_CONFIGS), true);
      }
    }catch(e){}
    return wheelConfigsCache || DEFAULT_WHEEL_CONFIGS;
  }

  function defaultSeasonConfig(){
    return { name: "Season 1", levels: [], seasonId: Date.now(), seasonEndsAt: null };
  }

  var seasonConfigCache = null; // cached so a failed fetch never triggers a season reset

  async function fetchSeasonConfig(){
    // Try primary key first
    var parsed = null;
    try{
      var res = await shimGet(SEASON_CONFIG_KEY, true);
      if(res && res.value){
        var candidate = JSON.parse(res.value);
        if(candidate && typeof candidate === "object") parsed = candidate;
      }
    }catch(e){}

    // If primary was blank/corrupt, try the backup
    if(!parsed || !parsed.name || parsed.name === "Season 1" && !parsed.levels.length){
      try{
        var backup = await shimGet("season_config_backup", true);
        if(backup && backup.value){
          var backupCandidate = JSON.parse(backup.value);
          if(backupCandidate && typeof backupCandidate === "object" &&
             backupCandidate.seasonId && backupCandidate.name){
            // Backup looks real — restore it to primary
            parsed = backupCandidate;
            try{ await shimSet(SEASON_CONFIG_KEY, JSON.stringify(parsed), true); }catch(e){}
          }
        }
      }catch(e){}
    }

    if(parsed){
      if(!Array.isArray(parsed.levels)) parsed.levels = [];
      if(!parsed.seasonId){
        parsed.seasonId = (seasonConfigCache && seasonConfigCache.seasonId) ? seasonConfigCache.seasonId : Date.now();
        try{ await shimSet(SEASON_CONFIG_KEY, JSON.stringify(parsed), true); }catch(e){}
      }
      seasonConfigCache = parsed;
      return parsed;
    }

    // Nothing on server at all — return cache or in-memory default only,
    // never save a default to the database.
    if(seasonConfigCache) return seasonConfigCache;
    return defaultSeasonConfig();
  }

  async function saveSeasonConfig(cfg){
    try{
      await shimSet(SEASON_CONFIG_KEY, JSON.stringify(cfg), true);
      // Always save a backup so we can recover if the primary gets corrupted
      try{ await shimSet("season_config_backup", JSON.stringify(cfg), true); }catch(e){}
      return { ok:true };
    }catch(e){
      return { ok:false, error:(e&&e.message)?e.message:String(e) };
    }
  }

  // Removes a username from a guild's membership/leadership lists. If the
  // departing player was the leader, promotes the senior co-leader (or, if
  // none, the longest-standing remaining member) to leader. If they were
  // the last member, the guild is deleted outright.
  async function removeMemberFromGuild(guild, username){
    var lower = username.toLowerCase();
    guild.memberUsernames = (guild.memberUsernames || []).filter(function(u){ return u.toLowerCase() !== lower; });
    guild.coLeaderUsernames = (guild.coLeaderUsernames || []).filter(function(u){ return u.toLowerCase() !== lower; });

    if(guild.leaderUsername && guild.leaderUsername.toLowerCase() === lower){
      if(guild.coLeaderUsernames.length){
        guild.leaderUsername = guild.coLeaderUsernames.shift();
      } else if(guild.memberUsernames.length){
        guild.leaderUsername = guild.memberUsernames[0];
      } else {
        guild.leaderUsername = null;
      }
    }

    if(!guild.memberUsernames.length){
      await deleteGuildRecord(guild.id);
      return null;
    }
    await saveGuild(guild);
    return guild;
  }

  // Whenever a player loses copies of a car OUTSIDE the marketplace flow
  // (currently: Quick Sell), any of their own active listings for that car
  // that now exceed what they actually have left need to be removed —
  // otherwise a listing could sit there promising a car that's already
  // gone. Trims oldest-first down to the player's current quantity.
  async function pruneSellerListingsForCar(username, carId){
    try{
      var accRes = await getAccount(username);
      if(!accRes.ok || !accRes.account) return;
      var qty = getCarQuantity(accRes.account, carId);

      var listings = await fetchBlackMarketListings();
      var mine = [];
      var others = [];
      listings.forEach(function(l){
        if(l.sellerUsername.toLowerCase() === username.toLowerCase() && l.carId === carId){
          mine.push(l);
        } else {
          others.push(l);
        }
      });
      if(mine.length <= qty) return; // nothing to prune

      mine.sort(function(a,b){ return (a.createdAt||0) - (b.createdAt||0); });
      var keep = mine.slice(0, qty);
      var pruned = others.concat(keep);
      await saveBlackMarketListings(pruned);
    }catch(e){ /* best-effort cleanup; never block the action that triggered it */ }
  }

  // Check all achievements against the player's current stats after a race.
  // Newly completed ones are granted their reward and marked as earned.
  // Returns an array of newly-earned achievement objects (may be empty).
  // Applies a reward object — shared shape used by both achievements and
  // season levels: { rewardType: "coins"|"car"|"nameTag"|"avatar",
  // rewardCoins, rewardCarId, rewardCarName, rewardNameTagImage,
  // rewardAvatarPieceId, rewardAvatarSlot }.
  function applyReward(acc, reward){
    if(!reward || !reward.rewardType || reward.rewardType === "none") return;
    if(reward.rewardType === "coins" && reward.rewardCoins){
      acc.coins = (acc.coins||0) + parseInt(reward.rewardCoins,10);
    } else if(reward.rewardType === "car" && reward.rewardCarId){
      addCarToInventory(acc, reward.rewardCarId, 1);
    } else if(reward.rewardType === "nameTag" && reward.rewardNameTagImage){
      acc.ownedNameTags = acc.ownedNameTags || [];
      if(acc.ownedNameTags.indexOf(reward.rewardNameTagImage) === -1){
        acc.ownedNameTags.push(reward.rewardNameTagImage);
      }
      // Added to collection only — player equips it manually from the garage.
    } else if(reward.rewardType === "avatar" && reward.rewardAvatarPieceId && reward.rewardAvatarSlot){
      addAvatarPieceToInventory(acc, reward.rewardAvatarSlot, reward.rewardAvatarPieceId);
      // Added to collection only — player equips it manually from the garage.
    } else if(reward.rewardType === "title" && reward.rewardTitleId){
      acc.ownedTitles = acc.ownedTitles || [];
      if(acc.ownedTitles.indexOf(reward.rewardTitleId) === -1) acc.ownedTitles.push(reward.rewardTitleId);
      if(!acc.equippedTitle) acc.equippedTitle = reward.rewardTitleId;
    } else if(reward.rewardType === "freeSpins" && reward.rewardSpinCount){
      acc.freeWheelSpins = (acc.freeWheelSpins||0) + parseInt(reward.rewardSpinCount,10);
    }
  }

  // Short plain-ish text describing a reward, for result pops and lists.
  function rewardSummaryText(reward){
    if(!reward || !reward.rewardType || reward.rewardType === "none") return "No reward";
    if(reward.rewardType === "coins") return COIN_ICON + (reward.rewardCoins||0) + " coins";
    if(reward.rewardType === "car") return "\uD83D\uDE97 " + escapeHtml(reward.rewardCarName || "Car");
    if(reward.rewardType === "nameTag") return "\uD83C\uDFF7\uFE0F Name Tag";
    if(reward.rewardType === "avatar") return "\uD83E\uDDCD " + escapeHtml(reward.rewardAvatarName || "Avatar Piece");
    if(reward.rewardType === "title") return "\uD83D\uDCDC \"" + escapeHtml(reward.rewardTitleText || "Title") + "\"";
    if(reward.rewardType === "freeSpins") return "\uD83C\uDFB0 " + (reward.rewardSpinCount||0) + " Free Wheel Spin" + ((reward.rewardSpinCount===1) ? "" : "s");
    return "Reward";
  }

  async function checkAndGrantAchievements(acc){
    var list = await fetchAchievements();
    if(!list.length) return [];
    acc.earnedAchievementIds = acc.earnedAchievementIds || [];
    var newlyEarned = [];

    for(var i=0;i<list.length;i++){
      var a = list[i];
      if(acc.earnedAchievementIds.indexOf(a.id) !== -1) continue; // already granted

      // Check condition
      var condMet = false;
      // Achievements placed in the "Premium" section ignore whatever
      // condition type/value they're configured with -- moving an
      // achievement into this section is itself what makes it
      // auto-complete, the instant the account has an active premium
      // subscription. This is deliberately checked before the normal
      // condition-type switch below, which never runs for these.
      if(a.section === "Premium"){
        condMet = !!acc.hasPremiumPass;
      } else {
        var val = parseInt(a.conditionValue, 10) || 0;
        if(a.conditionType === "races")    condMet = (acc.races||0) >= val;
        else if(a.conditionType === "bestWpm") condMet = (acc.bestWpm||0) >= val;
        else if(a.conditionType === "ownedCars") condMet = (1 + (acc.ownedCarIds||[]).length) >= val;
        else if(a.conditionType === "coins") condMet = (acc.coins||0) >= val;
        else if(a.conditionType === "bestSession") condMet = (acc.bestSession||0) >= val;
        else if(a.conditionType === "racesWithRarity"){
          var rarityCount = (acc.racesWithRarity && a.conditionRarity) ? (acc.racesWithRarity[a.conditionRarity] || 0) : 0;
          condMet = rarityCount >= val;
        }
      }

      if(!condMet) continue;

      // Grant reward
      acc.earnedAchievementIds.push(a.id);
      applyReward(acc, a);
      newlyEarned.push(a);
    }
    return newlyEarned;
  }

  /* ============ SEASON ============ */
  var RACES_PER_SEASON_LEVEL = 20;
  var SEASON_BONUS_RACE_INTERVAL = 40; // once max level is reached, a bonus repeats every N more races
  var SEASON_BONUS_COINS = 5000;

  // Returns the effective race count for season level calculation,
  // subtracting any admin-applied offset (set by "Reset Season Rewards Progress").
  function seasonRaces(acc){
    // Use the higher of the two calculations to prevent under-counting
    // when seasonStats.races was reset but acc.races - seasonRacesOffset is correct,
    // or vice versa.
    var fromStats = (acc.seasonStats && typeof acc.seasonStats.races === "number") ? acc.seasonStats.races : 0;
    var fromOffset = Math.max(0, (acc.races || 0) - (acc.seasonRacesOffset || 0));
    return Math.max(fromStats, fromOffset);
  }

  // Which season level a given race count has reached (uncapped — can
  // exceed the number of configured levels once the season is "maxed").
  function seasonLevelForRaces(races){
    return Math.floor((races || 0) / RACES_PER_SEASON_LEVEL);
  }

  // Races still needed to reach the next level (0 if already at/above maxLevel).
  function racesUntilNextSeasonLevel(races, maxLevel){
    var reached = seasonLevelForRaces(races);
    if(reached >= maxLevel) return 0;
    return (reached + 1) * RACES_PER_SEASON_LEVEL - (races || 0);
  }

  // Auto-grants every free (and, if owned, premium) level reward the player
  // has reached but not yet been given, plus the repeating bonus once past
  // the season's configured max level. Mirrors checkAndGrantAchievements —
  // called after every race, fully idempotent (safe to call repeatedly).
  async function checkAndGrantSeasonRewards(acc){
    // Auto-expire premium pass if expiry date has passed
    if(acc.hasPremiumPass && acc.premiumExpiresAt && Date.now() > acc.premiumExpiresAt){
      acc.hasPremiumPass = false;
      acc.premiumExpiresAt = null;
    }
    var cfg = await fetchSeasonConfig();
    // Don't grant rewards after season ends
    if(cfg.seasonEndsAt && Date.now() > cfg.seasonEndsAt) return [];
    var levels = cfg.levels || [];
    var maxLevel = levels.length;

    // Self-heal: if seasonRacesOffset somehow exceeds acc.races (can happen
    // if the offset was set but the account never raced since), reset it so
    // new races immediately count toward level progress.
    if((acc.seasonRacesOffset || 0) > (acc.races || 0)){
      acc.seasonRacesOffset = acc.races || 0;
    }

    var reachedLevel = Math.min(seasonLevelForRaces(seasonRaces(acc)), maxLevel);

    acc.seasonFreeClaimedLevel = acc.seasonFreeClaimedLevel || 0;
    acc.seasonPremiumClaimedLevel = acc.seasonPremiumClaimedLevel || 0;
    acc.seasonBonusClaimedCount = acc.seasonBonusClaimedCount || 0;

    // FREE TRACK: if claimed level is behind by more than 1, it means a
    // season reset wiped claimedLevel but the player already owns those rewards.
    // Skip to one below current so only the newest level fires as a notification.
    if(acc.seasonFreeClaimedLevel < reachedLevel - 1){
      acc.seasonFreeClaimedLevel = reachedLevel - 1;
    }

    // PREMIUM TRACK: never skip — always grant all unclaimed back-levels.
    // applyReward is idempotent (can't duplicate cars/titles/coins sensibly),
    // and when premium is newly granted the player deserves all earned levels.

    var granted = [];

    while(acc.seasonFreeClaimedLevel < reachedLevel){
      acc.seasonFreeClaimedLevel++;
      var lvl = levels[acc.seasonFreeClaimedLevel - 1];
      if(lvl && lvl.freeReward){
        applyReward(acc, lvl.freeReward);
        granted.push({ track:"free", level: acc.seasonFreeClaimedLevel, reward: lvl.freeReward });
      }
    }

    if(acc.hasPremiumPass){
      while(acc.seasonPremiumClaimedLevel < reachedLevel){
        acc.seasonPremiumClaimedLevel++;
        var lvl2 = levels[acc.seasonPremiumClaimedLevel - 1];
        if(lvl2 && lvl2.premiumReward){
          applyReward(acc, lvl2.premiumReward);
          granted.push({ track:"premium", level: acc.seasonPremiumClaimedLevel, reward: lvl2.premiumReward });
        }
      }
    }

    if(maxLevel > 0 && seasonRaces(acc) > maxLevel * RACES_PER_SEASON_LEVEL){
      var extraRaces = seasonRaces(acc) - maxLevel * RACES_PER_SEASON_LEVEL;
      var bonusEarned = Math.floor(extraRaces / SEASON_BONUS_RACE_INTERVAL);
      while(acc.seasonBonusClaimedCount < bonusEarned){
        acc.seasonBonusClaimedCount++;
        var bonusReward = { rewardType:"coins", rewardCoins:SEASON_BONUS_COINS };
        applyReward(acc, bonusReward);
        granted.push({ track:"bonus", reward: bonusReward });
      }
    }

    return granted;
  }

  /* ============ UTIL ============ */
  function randInt(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }
  function shuffle(arr){
    var a = arr.slice();
    for(var i=a.length-1;i>0;i--){
      var j = Math.floor(Math.random()*(i+1));
      var t=a[i]; a[i]=a[j]; a[j]=t;
    }
    return a;
  }
  function formatTime(ms){
    var s = Math.max(0, ms/1000);
    var m = Math.floor(s/60);
    var rem = (s - m*60).toFixed(1);
    return m + ":" + (rem<10? "0":"") + rem;
  }
  function escapeHtml(str){
    return String(str).replace(/[&<>"']/g, function(c){

    });
  }

  // Wires a text input to live-filter a <select>'s car options by name.
  // Tries to keep the current selection if it still matches the filter;
  // otherwise falls back to the first visible match. cars is the full,
  // unfiltered list this select should ever offer.
  function attachCarSearchFilter(searchInputId, selectId, cars){
    var searchInput = document.getElementById(searchInputId);
    var select = document.getElementById(selectId);
    if(!searchInput || !select) return;

    function rebuild(){
      var query = searchInput.value.trim().toLowerCase();
      var previousValue = select.value;
      var filtered = query
        ? cars.filter(function(c){ return (c.name||"").toLowerCase().indexOf(query) !== -1; })
        : cars;

      if(!filtered.length){
        select.innerHTML = '<option value="">No matching cars</option>';
        return;
      }

      select.innerHTML = filtered.map(function(c){
        return '<option value="' + escapeHtml(c.id) + '" data-name="' + escapeHtml(c.name) + '">' + escapeHtml(c.name) + '</option>';
      }).join("");

      var stillPresent = filtered.some(function(c){ return c.id === previousValue; });
      if(stillPresent) select.value = previousValue;
    }

    searchInput.addEventListener("input", rebuild);
  }

  /* ============ MULTIPLAYER RACE CONNECTION ============ */
  // Thin wrapper around the WebSocket to the server's /race endpoint
  // (see race.js in the server package for the exact protocol this
  // talks to). One connection per race attempt — opened when the player
  // presses Race, closed once the race room either finishes or the
  // player quits/leaves. Regular players always go through this; only
  // the admin Test Race tool skips it entirely and stays local (see
  // startRace()'s testSession branch).
  var raceSocket = null;

  function raceServerWsUrl(){
    // Same host as SERVER_URL, just swapping the scheme (http->ws,
    // https->wss) and pointing at the /race path race.js listens on.
    return SERVER_URL.replace(/^http/, "ws") + "/race";
  }

  // Opens a connection and wires up the message handlers passed in
  // `handlers` (an object of type -> function(msg)). Resolves once the
  // socket is open and the join_race message has been sent; rejects if
  // the connection can't be established at all (server unreachable,
  // wrong URL, etc.) — callers use that rejection to show the "couldn't
  // reach the race server" error path rather than silently falling back
  // to a local race, per how this is supposed to work for real players.
  function connectToRaceServer(username, carId, handlers){
    return new Promise(function(resolve, reject){
      var settled = false;
      var ws;
      try{
        ws = new WebSocket(raceServerWsUrl());
      }catch(e){
        reject(e);
        return;
      }

      var connectTimeout = setTimeout(function(){
        if(settled) return;
        settled = true;
        try{ ws.close(); }catch(e){}
        reject(new Error("Connection timed out"));
      }, 8000);

      ws.onopen = function(){
        var recentWpms = (state.user && state.user.recentWpms) || [];
        var recentWpm = recentWpms.length
          ? Math.round(recentWpms.reduce(function(a,b){return a+b;},0)/recentWpms.length)
          : (state.user && state.user.races ? Math.round((state.user.sumWpm||0)/(state.user.races||1)) : 60);
        var joinDisplayName = state.user ? displayNameFor(state.user) : "";
        var joinGuildTag = (state.user && state.user.guildTag) || "";
        var joinGuildColor = (state.user && state.user.guildColor) || "";
        var joinTitle = state.user ? resolveTitle(state.user, titleCatalogCache) : null;
        var joinTitleText = (joinTitle && joinTitle.text) ? joinTitle.text : "";
        var joinTitleRarity = (joinTitle && joinTitle.rarity) ? joinTitle.rarity : "";
        ws.send(JSON.stringify({ type: "join_race", username: username, carId: carId, recentWpm: recentWpm, displayName: joinDisplayName, guildTag: joinGuildTag, guildColor: joinGuildColor, titleText: joinTitleText, titleRarity: joinTitleRarity }));
        if(!settled){
          settled = true;
          clearTimeout(connectTimeout);
          raceSocket = ws;
          resolve(ws);
        }
      };

      ws.onmessage = function(ev){
        var msg;
        try{ msg = JSON.parse(ev.data); }catch(e){ return; }
        if(msg && msg.type && handlers[msg.type]) handlers[msg.type](msg);
      };

      ws.onerror = function(){
        if(!settled){
          settled = true;
          clearTimeout(connectTimeout);
          reject(new Error("Couldn't connect to the race server"));
        }
      };

      ws.onclose = function(){
        if(!settled){
          settled = true;
          clearTimeout(connectTimeout);
          reject(new Error("Connection closed before joining"));
        }
        if(handlers.__onclose) handlers.__onclose();
      };
    });
  }

  function closeRaceSocket(){
    if(raceSocket){
      try{ raceSocket.onclose = null; raceSocket.close(); }catch(e){}
      raceSocket = null;
    }
  }

  function sendRaceMessage(msg){
    if(raceSocket && raceSocket.readyState === WebSocket.OPEN){
      raceSocket.send(JSON.stringify(msg));

  function renderApp(){
    syncUrl();

    // Maintenance mode: kick any logged-in user who doesn't have special access.
    if(state.maintenanceMode && !state.isAdmin && state.user &&
       !state.user.isModerator && !state.user.maintenanceAccess){
      state.user = null;
      currentToken = null;
      try{ localStorage.removeItem("zt_session"); }catch(e){}
      state.screen = "auth";
    }

    var isPublicScreen = (state.screen === "leaderboard" || state.screen === "profile");
    if(isPublicScreen && state.maintenanceMode && !state.isAdmin && !state.user){
      if(state.screen !== "auth" && state.screen !== "adminAuth" && state.screen !== "adminAuthLoading"){
        state.screen = "auth";
      }
    }
    if(isPublicScreen && !state.user){
      if(state.screen === "leaderboard") renderLeaderboard();
      else if(state.screen === "profile") renderProfile();
      return;
    }

    if(state.maintenanceMode && !state.isAdmin && !state.user && state.screen !== "auth" && state.screen !== "adminAuth" && state.screen !== "adminAuthLoading" && state.screen !== "profile" && state.screen !== "leaderboard" && state.screen !== "loginConsent"){
      state.screen = "auth";
    }
    if(state.screen === "auth") renderAuth();
    else if(state.screen === "loginConsent") renderLoginConsent();
    else if(state.screen === "dashboard") renderDashboard();

  // Shared nav bar — rendered on every logged-in screen.
  // activeTab: "garage" | "shop" | "leaderboard" | "achievements" | "blackMarket" | "season" | "guilds" | "friends"
  // ── Premium subscription (real payment, via Stripe) ────────────────────
  // Starts a Stripe-hosted checkout page for the Premium Pass subscription.
  // Redirects the whole page there -- Stripe redirects back afterward to
  // either ?premium=success or ?premium=cancelled (handled at boot, below).
  async function startPremiumCheckout(){
    var res = await fetch(SERVER_URL + "/api/create-checkout-session", {
      method: "POST",
      headers: { "x-session-token": currentToken || "" }
    });
    var data = await res.json().catch(function(){ return {}; });
    if(!res.ok || !data.url) throw new Error(data.error || "checkout_failed");
    window.location.href = data.url;
  }

  // Opens Stripe's hosted "manage my subscription" page (cancel, update
  // card, view invoices) for a player who already has an active
  // subscription. Requires the Customer Portal to be turned on once in
  // the Stripe dashboard (Settings -> Billing -> Customer portal).
  async function openBillingPortal(){
    var res = await fetch(SERVER_URL + "/api/create-billing-portal-session", {
      method: "POST",
      headers: { "x-session-token": currentToken || "" }
    });
    var data = await res.json().catch(function(){ return {}; });
    if(!res.ok || !data.url) throw new Error(data.error || "portal_failed");
    window.location.href = data.url;
  }

      msgEl.style.color = "var(--red)";
      var val = document.getElementById("accountDisplayNameInput").value.trim();
      if(val && !/^[a-zA-Z0-9]{4,20}$/.test(val)){
        msgEl.textContent = "Must be 4\u201320 characters, letters and numbers only.";
        return;
      }
      if(containsProfanity(val)){
        msgEl.textContent = "That display name isn\u2019t allowed.";
        return;
      }
      var fresh = await getAccount(acc.username);
      if(!fresh.ok || !fresh.account){ msgEl.textContent = "Couldn't load account."; return; }
      fresh.account.displayName = val;
      var saveRes = await saveAccount(fresh.account);
      if(!saveRes.ok){ msgEl.textContent = "Save failed: " + saveRes.error; return; }
      state.user.displayName = val;
      msgEl.style.color = "var(--green)";
      msgEl.textContent = val ? "Display name saved!" : "Cleared — your username will be shown.";
    });
