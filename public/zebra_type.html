        '<div style="display:flex;flex-direction:column;align-items:center;gap:14px;margin-top:8px;">' +
          '<div style="position:relative;width:200px;height:200px;">' +
            '<div id="wheelSvgWrap_' + wc.id + '">' + buildWheelSvg(wc, prizesForWheel, 200) + '</div>' +
            '<div id="wheelNeedle_' + wc.id + '" style="position:absolute;left:50%;top:50%;width:5px;height:92px;margin-left:-2.5px;margin-top:-92px;transform-origin:50% 100%;transition:transform 4s cubic-bezier(.13,.66,.1,1);">' +
              '<div style="position:absolute;top:0;left:50%;width:0;height:0;border-left:10px solid transparent;border-right:10px solid transparent;border-bottom:20px solid var(--amber);transform:translateX(-50%);"></div>' +
              '<div style="position:absolute;bottom:-7px;left:50%;width:14px;height:14px;border-radius:50%;background:var(--amber);border:2px solid var(--bg);transform:translateX(-50%);"></div>' +
            '</div>' +
          '</div>' +
          '<button class="btn btn-primary" data-spin-wheel="' + wc.id + '" ' + (canSpin ? "" : "disabled style=\"opacity:.5;\"") + '>' +
            (!hasAny ? "No prizes available" : (freeSpins > 0 ? "\uD83C\uDFB0 Spin (Free Roll)" : (COIN_ICON + "Spin for " + wc.costCoins))) +
          '</button>' +
          '<div class="error-text" id="wheelError_' + wc.id + '"></div>' +
        '</div>' +
      '</div>';
    }

    // Wheels are grouped into three sections: Premium (subscriber-only,
    // hidden entirely -- not even shown locked -- for non-subscribers),
    // Titles (wheels that only give out titles), and General (everything
    // else). Generic by wc.premiumOnly / allowedTypes, so any wheel added
    // later sorts into the right group automatically.
    var isPremiumViewer = !!(state.user && state.user.hasPremiumPass);
    var premiumWheels = wheelConfigsCache.filter(function(wc){ return wc.premiumOnly; });
    var generalWheels = wheelConfigsCache.filter(function(wc){ return !wc.premiumOnly && !(wc.allowedTypes && wc.allowedTypes.length === 1 && wc.allowedTypes[0] === "title"); });
    var titleWheels = wheelConfigsCache.filter(function(wc){ return !wc.premiumOnly && wc.allowedTypes && wc.allowedTypes.length === 1 && wc.allowedTypes[0] === "title"; });

    function sectionHeaderHtml(text){
      return '<div class="garage-title" style="color:var(--text);font-size:20px;margin:22px 0 12px;">' + escapeHtml(text) + '</div>';
    }

    var wheelPanelsHtml =
      (isPremiumViewer && premiumWheels.length ? sectionHeaderHtml("Premium") : "") +
      (isPremiumViewer && premiumWheels.length ?
        '<div style="display:flex;flex-wrap:wrap;gap:18px;">' +
          premiumWheels.map(buildWheelPanelHtml).join("") +
        '</div>'
      : "") +
      (generalWheels.length ? sectionHeaderHtml("General") : "") +
      '<div style="display:flex;flex-wrap:wrap;gap:18px;">' +
        generalWheels.map(buildWheelPanelHtml).join("") +
      '</div>' +
      (titleWheels.length ? sectionHeaderHtml("Titles") : "") +
      '<div style="display:flex;flex-wrap:wrap;gap:18px;">' +
        titleWheels.map(buildWheelPanelHtml).join("") +
      '</div>';

    app.innerHTML =
      brandHeader() +
      renderNavBar("shop") +
      shopCoinBar +
      wheelPanelsHtml;

    attachNavListeners();

    document.querySelectorAll("[data-spin-wheel]").forEach(function(spinBtn){
      if(spinBtn.disabled) return;
      var wheelId = spinBtn.getAttribute("data-spin-wheel");
      spinBtn.addEventListener("click", function(){ spinWheel(wheelId, spinBtn); });
    });

    async function spinWheel(wheelId, spinBtn){
      var wc = getWheelConfig(wheelConfigsCache, wheelId);
      if(!wc) return;
      var errEl = document.getElementById("wheelError_" + wheelId);
      errEl.textContent = "";
      spinBtn.disabled = true;
      var originalLabel = spinBtn.innerHTML;
      spinBtn.textContent = "Spinning...";

      try{
        // Re-fetch the account so the coin balance is current, same
        // pattern as any other purchase.
        var latest = await getAccount(acc.username);
        if(!latest.ok || !latest.account){
          errEl.textContent = "Couldn't reach storage. Try again.";
          spinBtn.disabled = false; spinBtn.innerHTML = originalLabel;
          return;
        }
        var freshAcc = latest.account;
        var usingFreeSpin = (freshAcc.freeWheelSpins || 0) > 0;
        if(!usingFreeSpin && (freshAcc.coins || 0) < wc.costCoins){
          errEl.textContent = "Not enough coins.";
          spinBtn.disabled = false; spinBtn.innerHTML = originalLabel;
          return;
        }

        var prizesForWheel = wheelPrizesCache.filter(function(p){
          if(p.wheelId !== wheelId) return false;
          // Never include seasonal cars in the prize pool — even if one was
          // added before it was marked seasonal, it should never be winnable.
          if(p.rewardType === "car" && p.rewardCarId){
            var carEntry = customCarsCache.find(function(c){ return c.id === p.rewardCarId; });
            if(carEntry && carEntry.isSeasonal) return false;
          }
          if(p.rewardType === "nameTag" && p.rewardNameTagImage){
            var ntCatalog = (typeof nameTagCatalogCache !== "undefined" ? nameTagCatalogCache : null) || [];
            var ntEntry = ntCatalog.find(function(t){ return t.image === p.rewardNameTagImage; });
            if(ntEntry && ntEntry.isSeasonal) return false;
          }
          if(p.rewardType === "avatar" && p.rewardAvatarPieceId){
            var avEntry = (avatarCatalogCache||[]).find(function(a){ return a.id === p.rewardAvatarPieceId; });
            if(avEntry && avEntry.isSeasonal) return false;
          }
          return true;
        });
        var result = rollWheelTierAndPrize(wc, prizesForWheel);
        if(!result){
          errEl.textContent = "No prizes are configured yet.";
          spinBtn.disabled = false; spinBtn.innerHTML = originalLabel;
          return;
        }
        var winner = result.prize;
        var winTier = result.tier;

        // Pay for the spin up front -- free rolls are spent before coins.
        if(usingFreeSpin){
          freshAcc.freeWheelSpins = freshAcc.freeWheelSpins - 1;
        } else {
          freshAcc.coins = (freshAcc.coins || 0) - wc.costCoins;
        }
        var payRes = await saveAccount(freshAcc);
        if(!payRes.ok){
          errEl.textContent = "Couldn't save: " + payRes.error;
          spinBtn.disabled = false; spinBtn.innerHTML = originalLabel;
          return;
        }
        state.user = freshAcc;

        // Animate the needle: snap to 0 instantly, then spin several full
        // turns and land at a random position within the winning rarity's band.
        // We add a small margin so it never lands right on the edge.
        var needle = document.getElementById("wheelNeedle_" + wheelId);
        var range = wheelTierAngleRange(wc, winTier);
        var segSize = range.end - range.start;
        var targetAngle = range.start + Math.random() * segSize;
        var spins = 5 + Math.floor(Math.random() * 3); // 5-7 spins for variety
        needle.style.transition = "none";
        needle.style.transform = "rotate(0deg)";
        void needle.offsetWidth; // force reflow so the reset isn't animated
        needle.style.transition = "transform 4s cubic-bezier(.13,.66,.1,1)";
        needle.style.transform = "rotate(" + (spins*360 + targetAngle) + "deg)";

        setTimeout(async function(){
          // Apply the reward — applyReward handles both cars (stacking
          // onto whatever quantity they already have) and name tags.
          var rewardAcc = freshAcc;
          applyReward(rewardAcc, winner);
          var saveRes2 = await saveAccount(rewardAcc);
          if(saveRes2.ok) state.user = rewardAcc;

          var isCarWin = winner.rewardType === "car";
          var isAvatarWin = winner.rewardType === "avatar";
          var isTitleWin = winner.rewardType === "title";
          var wonCar = isCarWin ? customCarsCache.find(function(c){ return c.id === winner.rewardCarId; }) : null;
          var wonAvatarPiece = isAvatarWin ? avatarCatalogCache.find(function(p){ return p.id === winner.rewardAvatarPieceId; }) : null;
          var prizeLabel = isCarWin ? (winner.rewardCarName || "Car")
            : isAvatarWin ? (winner.rewardAvatarName || "Avatar Piece")
            : isTitleWin ? ('\u201C' + (winner.rewardTitleText || "Title") + '\u201D')
            : (winner.rewardNameTagName || "Name Tag");
          var prizeVisual = isCarWin
            ? (wonCar ? '<div style="width:160px;height:80px;">' + carVisualHtml(wonCar) + '</div>' : rarityIconHtml(winner.rarity, 56))
            : isAvatarWin
            ? (wonAvatarPiece ? '<div style="width:120px;height:120px;display:flex;align-items:center;justify-content:center;"><img src="' + wonAvatarPiece.image + '" alt="" style="max-width:100%;max-height:100%;object-fit:contain;image-rendering:pixelated;display:block;" /></div>' : rarityIconHtml(winner.rarity, 56))
            : isTitleWin
            ? ('<div style="font-family:\'Arial Black\',Impact,sans-serif;font-style:italic;font-size:22px;color:' + (RARITY_COLORS[winner.rarity]||"var(--text)") + ';text-align:center;padding:10px 6px;">' + escapeHtml(winner.rewardTitleText || "Title") + '</div>')
            : '<div style="width:200px;height:50px;"><img src="' + winner.rewardNameTagImage + '" alt="" style="width:100%;height:100%;object-fit:contain;display:block;image-rendering:pixelated;" /></div>';
          var ownershipNote = isCarWin
            ? ('You now own ' + getCarQuantity(rewardAcc, winner.rewardCarId))
            : 'Added to your collection \u2014 equip it from the Garage';

          openModal(
            '<button class="small-btn" id="modalCloseBtn" style="position:absolute;top:14px;right:14px;">\u2715</button>' +
            '<div style="text-align:center;">' +
              '<div class="garage-title" style="color:var(--text);font-size:18px;margin-bottom:10px;">You Won!</div>' +
              '<div style="display:flex;justify-content:center;margin-bottom:14px;">' + prizeVisual + '</div>' +
              '<div style="font-weight:700;font-size:16px;margin-bottom:4px;">' + escapeHtml(prizeLabel) + '</div>' +
              '<div style="margin-bottom:10px;">' + rarityTextHtml(winner.rarity) + '</div>' +
              '<div style="color:var(--muted);font-size:12px;">' + ownershipNote + '</div>' +
            '</div>'
          );
          // Re-enable the spin button whenever the modal is dismissed —
          // whether via the X button or clicking outside the modal box.
          function onWinModalClose(){
            spinBtn.disabled = false; spinBtn.innerHTML = originalLabel;
            renderShop();
          }
          document.getElementById("modalCloseBtn").addEventListener("click", function(){
            closeModal();
            onWinModalClose();
          });
          // Hook into click-outside-to-close on the overlay
          var overlay = document.getElementById("globalModalOverlay");
          if(overlay){
            function onOverlayClick(e){
              if(e.target === overlay){
                overlay.removeEventListener("click", onOverlayClick);
                onWinModalClose();
              }
            }
            overlay.addEventListener("click", onOverlayClick);
          }
        }, 4150);
      }catch(e){
        errEl.textContent = "Unexpected error: " + ((e&&e.message)?e.message:String(e));
        spinBtn.disabled = false; spinBtn.innerHTML = originalLabel;
      }
    }

    // Refresh wheel data in the background in case an admin changed
    // something since the last load — but only re-render if something
    // actually changed, otherwise this would re-fetch and re-render
    // forever in an infinite loop.
    Promise.all([fetchWheelPrizes(), fetchWheelConfigs(), fetchCustomCars(), fetchAvatarCatalog()]).then(function(results){
      var newWheelPrizes = results[0];
      var newWheelConfigs = results[1];
      var newCustomCars = results[2];
      var newAvatarCatalog = results[3];
      var changed =
        JSON.stringify(newWheelPrizes) !== JSON.stringify(wheelPrizesCache) ||
        JSON.stringify(newWheelConfigs) !== JSON.stringify(wheelConfigsCache) ||
        JSON.stringify(newCustomCars) !== JSON.stringify(customCarsCache) ||
        JSON.stringify(newAvatarCatalog) !== JSON.stringify(avatarCatalogCache);
      wheelPrizesCache = newWheelPrizes;
      wheelConfigsCache = newWheelConfigs;
      customCarsCache = newCustomCars;
      avatarCatalogCache = newAvatarCatalog;
      if(changed && state.screen === "shop") renderShop();
    });
  }

  /* ============ BLACK MARKET ============ */
  // Players list cars at any price they choose; other players buy them
  // directly. Listings don't lock the seller's copy up front — at purchase
  // time we re-verify the seller still has at least one (minus whatever
  // they've already got listed elsewhere) before finalizing the trade, so a
  // listing can never sell a copy that's already gone.
  function renderBlackMarket(){
    var acc = state.user;
    var coins = acc.coins || 0;

    app.innerHTML =
      brandHeader() +
      renderNavBar("blackMarket") +
      '<div style="display:flex;align-items:center;justify-content:flex-end;margin-bottom:14px;">' +
        '<span style="font-family:\'Arial Black\',Impact,sans-serif;font-style:italic;font-size:16px;color:var(--amber);">' + COIN_ICON + coins.toLocaleString() + '</span>' +
      '</div>' +
      '<div class="panel" style="margin-bottom:18px;">' +
        '<div class="garage-title" style="color:var(--text);font-size:20px;margin-bottom:4px;">\uD83D\uDDA4 Black Market</div>' +
        '<div class="hint-text" style="margin-top:0;">Buy and sell cars, avatar pieces, and name tags. List items from your Garage.</div>' +
      '</div>' +

      '<div class="panel" style="margin-bottom:18px;">' +
        '<div class="garage-title" style="color:var(--text);font-size:17px;margin-bottom:10px;">My Listings</div>' +
        '<div id="myListingsBox"><div class="center-note">Loading...</div></div>' +
      '</div>' +

      '<div class="panel">' +
        '<div class="garage-title" style="color:var(--text);font-size:17px;margin-bottom:12px;">Browse Listings</div>' +
        '<div style="display:flex;flex-wrap:wrap;gap:10px;margin-bottom:14px;">' +
          '<select id="bmFilterType" style="background:var(--panel-2);color:var(--text);border:1px solid var(--line);border-radius:8px;padding:8px 12px;font-size:13px;">' +
            '<option value="">All Types</option>' +
            '<option value="car">Cars</option>' +
            '<option value="avatar">Avatar Pieces</option>' +
            '<option value="nameTag">Name Tags</option>' +
          '</select>' +
          '<select id="bmFilterRarity" style="background:var(--panel-2);color:var(--text);border:1px solid var(--line);border-radius:8px;padding:8px 12px;font-size:13px;">' +
            '<option value="">All Rarities</option>' +
            ["Common","Rare","Ultra Rare","Legendary","Mythic","Ascended","Unobtainable"].map(function(r){ return '<option value="' + r + '">' + r + '</option>'; }).join("") +
          '</select>' +
          '<select id="bmFilterPrice" style="background:var(--panel-2);color:var(--text);border:1px solid var(--line);border-radius:8px;padding:8px 12px;font-size:13px;">' +
            '<option value="">Any Price</option>' +
            '<option value="0-100">Under 100</option>' +
            '<option value="0-500">Under 500</option>' +
            '<option value="0-1000">Under 1,000</option>' +
            '<option value="0-5000">Under 5,000</option>' +
            '<option value="5000-999999">5,000+</option>' +
          '</select>' +
          '<select id="bmFilterAfford" style="background:var(--panel-2);color:var(--text);border:1px solid var(--line);border-radius:8px;padding:8px 12px;font-size:13px;">' +
            '<option value="">All Prices</option>' +
            '<option value="1">Can Afford</option>' +
          '</select>' +
        '</div>' +
        '<div id="browseListingsBox"><div class="center-note">Loading...</div></div>' +
      '</div>';

    attachNavListeners();

    // Fetch both listing sources in parallel
    Promise.all([fetchBlackMarketListings(), fetchBMItemListings()]).then(function(results){
      var carListings = results[0];
      var itemListings = results[1];

      // Normalize car listings to unified format
      var allListings = carListings.map(function(l){
        return {
          id: l.id, listingType: "car", itemType: "car",
          itemId: l.carId, itemName: l.carName, itemImage: null,
          rarity: l.rarity, price: l.price,
          sellerUsername: l.sellerUsername,
          _carListing: l
        };
      }).concat(itemListings.map(function(l){
        return {
          id: l.id, listingType: "item", itemType: l.itemType,
          itemId: l.itemId, itemName: l.itemName, itemImage: l.itemImage,
          rarity: l.rarity, slot: l.slot, price: l.price,
          sellerUsername: l.sellerUsername,
          _itemListing: l
        };
      }));

      // Sort by price ascending
      allListings.sort(function(a,b){ return a.price - b.price; });

      // My listings box
      var myBox = document.getElementById("myListingsBox");
      var mine = allListings.filter(function(l){ return l.sellerUsername.toLowerCase() === acc.username.toLowerCase(); });
      if(myBox){
        myBox.innerHTML = mine.length ? mine.map(function(l){
          var thumb = l.itemType === "car"
            ? (function(){ var car = customCarsCache.find(function(c){ return c.id === l.itemId; }); return '<div class="admin-car-thumb">' + (car ? carVisualHtml(car) : '') + '</div>'; })()
            : '<div class="admin-car-thumb" style="width:80px;height:50px;flex:0 0 80px;display:flex;align-items:center;justify-content:center;"><img src="' + escapeHtml(l.itemImage) + '" style="max-width:100%;max-height:100%;object-fit:contain;image-rendering:pixelated;" /></div>';
          var typeLabel = l.itemType === "car" ? "Car" : l.itemType === "avatar" ? (AVATAR_SLOT_LABELS[l.slot] || "Avatar") : "Name Tag";
          return '<div class="admin-car-row">' +
            thumb +
            '<div style="flex:1;min-width:0;">' +
              '<div style="font-weight:700;font-size:14px;">' + escapeHtml(l.itemName) + '</div>' +
              '<div style="font-size:12px;color:var(--muted);">' + rarityTextHtml(l.rarity) + ' \u2022 ' + typeLabel + ' \u2022 ' + COIN_ICON + l.price.toLocaleString() + '</div>' +
            '</div>' +
            '<button class="small-btn" data-bm-cancel="' + escapeHtml(l.id) + '" data-bm-type="' + l.listingType + '">Cancel</button>' +
          '</div>';
        }).join("") : '<div class="center-note">You have no active listings.</div>';

        myBox.querySelectorAll("[data-bm-cancel]").forEach(function(btn){
          btn.addEventListener("click", async function(){
            var id = btn.getAttribute("data-bm-cancel");
            var type = btn.getAttribute("data-bm-type");
            btn.disabled = true; btn.textContent = "...";
            if(type === "car"){
              var list2 = await fetchBlackMarketListings();
              await saveBlackMarketListings(list2.filter(function(l){ return l.id !== id; }));
            } else {
              var list2 = await fetchBMItemListings();
              await saveBMItemListings(list2.filter(function(l){ return l.id !== id; }));
            }
            renderBlackMarket();
          });
        });
      }

      // Browse box with filters
      var browseBox = document.getElementById("browseListingsBox");
      var others = allListings.filter(function(l){ return l.sellerUsername.toLowerCase() !== acc.username.toLowerCase(); });

      function applyFilters(){
        var typeFilter   = document.getElementById("bmFilterType")   ? document.getElementById("bmFilterType").value   : "";
        var rarityFilter = document.getElementById("bmFilterRarity") ? document.getElementById("bmFilterRarity").value : "";
        var priceFilter  = document.getElementById("bmFilterPrice")  ? document.getElementById("bmFilterPrice").value  : "";
        var affordFilter = document.getElementById("bmFilterAfford") ? document.getElementById("bmFilterAfford").value : "";

        var filtered = others.filter(function(l){
          if(typeFilter   && l.itemType !== typeFilter) return false;
          if(rarityFilter && l.rarity   !== rarityFilter) return false;
          if(priceFilter){
            var parts = priceFilter.split("-");
            var lo = parseInt(parts[0],10), hi = parseInt(parts[1],10);
            if(l.price < lo || l.price > hi) return false;
          }
          if(affordFilter && coins < l.price) return false;
          return true;
        });

        if(!browseBox) return;
        browseBox.innerHTML = filtered.length ? filtered.map(function(l){
          var canAfford = coins >= l.price;
          var thumb = l.itemType === "car"
            ? (function(){ var car = customCarsCache.find(function(c){ return c.id === l.itemId; }); return '<div class="admin-car-thumb">' + (car ? carVisualHtml(car) : '') + '</div>'; })()
            : '<div class="admin-car-thumb" style="width:80px;height:50px;flex:0 0 80px;display:flex;align-items:center;justify-content:center;"><img src="' + escapeHtml(l.itemImage) + '" style="max-width:100%;max-height:100%;object-fit:contain;image-rendering:pixelated;" /></div>';
          var typeLabel = l.itemType === "car" ? "Car" : l.itemType === "avatar" ? (AVATAR_SLOT_LABELS[l.slot] || "Avatar") : "Name Tag";
          return '<div class="admin-car-row">' +
            thumb +
            '<div style="flex:1;min-width:0;">' +
              '<div style="font-weight:700;font-size:14px;">' + escapeHtml(l.itemName) + '</div>' +
              '<div style="font-size:12px;color:var(--muted);">' + rarityTextHtml(l.rarity) + ' \u2022 ' + typeLabel + ' \u2022 ' + COIN_ICON + l.price.toLocaleString() + ' \u2022 sold by ' + clickableUsernameHtml(l.sellerUsername) + '</div>' +
            '</div>' +
            (canAfford
              ? '<button class="small-btn" data-bm-buy="' + escapeHtml(l.id) + '" data-bm-type="' + l.listingType + '">Buy</button>'
              : '<button class="small-btn" disabled style="opacity:.5;">Can\u2019t afford</button>') +
            (state.isAdmin && state.isSuperAdmin
              ? '<button class="small-btn" data-bm-admin-remove="' + escapeHtml(l.id) + '" data-bm-listing-type="' + l.listingType + '" style="color:var(--red);border-color:var(--red);margin-left:4px;" title="Remove listing (keeps item with seller)">\u2715</button>'
              : '') +
          '</div>';
        }).join("") : '<div class="center-note">No listings match your filters.</div>';

        attachProfileLinkListeners(browseBox);

        // Super admin only: remove listing without affecting the seller's inventory
        if(state.isAdmin && state.isSuperAdmin){
          browseBox.querySelectorAll("[data-bm-admin-remove]").forEach(function(btn){
            btn.addEventListener("click", async function(){
              if(!confirm("Remove this listing? The seller keeps their item.")) return;
              btn.disabled = true;
              var id = btn.getAttribute("data-bm-admin-remove");
              var ltype = btn.getAttribute("data-bm-listing-type");
              try{
                if(ltype === "car"){
                  var carListings = await fetchBlackMarketListings();
                  await saveBlackMarketListings(carListings.filter(function(l){ return l.id !== id; }));
                } else {
                  var itemListings = await fetchBMItemListings();
                  await saveBMItemListings(itemListings.filter(function(l){ return l.id !== id; }));
                }
                renderBlackMarket();
              }catch(e){ btn.disabled = false; alert("Failed to remove listing."); }
            });
          });
        }

        browseBox.querySelectorAll("[data-bm-buy]").forEach(function(btn){
          btn.addEventListener("click", async function(){
            var id = btn.getAttribute("data-bm-buy");
            var type = btn.getAttribute("data-bm-type");
            btn.disabled = true; btn.textContent = "Buying...";
            try{
              if(type === "car"){
                // Fetch listings and verify the listing still exists
                var allCarL = await fetchBlackMarketListings();
                var listing = allCarL.find(function(l){ return l.id === id; });
                if(!listing){ btn.textContent = "No longer available"; return; }
                if(listing.sellerUsername.toLowerCase() === acc.username.toLowerCase()){ btn.textContent = "That\u2019s yours"; return; }

                // Check buyer can afford it
                var buyerRes = await getAccount(acc.username);
                if(!buyerRes.ok || !buyerRes.account){ btn.textContent = "Error loading your account"; return; }
                var buyerAcc = buyerRes.account;
                if((buyerAcc.coins||0) < listing.price){ btn.textContent = "Not enough coins"; return; }

                // Fetch seller account
                var sellerRes = await getAccount(listing.sellerUsername);
                if(!sellerRes.ok || !sellerRes.account){ btn.textContent = "Seller not found"; return; }
                var sellerAcc = sellerRes.account;

                // Verify seller still has the car (accounting for their other listings of the same car)
                var otherListingsBySeller = allCarL.filter(function(l){
                  return l.id !== id &&
                    l.sellerUsername.toLowerCase() === sellerAcc.username.toLowerCase() &&
                    l.carId === listing.carId;
                }).length;
                if(getCarQuantity(sellerAcc, listing.carId) <= otherListingsBySeller){
                  btn.textContent = "No longer available";
                  await saveBlackMarketListings(allCarL.filter(function(l){ return l.id !== id; }));
                  renderBlackMarket(); return;
                }

                // Remove listing first (atomic lock), then transfer
                await saveBlackMarketListings(allCarL.filter(function(l){ return l.id !== id; }));
                addCarToInventory(buyerAcc, listing.carId, 1);
                removeCarFromInventory(sellerAcc, listing.carId, 1);
                buyerAcc.coins = (buyerAcc.coins||0) - listing.price;
                sellerAcc.coins = (sellerAcc.coins||0) + listing.price;
                await saveAccount(buyerAcc);
                await saveAccount(sellerAcc);
                state.user = buyerAcc;

              } else {
                // Item buy
                var allItemL = await fetchBMItemListings();
                var listing = allItemL.find(function(l){ return l.id === id; });
                if(!listing){ btn.textContent = "No longer available"; return; }
                if(listing.sellerUsername.toLowerCase() === acc.username.toLowerCase()){ btn.textContent = "That\u2019s yours"; return; }

                var buyerRes = await getAccount(acc.username);
                if(!buyerRes.ok || !buyerRes.account){ btn.textContent = "Error loading your account"; return; }
                var buyerAcc = buyerRes.account;
                if((buyerAcc.coins||0) < listing.price){ btn.textContent = "Not enough coins"; return; }

                var sellerRes = await getAccount(listing.sellerUsername);
                if(!sellerRes.ok || !sellerRes.account){ btn.textContent = "Seller not found"; return; }
                var sellerAcc = sellerRes.account;

                // Remove listing first, then transfer item
                await saveBMItemListings(allItemL.filter(function(l){ return l.id !== id; }));

                if(listing.itemType === "nameTag"){
                  buyerAcc.ownedNameTags = buyerAcc.ownedNameTags || [];
                  if(buyerAcc.ownedNameTags.indexOf(listing.itemImage) === -1) buyerAcc.ownedNameTags.push(listing.itemImage);
                  sellerAcc.ownedNameTags = (sellerAcc.ownedNameTags||[]).filter(function(t){ return t !== listing.itemImage; });
                  if(sellerAcc.equippedNameTag === listing.itemImage) sellerAcc.equippedNameTag = null;
                } else if(listing.itemType === "avatar"){
                  addAvatarPieceToInventory(buyerAcc, listing.slot, listing.itemId);
                  removeAvatarPieceFromInventory(sellerAcc, listing.slot, listing.itemId, 1);
                  if(sellerAcc.equippedAvatar && sellerAcc.equippedAvatar[listing.slot] === listing.itemId) sellerAcc.equippedAvatar[listing.slot] = null;
                }
                buyerAcc.coins = (buyerAcc.coins||0) - listing.price;
                sellerAcc.coins = (sellerAcc.coins||0) + listing.price;
                await saveAccount(buyerAcc);
                await saveAccount(sellerAcc);
                state.user = buyerAcc;
              }
              renderBlackMarket();
            }catch(e){
              btn.disabled = false;
              btn.textContent = "Error \u2014 try again";
              // Show more detail so player knows what happened
              var errMsg = e && e.message ? e.message : String(e);
              if(errMsg.indexOf("404") !== -1 || errMsg.indexOf("not found") !== -1){
                btn.textContent = "Server error \u2014 contact admin";
              }
            }
          });
        });
      }

      applyFilters();
      ["bmFilterType","bmFilterRarity","bmFilterPrice","bmFilterAfford"].forEach(function(id){
        var el = document.getElementById(id);
        if(el) el.addEventListener("change", applyFilters);
      });
    });
  }

  /* ============ SEASON ============ */
  function seasonRewardCellHtml(reward){
    if(!reward || !reward.rewardType || reward.rewardType === "none"){
      return '<div class="season-cell-label" style="color:var(--line);font-size:28px;">\u2014</div>';
    }
    if(reward.rewardType === "coins"){
      return '<div style="font-size:26px;line-height:1;">' + COIN_ICON + '</div>' +
        '<div class="season-cell-label" style="font-size:20px;font-weight:700;">' + (reward.rewardCoins||0) + '</div>';
    }
    if(reward.rewardType === "car"){
      var car = customCarsCache.find(function(c){ return c.id === reward.rewardCarId; });
      return '<div class="season-cell-img">' + (car ? carVisualHtml(car) : '') + '</div>' +
        '<div class="season-cell-label">' + escapeHtml(reward.rewardCarName || "") + '</div>';
    }
    if(reward.rewardType === "nameTag"){
      return '<div class="season-cell-img"><img src="' + reward.rewardNameTagImage + '" alt="" /></div>' +
        '<div class="season-cell-label">' + escapeHtml(reward.rewardNameTagName || "Name Tag") + '</div>';
    }
    if(reward.rewardType === "avatar"){
      var piece = avatarCatalogCache.find(function(p){ return p.id === reward.rewardAvatarPieceId; });
      return '<div class="season-cell-img">' + (piece ? '<img src="' + piece.image + '" alt="" style="image-rendering:pixelated;" />' : '') + '</div>' +
        '<div class="season-cell-label">' + escapeHtml(reward.rewardAvatarName || "Avatar") + '</div>';
    }
    if(reward.rewardType === "title"){
      return '<div class="season-cell-label" style="font-size:22px;">\uD83D\uDCDC</div>' +
        '<div class="season-cell-label" style="font-size:13px;font-style:italic;font-weight:700;">' + escapeHtml(reward.rewardTitleText || "Title") + '</div>';
    }
    if(reward.rewardType === "freeSpins"){
      return '<div style="font-size:26px;line-height:1;">\uD83C\uDFB0</div>' +
        '<div class="season-cell-label" style="font-size:20px;font-weight:700;">x' + (reward.rewardSpinCount||0) + '</div>';
    }
    return '';
  }

  function renderSeason(){
    var acc = state.user;

    app.innerHTML =
      brandHeader() +
      renderNavBar("season") +
      '<div class="panel" id="seasonPanel"><div class="center-note">Loading season...</div></div>';

    attachNavListeners();

    Promise.all([fetchSeasonConfig(), fetchCustomCars(), fetchAvatarCatalog()]).then(function(results){
      var cfg = results[0];
      customCarsCache = results[1];
      avatarCatalogCache = results[2];

      // Show ended banner if season has finished
      var seasonIsOver = cfg.seasonEndsAt && Date.now() > cfg.seasonEndsAt;
      var seasonPanel = document.getElementById("seasonPanel");
      if(seasonIsOver && seasonPanel){
        var endDate = new Date(cfg.seasonEndsAt);
        var bannerDiv = document.createElement("div");
        bannerDiv.style.cssText = "background:rgba(220,38,38,0.12);border:1px solid var(--red);border-radius:10px;padding:14px 18px;margin-bottom:18px;display:flex;align-items:center;gap:12px;";
        bannerDiv.innerHTML = '<span style="font-size:22px;">\u26D4</span><div><div style="font-weight:700;color:var(--red);font-size:15px;">Season Ended</div><div style="font-size:13px;color:var(--muted);">This season ended on ' + endDate.toLocaleString() + '. Races no longer count toward the season leaderboard and no more rewards can be earned.</div></div>';
        seasonPanel.insertBefore(bannerDiv, seasonPanel.firstChild);
      }

      var levels = cfg.levels || [];
      var maxLevel = levels.length;
      var races = seasonRaces(acc);
      var currentLevel = Math.min(seasonLevelForRaces(races), maxLevel);
      var toNext = racesUntilNextSeasonLevel(races, maxLevel);
      var hasPremium = !!acc.hasPremiumPass;

      var freeClaimed = acc.seasonFreeClaimedLevel || 0;
      var premiumClaimed = acc.seasonPremiumClaimedLevel || 0;

      var progressLine = maxLevel === 0
        ? "No season levels have been set up yet."
        : (currentLevel >= maxLevel
            ? "Max level reached \u2014 every " + SEASON_BONUS_RACE_INTERVAL + " more races earns a " + SEASON_BONUS_COINS + "-coin bonus."
            : "Level " + currentLevel + " of " + maxLevel + " \u2014 " + toNext + " more race" + (toNext===1?"":"s") + " to level up.");

      var levelCols = levels.map(function(lvl, i){
        var levelNum = i + 1;
        var freeUnlocked = levelNum <= currentLevel;
        var premiumUnlocked = levelNum <= currentLevel && hasPremium;
        var freeClaimedHere = levelNum <= freeClaimed;
        var premiumClaimedHere = levelNum <= premiumClaimed;

        return '<div class="season-level-col">' +
          '<div class="season-level-num">' + levelNum + '</div>' +
          '<div class="season-cell free' + (freeUnlocked ? "" : " locked") + '">' +
            (freeClaimedHere ? '<div class="season-cell-check">\u2713</div>' : '') +
            seasonRewardCellHtml(lvl.freeReward) +
          '</div>' +
          '<div class="season-cell premium' + (premiumUnlocked ? "" : " locked") + '">' +
            (premiumClaimedHere ? '<div class="season-cell-check">\u2713</div>' : '') +
            seasonRewardCellHtml(lvl.premiumReward) +
          '</div>' +
        '</div>';
      }).join("");

      var bonusCount = acc.seasonBonusClaimedCount || 0;
      var bonusColHtml = maxLevel > 0
        ? '<div class="season-bonus-col">' +

  /* ============ GUILDS ============ */
  async function renderGuildView(){
    var tag = state.guildViewTag;
    app.innerHTML =
      brandHeader() +
      (state.user ? renderNavBar("guilds") : "") +
      '<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">' +
        '<button class="small-btn" id="backFromGuildViewBtn">\u2190 Back</button>' +
        '<span style="font-weight:700;font-size:16px;color:var(--text);">Guild</span>' +
      '</div>' +
      '<div id="guildViewBody"><div class="panel"><div class="center-note">Loading\u2026</div></div></div>';

    if(state.user) attachNavListeners();
    document.getElementById("backFromGuildViewBtn").addEventListener("click", function(){
      history.back();
    });

    // Find guild by tag — reuse the same fetch helper as the guild leaderboard
    var body = document.getElementById("guildViewBody");
    try{
      var allGuilds = await fetchAllGuilds();
      var guild = allGuilds.find(function(g){ return g && g.tag && g.tag.toLowerCase() === tag.toLowerCase(); });

      if(!guild){
        body.innerHTML = '<div class="panel"><div class="center-note">No guild found with tag [' + escapeHtml(tag) + '].</div></div>';
        return;
      }

      var tcList = await fetchTitleCatalog().catch(function(){ return []; });
      titleCatalogCache = tcList || [];

      // Load member accounts for stats
      var memberData = await Promise.all((guild.memberUsernames||[]).map(async function(u){
        try{
          var r = await getAccount(u);
          return r.ok ? r.account : null;
        }catch(e){ return null; }
      }));

      var color = GUILD_COLORS[guild.color] || "#FFD54F";
      var totalRaces = (guild.memberUsernames||[]).reduce(function(sum, u, i){
        var m = memberData[i];
        if(m && (m.isBanned || m.isSuspended)) return sum; // exclude banned/suspended
        return sum + (m && m.guildStats && m.guildStats.guildId === guild.id ? m.guildStats.races : 0);
      }, 0);

      var membersHtml = (guild.memberUsernames||[]).map(function(u, i){
        var m = memberData[i];
        if(!m){
          // Account failed to load — show a faded placeholder row instead
          // of silently dropping them from the roster, with a way to clean
          // up genuinely stale entries (account renamed/deleted elsewhere).
          return '<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--line);opacity:0.6;">' +
            '<div style="flex:1;font-weight:700;color:var(--muted);">' + escapeHtml(u) + ' <span style="font-size:11px;color:var(--red);">(couldn\u2019t load)</span></div>' +
            (state.isSuperAdmin ? '<button class="small-btn" data-remove-stale-member="' + escapeHtml(u) + '" style="color:var(--red);border-color:var(--red);">Remove</button>' : '') +
          '</div>';
        }
        var isLeader = guild.leaderUsername && guild.leaderUsername.toLowerCase() === u.toLowerCase();
        var isCoLeader = (guild.coLeaderUsernames||[]).some(function(x){ return x.toLowerCase() === u.toLowerCase(); });
        var role = isLeader ? "\uD83D\uDC51" : isCoLeader ? "\u2B50" : "";
        var displayName = m ? displayNameFor(m) : u;
        var titleEntry = m ? resolveTitle(m, titleCatalogCache) : null;
        var titleHtml = (titleEntry && titleEntry.text) ? '<div style="font-size:11px;font-style:italic;font-weight:700;color:' + (RARITY_COLORS[titleEntry.rarity]||"var(--muted)") + ';">' + escapeHtml(titleEntry.text) + '</div>' : "";
        var races = m && m.guildStats && m.guildStats.guildId === guild.id ? (m.guildStats.races||0) : 0;
        return '<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--line);">' +
          '<div style="flex:1;">' +
            '<div style="display:flex;align-items:center;gap:6px;">' +
              (role ? '<span style="font-size:14px;">' + role + '</span>' : '') +
              '<a href="/racer/' + encodeURIComponent(u) + '" style="font-weight:700;color:var(--text);text-decoration:none;" onclick="event.preventDefault();navigate(\'/racer/' + encodeURIComponent(u) + '\');">' + escapeHtml(displayName) + '</a>' +
            '</div>' +
            titleHtml +
          '</div>' +
          '<div style="font-size:13px;color:var(--muted);">' + races + ' team race' + (races===1?'':'s') + '</div>' +
        '</div>';
      }).join("");

      body.innerHTML =
        '<div class="panel" style="margin-bottom:18px;border-top:4px solid ' + color + ';">' +
          '<div style="display:flex;align-items:baseline;gap:10px;margin-bottom:4px;">' +
            '<span style="font-family:\'Arial Black\',Impact,sans-serif;font-style:italic;font-size:24px;color:' + color + ';">[' + escapeHtml(guild.tag) + ']</span>' +
            '<span style="font-weight:700;font-size:18px;color:var(--text);">' + escapeHtml(guild.name) + '</span>' +
          '</div>' +
          '<div style="font-size:13px;color:var(--muted);">' + (guild.memberUsernames||[]).length + ' / ' + GUILD_MAX_MEMBERS + ' members \u00b7 ' + totalRaces + ' total team race' + (totalRaces===1?'':'s') + '</div>' +
          (guild.closed ? '<div style="font-size:12px;color:var(--red);margin-top:4px;">\uD83D\uDD12 Closed \u2014 not accepting new members</div>' : '') +
        '</div>' +
        '<div class="panel">' +
          '<div style="font-weight:700;font-size:15px;color:var(--text);margin-bottom:10px;">Members</div>' +
          membersHtml +
        '</div>' +
        (state.user && !state.user.guildId && !guild.closed && (guild.memberUsernames||[]).length < GUILD_MAX_MEMBERS ?
          '<div class="panel" style="margin-top:18px;text-align:center;">' +
            '<button class="btn btn-primary" id="joinFromViewBtn">Request to Join [' + escapeHtml(guild.tag) + ']</button>' +
            '<div id="joinFromViewMsg" style="font-size:13px;margin-top:8px;"></div>' +
          '</div>' : "");

      // Super admin: remove a roster entry whose account couldn't load
      if(state.isSuperAdmin){
        body.querySelectorAll("[data-remove-stale-member]").forEach(function(btn){
          btn.addEventListener("click", async function(){
            var staleUsername = btn.getAttribute("data-remove-stale-member");
            if(!confirm("Remove \"" + staleUsername + "\" from this guild\u2019s roster? This only cleans up the stale entry \u2014 use this if their account no longer exists under this name.")) return;
            btn.disabled = true;
            try{
              var freshGuildForRemoval = await fetchGuild(guild.id);
              if(freshGuildForRemoval){
                var lowerStale = staleUsername.toLowerCase();
                freshGuildForRemoval.memberUsernames = (freshGuildForRemoval.memberUsernames||[]).filter(function(u){ return u.toLowerCase() !== lowerStale; });
                if(freshGuildForRemoval.leaderUsername && freshGuildForRemoval.leaderUsername.toLowerCase() === lowerStale){
                  freshGuildForRemoval.leaderUsername = freshGuildForRemoval.memberUsernames[0] || null;
                }
                if(freshGuildForRemoval.coLeaderUsernames){
                  freshGuildForRemoval.coLeaderUsernames = freshGuildForRemoval.coLeaderUsernames.filter(function(u){ return u.toLowerCase() !== lowerStale; });
                }
                await saveGuild(freshGuildForRemoval);
              }
              renderGuildView();
            }catch(e){ btn.disabled = false; alert("Failed to remove."); }
          });
        });
      }

      var joinBtn = document.getElementById("joinFromViewBtn");
      if(joinBtn) joinBtn.addEventListener("click", async function(){
        joinBtn.disabled = true; joinBtn.textContent = "Sending\u2026";
        var msg = document.getElementById("joinFromViewMsg");
        try{
          var freshGuild = await fetchGuild(guild.id);
          if(!freshGuild){ msg.textContent = "Guild no longer exists."; return; }
          if((freshGuild.memberUsernames||[]).includes(state.user.username.toLowerCase())){ msg.textContent = "You're already a member."; return; }
          freshGuild.pendingRequests = freshGuild.pendingRequests || [];
          if(freshGuild.pendingRequests.includes(state.user.username.toLowerCase())){ msg.style.color="var(--muted)"; msg.textContent = "Request already sent."; return; }
          freshGuild.pendingRequests.push(state.user.username.toLowerCase());
          await saveGuild(freshGuild);
          msg.style.color = "var(--green)";
          msg.textContent = "Request sent!";
          joinBtn.textContent = "Requested";
        }catch(e){
          msg.textContent = "Failed to send request.";
          joinBtn.disabled = false;
          joinBtn.textContent = "Requested";
        }
      });

    }catch(e){
      var errDetail = (e && e.message) ? e.message : String(e);
      body.innerHTML = '<div class="panel"><div class="center-note" style="color:var(--muted);">Couldn\u2019t load guild: ' + escapeHtml(errDetail) + '</div></div>';
    }
  }

  function renderGuilds(){

    app.innerHTML =
      brandHeader() +
      renderNavBar("guilds") +
      '<div id="guildsBody"><div class="panel"><div class="center-note">Loading...</div></div></div>';
    attachNavListeners();

    if(acc.guildId){
