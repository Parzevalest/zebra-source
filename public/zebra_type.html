        renderAccount();
      });
    });

    document.getElementById("changePasswordBtn").addEventListener("click", async function(){
      var pwMsg = document.getElementById("changePasswordMsg");
      pwMsg.style.color = ""; pwMsg.textContent = "";
      var currentPw = document.getElementById("currentPasswordInput").value;
      var newPw = document.getElementById("newPasswordInput").value;
      var confirmPw = document.getElementById("confirmPasswordInput").value;
      if(!currentPw || !newPw || !confirmPw){ pwMsg.textContent = "Fill in all three fields."; return; }
      if(newPw.length < 4){ pwMsg.textContent = "New password must be at least 4 characters."; return; }
      if(newPw !== confirmPw){ pwMsg.textContent = "New passwords don\u2019t match."; return; }
      var currentHash = await hashPassword(currentPw);
      if(currentHash !== acc.passwordHash){ pwMsg.textContent = "Current password is incorrect."; return; }
      var newHash = await hashPassword(newPw);
      var fresh = await getAccount(acc.username);
      if(!fresh.ok || !fresh.account){ pwMsg.textContent = "Couldn\u2019t load account."; return; }
      fresh.account.passwordHash = newHash;
      var saveRes = await saveAccount(fresh.account);
      if(!saveRes.ok){ pwMsg.textContent = "Save failed: " + saveRes.error; return; }
      state.user.passwordHash = newHash;
      acc.passwordHash = newHash;
      document.getElementById("currentPasswordInput").value = "";
      document.getElementById("newPasswordInput").value = "";
      document.getElementById("confirmPasswordInput").value = "";
      pwMsg.style.color = "var(--green)";
      pwMsg.textContent = "Password changed successfully!";
    });
  }

  function attachNavListeners(){
    var loginBtn = document.getElementById("navLoginBtn");
    if(loginBtn) loginBtn.addEventListener("click", function(){ state.screen = "auth"; renderApp(); });
    var raceBtn = document.getElementById("navRaceBtn");
    if(raceBtn) raceBtn.addEventListener("click", function(){ startRace(); });
    var modBtn = document.getElementById("navModBtn");
    if(modBtn) modBtn.addEventListener("click", function(){ openAdminAuth(); });
    // Dropdown menu
    var dropBtn = document.getElementById("navDropdownBtn");
    var dropMenu = document.getElementById("navDropdownMenu");
    if(dropBtn && dropMenu){
      dropBtn.addEventListener("click", function(e){
        e.preventDefault();
        e.stopPropagation();
        dropMenu.classList.toggle("open");
      });
      document.body.addEventListener("click", function(e){
        var wrap = document.getElementById("navDropdownWrap");
        if(wrap && !wrap.contains(e.target)){
          var m = document.getElementById("navDropdownMenu");
          if(m) m.classList.remove("open");
        }
      });
    }
    var navAbout = document.getElementById("navDropAbout");
    if(navAbout) navAbout.addEventListener("click", function(){ if(dropMenu) dropMenu.classList.remove("open"); navigate("/about"); });
    var navDropAccount = document.getElementById("navDropAccount");
    if(navDropAccount) navDropAccount.addEventListener("click", function(){ if(dropMenu) dropMenu.classList.remove("open"); state.accountReturnScreen = state.screen; navigate("/account"); });
    var navDropProfile = document.getElementById("navDropProfile");
    if(navDropProfile) navDropProfile.addEventListener("click", function(){ if(dropMenu) dropMenu.classList.remove("open"); if(state.user) navigate("/racer/" + state.user.username); });
    var logoutBtn = document.getElementById("navDropLogout");
    if(logoutBtn) { var _logoutEl = logoutBtn; } // alias for logout block below
    var logoutBtn = document.getElementById("navLogoutBtn") || document.getElementById("navDropLogout");
    if(logoutBtn) logoutBtn.addEventListener("click", function(){
      // Clear every per-account session cache — otherwise stale data (like
      // a previous account's guild) can leak into whichever account logs
      // in next, until something happens to overwrite it.
      state.user = null;
      currentToken = null;
      try{ localStorage.removeItem("zt_session"); }catch(e){}
      state.userGuild = null;
      state.garageOrder = null;
      state.equippedCarIndex = 0;
      navigate("/", false);
      history.pushState(null, "", "/");
      renderApp();
    });
    document.querySelectorAll("[data-nav]").forEach(function(btn){
      btn.addEventListener("click", function(){
        var nav = btn.getAttribute("data-nav");
        var navPath = {
          garage:"/garage", shop:"/shop", leaderboard:"/leaderboards",
          achievements:"/achievements", blackMarket:"/blackmarket",
          season:"/season", guilds:"/guilds", friends:"/friends"
        }[nav];
        if(navPath) navigate(navPath);
      });
    });
  }

      : "";

      ? 'Accounts are stored so anyone using this game can race and appear on the leaderboard. Don\u2019t reuse a password you use elsewhere \u2014 it\u2019s hashed, but this is a demo, not a vault.'
      : 'Since this session isn\u2019t saving to shared storage, only accounts created in this tab will show up on your leaderboard.';

      brandHeader() +
      '<div class="auth-wrap">' +
        '<div class="panel">' +
          banner +
          '<div class="tabs">' +

            '</div>' +

              (mode==="login" ? "Start Engine" : "Create Account") +
            '</button>' +
          '</form>' +
          '<div class="hint-text">' + hint + '</div>' +
          '<div style="text-align:center;margin-top:14px;">' +

          '</div>' +

    app.querySelectorAll(".tab").forEach(function(tab){
      tab.addEventListener("click", function(){
        state.authMode = tab.getAttribute("data-tab");

      });
    });

    document.getElementById("authForm").addEventListener("submit", function(e){
      e.preventDefault();
      if(mode === "login") handleLogin(); else handleRegister();
    });

    document.getElementById("adminLink").addEventListener("click", function(){
      openAdminAuth();
    });

    // If we just navigated back here from another screen (e.g. the "secret
    // sauce" consent screen deciding "No") carrying an error message that
    // needs to survive the transition, show it now and clear it -- this
    // element is freshly built above with nothing in it otherwise.
    if(state.pendingAuthError){
      document.getElementById("authError").textContent = state.pendingAuthError;
      state.pendingAuthError = null;
    }
  }

  async function handleRegister(){
    var username = document.getElementById("username").value.trim();
    var password = document.getElementById("password").value;
    var errEl = document.getElementById("authError");
    errEl.textContent = "";

    if(state.maintenanceMode && !state.isAdmin){
      errEl.textContent = "Panda Type is currently undergoing maintenance. Only authorized accounts can log in.";
      return;
    }

    if(!/^[a-zA-Z0-9_]{4,20}$/.test(username)){
      errEl.textContent = "Username must be 4\u201320 characters: letters, numbers, underscore.";
      return;
    }
    if(containsProfanity(username)){
      errEl.textContent = "That username isn\u2019t allowed.";
      return;
    }
    if(password.length < 4){
      errEl.textContent = "Password needs to be at least 4 characters.";
      return;
    }

    var submitBtn = document.querySelector("#authForm button");
    submitBtn.disabled = true; submitBtn.textContent = "Checking...";

    try{
      // Check username availability without needing a session
      try{
        var checkRes = await fetch(SERVER_URL + "/api/check-username/" + encodeURIComponent(username.toLowerCase()));
        if(checkRes.ok && (await checkRes.json()).taken){
          errEl.textContent = "That username is already taken.";
          return;
        }
      }catch(e){ /* if check fails, let save attempt handle it */ }

      var passwordHash = await hashPassword(password);
      var fp = null;
      try{ fp = await DeviceFingerprint.get(); }catch(e){ /* fingerprinting failed -- proceed without it, server just won't have a hash to check */ }
      var acc = {
        username: username,
        passwordHash: passwordHash,
        races: 0,
        sumWpm: 0,
        sumAccuracy: 0,
        bestWpm: 0,
        coins: 0,
        ownedCarIds: [],
        carQuantities: {},     // how many of each car the player owns: { [carId]: count }
        equippedNameTag: null, // data URL of their active race name tag; null = use the default
        ownedNameTags: [],     // data URLs of every name tag they've earned
        hasPremiumPass: false,       // admin-granted; gates the premium season reward track
        displayName: "",             // optional public display name; falls back to username if blank
        seasonFreeClaimedLevel: 0,   // highest free season level already granted
        seasonPremiumClaimedLevel: 0,// highest premium season level already granted
        seasonBonusClaimedCount: 0,  // how many post-max-level 40-race bonuses already granted
        recentRaceLog: [],     // [{ts, wpm, accuracy}] trimmed to ~7 days, powers the 24-hour leaderboard
        seasonStats: { seasonId: null, races: 0, sumWpm: 0, sumAccuracy: 0, bestWpm: 0 }, // resets whenever the season's seasonId changes
        guildId: null,          // which guild they're in, if any
        guildStats: { guildId: null, races: 0 }, // "team races" — resets whenever guildId changes
        equippedCarId: "starter_car", // persisted so others (e.g. guild members) can see it, not just session state
        calibratedWpm: null,   // set after the first calibration race
        recentWpms: [],        // last 20 race WPMs, used to size passages and show avg
        carStats: {},          // per-car stats: { [carId]: { races, sumWpm, sumAccuracy } }
        ownedAvatarPieces: { shoes: [], pants: [], shirt: [], head: [] }, // catalog piece ids the player has earned, per slot
        equippedAvatar: { shoes: null, pants: null, shirt: null, head: null }, // catalog piece id per slot; null = use the DEFAULT_AVATAR_PIECES fallback for that slot
        friendUsernames: [],           // accepted friends, both directions store each other here once accepted
        incomingFriendRequests: [],    // usernames who sent *this* account a request, pending accept/decline
        outgoingFriendRequests: [],    // usernames *this* account has requested, pending their response
        pendingCoinNotifications: [],  // [{id, fromUsername, amount, ts}] — unseen "someone sent you coins" popups, shown next time the Garage loads
        createdAt: Date.now()
      };
      var regRes = await fetch(SERVER_URL + "/api/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username: acc.username.toLowerCase(), passwordHash: acc.passwordHash, account: acc, fingerprintHash: fp ? fp.hash : null })
      });
      if(regRes.status === 409){
        errEl.textContent = "That username is already taken.";
        return;
      }
      if(regRes.status === 403){
        var regBanData = await regRes.json().catch(function(){ return {}; });
        errEl.textContent = regBanData.error === "ip_banned" ? "Your IP address has been banned."
          : regBanData.error === "device_banned" ? "This device has been banned."
          : "You are not able to create an account.";
        return;
      }
      if(!regRes.ok){
        errEl.textContent = "Couldn\u2019t save account. Try again.";
        return;
      }
      var regData = await regRes.json();
      currentToken = regData.token;
      try{ localStorage.setItem("zt_session", currentToken); }catch(e){}
      if(fp) acc.deviceFingerprint = fp.hash;

      state.user = acc;
      state.userGuild = null;
      state.screen = "dashboard";
      renderApp();
    }catch(e){
      errEl.textContent = "Unexpected error: " + ((e && e.message) ? e.message : String(e));
    }finally{
      if(state.screen === "auth"){
        submitBtn.disabled = false;
        submitBtn.textContent = "Create Account";
      }
    }
  }

  async function handleLogin(){
    var username = document.getElementById("username").value.trim();
    var password = document.getElementById("password").value;
    var errEl = document.getElementById("authError");
    errEl.textContent = "";

    if(!username || !password){
      errEl.textContent = "Enter a username and password.";
      return;
    }

    var submitBtn = document.querySelector("#authForm button");
    submitBtn.disabled = true; submitBtn.textContent = "Checking...";

    try{
      var hash = await hashPassword(password);
      var nonce = await getLoginChallenge();
      var response = await challengeHash(hash, nonce);
      var loginFp = null;
      try{ loginFp = await DeviceFingerprint.get(); }catch(e){ /* fingerprinting failed -- proceed without it */ }
      var loginRes = await fetch(SERVER_URL + "/api/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username: username.toLowerCase(), challengeResponse: response, nonce: nonce, fingerprintHash: loginFp ? loginFp.hash : null })
      });
      if(loginRes.status === 401){
        errEl.textContent = "Wrong username or password.";
        return;
      }
      if(loginRes.status === 403){
        var banData = await loginRes.json().catch(function(){ return {}; });
        errEl.textContent = banData.error === "ip_banned" ? "Your IP address has been banned."
          : banData.error === "device_banned" ? "This device has been banned."
          : "This account has been banned.";
        return;
      }
      if(!loginRes.ok){
        errEl.textContent = "Couldn\u2019t reach the server. Try again.";
        return;
      }
      var loginData = await loginRes.json();

      // If this account has the "secret sauce" consent flag enabled, hold
      // off on finalizing the login (session token, state.user, etc.) and
      // show the consent screen first. The server has already validated
      // credentials, bans, maintenance, etc. by this point -- all that's
      // left is finalizing, so finalizeLoginAndEnter can run either
      // immediately (below) or later once consent is given.
      if(loginData.account && loginData.account.secretSauceEnabled){
        state.pendingLoginData = loginData;
        state.screen = "loginConsent";
        renderApp();
        return;
      }

      await finalizeLoginAndEnter(loginData);
    }catch(e){
      errEl.textContent = "Unexpected error: " + ((e && e.message) ? e.message : String(e));
    }finally{
      if(state.screen === "auth"){
        submitBtn.disabled = false;
        submitBtn.textContent = "Start Engine";
      }
    }
  }

  // Finalizes a successful login: sets up the session token, applies the
  // maintenance/suspension checks, and enters the dashboard. Split out
  // from handleLogin so the "secret sauce" consent screen can call this
  // same logic after the player confirms, instead of duplicating it.
  async function finalizeLoginAndEnter(loginData){
    currentToken = loginData.token;
    try{ localStorage.setItem("zt_session", currentToken); }catch(e){}

    var acc = loginData.account;
    // Ensure default title
    acc.ownedTitles = acc.ownedTitles || [];
    if(acc.ownedTitles.indexOf(DEFAULT_TITLE_ID) === -1) acc.ownedTitles.unshift(DEFAULT_TITLE_ID);
    if(!acc.equippedTitle) acc.equippedTitle = DEFAULT_TITLE_ID;

    // In maintenance mode, only admins/mods/maintenance-access can log in
    if(state.maintenanceMode && !state.isAdmin && !acc.isModerator && !acc.maintenanceAccess){
      currentToken = null;
      try{ localStorage.removeItem("zt_session"); }catch(e){}
      state.pendingAuthError = "Panda Type is currently undergoing maintenance. Only authorized accounts can log in.";
      state.screen = "auth";
      renderApp();
      return;
    }

    if(acc.isSuspended && acc.suspendedUntil && Date.now() < acc.suspendedUntil){
      currentToken = null;
      try{ localStorage.removeItem("zt_session"); }catch(e){}
      state.pendingAuthError = "Your account is suspended until " + new Date(acc.suspendedUntil).toLocaleString() + ".";
      state.screen = "auth";
      renderApp();
      return;
    }

    state.user = acc;
    try{
      var newlyEarnedOnLogin = await checkAndGrantAchievements(acc);
      if(newlyEarnedOnLogin.length){
        var earnSaveRes = await saveAccount(acc);
        if(earnSaveRes.ok) state.user = acc;
      }
    }catch(e){}
    await refreshUserGuildCache();
    state.screen = "dashboard";
    renderApp();
  }

  // Renders the "secret sauce" consent screen -- shown after credentials
  // are already verified server-side, before the login is actually
  // finalized client-side. Checking "Yes" finalizes the pending login;
  // "No" discards the already-issued session token and returns to the
  // login screen as if nothing happened.
  function renderLoginConsent(){
    app.innerHTML =
      brandHeader() +
      '<div class="panel" style="max-width:440px;margin:60px auto;text-align:center;">' +
        '<div class="garage-title" style="color:var(--text);font-size:20px;margin-bottom:14px;">You are about to be molested.</div>' +
        '<div style="color:var(--muted);font-size:15px;margin-bottom:22px;">Do you consent?</div>' +
        '<label style="display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:24px;cursor:pointer;font-size:15px;color:var(--text);">' +
          '<input type="checkbox" id="loginConsentYes" style="width:20px;height:20px;cursor:pointer;" />' +
          'Yes' +
        '</label>' +
        '<div style="display:flex;gap:12px;justify-content:center;">' +
          '<button class="btn btn-ghost" id="loginConsentNoBtn">No</button>' +
        '</div>' +
        '<div class="error-text" id="loginConsentError" style="margin-top:14px;"></div>' +
      '</div>';

    document.getElementById("loginConsentYes").addEventListener("change", async function(){
      if(!this.checked) return;
      var data = state.pendingLoginData;
      state.pendingLoginData = null;
      if(!data){
        state.pendingAuthError = "Something went wrong -- please log in again.";
        state.screen = "auth";
        renderApp();
        return;
      }
      await finalizeLoginAndEnter(data);
    });

    document.getElementById("loginConsentNoBtn").addEventListener("click", async function(){
      var data = state.pendingLoginData;
      state.pendingLoginData = null;
      // The server already issued a valid session token for this login
      // attempt before we knew the player's answer -- explicitly log it
      // out server-side rather than just discarding it client-side, so
      // it can't be reused.
      if(data && data.token){
        try{
          await fetch(SERVER_URL + "/api/logout", {
            method: "POST",
            headers: { "x-session-token": data.token }
          });
        }catch(e){}
      }
      currentToken = null;
      try{ localStorage.removeItem("zt_session"); }catch(e){}
      state.screen = "auth";
      renderApp();
    });
  }

  /* ============ GARAGE (original car icons, no copied artwork) ============ */
  // Default fallback image shown for any catalog car that has no uploaded
  // image of its own (e.g. added without a file). Used instead of the old
  // generated-color-icon system.

  /* ============ RACE NAME TAGS ============ */
  // Every racer (player and bots) shows a small name tag next to their car
  // during a race. The base tag below is the default every player has;
  // achievements can grant alternate tag designs (admin-uploaded, also
  // 256x64) which become the player's equipped tag once earned.
  var DEFAULT_NAME_TAG = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAQAAAABACAYAAAD1Xam+AAAAAXNSR0IArs4c6QAAAERlWElmTU0AKgAAAAgAAYdpAAQAAAABAAAAGgAAAAAAA6ABAAMAAAABAAEAAKACAAQAAAABAAABAKADAAQAAAABAAAAQAAAAAD0RZGlAAAChUlEQVR4Ae3WwXGjQBQEUMmxkQCRkgC5yTWu4s5gtam2ni7eg+bTvF/Tq8fDhwABAgQIECBAgAABAgQIECBAgACBfy3wvPp267q+rp51jgCB9wps23bpLl86dFz+ZVne+xamESAwLbDv+8+ZKyUwXQDj8rv40ztygEBcYBTBbAlMFYDLH9+hBxD4lcBsCXydfdrxs//s932PAIF7BGbu6ukCGK/ip/89C/VUAmcFZu/oVAGcDeF7BAh0CCiAjj1JSSAioAAirIYS6BBQAB17kpJAREABRFgNJdAhoAA69iQlgYiAAoiwGkqgQ0ABdOxJSgIRAQUQYTWUQIeAAujYk5QEIgIKIMJqKIEOAQXQsScpCUQEFECE1VACHQIKoGNPUhKICCiACKuhBDoEFEDHnqQkEBFQABFWQwl0CCiAjj1JSSAioAAirIYS6BBQAB17kpJAREABRFgNJdAhoAA69iQlgYiAAoiwGkqgQ0ABdOxJSgIRAQUQYTWUQIeAAujYk5QEIgIKIMJqKIEOAQXQsScpCUQEFECE1VACHQIKoGNPUhKICCiACKuhBDoEFEDHnqQkEBFQABFWQwl0CCiAjj1JSSAioAAirIYS6BBQAB17kpJAREABRFgNJdAhoAA69iQlgYiAAoiwGkqgQ0ABdOxJSgIRAQUQYTWUQIeAAujYk5QEIgIKIMJqKIEOgakC2Pe9462kJPChArN39HQBbNv2/FBTr02gSmDmrk5f6nVdX8uyVIEIS+ATBMb//jOXf5hMF8A4NEpg/FUEQ8GHwL0Cx8/+2cs/Ul8qgHHwKIHxbx8CBO4VuHL5703s6QQIECBAgAABAgQIECBAgAABAgQI/InAN1j6OWYeW4CrAAAAAElFTkSuQmCC";
  var DEFAULT_TITLE_ID = "zebra_typist_default";
  var DEFAULT_TITLE = { id: "zebra_typist_default", text: "Panda Typist", rarity: "Common", isDefault: true };

  // Names get cut short on the small in-race tag rather than overflowing —
  // longer names end in "..." once they exceed this length. Doubled
  // alongside the wider 256x64 tags (was 8 / 5 at 128x64).
  var NAME_TAG_MAX_CHARS = 22;
  function truncateForNameTag(name, maxChars){
    name = name || "";
    var max = maxChars || NAME_TAG_MAX_CHARS;
    if(name.length <= max) return name;
    return name.slice(0, Math.max(1, max - 3)) + "...";
  }

  // Builds the name tag element shown beside a car on the track: the tag
  // image as a background with the (possibly truncated) name overlaid.
  // White text with a dark outline stays legible on any tag background,
  // since admins can upload arbitrary tag art later. If the racer is in a
  // guild, their tag is shown as a colored bracketed prefix, and the
  // username gets a slightly shorter allowance to make room for it.
  function nameTagHtml(imageSrc, name, guildTag, guildColor, titleText, titleRarity){
    var maxNameChars = guildTag ? 14 : NAME_TAG_MAX_CHARS;
    var label = truncateForNameTag(name, maxNameChars);
    var prefix = guildTag
      ? '<span data-guild-tag-click="' + escapeHtml(guildTag) + '" style="color:' + (guildColor || "#FFD54F") + ';cursor:pointer;">[' + escapeHtml(guildTag) + ']</span> '
      : '';
    var titleEl = titleText
      ? '<span style="font-size:9px;font-style:italic;font-weight:700;color:' + (RARITY_COLORS[titleRarity]||'#fff') + ';text-shadow:-1px -1px 0 #000,1px -1px 0 #000,-1px 1px 0 #000,1px 1px 0 #000;line-height:1;">' + escapeHtml(titleText) + '</span>'
      : '';
    return '<div class="car-nametag">' +
      '<img src="' + (imageSrc || DEFAULT_NAME_TAG) + '" alt="" />' +
      '<div class="car-nametag-text">' +
        '<span>' + prefix + escapeHtml(label) + '</span>' +
        titleEl +
      '</div>' +
    '</div>';
  }

  // A small original side-view car silhouette - not based on any specific
  // game's artwork. 2:1 aspect ratio (128x64) to match uploaded car images.
  function carIconSvg(primary, accent){
    var pattern = arguments.length > 2 ? arguments[2] : "solid";
    var overlay = "";
    if(pattern === "stripe"){
      overlay = '<rect x="10" y="40" width="108" height="6" rx="2" fill="' + accent + '" opacity="0.9"/>';
    } else if(pattern === "split"){
      overlay = '<path d="M70,30 H114 Q120,30 120,36 L120,42 Q120,48 114,48 H70 Z" fill="' + accent + '" opacity="0.85"/>';
    }
    return '<svg viewBox="0 0 128 64" xmlns="http://www.w3.org/2000/svg">' +
      '<circle cx="34" cy="50" r="10" fill="#0A0B0D"/>' +
      '<circle cx="94" cy="50" r="10" fill="#0A0B0D"/>' +
      '<circle cx="34" cy="50" r="4" fill="#3A3F47"/>' +
      '<circle cx="94" cy="50" r="4" fill="#3A3F47"/>' +
      '<path d="M10,46 Q6,46 6,40 L6,36 Q6,30 14,30 L36,30 L46,12 Q49,8 56,8 L82,8 Q90,8 95,16 L104,30 L116,30 Q122,30 122,36 L122,40 Q122,46 116,46 Z" fill="' + primary + '"/>' +
      overlay +
      '<path d="M51,14 L80,14 Q86,14 89,20 L94,28 L47,28 Z" fill="#11141A" opacity="0.82"/>' +
