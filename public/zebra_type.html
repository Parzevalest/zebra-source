    acc.recentRaceLog.push({ ts: Date.now(), wpm: wpm, accuracy: accuracy, points: racePoints });
    var sevenDaysAgo = Date.now() - 7*24*60*60*1000;
    acc.recentRaceLog = acc.recentRaceLog.filter(function(r){ return r.ts >= sevenDaysAgo; });

    var seasonCfgForStats = await fetchSeasonConfig();
    var seasonIsOver = seasonCfgForStats.seasonEndsAt && Date.now() > seasonCfgForStats.seasonEndsAt;
    acc.seasonStats = acc.seasonStats || { seasonId: null, races: 0, sumWpm: 0, sumAccuracy: 0, bestWpm: 0 };
    if(acc.seasonStats.seasonId !== seasonCfgForStats.seasonId && seasonCfgForStats.seasonId){
      // Update the seasonId to match current config, but DON'T reset stats.
      // Actual season resets are only done intentionally via the admin panel
      // "Reset Full Season" button, which explicitly zeroes all accounts.
      // Auto-resetting here caused data loss whenever the config was rebuilt.
      acc.seasonStats.seasonId = seasonCfgForStats.seasonId;
    }
    if(!seasonIsOver){
      acc.seasonStats.races += 1;
      acc.seasonStats.sumWpm += wpm;
      acc.seasonStats.sumAccuracy += accuracy;
      acc.seasonStats.bestWpm = Math.max(acc.seasonStats.bestWpm || 0, wpm);
      acc.seasonStats.points = (acc.seasonStats.points || 0) + racePoints;
    }

    // "Team races" — only counts races completed while in THIS guild;
    // resets automatically if the player has since joined a different one.
    // Does not count if the guild leaderboard is paused or has ended.
    acc.guildStats = acc.guildStats || { guildId: null, races: 0, pointsOffset: acc.totalPoints || 0 };
    if(acc.guildStats.guildId !== acc.guildId){
      acc.guildStats = { guildId: acc.guildId, races: 0, pointsOffset: acc.totalPoints || 0 };
    }
    if(acc.guildId){
      var guildLbCfg = await fetchGuildLbConfig();
      var guildLbActive = !guildLbCfg.paused && !(guildLbCfg.endsAt && Date.now() > guildLbCfg.endsAt);
      if(guildLbActive) acc.guildStats.races += 1;
    }

    // Track races per car rarity for rarity-based achievements.
    var racedCar = resolveCarById(carId);
    var racedRarity = racedCar && racedCar.rarity ? racedCar.rarity : "Common";
    acc.racesWithRarity = acc.racesWithRarity || {};
    acc.racesWithRarity[racedRarity] = (acc.racesWithRarity[racedRarity] || 0) + 1;

    // Coins: base 10 per race + 1 per WPM, bonus for placement.
    var placebonus = [50, 25, 10, 0][Math.min(place-1, 3)];
    var coinsEarned = 10 + Math.floor(wpm) + placebonus;
    acc.coins = (acc.coins || 0) + coinsEarned;

    // Show results immediately — don't wait for achievements/save
    // to complete before navigating. The player sees the screen right
    // away; achievements and season rewards populate a moment later.
    if(acc.isBanned && anticheatVerdict && anticheatVerdict.isBot){
      state.user = null;
      currentToken = null;
      try{ localStorage.removeItem("zt_session"); }catch(e){}
      raceState = null;
      state.screen = "auth";
      renderApp();
      return;
    }

    state.user = acc;
    state.raceResult = {
      wpm: wpm, accuracy: accuracy, place: place, elapsed: elapsed,
      coinsEarned: coinsEarned, pointsEarned: racePoints,
      wasCalibration: wasCalibration,
      sessionRaces: acc.sessionRaces,
      bestSession: acc.bestSession || acc.sessionRaces,
      newAchievements: [],
      newSeasonRewards: [],
      carId: rs.carId || "starter_car",
      saveWarning: null,
      isMultiplayer: rs.isMultiplayer,
      opponentPlacements: rs.isMultiplayer ? (rs.placements || []).slice() : [],
      stillRacingUsernames: rs.isMultiplayer
        ? rs.opponents.filter(function(o){ return !o.finished; }).map(function(o){ return o.username; })
        : []
    };
    state.screen = "results";
    renderApp();

    // Save and check achievements/rewards in the background — results
    // screen is already showing so the player isn't blocked waiting for these.
    (async function(){
      try{
        var newAchievements = await checkAndGrantAchievements(acc);
        var newSeasonRewards = await checkAndGrantSeasonRewards(acc);
        var saveRes = await saveAccount(acc);
        state.user = acc;
        // If achievements or rewards came in, update the results screen
        // if the player is still on it.
        if(state.screen === "results" && state.raceResult){
          state.raceResult.newAchievements = newAchievements;
          state.raceResult.newSeasonRewards = newSeasonRewards;
          state.raceResult.saveWarning = saveRes.ok ? null : ("Stats didn't save: " + saveRes.error);
          renderApp();
        }
      }catch(e){ /* background save failure — non-blocking */ }
    })();
  }

  /* ============ RESULTS SCREEN ============ */
  var resultsKeydownHandler = null;

  function placementRowHtml(place, opts){

    var guildBadge = opts.guildTag

  function renderResults(){
    var r = state.raceResult;
    var placeLabel = { 1:"1ST PLACE \uD83C\uDFC1", 2:"2ND PLACE", 3:"3RD PLACE", 4:"4TH PLACE" }[r.place] || (r.place + "TH PLACE");
    var headingHtml = r.wasCalibration
      ? '<div class="results-place" style="font-size:32px;">Speed Measured!</div>' +
        '<div class="results-sub">Your baseline is ' + r.wpm + ' WPM \u2014 races will now be sized to last about 20 seconds for you</div>'
      : '<div class="results-place">' + placeLabel + '</div>' +
        '<div class="results-sub">Race complete</div>';

    // Test races use the throwaway session's display name instead of
    // state.user, which may well be null here — an admin previewing a
    // catalog item usually isn't also logged in as a real player.
    var testSession = r.isTestRace ? state.testRaceSession : null;
    var resultUsername = testSession ? testSession.username : (state.user ? state.user.username : "Racer");

    // Solo (local/test/calibration) races: just the player, exactly as
    // before. Multiplayer: a real placements list built from whoever
    // the server told us finished (opponentPlacements, populated live
    // as the race played out) plus the player's own result, sorted by
    // place. Anyone still racing when this player finished shows below
    // with a "still racing" note instead of a place — filled in for
    // real once race_complete arrives (see applyFinalPlacementsToResults).
    var placements;
    if(r.isMultiplayer){
      var carIdByUsername = {};
      (raceState ? raceState.opponents : []).forEach(function(o){ carIdByUsername[o.username] = o.carId; });

      var displayNameByUsername = {};
      var guildTagByUsername = {};
      var guildColorByUsername = {};
      (raceState ? raceState.opponents : []).forEach(function(o){
        displayNameByUsername[o.username] = o.displayName || "";
        guildTagByUsername[o.username] = o.guildTag || "";
        guildColorByUsername[o.username] = o.guildTag ? (GUILD_COLORS[o.guildColor] || o.guildColor || "#FFD54F") : "";
      });
      placements = (r.opponentPlacements || []).map(function(p){
        return { username: p.username, wpm: p.wpm, accuracy: p.accuracy, carId: carIdByUsername[p.username] || "starter_car", place: p.place, displayName: p.displayName || displayNameByUsername[p.username] || "", guildTag: guildTagByUsername[p.username] || "", guildColor: guildColorByUsername[p.username] || "" };
      });
      placements.push({
        username: resultUsername, wpm: r.wpm, accuracy: r.accuracy, carId: r.carId, place: r.place,
        displayName: state.user ? displayNameFor(state.user) : "",
        guildTag: (state.userGuild && state.userGuild.tag) || (state.user && state.user.guildTag) || "",
        guildColor: (state.userGuild && GUILD_COLORS[state.userGuild.color]) || (state.user && state.user.guildTag && (GUILD_COLORS[state.user.guildColor] || state.user.guildColor)) || ""
      });
      placements.sort(function(a,b){ return a.place - b.place; });
    } else {
      placements = [
        { username: resultUsername, wpm: r.wpm, accuracy: r.accuracy, carId: r.carId,
          guildTag: !testSession && state.userGuild && state.userGuild.tag,
          guildColor: !testSession && state.userGuild && GUILD_COLORS[state.userGuild.color] }
      ];
    }

    var stillRacingHtml = (r.isMultiplayer && r.stillRacingUsernames && r.stillRacingUsernames.length)
      ? '<div id="stillRacingNote" style="text-align:center;font-size:12px;color:var(--muted);margin-top:10px;">' +
          'Still racing: ' + r.stillRacingUsernames.map(escapeHtml).join(", ") +
        '</div>'
      : '';

    var placementsHtml = r.wasCalibration ? '' :
      '<div style="margin-top:18px;">' +
        '<div class="lbl" style="text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-size:12px;margin-bottom:8px;">Race Results</div>' +
        '<div id="placementsList" style="display:flex;flex-direction:column;gap:8px;">' +
          placements.map(function(p){ return placementRowHtml(p.place, p); }).join("") +
        '</div>' +
        stillRacingHtml +
      '</div>';

    app.innerHTML =
      brandHeader() +
      '<div class="panel">' +
        (testSession ? '<div style="text-align:center;background:rgba(255,179,0,.12);border:1px solid rgba(255,179,0,.35);border-radius:8px;padding:8px 12px;margin-bottom:14px;font-size:12px;font-weight:700;color:var(--amber);">\uD83D\uDD27 TEST RACE \u2014 nothing here was saved</div>' : '') +
        headingHtml +
        '<div class="results-grid">' +
          '<div class="stat-card"><div class="num">' + r.wpm + '</div><div class="lbl">WPM</div></div>' +
          '<div class="stat-card"><div class="num">' + r.accuracy + '%</div><div class="lbl">Accuracy</div></div>' +
          '<div class="stat-card"><div class="num">' + formatTime(r.elapsed) + '</div><div class="lbl">Time</div></div>' +
        '</div>' +
        '<div class="coins-earned">+' + r.coinsEarned + ' <span>' + COIN_ICON + (testSession ? 'coins (not granted)' : 'coins') + '</span></div>' +
        (r.pointsEarned ? '<div class="coins-earned" style="margin-top:4px;">+' + r.pointsEarned.toLocaleString() + ' <span style="color:var(--amber);">\u2605 pts</span></div>' : '') +
        (!r.wasCalibration && !r.isTestRace && r.sessionRaces
          ? '<div style="margin-top:8px;display:inline-flex;align-items:center;gap:7px;background:var(--panel-2);border:1px solid var(--line);border-radius:999px;padding:5px 14px;font-size:13px;font-weight:700;color:var(--text);">' +
              '<span style="font-size:15px;">\uD83D\uDD25</span>' +
              '<span>Session: <span style="color:var(--amber);">' + r.sessionRaces + '</span> race' + (r.sessionRaces === 1 ? '' : 's') + '</span>' +
              (r.bestSession && r.bestSession > r.sessionRaces ? '<span style="font-size:11px;font-weight:400;color:var(--muted);">best: ' + r.bestSession + '</span>' : '') +
              (r.sessionRaces === r.bestSession && r.sessionRaces > 1 ? '<span style="font-size:11px;font-weight:700;color:var(--amber);">\u2605 new best!</span>' : '') +
              '<span style="font-size:11px;font-weight:400;color:var(--muted);">(resets after 30 min)</span>' +
            '</div>'
          : '') +
        (r.newAchievements && r.newAchievements.length ? '<div style="margin:-8px 0 16px;display:flex;flex-direction:column;gap:6px;">' +
          r.newAchievements.map(function(a){
            return '<div style="display:flex;align-items:center;gap:10px;background:rgba(255,179,0,.1);border:1px solid rgba(255,179,0,.3);border-radius:8px;padding:8px 12px;">' +
              '<div><div style="font-weight:700;font-size:13px;color:var(--amber);">Achievement Unlocked!</div>' +
              '<div style="font-size:12px;">' + escapeHtml(a.title) + '</div></div>' +
            '</div>';
          }).join("") +
        '</div>' : '') +
        (r.newSeasonRewards && r.newSeasonRewards.length ? '<div style="margin:-8px 0 16px;display:flex;flex-direction:column;gap:6px;">' +
          r.newSeasonRewards.map(function(sr){
            var label = sr.track === "bonus" ? "Season Bonus!" : sr.track === "premium" ? "Premium Reward \u2014 Level " + sr.level : "Season Reward \u2014 Level " + sr.level;
            return '<div style="display:flex;align-items:center;gap:10px;background:rgba(79,163,255,.1);border:1px solid rgba(79,163,255,.3);border-radius:8px;padding:8px 12px;">' +
              '<div><div style="font-weight:700;font-size:13px;color:#4FA3FF;">' + label + '</div>' +
              '<div style="font-size:12px;">' + rewardSummaryText(sr.reward) + '</div></div>' +
            '</div>';
          }).join("") +
        '</div>' : '') +
        (r.saveWarning ? '<div class="error-text" style="text-align:center;margin-bottom:14px;">' + escapeHtml(r.saveWarning) + '</div>' : '') +
        placementsHtml +
        '<div class="results-actions" style="margin-top:18px;">' +
          '<button class="btn btn-ghost" id="toDashboardBtn">' + (testSession ? "Back to Test Race" : "Back to Garage") + '</button>' +
          '<button class="btn btn-primary" id="raceAgainBtn">Race Again <span style="opacity:.6;font-weight:400;">(Enter)</span></button>' +
        '</div>' +
      '</div>';

    attachProfileLinkListeners();

    function stopListeningForEnter(){
      if(resultsKeydownHandler){
        document.removeEventListener("keydown", resultsKeydownHandler);
        resultsKeydownHandler = null;
      }
    }

    document.getElementById("toDashboardBtn").addEventListener("click", function(){
      stopListeningForEnter();
      closeRaceSocket();
      state.screen = testSession ? "adminTestRace" : "dashboard";
      renderApp();
    });
    document.getElementById("raceAgainBtn").addEventListener("click", function(){
      stopListeningForEnter();
      closeRaceSocket(); // the room this race used is already finished/closing server-side; startRace() opens a fresh one
      startRace();
    });

    // Pressing Enter on the results screen is the same as clicking "Race
    // Again" — only one listener is ever active at a time.
    stopListeningForEnter();
    resultsKeydownHandler = function(e){
      if(e.key === "Enter"){
        e.preventDefault();
        stopListeningForEnter();
        closeRaceSocket();
        startRace();
      }
    };
    document.addEventListener("keydown", resultsKeydownHandler);
  }

  // Called when race_complete arrives while the player is already
  // sitting on the results screen (the normal case if they finished
  // before everyone else) — fills in any opponents who were still
  // racing, re-renders just the placements list and removes the "still
  // racing" note rather than redrawing the whole screen (which would
  // lose scroll position / interrupt anything mid-click).
  function applyFinalPlacementsToResults(){
    var r = state.raceResult;
    if(!r || !r.isMultiplayer) return;
    if(!raceState || !raceState.placements || raceState.placements.length === 0) return;
    var listEl = document.getElementById("placementsList");
    if(!listEl) return; // navigated away already

    var carIdByUsername = {};
    (raceState ? raceState.opponents : []).forEach(function(o){ carIdByUsername[o.username] = o.carId; });

    var resultUsername = state.user ? state.user.username : "Racer";
    var guildTagMap = {}, guildColorMap = {};
    (raceState ? raceState.opponents : []).forEach(function(o){ guildTagMap[o.username] = o.guildTag || ""; guildColorMap[o.username] = o.guildTag ? (GUILD_COLORS[o.guildColor] || o.guildColor || "#FFD54F") : ""; });
    var placements = (raceState && raceState.placements ? raceState.placements : []).map(function(p){
      return { username: p.username, wpm: p.wpm, accuracy: p.accuracy, carId: carIdByUsername[p.username] || "starter_car", place: p.place, displayName: p.displayName || "", guildTag: p.guildTag || guildTagMap[p.username] || "", guildColor: p.guildColor || guildColorMap[p.username] || "" };
    }).filter(function(p){
      // Remove any server entry for the current player — we add their own
      // result separately below using local race data which is more accurate.
      return p.username.toLowerCase() !== resultUsername.toLowerCase();
    });
    placements.push({
      username: resultUsername, wpm: r.wpm, accuracy: r.accuracy, carId: r.carId, place: r.place,
      displayName: state.user ? displayNameFor(state.user) : "",
      guildTag: (state.userGuild && state.userGuild.tag) || (state.user && state.user.guildTag) || "",
      guildColor: (state.userGuild && GUILD_COLORS[state.userGuild.color]) || (state.user && state.user.guildTag && (GUILD_COLORS[state.user.guildColor] || state.user.guildColor)) || ""
    });
    placements.sort(function(a,b){ return a.place - b.place; });

    listEl.innerHTML = placements.map(function(p){ return placementRowHtml(p.place, p); }).join("");
    var stillRacingEl = document.getElementById("stillRacingNote");
    if(stillRacingEl) stillRacingEl.remove();
  }

  /* ============ ADMIN ============ */
  function openAdminAuth(){
    // If a logged-in user clicks Mod Panel, re-fetch their account to get
    // the latest isModerator flag (in case it was granted after they logged in)
    if(state.user && !state.isSuperAdmin){
      getAccount(state.user.username).then(async function(res){
        if(res.ok && res.account) state.user = res.account;
        if(state.user && state.user.isModerator){
          state.isAdmin = true;
          state.isSuperAdmin = false;
          state.adminUsername = state.user.username;
          state.previousScreen = state.screen;
          // currentToken is already set from player login — player token
          // is sufficient for mod-level access since any authenticated
          // session can read/write shared data. No extra token needed.
          state.screen = "admin";
          renderApp();
        } else {
          // Not a moderator — show the admin password form
          state.previousScreen = state.screen;
          state.screen = "adminAuthLoading";
          renderApp();
          getAdminAccount().then(function(r){
            state.adminAccountExists = r.ok ? !!r.account : null;
            state.adminLookupError = r.ok ? null : r.error;
            state.screen = "adminAuth";
            renderApp();
          });
        }
      });
      return;
    }
    state.previousScreen = state.screen;
    state.screen = "adminAuthLoading";
    renderApp();
    getAdminAccount().then(function(res){
      state.adminAccountExists = res.ok ? !!res.account : null;
      state.adminLookupError = res.ok ? null : res.error;
      state.screen = "adminAuth";
      renderApp();
    });
  }

  function renderAdminAuthLoading(){
    app.innerHTML =
      brandHeader() +
      '<div class="auth-wrap"><div class="panel" style="text-align:center;color:var(--muted);">' +
      'Checking admin access...' +
      '</div></div>';
  }

  function renderAdminAuth(){
    if(state.adminLookupError){
      app.innerHTML =
        brandHeader() +
        '<div class="auth-wrap"><div class="panel">' +
          '<div class="error-text">Couldn\u2019t reach storage: ' + escapeHtml(state.adminLookupError) + '</div>' +
          '<button class="btn btn-ghost btn-block" id="adminBackBtn">Back</button>' +
        '</div></div>';
      document.getElementById("adminBackBtn").addEventListener("click", exitAdminFlow);
      return;
    }

    var isClaim = !state.adminAccountExists;
    app.innerHTML =
      brandHeader() +
      '<div class="auth-wrap"><div class="panel">' +
        '<div class="garage-title" style="color:var(--text);font-size:18px;margin-bottom:4px;">' +
          (isClaim ? "Set Up Admin Access" : "Admin Login") +
        '</div>' +
        (isClaim
          ? '<div class="hint-text" style="margin-top:0;margin-bottom:16px;">No admin account exists yet. Choose a username and password \u2014 this becomes the one and only admin login for this game. There\u2019s no real backend here, so treat this as a casual gate, not a vault.</div>'
          : '') +
        '<form id="adminForm">' +
          '<div class="field">' +
            '<label for="adminUsername">Username</label>' +
            '<input id="adminUsername" autocomplete="off" maxlength="20" />' +
          '</div>' +
          '<div class="field">' +
            '<label for="adminPassword">Password</label>' +
            '<input id="adminPassword" type="password" maxlength="40" />' +
          '</div>' +
          (isClaim ?
            '<div class="field">' +
              '<label for="adminPasswordConfirm">Confirm password</label>' +
              '<input id="adminPasswordConfirm" type="password" maxlength="40" />' +
            '</div>' : '') +
          '<div class="error-text" id="adminError"></div>' +
          '<button type="submit" class="btn btn-primary btn-block btn-lg">' +
            (isClaim ? "Create Admin Account" : "Log In") +
          '</button>' +
        '</form>' +
        '<button class="btn btn-ghost btn-block" id="adminBackBtn" style="margin-top:10px;">Cancel</button>' +
      '</div></div>';

    document.getElementById("adminBackBtn").addEventListener("click", exitAdminFlow);
    document.getElementById("adminForm").addEventListener("submit", function(e){
      e.preventDefault();
      if(isClaim) handleAdminClaim(); else handleAdminLogin();
    });

  function exitAdminFlow(){
    state.isAdmin = false;
    state.screen = state.previousScreen || "auth";
    renderApp();
  }

  async function handleAdminClaim(){
    var username = document.getElementById("adminUsername").value.trim();
    var password = document.getElementById("adminPassword").value;
    var confirmPw = document.getElementById("adminPasswordConfirm").value;
    var errEl = document.getElementById("adminError");
    errEl.textContent = "";

    if(!username){
      errEl.textContent = "Choose a username.";
      return;
    }
    if(password.length < 6){
      errEl.textContent = "Use at least 6 characters for the admin password.";
      return;
    }
    if(password !== confirmPw){
      errEl.textContent = "Passwords don\u2019t match.";
      return;
    }

    var submitBtn = document.querySelector("#adminForm button");
    submitBtn.disabled = true; submitBtn.textContent = "Creating...";

    try{
      // Re-check right before writing, in case someone else claimed it first.
      var recheck = await getAdminAccount();
      if(!recheck.ok){
        errEl.textContent = "Couldn't reach storage: " + recheck.error;
        return;
      }
      if(recheck.account){
        errEl.textContent = "An admin account already exists \u2014 log in instead.";
        state.adminAccountExists = true;
        renderApp();
        return;
      }
      var passwordHash = await hashPassword(password);
      var saveRes = await saveAdminAccount({ username: username, passwordHash: passwordHash, createdAt: Date.now() });
      if(!saveRes.ok){
        errEl.textContent = "Couldn't save admin account: " + saveRes.error;
        return;
      }
      // Get a session token for admin API calls
      try{
        var claimNonce = await getLoginChallenge();
        var claimResponse = await challengeHash(passwordHash, claimNonce);
        var claimTokenRes = await fetch(SERVER_URL + "/api/admin-login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ challengeResponse: claimResponse, nonce: claimNonce })
        });
        if(claimTokenRes.ok){
          var claimTokenData = await claimTokenRes.json();
          currentToken = claimTokenData.token;
          try{ localStorage.setItem("zt_session", currentToken); }catch(e){}
        }
      }catch(e){}
      state.isAdmin = true;
      state.isSuperAdmin = true;
      state.adminUsername = username;
      state.screen = "admin";
      renderApp();
    }catch(e){
      errEl.textContent = "Unexpected error: " + ((e && e.message) ? e.message : String(e));
    }finally{
      if(state.screen === "adminAuth"){
        submitBtn.disabled = false;
        submitBtn.textContent = "Create Admin Account";
      }
    }
  }

  async function handleAdminLogin(){
    var username = document.getElementById("adminUsername").value.trim();
    var password = document.getElementById("adminPassword").value;
    var errEl = document.getElementById("adminError");
    errEl.textContent = "";

    if(!username || !password){
      errEl.textContent = "Enter the admin username and password.";
      return;
    }

    var submitBtn = document.querySelector("#adminForm button");
    submitBtn.disabled = true; submitBtn.textContent = "Checking...";

    try{
      var res = await getAdminAccount();
      if(!res.ok){
        errEl.textContent = "Couldn't reach storage: " + res.error;
        return;
      }
      if(!res.account){
        errEl.textContent = "No admin account is set up yet.";
        state.adminAccountExists = false;
        renderApp();
        return;
      }
      if(username.toLowerCase() !== res.account.username.toLowerCase()){
        errEl.textContent = "Wrong admin username or password.";
        return;
      }
      var hash = await hashPassword(password);
      if(hash !== res.account.passwordHash){
        errEl.textContent = "Wrong admin username or password.";
        return;
      }
      // Get a session token so admin API calls work (shimGet/shimList etc.)
      try{
        var adminNonce = await getLoginChallenge();
        var adminResponse = await challengeHash(hash, adminNonce);
        var adminTokenRes = await fetch(SERVER_URL + "/api/admin-login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ challengeResponse: adminResponse, nonce: adminNonce })
        });
        if(adminTokenRes.ok){
          var adminTokenData = await adminTokenRes.json();
          currentToken = adminTokenData.token;
          try{ localStorage.setItem("zt_session", currentToken); }catch(e){}
        }
      }catch(e){}
      state.isAdmin = true;
      state.isSuperAdmin = true;
      state.adminUsername = res.account.username;
      state.screen = "admin";
      renderApp();
    }catch(e){
      errEl.textContent = "Unexpected error: " + ((e && e.message) ? e.message : String(e));
    }finally{
      if(state.screen === "adminAuth"){
        submitBtn.disabled = false;
        submitBtn.textContent = "Log In";
      }
    }
  }

  function attachAdminNavListeners(){
    var maintBtn = document.getElementById("maintenanceToggleBtn");

      state.maintenanceMode = !state.maintenanceMode;
      await shimSet("site_maintenance", JSON.stringify(state.maintenanceMode), true);
      renderApp();
    });
    document.getElementById("exitAdminBtn").addEventListener("click", function(){
      state.isAdmin = false;
      state.screen = (state.previousScreen === "dashboard" && state.user) ? "dashboard" : "auth";
      renderApp();
    });
    var viewSiteBtn = document.getElementById("viewSiteBtn");
    if(viewSiteBtn) viewSiteBtn.addEventListener("click", function(){
      // Navigate to the regular site WITHOUT clearing isAdmin/isSuperAdmin —
      // this lets a super admin browse pages like a guild view to verify
      // fixes, then come straight back into the admin panel without
      // re-entering the admin password.
      state.screen = state.user ? "dashboard" : "leaderboard";
      renderApp();
    });
    document.querySelectorAll("[data-admin-tab]").forEach(function(btn){
      btn.addEventListener("click", function(){
        var tab = btn.getAttribute("data-admin-tab");
        state.adminTab = tab;
        state.screen = tab === "cars" ? "adminCars"
          : tab === "nametags" ? "adminNameTags"
          : tab === "avatars" ? "adminAvatars"
          : tab === "titles" ? "adminTitles"
          : tab === "players" ? "adminPlayers"
          : tab === "wheel" ? "adminWheel"
          : tab === "season" ? "adminSeason"
          : tab === "track" ? "adminTrack"
          : tab === "passages" ? "adminPassages"
          : tab === "testrace" ? "adminTestRace"
          : tab === "about" ? "adminAbout"
          : "adminAchievements";
        renderApp();
      });
    });
  }

    function updatePreview(){
      var previewEl = document.getElementById("carPreview");
      if(!previewEl) return;
      if(pendingCarImage){
        previewEl.innerHTML = '<img src="' + pendingCarImage + '" alt="" style="width:100%;height:100%;object-fit:contain;display:block;" />';
      } else {
        previewEl.innerHTML = carVisualHtml({});
      }
    }

    document.getElementById("carImageFile").addEventListener("change", function(e){
      var file = e.target.files && e.target.files[0];
      var note = document.getElementById("imageSizeNote");
      note.textContent = "";
      if(!file) return;
      if(file.size > 2 * 1024 * 1024){
        note.textContent = "File over 2MB \u2014 pick something smaller.";
        e.target.value = ""; return;
      }
      var reader = new FileReader();
      reader.onload = function(){
        pendingCarImage = reader.result;
        updatePreview();
        var img = new Image();
        img.onload = function(){
          if(img.naturalWidth !== 128 || img.naturalHeight !== 64){
            note.textContent = "Heads up: image is " + img.naturalWidth + "\u00d7" + img.naturalHeight + "px, not 128\u00d764.";
          }
        };
        img.src = pendingCarImage;
      };
      reader.readAsDataURL(file);
    });

    document.getElementById("clearImageBtn").addEventListener("click", function(){
      pendingCarImage = null;
      document.getElementById("carImageFile").value = "";
      document.getElementById("imageSizeNote").textContent = "";
      updatePreview();
    });

    if(editingId){
      document.getElementById("cancelEditCarBtn").addEventListener("click", function(){
        state.adminEditingCarId = null;
        renderAdminCars();
      });
      // Pre-populate the form from the car being edited.
      fetchCustomCars().then(function(list){
        customCarsCache = list;
        var car = list.find(function(c){ return c.id === editingId; });
        if(!car) return;
        document.getElementById("carName").value = car.name || "";
        document.getElementById("carCreator").value = car.creator || "";
        document.getElementById("carDescription").value = car.description || "";
        var seasonalCb = document.getElementById("carSeasonal");
        if(seasonalCb) seasonalCb.checked = !!car.isSeasonal;
        document.getElementById("carRarity").value = car.rarity || "Common";
        if(car.image){
          pendingCarImage = car.image;
          updatePreview();
        }
      });
    }

    document.getElementById("addCarBtn").addEventListener("click", async function(){
      var name        = document.getElementById("carName").value.trim();
      var creator     = document.getElementById("carCreator").value.trim();
      var description = document.getElementById("carDescription").value.trim();
      var rarity  = document.getElementById("carRarity").value;
      var errEl   = document.getElementById("adminPanelError");
      errEl.textContent = "";
      if(!name){ errEl.textContent = "Give the car a name."; return; }

      var btn = document.getElementById("addCarBtn");
      btn.disabled = true; btn.textContent = editingId ? "Saving..." : "Adding...";
      try{
        var list = await fetchCustomCars();
        if(editingId){
          var idx = list.findIndex(function(c){ return c.id === editingId; });
          if(idx === -1){ errEl.textContent = "This car no longer exists."; return; }
          var isSeasonal = document.getElementById("carSeasonal") && document.getElementById("carSeasonal").checked;
          list[idx] = Object.assign({}, list[idx], {
            name: name, creator: creator || "Unknown", description: description,
            rarity: rarity || "Common", image: pendingCarImage || null, isSeasonal: !!isSeasonal
          });
        } else {
          var isSeasonal = document.getElementById("carSeasonal") && document.getElementById("carSeasonal").checked;
          list.push({
            id: "car_" + Date.now() + "_" + Math.floor(Math.random()*10000),
            name: name, creator: creator || "Unknown", description: description,
            rarity: rarity || "Common",
            image: pendingCarImage || null, createdAt: Date.now(), isSeasonal: !!isSeasonal
          });
        }
        var saveRes = await saveCustomCars(list);
        if(!saveRes.ok){ errEl.textContent = "Couldn\u2019t save: " + saveRes.error; return; }
        customCarsCache = list;
        state.adminEditingCarId = null;
        document.getElementById("carName").value = "";
        document.getElementById("carCreator").value = "";
        document.getElementById("carDescription").value = "";
        document.getElementById("carImageFile").value = "";
        pendingCarImage = null;
        renderAdminCars();
      }catch(e){
        errEl.textContent = "Unexpected error: " + ((e&&e.message)?e.message:String(e));
      }finally{
        btn.disabled = false; btn.textContent = editingId ? "Save Changes" : "Add to Catalog";
      }
    });

    renderAdminCarList();
  }

    attachAdminNavListeners();

    // --- Searchable Title picker (achievements) ---

    var allAchTitles = [];
    function renderAchTitleList(q){
      var listEl = document.getElementById("achTitleList"); if(!listEl) return;
      var filtered = q ? allAchTitles.filter(function(t){ return (t.text||"").toLowerCase().indexOf(q.toLowerCase()) !== -1; }) : allAchTitles;
      if(!filtered.length){ listEl.innerHTML = '<div style="color:var(--muted);font-size:13px;padding:8px;">No titles found.</div>'; return; }

        var sel = selectedAchTitleId === t.id;

        return '<div data-atitle-id="' + escapeHtml(t.id) + '" data-atitle-text="' + escapeHtml(t.text||"") + '" data-atitle-rarity="' + escapeHtml(t.rarity||"") + '" style="padding:8px 10px;border-radius:8px;cursor:pointer;background:' + (sel?'var(--panel)':'var(--panel-2)') + ';border:1px solid ' + (sel?'var(--text)':'var(--line)') + ';">' +
          '<span style="font-style:italic;font-weight:700;color:' + color + ';">' + escapeHtml(t.text||"") + '</span>' +
        '</div>';

          var st = document.getElementById("achTitleSelectedText"); if(st) st.textContent = selectedAchTitleText;

    fetchTitleCatalog().then(function(titles){ allAchTitles = titles || []; });

    if(achTitleSearch) achTitleSearch.addEventListener("input", function(){ renderAchTitleList(this.value); });

    // --- Searchable Name Tag picker ---
    var selectedNameTagImage = null;
    var selectedNameTagName = null;

    function renderNameTagList(filter){
      var listEl = document.getElementById("achNameTagList");
      if(!listEl) return;
      var q = (filter || "").toLowerCase();
      var filtered = q ? allNameTags.filter(function(t){ return (t.name||"").toLowerCase().indexOf(q) !== -1; }) : allNameTags;
      if(!filtered.length){
        listEl.innerHTML = '<div style="color:var(--muted);font-size:13px;padding:8px;">No name tags found.</div>';
        return;
      }
      listEl.innerHTML = filtered.map(function(t){
        var isSelected = selectedNameTagImage === t.image;
        return '<div data-nt-image="' + escapeHtml(t.image) + '" data-nt-name="' + escapeHtml(t.name||"") + '" style="display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;cursor:pointer;background:' + (isSelected ? 'var(--panel)' : 'var(--panel-2)') + ';border:1px solid ' + (isSelected ? 'var(--text)' : 'var(--line)') + ';">' +
          '<img src="' + escapeHtml(t.image) + '" style="width:100px;height:25px;object-fit:contain;flex:0 0 100px;" />' +
          '<span style="font-size:13px;color:var(--text);">' + escapeHtml(t.name||"") + '</span>' +
        '</div>';
      }).join("");

        row.addEventListener("click", function(){
          selectedNameTagImage = row.getAttribute("data-nt-image");
          selectedNameTagName = row.getAttribute("data-nt-name");

          var selImg = document.getElementById("achNameTagSelectedImg");

      if(!listEl) return;
      var q = (filter || "").toLowerCase();

          (p.image ? '<img src="' + escapeHtml(p.image) + '" style="width:36px;height:36px;object-fit:contain;image-rendering:pixelated;" />' : '<div style="width:36px;height:36px;background:var(--line);border-radius:4px;"></div>') +

            '<div style="font-size:13px;font-weight:700;color:var(--text);">' + escapeHtml(p.name||"") + '</div>' +
            '<div style="font-size:11px;color:var(--muted);">' + escapeHtml(AVATAR_SLOT_LABELS[p.slot] || p.slot || "") + (p.rarity ? ' \u2022 ' + escapeHtml(p.rarity) : '') + '</div>' +

      listEl.querySelectorAll("[data-av-id]").forEach(function(row){

          selectedAvatarPieceId = row.getAttribute("data-av-id");
          selectedAvatarSlot = row.getAttribute("data-av-slot");
          selectedAvatarPieceName = row.getAttribute("data-av-name");
          var hiddenPiece = document.getElementById("achRewardAvatarPiece");
          var hiddenSlot = document.getElementById("achRewardAvatarSlot");
          if(hiddenPiece) hiddenPiece.value = selectedAvatarPieceId;
          if(hiddenSlot) hiddenSlot.value = selectedAvatarSlot;
          var selDiv = document.getElementById("achAvatarSelected");
          var selName = document.getElementById("achAvatarSelectedName");
          if(selDiv) selDiv.style.display = "";
          if(selName) selName.textContent = selectedAvatarPieceName + " (" + (AVATAR_SLOT_LABELS[selectedAvatarSlot] || selectedAvatarSlot) + ")";

    fetchCustomCars().then(function(cars){
      var sel = document.getElementById("achRewardCar");
      if(!sel) return;
      sel.innerHTML = cars.length
        ? cars.map(function(c){ return '<option value="' + escapeHtml(c.id) + '" data-name="' + escapeHtml(c.name) + '">' + escapeHtml(c.name) + '</option>'; }).join("")
        : '<option value="">No cars in catalog yet</option>';
    });

    document.getElementById("addAchBtn").addEventListener("click", async function(){
      var title    = document.getElementById("achTitle").value.trim();
      var desc     = document.getElementById("achDesc").value.trim();
      var condType = document.getElementById("achCondType").value;
      var condVal  = document.getElementById("achCondVal").value;
      var rewardType = document.getElementById("achRewardType").value;
      var errEl    = document.getElementById("achError");
      errEl.textContent = "";
      if(!title){ errEl.textContent = "Give the achievement a title."; return; }
      if(!desc){  errEl.textContent = "Add a description."; return; }
      if(!condVal || parseInt(condVal,10) < 1){ errEl.textContent = "Set a condition value of at least 1."; return; }

      var achSection = document.getElementById("achSection");
      var entry = {
        id: "ach_" + Date.now() + "_" + Math.floor(Math.random()*10000),
        title: title, description: desc,
        section: achSection ? achSection.value : "Common",
        conditionType: condType, conditionValue: condVal,
        conditionRarity: condType === "racesWithRarity" ? (document.getElementById("achCondRarity") ? document.getElementById("achCondRarity").value : "") : "",
        rewardType: rewardType, createdAt: Date.now()
      };
      if(rewardType === "coins"){
        var rc = parseInt(document.getElementById("achRewardCoins").value, 10);
        if(!rc || rc < 1){ errEl.textContent = "Enter a coin reward amount."; return; }
        entry.rewardCoins = rc;
      } else if(rewardType === "car"){
        var carSel  = document.getElementById("achRewardCar");
        var carId   = carSel && carSel.value;
        var carOpt  = carSel && carSel.options[carSel.selectedIndex];
        var carName = carOpt && carOpt.getAttribute("data-name");
        if(!carId){ errEl.textContent = "Select a car reward."; return; }
        entry.rewardCarId = carId; entry.rewardCarName = carName || carId;
      } else if(rewardType === "nameTag"){
        if(!selectedNameTagImage){ errEl.textContent = "Select a name tag from the list."; return; }
        entry.rewardNameTagImage = selectedNameTagImage;
        entry.rewardNameTagName = selectedNameTagName || "";
      } else if(rewardType === "avatar"){
        if(!selectedAvatarPieceId){ errEl.textContent = "Select an avatar piece reward."; return; }
        entry.rewardAvatarPieceId = selectedAvatarPieceId;
        entry.rewardAvatarSlot = selectedAvatarSlot || "";
        entry.rewardAvatarName = selectedAvatarPieceName || selectedAvatarPieceId;
      } else if(rewardType === "title"){
        if(!selectedAchTitleId){ errEl.textContent = "Select a title reward."; return; }
        entry.rewardTitleId = selectedAchTitleId;
        entry.rewardTitleText = selectedAchTitleText || "";
        entry.rewardTitleRarity = selectedAchTitleRarity || "";
      }

      var btn = document.getElementById("addAchBtn");
      btn.disabled = true; btn.textContent = "Adding...";
      try{
        var list = await fetchAchievements();
        list.push(entry);
        var res = await saveAchievements(list);
        if(!res.ok){ errEl.textContent = "Couldn\u2019t save: " + res.error; return; }
        document.getElementById("achTitle").value = "";
        document.getElementById("achDesc").value  = "";
        selectedNameTagImage = null; selectedNameTagName = null;
        selectedAvatarPieceId = null; selectedAvatarSlot = null; selectedAvatarPieceName = null;
        var ntSelDiv = document.getElementById("achNameTagSelected");
        if(ntSelDiv) ntSelDiv.style.display = "none";
        var avSelDiv = document.getElementById("achAvatarSelected");
        if(avSelDiv) avSelDiv.style.display = "none";
        renderAdminAchList();
      }catch(e){
        errEl.textContent = "Unexpected error: " + ((e&&e.message)?e.message:String(e));
      }finally{
        btn.disabled = false; btn.textContent = "Add Achievement";
      }
    });

    renderAdminAchList();
  }

  async function renderAdminAchList(){
    var box = document.getElementById("adminAchList");
    if(!box) return;
    var list = await fetchAchievements();
    if(!document.getElementById("adminAchList")) return;

    if(!list.length){
      box.innerHTML = '<div class="center-note">No achievements yet \u2014 add one above.</div>';
      return;
    }

    var condLabels = { races:"Races \u2265", bestWpm:"Best WPM \u2265", ownedCars:"Cars owned \u2265", coins:"Coins \u2265", racesWithRarity:"Races with rarity \u2265", bestSession:"Best session \u2265" };
    var SECTION_OPTIONS = ["Common","Rare","Ultra Rare","Legendary","Mythic","Ascended","Unobtainable","Loaded","Redline","Sessionist","Premium"];
    box.innerHTML = list.map(function(a){
      var condBase = (condLabels[a.conditionType] || a.conditionType) + " " + a.conditionValue;
      var cond = a.conditionType === "racesWithRarity" && a.conditionRarity ? condBase + " (" + a.conditionRarity + ")" : condBase;
      var reward = rewardSummaryText(a);
      var sectionSel = '<select class="ach-section-sel" data-ach-id="' + escapeHtml(a.id) + '" style="background:var(--panel-2);color:var(--text);border:1px solid var(--line);border-radius:6px;padding:4px 8px;font-size:12px;">' +
        SECTION_OPTIONS.map(function(s){ return '<option value="' + escapeHtml(s) + '"' + (a.section===s?' selected':'') + '>' + escapeHtml(s) + '</option>'; }).join('') +
        '</select>';
      return '<div class="admin-car-row">' +
        '<div style="flex:1;min-width:0;">' +
          '<div style="font-weight:700;font-size:14px;">' + escapeHtml(a.title) + '</div>' +
          '<div style="font-size:12px;color:var(--muted);margin-bottom:4px;">' + cond + ' \u2022 ' + reward + '</div>' +
          '<div style="display:flex;align-items:center;gap:6px;">' +
            '<span style="font-size:11px;color:var(--muted);">Section:</span>' + sectionSel +
          '</div>' +
        '</div>' +
        '<button class="small-btn" data-del-ach="' + escapeHtml(a.id) + '">Delete</button>' +
      '</div>';
    }).join("");

    box.querySelectorAll("[data-del-ach]").forEach(function(btn){
      btn.addEventListener("click", async function(){
        var id = btn.getAttribute("data-del-ach");
        btn.disabled = true; btn.textContent = "...";
        var list2 = await fetchAchievements();
        list2 = list2.filter(function(a){ return a.id !== id; });
        await saveAchievements(list2);
        renderAdminAchList();
      });
    });
    box.querySelectorAll(".ach-section-sel").forEach(function(sel){
      sel.addEventListener("change", async function(){
        var id = sel.getAttribute("data-ach-id");
        var list2 = await fetchAchievements();
        var entry = list2.find(function(a){ return a.id === id; });
        if(entry){ entry.section = sel.value; await saveAchievements(list2); }
      });
    });
  }

    function recomputeOddsTotal(){
      var total = 0;
      document.querySelectorAll(".wheel-odds-input").forEach(function(inp){
        total += parseFloat(inp.value) || 0;
      });
      var disp = document.getElementById("oddsTotalDisplay");
      if(disp){
        disp.textContent = total.toFixed(2).replace(/\.00$/,"").replace(/(\.\d)0$/,"$1");
        disp.style.color = Math.abs(total-100) < 0.005 ? "var(--green)" : "var(--red)";
      }
    }
    document.querySelectorAll(".wheel-odds-input").forEach(function(inp){
      inp.addEventListener("input", recomputeOddsTotal);
    });
    recomputeOddsTotal();

    document.getElementById("saveCostBtn").addEventListener("click", async function(){
      var msg = document.getElementById("costSaveMsg");
      var val = Math.max(0, parseInt(document.getElementById("wheelCostInput").value, 10) || 0);
      msg.textContent = "Saving...";
      var configs = await fetchWheelConfigs();
      var cfg = getWheelConfig(configs, activeWheelId);
      if(cfg) cfg.costCoins = val;
      var res = await saveWheelConfigs(configs);
      if(res.ok){
        wheelConfigsCache = configs;
        msg.textContent = "Saved.";
        setTimeout(function(){ if(msg) msg.textContent = ""; }, 1500);
      } else {
        msg.textContent = "Error: " + res.error;
      }
    });

    document.getElementById("saveOddsBtn").addEventListener("click", async function(){
      var msg = document.getElementById("oddsSaveMsg");
      msg.textContent = "";
      var newWeights = {};
      var total = 0;
      document.querySelectorAll(".wheel-odds-input").forEach(function(inp){
        var v = Math.max(0, parseFloat(inp.value) || 0);
        newWeights[inp.getAttribute("data-tier")] = v;
        total += v;
      });
      if(Math.abs(total - 100) > 0.005){
        msg.textContent = "Odds must add up to exactly 100% (currently " + total.toFixed(2) + "%).";
        return;
      }
      var configs = await fetchWheelConfigs();
      var cfg = getWheelConfig(configs, activeWheelId);
      if(cfg) cfg.weights = newWeights;
      var res = await saveWheelConfigs(configs);
      if(res.ok){
        wheelConfigsCache = configs;
        msg.style.color = "var(--green)";
        msg.textContent = "Saved.";
        setTimeout(function(){ if(msg){ msg.textContent = ""; msg.style.color = ""; } }, 1500);
      } else {
        msg.textContent = "Error: " + res.error;

        : '<option value="">No name tags in catalog yet</option>';

      if(!slotSel || !pieceSel) return;
      var slot = slotSel.value;
      var pieces = catalogList.filter(function(p){ return p.slot === slot; });
      pieceSel.innerHTML = pieces.length
        ? pieces.map(function(p){ return '<option value="' + escapeHtml(p.id) + '" data-name="' + escapeHtml(p.name) + '">' + escapeHtml(p.name) + ' (' + escapeHtml(p.rarity || "Common") + ')</option>'; }).join("")

    function renderPrizeTitleList(q){
      var listEl = document.getElementById("prizeTitleList"); if(!listEl) return;
      var filtered = q ? allPrizeTitles.filter(function(t){ return (t.text||"").toLowerCase().indexOf(q.toLowerCase()) !== -1; }) : allPrizeTitles;

      listEl.innerHTML = filtered.map(function(t){

        return '<div data-ptitle-id="' + escapeHtml(t.id) + '" data-ptitle-text="' + escapeHtml(t.text||"") + '" style="padding:8px 10px;border-radius:8px;cursor:pointer;background:' + (sel?'var(--panel)':'var(--panel-2)') + ';border:1px solid ' + (sel?'var(--text)':'var(--line)') + ';">' +

      }).join("");
      listEl.querySelectorAll("[data-ptitle-id]").forEach(function(row){
        row.addEventListener("click", function(){

          selectedPrizeTitleText = row.getAttribute("data-ptitle-text");
          var hid = document.getElementById("prizeRewardTitleId"); if(hid) hid.value = selectedPrizeTitleId;
          var sd = document.getElementById("prizeTitleSelected"); if(sd) sd.style.display = "";
          var st = document.getElementById("prizeTitleSelectedText"); if(st) st.textContent = selectedPrizeTitleText;
          renderPrizeTitleList(document.getElementById("prizeTitleSearch") ? document.getElementById("prizeTitleSearch").value : "");

    if(prizeTitleSearchEl) prizeTitleSearchEl.addEventListener("input", function(){ renderPrizeTitleList(this.value); });

    document.getElementById("addWheelPrizeBtn").addEventListener("click", async function(){
      var rarity = document.getElementById("prizeRarity").value;
      var prizeType = document.getElementById("prizeType").value;
      var errEl = document.getElementById("wheelPrizeError");
      errEl.textContent = "";

      var entry = {
        id: "wp_" + Date.now() + "_" + Math.floor(Math.random()*10000),
        wheelId: activeWheelId, rarity: rarity,
        createdAt: Date.now()
      };

      if(prizeType === "nameTag"){
        var tagSel = document.getElementById("prizeNameTagSelect");
        var tagId = tagSel && tagSel.value;
        var tagOpt = tagSel && tagSel.options[tagSel.selectedIndex];
        if(!tagId){ errEl.textContent = "Select a name tag."; return; }
        entry.rewardType = "nameTag";
        entry.rewardNameTagImage = tagOpt.getAttribute("data-image");
        entry.rewardNameTagName = tagOpt.getAttribute("data-name");
      } else if(prizeType === "avatar"){
        var avSlotSel = document.getElementById("prizeAvatarSlotSelect");
        var avPieceSel = document.getElementById("prizeAvatarSelect");
        var avPieceId = avPieceSel && avPieceSel.value;
        var avPieceOpt = avPieceSel && avPieceSel.options[avPieceSel.selectedIndex];
        if(!avPieceId){ errEl.textContent = "Select an avatar piece."; return; }
        entry.rewardType = "avatar";
        entry.rewardAvatarPieceId = avPieceId;
        entry.rewardAvatarSlot = avSlotSel && avSlotSel.value;
        entry.rewardAvatarName = (avPieceOpt && avPieceOpt.getAttribute("data-name")) || avPieceId;
      } else if(prizeType === "title"){
        var titleId = document.getElementById("prizeRewardTitleId").value;
        var titleTextEl = document.getElementById("prizeTitleSelectedText");
        if(!titleId){ errEl.textContent = "Select a title."; return; }
        entry.rewardType = "title";
        entry.rewardTitleId = titleId;
        entry.rewardTitleText = titleTextEl ? titleTextEl.textContent : "";
      } else {
        var carSel = document.getElementById("prizeCarSelect");
        var carId = carSel && carSel.value;
        var carOpt = carSel && carSel.options[carSel.selectedIndex];
        var carName = carOpt && carOpt.getAttribute("data-name");
        if(!carId){ errEl.textContent = "Select a car."; return; }
        entry.rewardType = "car";
        entry.rewardCarId = carId;
        entry.rewardCarName = carName || carId;
      }

      var btn = document.getElementById("addWheelPrizeBtn");
      btn.disabled = true; btn.textContent = "Adding...";
      try{
        var list = await fetchWheelPrizes();
        list.push(entry);
        var res = await saveWheelPrizes(list);
        if(!res.ok){ errEl.textContent = "Couldn\u2019t save: " + res.error; return; }
        wheelPrizesCache = list;
        renderAdminWheelList();
      }catch(e){
        errEl.textContent = "Unexpected error: " + ((e&&e.message)?e.message:String(e));
      }finally{
        btn.disabled = false; btn.textContent = "Add Prize";
      }
    });

    renderAdminWheelList();
  }

  async function renderAdminWheelList(){
    var box = document.getElementById("adminWheelList");
    if(!box) return;
    var activeWheelId = state.adminWheelSub || "bad";
    var allPrizes = await fetchWheelPrizes();
    wheelPrizesCache = allPrizes;
    if(!document.getElementById("adminWheelList")) return;

    var list = allPrizes.filter(function(p){ return p.wheelId === activeWheelId; });
    if(!list.length){
      box.innerHTML = '<div class="center-note">No prizes on this wheel yet \u2014 add one above.</div>';
      return;
    }

    var wheelConfig = getWheelConfig(wheelConfigsCache, activeWheelId) || DEFAULT_WHEEL_CONFIGS[0];
    var grouped = groupWheelPrizesByTier(list, wheelConfig.tiers);
    var ordered = [];
    wheelConfig.tiers.forEach(function(t){ ordered = ordered.concat(grouped[t]); });

    box.innerHTML = ordered.map(function(p){
      var label = p.rewardType === "car" ? p.rewardCarName
                : p.rewardType === "avatar" ? (p.rewardAvatarName || "Avatar Piece")
                : p.rewardType === "title" ? ('\u201C' + (p.rewardTitleText || "Title") + '\u201D')
                : (p.rewardNameTagName || "Name Tag");
      var typeBadge = p.rewardType === "car" ? "\uD83D\uDE97 Car"
                : p.rewardType === "avatar" ? ("\uD83E\uDDCD " + (p.rewardAvatarSlot ? AVATAR_SLOT_LABELS[p.rewardAvatarSlot] : "Avatar"))
                : p.rewardType === "title" ? "\uD83D\uDCDC Title"
                : "\uD83C\uDFF7\uFE0F Name Tag";
      return '<div class="admin-car-row">' +
        '<div style="flex:1;min-width:0;">' +
          '<div style="font-weight:700;font-size:14px;">' + escapeHtml(label) + '</div>' +
          '<div style="font-size:12px;color:var(--muted);">' + rarityTextHtml(p.rarity) + ' \u2022 ' + typeBadge + '</div>' +
        '</div>' +
        '<button class="small-btn" data-del-wp="' + escapeHtml(p.id) + '">Delete</button>' +
      '</div>';
    }).join("");

    box.querySelectorAll("[data-del-wp]").forEach(function(btn){
      btn.addEventListener("click", async function(){
        var id = btn.getAttribute("data-del-wp");
        btn.disabled = true; btn.textContent = "...";
        var list2 = await fetchWheelPrizes();
        list2 = list2.filter(function(p){ return p.id !== id; });
        await saveWheelPrizes(list2);
        renderAdminWheelList();
      });
    });
  }

  function attachSeasonRewardFieldListeners(prefix, pendingImages){
    document.getElementById(prefix + "Type").addEventListener("change", function(){
      var v = this.value;
      document.getElementById(prefix + "CoinsWrap").style.display = (v==="coins") ? "" : "none";
      document.getElementById(prefix + "CarWrap").style.display = (v==="car") ? "" : "none";
      document.getElementById(prefix + "NameTagWrap").style.display = (v==="nameTag") ? "" : "none";
      document.getElementById(prefix + "AvatarWrap").style.display = (v==="avatar") ? "" : "none";
      var tw = document.getElementById(prefix + "TitleWrap"); if(tw) tw.style.display = (v==="title") ? "" : "none";
      var fsw = document.getElementById(prefix + "FreeSpinsWrap"); if(fsw) fsw.style.display = (v==="freeSpins") ? "" : "none";
      // Load lists when shown
      if(v === "nameTag") renderSeasonNTList(prefix, "");
      if(v === "avatar") renderSeasonAVList(prefix, "");
      if(v === "car") renderSeasonCarList(prefix, "");
      if(v === "title") renderSeasonTitleList(prefix, "");
      document.getElementById(prefix + "TitleWrap").style.display = (v==="title") ? "" : "none";
    });

    // --- Title picker for season ---
    function renderSeasonTitleList(p, q){
      var listEl = document.getElementById(p + "TitleList"); if(!listEl) return;
      fetchTitleCatalog().then(function(titles){
        var filtered = q ? titles.filter(function(t){ return (t.text||"").toLowerCase().indexOf(q.toLowerCase()) !== -1; }) : titles;
        var selId = document.getElementById(p + "TitleId") ? document.getElementById(p + "TitleId").value : "";
        if(!filtered.length){ listEl.innerHTML = '<div style="color:var(--muted);font-size:13px;padding:8px;">No titles.</div>'; return; }

  function readSeasonRewardFromForm(prefix, pendingImages){
    var type = document.getElementById(prefix + "Type").value;
    if(type === "none") return { rewardType: "none" };
    if(type === "coins"){
      var amt = parseInt(document.getElementById(prefix + "Coins").value, 10);
      if(!amt || amt < 1) return null;
      return { rewardType: "coins", rewardCoins: amt };
    }
    if(type === "car"){
      var carHid = document.getElementById(prefix + "CarSelect");
      var carId = carHid && carHid.value;
      var carNameEl = document.getElementById(prefix + "CarSelectedName");
      if(!carId) return null;
      return { rewardType: "car", rewardCarId: carId, rewardCarName: (carNameEl ? carNameEl.textContent : "") || carId };
    }
    if(type === "nameTag"){
      if(!pendingImages[prefix]) return null;
      var ntNameEl = document.getElementById(prefix + "NTSelectedName");
      return { rewardType: "nameTag", rewardNameTagImage: pendingImages[prefix], rewardNameTagName: ntNameEl ? ntNameEl.textContent : "" };
    }
    if(type === "avatar"){
      var avSlotHid = document.getElementById(prefix + "AvatarSlotSelect");
      var avPieceHid = document.getElementById(prefix + "AvatarSelect");
      var avPieceId = avPieceHid && avPieceHid.value;
      var avNameEl = document.getElementById(prefix + "AVSelectedName");
      if(!avPieceId) return null;
      return {
        rewardType: "avatar",
        rewardAvatarPieceId: avPieceId,
        rewardAvatarSlot: avSlotHid && avSlotHid.value,
        rewardAvatarName: avNameEl ? avNameEl.textContent.split(" (")[0] : avPieceId
      };
    }
    if(type === "title"){
      var titleHid = document.getElementById(prefix + "TitleId");
      var titleId = titleHid && titleHid.value;
      var titleTextEl = document.getElementById(prefix + "TitleSelectedText");
      if(!titleId) return null;
      return { rewardType: "title", rewardTitleId: titleId, rewardTitleText: titleTextEl ? titleTextEl.textContent : "" };
    }
    if(type === "freeSpins"){
      var spinCount = parseInt(document.getElementById(prefix + "FreeSpinsCount").value, 10);
      if(!spinCount || spinCount < 1) return null;
      return { rewardType: "freeSpins", rewardSpinCount: spinCount };
    }
    return { rewardType: "none" };
  }

  function populateSeasonRewardForm(prefix, reward, pendingImages){
    var type = (reward && reward.rewardType) || "none";
    document.getElementById(prefix + "Type").value = type;
    document.getElementById(prefix + "CoinsWrap").style.display = (type==="coins") ? "" : "none";
    document.getElementById(prefix + "CarWrap").style.display = (type==="car") ? "" : "none";
    document.getElementById(prefix + "NameTagWrap").style.display = (type==="nameTag") ? "" : "none";
    document.getElementById(prefix + "AvatarWrap").style.display = (type==="avatar") ? "" : "none";
    if(type === "coins") document.getElementById(prefix + "Coins").value = reward.rewardCoins || 100;
    if(type === "car"){
      var carHid = document.getElementById(prefix + "CarSelect");
      if(carHid) carHid.value = reward.rewardCarId || "";
      if(reward.rewardCarName){
        var sd = document.getElementById(prefix + "CarSelected"); if(sd) sd.style.display = "";
        var sn = document.getElementById(prefix + "CarSelectedName"); if(sn) sn.textContent = reward.rewardCarName;
      }
    }
    if(type === "nameTag" && reward.rewardNameTagImage){
      pendingImages[prefix] = reward.rewardNameTagImage;
      var ntSelDiv = document.getElementById(prefix + "NTSelected");
      var ntSelImg = document.getElementById(prefix + "NTSelectedImg");
      if(ntSelDiv) ntSelDiv.style.display = "";
      if(ntSelImg) ntSelImg.innerHTML = '<img src="' + reward.rewardNameTagImage + '" alt="" style="width:100%;height:100%;object-fit:contain;display:block;" />';
    }
    if(type === "avatar" && reward.rewardAvatarPieceId){
      var hidS = document.getElementById(prefix + "AvatarSlotSelect");
      var hidP = document.getElementById(prefix + "AvatarSelect");
      if(hidS) hidS.value = reward.rewardAvatarSlot || "";
      if(hidP) hidP.value = reward.rewardAvatarPieceId;
      var avSelDiv = document.getElementById(prefix + "AVSelected");
      var avSelName = document.getElementById(prefix + "AVSelectedName");
      if(avSelDiv) avSelDiv.style.display = "";
      if(avSelName) avSelName.textContent = (reward.rewardAvatarName || reward.rewardAvatarPieceId) + (reward.rewardAvatarSlot ? " (" + (AVATAR_SLOT_LABELS[reward.rewardAvatarSlot] || reward.rewardAvatarSlot) + ")" : "");
    }
    if(type === "title" && reward.rewardTitleId){
      var titleHid = document.getElementById(prefix + "TitleId");
      if(titleHid) titleHid.value = reward.rewardTitleId;
      var titleSelDiv = document.getElementById(prefix + "TitleSelected");
      var titleSelText = document.getElementById(prefix + "TitleSelectedText");
      if(titleSelDiv) titleSelDiv.style.display = "";
      if(titleSelText) titleSelText.textContent = reward.rewardTitleText || reward.rewardTitleId;
    }
    var fspw = document.getElementById(prefix + "FreeSpinsWrap"); if(fspw) fspw.style.display = (type==="freeSpins") ? "" : "none";
    if(type === "freeSpins") document.getElementById(prefix + "FreeSpinsCount").value = reward.rewardSpinCount || 1;
  }

                var avgWpm = a.races ? Math.round((a.sumWpm||0)/a.races) : 0;

          msg.style.color = "var(--green)";
          msg.textContent = "Season reset! " + resetCount + " accounts cleared.";

      // Reset Season Points
